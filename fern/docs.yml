# yaml-language-server: $schema=https://schema.buildwithfern.dev/docs-yml.json

instances:
  - url: signalwire.docs.buildwithfern.com # update this to {yourorg}.docs.buildwithfern.com
    # custom-domain: signalwire.dev # specify your custom domain when you are ready to go live

title: SignalWire

layout:
  searchbar-placement: header
  page-width: full

products:

  - display-name: Home
    path: products/home/home.yml

  - display-name: REST API
    slug: rest-api
    path: products/rest-api.yml

  - display-name: SWML
    slug: swml
    path: products/swml/swml.yml

  - display-name: Agents SDK
    slug: agents-sdk
    path: products/agents-sdk/agents-sdk.yml

  - display-name: Realtime SDK
    slug: realtime-sdk
    path: products/realtime-sdk/versions/v4.yml
    versions:
      - display-name: v4
        path: products/realtime-sdk/versions/v4.yml
        availability: stable
      - display-name: v3
        path: products/realtime-sdk/versions/v3.yml
        availability: deprecated
      - display-name: v2
        path: products/realtime-sdk/versions/v2.yml
        availability: deprecated

  - display-name: Call Flow Builder
    slug: call-flow-builder
    path: products/call-flow-builder/call-flow-builder.yml

  - display-name: Cantina
    slug: cantina
    path: products/cantina/cantina.yml

  - display-name: Platform
    slug: platform
    path: products/platform/platform.yml

colors:
  accent-primary:
    light: '#044ef4'  # SW Blue for light mode
    dark: '#40e0d0'   # SW Turquoise for dark mode
  background:
    light: '#ffffff'  # SW White
    dark: '#0a1628'   # SW Navy (visible blue tint)


logo:
  dark: docs/assets/signalwire-logo-light.svg
  light: docs/assets/signalwire-logo-dark.svg
  height: 25
  href: /

favicon: docs/assets/signalwire-favicon.png

typography:
  headingsFont:
    name: Neue Einstellung
    paths:
      - path: docs/fonts/neueeinstellung-bold.woff2
        weight: 700
        style: normal
      - path: docs/fonts/neueeinstellung-medium.woff2
        weight: 500
        style: normal
  bodyFont:
    name: Inter
    path: docs/fonts/Inter-Regular.ttf
    weight: 400
    style: normal

css:
  - docs/styles/styles.css
