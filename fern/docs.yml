instances:
  - url: signalwire.docs.buildwithfern.com # update this to {yourorg}.docs.buildwithfern.com
    # custom-domain: signalwire.dev # specify your custom domain when you are ready to go live

title: SignalWire

layout:
  searchbar-placement: header
  page-width: full

products:
  - display-name: Realtime Server SDK
    slug: realtime-server-sdk
    path: products/versions/v4.yml
    versions:
      - display-name: v4
        slug: v4
        path: products/versions/v4.yml
      - display-name: v3
        slug: v3
        path: products/versions/v3.yml
      - display-name: v2
        slug: v2
        path: products/versions/v2.yml

  - display-name: REST API
    slug: rest-api
    path: products/rest-api.yml

colors:
  accentPrimary:
    dark: '#1d4bed'
    light: '#1d4bed'
  background:
    dark: '#000000'
    light: '#FFFFFF'

logo:
  dark: docs/assets/signalwire-logo-light.svg
  light: docs/assets/signalwire-logo-dark.svg
  height: 25
  href: https://buildwithfern.com/?utm_campaign=demo&utm_medium=signalwire&utm_source=logo

favicon: docs/assets/signalwire-favicon.png

css: ./styles.css
