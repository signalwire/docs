# yaml-language-server: $schema=https://schema.buildwithfern.dev/docs-yml.json

instances:
  - url: signalwire.docs.buildwithfern.com/docs
    custom-domain: signalwire.com/docs
    edit-this-page:
      github:
        owner: signalwire
        repo: signalwire-fern-config
        branch: main

title: SignalWire

settings:
  folder-title-source: frontmatter

layout:
  searchbar-placement: header
  tabs-placement: header
  page-width: full

experimental:
  ai-examples: false

products:
  - display-name: Home
    slug: /
    path: products/home/home.yml
    icon: fa-regular fa-house
    subtitle: Overview and getting started

  - display-name: APIs
    slug: apis
    path: products/apis.yml
    icon: fa-regular fa-code
    subtitle: REST API reference and guides

  - display-name: SWML
    slug: swml
    path: products/swml/swml.yml
    icon: fa-regular fa-file-code
    subtitle: SignalWire Markup Language

  - display-name: Agents SDK
    slug: agents-sdk
    path: products/agents-sdk/agents-sdk.yml
    icon: fa-regular fa-robot
    subtitle: Build AI-powered voice agents

  - display-name: Server SDK
    slug: server-sdk
    path: products/realtime-sdk/versions/latest.yml
    icon: fa-regular fa-bolt
    subtitle: WebSocket-based server SDK
    versions:
      - display-name: v4
        path: products/realtime-sdk/versions/latest.yml
        availability: stable
      - display-name: v3
        path: products/realtime-sdk/versions/v3.yml
        availability: deprecated
        slug: v3
      - display-name: v2
        path: products/realtime-sdk/versions/v2.yml
        availability: deprecated
        slug: v2

  - display-name: Browser SDK
    slug: browser-sdk
    path: products/browser-sdk/versions/latest.yml
    icon: fa-regular fa-browser
    subtitle: Client-side WebRTC SDK
    versions:
      - display-name: v3
        path: products/browser-sdk/versions/latest.yml
        availability: stable
        slug: v3
      - display-name: v2
        path: products/browser-sdk/versions/v2.yml
        availability: deprecated
        slug: v2

  - display-name: Platform
    slug: platform
    path: products/platform/platform.yml
    icon: fa-regular fa-gear
    subtitle: Dashboard, configuration & admin

  - display-name: Compatibility API
    slug: compatibility-api
    path: products/compatibility-api/compatibility-api.yml
    icon: fa-regular fa-right-left
    subtitle: Migrate your TwiML™-based applications to SignalWire with ease

  # Column 3 (Tools)
  - display-name: Call Flow Builder
    slug: call-flow-builder
    path: products/call-flow-builder/call-flow-builder.yml
    icon: fa-regular fa-diagram-project

  - display-name: Wirestarter
    href: /platform/tools/wirestarter
    icon: fa-regular fa-plug

  - display-name: SWSH
    href: /platform/tools/swsh
    icon: fa-regular fa-terminal

theme:
  page-actions: toolbar

page-actions:
  options:
    cursor: false
    vscode: false

colors:
  accent-primary:
    light: "#044ef4" # SW Blue for light mode
    dark: "#40e0d0" # SW Turquoise for dark mode
  background:
    light: "#ffffff" # SW White
    dark: "#0a1628" # SW Navy (visible blue tint)

logo:
  dark: assets/signalwire-logo-light.svg
  light: assets/signalwire-logo-dark.svg
  height: 25
  href: /docs

favicon: assets/signalwire-favicon.png

typography:
  headingsFont:
    name: Neue Einstellung
    paths:
      - path: assets/fonts/neueeinstellung-bold.woff2
        weight: 700
        style: normal
      - path: assets/fonts/neueeinstellung-medium.woff2
        weight: 500
        style: normal
  bodyFont:
    name: Inter
    path: assets/fonts/Inter-Regular.ttf
    weight: 400
    style: normal

analytics:
  posthog:
    api-key: phc_Q78tnozKNjbx1lFBHBJkO7Qp3zLE3RISYS58cpVr7kX

css:
  - styles.css
