instances:
  - url: signalwire.docs.buildwithfern.com # update this to {yourorg}.docs.buildwithfern.com
    # custom-domain: signalwire.dev # specify your custom domain when you are ready to go live

title: SignalWire

layout:
  searchbar-placement: header
  page-width: full

products:
  - display-name: Realtime Server SDK
    slug: realtime-server-sdk
    path: products/realtime-server-sdk.yml

navigation:
  - section: Get Started
    contents:
      - page: Welcome
        path: docs/pages/welcome.mdx
      - page: Concepts
        path: docs/pages/concepts.mdx
      - page: SDKs
        path: docs/pages/sdks.mdx
        slug: sdks
  - api: API Reference
    snippets:
      python: signalwire-sdk
      typescript: signalwire-sdk

default-language: typescript

navbar-links:
  - type: secondary
    text: Fork this repo
    url: https://github.com/fern-api/docs-starter
  - type: primary
    text: Get a demo
    url: https://buildwithfern.com/contact?utm_campaign=demo&utm_medium=signalwire&utm_source=navbar

colors:
  accentPrimary:
    dark: '#1d4bed'
    light: '#1d4bed'
  background:
    dark: '#000000'
    light: '#FFFFFF'

logo:
  dark: docs/assets/signalwire-logo-light.svg
  light: docs/assets/signalwire-logo-dark.svg
  height: 25
  href: https://buildwithfern.com/?utm_campaign=demo&utm_medium=signalwire&utm_source=logo

favicon: docs/assets/signalwire-favicon.png
