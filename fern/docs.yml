# yaml-language-server: $schema=https://schema.buildwithfern.dev/docs-yml.json

instances:
  - url: signalwire.docs.buildwithfern.com/docs
    custom-domain: signalwire.com/docs
    edit-this-page:
      github:
        owner: signalwire
        repo: docs
        branch: main

title: SignalWire

settings:
  folder-title-source: frontmatter

layout:
  searchbar-placement: header
  tabs-placement: header
  page-width: full

landing-page:
  page: Home
  path: products/home/pages/welcome.mdx

agents:
  page-directive: >-
    For a complete index of all SignalWire documentation pages, fetch
    https://signalwire.com/docs/llms.txt

experimental:
  ai-examples: false

products:
  - display-name: Home
    slug: /
    path: products/home/home.yml
    icon: fa-regular fa-home
    subtitle: Overview and getting started

  # Column 1 (Products)
  - display-name: Platform
    slug: platform
    path: products/platform/platform.yml
    icon: fa-regular fa-planet-ringed
    subtitle: Dashboard, configuration & administration

  - display-name: Call Flow Builder
    slug: call-flow-builder
    path: products/call-flow-builder/call-flow-builder.yml
    icon: fa-regular fa-diagram-project
    subtitle: Drag-and-drop call flows and AI agents

  # Column 2 (Server SDKs)
  - display-name: Server SDKs
    slug: server-sdks
    path: products/server-sdks/server-sdks.yml
    icon: fa-regular fa-code
    subtitle: Build AI agents, control calls, send messages, and more

  # Deprecated: Agents SDK and Server SDK are now part of the unified SDKs product above.
  # Their directories are preserved for reference but no longer rendered as products.

  - display-name: Browser SDK
    slug: browser-sdk
    path: products/browser-sdk/versions/latest.yml
    icon: fa-regular fa-browser
    subtitle: Build voice, video and chat applications for the browser
    versions:
      - display-name: v3
        path: products/browser-sdk/versions/latest.yml
        availability: stable
        slug: v3
      - display-name: v2
        path: products/browser-sdk/versions/v2.yml
        availability: deprecated
        slug: v2

  - display-name: SDK Reference
    slug: sdk-reference
    path: products/sdk-reference/sdk-reference.yml
    icon: fa-regular fa-books
    subtitle: Auto-generated reference for every SignalWire SDK

  # Column 3 (APIs)
  - display-name: APIs
    slug: apis
    path: products/apis/apis.yml
    icon: fa-regular fa-rectangle-api
    subtitle: Send SMS, manage calls, administer SignalWire

  - display-name: SWML
    slug: swml
    path: products/swml/swml.yml
    icon: ./assets/icons/swml.svg
    subtitle: Write communication applications, call flows and AI agents

  - display-name: Compatibility API
    slug: compatibility-api
    path: products/compatibility-api/compatibility-api.yml
    icon: fa-regular fa-scroll-old
    subtitle: Migrate your TwiML™-based applications to SignalWire with ease

theme:
  page-actions: toolbar

page-actions:
  options:
    cursor: false
    vscode: false
    ask-ai: false

colors:
  accent-primary:
    light: "#044ef4" # SW Blue for light mode
    dark: "#40e0d0" # SW Turquoise for dark mode
  background:
    light: "#FAFBFC" # SW Light page (cool gray, per brand tokens)
    dark: "#0e0e18" # SW Dark page (near-black, per brand tokens)

logo:
  dark: assets/logo-no-text.svg
  light: assets/logo-no-text.svg
  right-text: SignalWire Docs
  height: 25
  href: /docs

navbar-links:
  - type: minimal
    text: Log in
    href: https://signalwire.com/signin
  - type: outlined
    text: Sign up
    href: https://signalwire.com/signup
  - type: dropdown
    text: Support
    links:
      - text: Create a ticket
        href: https://signalwire.zohodesk.com/portal/en/newticket
        target: _blank
      - text: My tickets
        href: https://signalwire.zohodesk.com/portal/en/myarea
        target: _blank
      - text: Status
        href: https://status.signalwire.com/
        target: _blank

favicon: assets/signalwire-favicon.png

metadata:
  og:dynamic: true

typography:
  headingsFont:
    name: Instrument Sans
    paths:
      - path: assets/fonts/instrument-sans.woff2
        weight: 700
        style: normal
      - path: assets/fonts/instrument-sans.woff2
        weight: 500
        style: normal
  bodyFont:
    name: Lexend
    path: assets/fonts/lexend-400.woff2
    weight: 400
    style: normal
  codeFont:
    name: JetBrains Mono
    path: assets/fonts/jetbrains-mono-400.woff2
    weight: 400
    style: normal

css:
  - brand-tokens.css
  - brand-overrides.css
  - styles.css


redirects:
  - source: /docs/agents-sdk
    destination: /docs/server-sdks
  - source: /docs/agents-sdk/:slug*
    destination: /docs/server-sdks
  - source: /docs/server-sdk
    destination: /docs/server-sdks
  - source: /docs/server-sdk/:slug*
    destination: /docs/server-sdks

  # SWML methods reorganized into calling/ and messaging/ subsections.
  # The old methods overview lived at /docs/swml/reference, which was
  # entirely calling-flavored — point it at the new calling overview.
  - source: /docs/swml/reference
    destination: /docs/swml/reference/calling

  # Folder-style methods with nested sub-pages — wildcard catches every old child path.
  - source: /docs/swml/reference/ai
    destination: /docs/swml/reference/calling/ai
  - source: /docs/swml/reference/ai/:slug*
    destination: /docs/swml/reference/calling/ai/:slug*
  - source: /docs/swml/reference/amazon-bedrock
    destination: /docs/swml/reference/calling/amazon-bedrock
  - source: /docs/swml/reference/amazon-bedrock/:slug*
    destination: /docs/swml/reference/calling/amazon-bedrock/:slug*

  # Top-level calling method slugs (one redirect per method — a blanket
  # /docs/swml/reference/:slug wildcard would incorrectly catch /messaging/* too).
  - source: /docs/swml/reference/answer
    destination: /docs/swml/reference/calling/answer
  - source: /docs/swml/reference/cond
    destination: /docs/swml/reference/calling/cond
  - source: /docs/swml/reference/connect
    destination: /docs/swml/reference/calling/connect
  - source: /docs/swml/reference/denoise
    destination: /docs/swml/reference/calling/denoise
  - source: /docs/swml/reference/detect-machine
    destination: /docs/swml/reference/calling/detect-machine
  - source: /docs/swml/reference/enter-queue
    destination: /docs/swml/reference/calling/enter-queue
  - source: /docs/swml/reference/execute
    destination: /docs/swml/reference/calling/execute
  - source: /docs/swml/reference/goto
    destination: /docs/swml/reference/calling/goto
  - source: /docs/swml/reference/hangup
    destination: /docs/swml/reference/calling/hangup
  - source: /docs/swml/reference/join-conference
    destination: /docs/swml/reference/calling/join-conference
  - source: /docs/swml/reference/join-room
    destination: /docs/swml/reference/calling/join-room
  - source: /docs/swml/reference/label
    destination: /docs/swml/reference/calling/label
  - source: /docs/swml/reference/live-transcribe
    destination: /docs/swml/reference/calling/live-transcribe
  - source: /docs/swml/reference/live-translate
    destination: /docs/swml/reference/calling/live-translate
  - source: /docs/swml/reference/pay
    destination: /docs/swml/reference/calling/pay
  - source: /docs/swml/reference/play
    destination: /docs/swml/reference/calling/play
  - source: /docs/swml/reference/prompt
    destination: /docs/swml/reference/calling/prompt
  - source: /docs/swml/reference/receive-fax
    destination: /docs/swml/reference/calling/receive-fax
  - source: /docs/swml/reference/record
    destination: /docs/swml/reference/calling/record
  - source: /docs/swml/reference/record-call
    destination: /docs/swml/reference/calling/record-call
  - source: /docs/swml/reference/request
    destination: /docs/swml/reference/calling/request
  - source: /docs/swml/reference/return
    destination: /docs/swml/reference/calling/return
  - source: /docs/swml/reference/send-digits
    destination: /docs/swml/reference/calling/send-digits
  - source: /docs/swml/reference/send-fax
    destination: /docs/swml/reference/calling/send-fax
  - source: /docs/swml/reference/send-sms
    destination: /docs/swml/reference/calling/send-sms
  - source: /docs/swml/reference/set
    destination: /docs/swml/reference/calling/set
  - source: /docs/swml/reference/sip-refer
    destination: /docs/swml/reference/calling/sip-refer
  - source: /docs/swml/reference/sleep
    destination: /docs/swml/reference/calling/sleep
  - source: /docs/swml/reference/stop-denoise
    destination: /docs/swml/reference/calling/stop-denoise
  - source: /docs/swml/reference/stop-record-call
    destination: /docs/swml/reference/calling/stop-record-call
  - source: /docs/swml/reference/stop-tap
    destination: /docs/swml/reference/calling/stop-tap
  - source: /docs/swml/reference/switch
    destination: /docs/swml/reference/calling/switch
  - source: /docs/swml/reference/tap
    destination: /docs/swml/reference/calling/tap
  - source: /docs/swml/reference/transfer
    destination: /docs/swml/reference/calling/transfer
  - source: /docs/swml/reference/unset
    destination: /docs/swml/reference/calling/unset
  - source: /docs/swml/reference/user-event
    destination: /docs/swml/reference/calling/user-event

check:
  rules:
    no-circular-redirects: error
    no-non-component-refs: error
    broken-links: error
    valid-docs-endpoints: error
    valid-local-references: error
    example-validation: error
    missing-redirects: error
