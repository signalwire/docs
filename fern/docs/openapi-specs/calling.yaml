            type: object
            properties:
              active:
                anyOf:
                  - type: boolean
                  - $ref: '#/components/schemas/SWMLVar'
                description: Whether to activate or deactivate the functions. Default is `true`
              function:
                anyOf:
                  - type: string
                  - type: array
                    items:
                      type: string
                description: The function names to toggle.
            required:
              - active
              - function
          description: Whether to toggle the functions on or off.
          title: toggle_functions
      title: ToggleFunctionsAction object
    TranscribeAction:
      anyOf:
        - $ref: '#/components/schemas/TranscribeStartAction'
        - type: string
          enum:
            - stop
        - $ref: '#/components/schemas/TranscribeSummarizeActionUnion'
      title: TranscribeAction union
    TranscribeDirection:
      type: string
      enum:
        - remote-caller
        - local-caller
      title: TranscribeDirection enum
    TranscribeStartAction:
      type: object
      required:
        - start
      properties:
        start:
          type: object
          properties:
            ai_summary:
              anyOf:
                - type: boolean
                - $ref: '#/components/schemas/SWMLVar'
              description: Enables AI summarization of the transcription. The summary will be sent to the specified URL at the end of the conversation.
            webhook:
              type: string
              description: The webhook URL the transcription will be sent to.
            lang:
              type: string
              description: The language to transcribe.
            live_events:
              anyOf:
                - type: boolean
                - $ref: '#/components/schemas/SWMLVar'
              description: Whether to enable live events.
            speech_timeout:
              anyOf:
                - type: integer
                - $ref: '#/components/schemas/SWMLVar'
              description: The timeout for speech recognition.
            vad_silence_ms:
              anyOf:
                - type: integer
                - $ref: '#/components/schemas/SWMLVar'
              description: Voice activity detection silence time in milliseconds.
            vad_thresh:
              anyOf:
                - type: integer
                - $ref: '#/components/schemas/SWMLVar'
              description: Voice activity detection threshold.
            debug_level:
              anyOf:
                - type: integer
                - $ref: '#/components/schemas/SWMLVar'
              description: Debug level for logging
            direction:
              type: array
              items:
                $ref: '#/components/schemas/TranscribeDirection'
              description: The direction of the call that should be transcribed.
            speech_engine:
              type: string
              description: The speech engine to be used.
            summary_prompt:
              type: string
              description: The prompt for summarizaton.
          required:
            - lang
            - direction
            - speech_engine
          description: Starts live transcription of the call. The transcription will be sent to the specified URL.
      title: TranscribeStartAction object
    TranscribeSummarizeAction:
      type: object
      required:
        - summarize
      properties:
        summarize:
          type: object
          properties:
            webhook:
              type: string
              description: The webhook URL to be called.
            prompt:
              type: string
              description: The prompt for summarizaton.
          description: Summarizes the conversation as an object, allowing you to specify the webhook url and prompt for the summary.
      title: TranscribeSummarizeAction object
    TranscribeSummarizeActionUnion:
      anyOf:
        - $ref: '#/components/schemas/TranscribeSummarizeAction'
        - type: string
          enum:
            - summarize
      title: TranscribeSummarizeAction union
    Transfer:
      type: object
      required:
        - transfer
      properties:
        transfer:
          type: object
          properties:
            dest:
              type: string
              description: |-
                Specifies where to transfer the call. The value can be one of:
                    - `<section_name>` - section in the SWML document to jump to.
                    - `https://<URL>` - URL pointing to the document to transfer to. Sends HTTP POST.
            params:
              type: object
              additionalProperties: {}
              description: |-
                Named parameters to send to transfer destination.
                Accepts an object mapping variable names to values.
                Default is not set.
            meta:
              type: object
              additionalProperties: {}
              description: |-
                User data, ignored by SignalWire.
                Accepts an object mapping variable names to values.
                Default is not set.
          required:
            - dest
          description: Transfer the execution of the script to a new URL or SWML Section.
          title: transfer
      title: Transfer object
    TranslateAction:
      anyOf:
        - $ref: '#/components/schemas/StartAction'
        - type: string
          enum:
            - stop
        - $ref: '#/components/schemas/SummarizeActionUnion'
        - $ref: '#/components/schemas/InjectAction'
      title: TranslateAction union
    TranslateDirection:
      type: string
      enum:
        - remote-caller
        - local-caller
      title: TranslateDirection enum
    Types.StatusCodes.StatusCode401:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          enum:
            - Unauthorized
    Types.StatusCodes.StatusCode404:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          enum:
            - Not Found
    Types.StatusCodes.StatusCode422Error:
      type: object
      required:
        - type
        - code
        - message
        - attribute
        - url
      properties:
        type:
          type: string
          description: Error type.
        code:
          type: string
          description: Error code.
        message:
          type: string
          description: Error details.
        attribute:
          type: string
          description: Request parameter associated with this error.
        url:
          type: string
          description: Link to developer resource for this error.
    Unset:
      type: object
      required:
        - unset
      properties:
        unset:
          type: object
          properties:
            vars:
              anyOf:
                - type: string
                - type: array
                  items:
                    type: string
              description: Names of the variables to unset.
          required:
            - vars
          description: Un set a variable that as been `set`.
          title: unset
      title: Unset object
    UnsetGlobalDataAction:
      type: object
      required:
        - unset_global_data
      properties:
        unset_global_data:
          anyOf:
            - type: string
            - type: object
          description: The key of the global data to unset from the `global_data`. You can also reset the `global_data` by passing in a new object.
          title: unset_global_data
      title: UnsetGlobalDataAction object
    UnsetMetaDataAction:
      type: object
      required:
        - unset_meta_data
      properties:
        unset_meta_data:
          anyOf:
            - type: string
            - type: object
          description: The key of the local data to unset from the `meta_data`. You can also reset the `meta_data` by passing in a new object.
          title: unset_meta_data
      title: UnsetMetaDataAction object
    UpdateCurrentCallRequest:
      oneOf:
        - $ref: '#/components/schemas/CallUpdateSWMLRequest'
        - $ref: '#/components/schemas/CallUpdateURLRequest'
      title: Update call
    UserEvent:
      type: object
      required:
        - user_event
      properties:
        user_event:
          type: object
          properties:
            event:
              type: object
              additionalProperties: {}
          required:
            - event
          description: |-
            Allows the user to set and send events to the connected client on the call.
            This is useful for triggering actions on the client side.
            Commonly used with the [browser-sdk](https://developer.signalwire.com/sdks/reference/browser-sdk/SignalWire%20Client/).
            The event object can be any valid JSON object.
            Any key-value pair in the object is sent to the client as an event type called `user_event`.
      title: user_event Object
    UserInputAction:
      type: object
      required:
        - user_input
      properties:
        user_input:
          type: string
          description: Used to inject text into the users queue as if they input the data themselves.
          title: user_input
      title: UserInputAction object
    UserSWAIGFunction:
      type: object
      required:
        - description
        - function
      properties:
        description:
          type: string
          description: A description of the context and purpose of the function, to explain to the agent when to use it.
        purpose:
          type: string
          description: |-
            The purpose field has been deprecated and is replaced by the `description` field.
            A description of the context and purpose of the function, to explain to the agent when to use it.
          deprecated: true
        parameters:
          allOf:
            - $ref: '#/components/schemas/FunctionParameters'
          description: A JSON object that defines the expected user input parameters and their validation rules for the function.
        fillers:
          allOf:
            - $ref: '#/components/schemas/FunctionFillers'
          description: A JSON object defining the fillers that should be played when calling a `swaig function`. This helps the AI break silence between responses. The filler is played asynchronously during the function call.
        argument:
          allOf:
            - $ref: '#/components/schemas/FunctionParameters'
          description: |-
            The argument field has been deprecated and is replaced by the `parameters` field. 
            A JSON object defining the input that should be passed to the function. 
            The fields of this object are the following two parameters.
          deprecated: true
        active:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: Whether the function is active. Default is `true`.
        meta_data:
          type: object
          additionalProperties: {}
          description: |-
            A powerful and flexible environmental variable which can accept arbitrary data that is set initially in the SWML script or from the SWML set_meta_data action.
            This data can be referenced locally to the function.
            All contained information can be accessed and expanded within the prompt - for example, by using a template string.
            Default is not set.
        meta_data_token:
          type: string
          description: Scoping token for meta_data. If not supplied, metadata will be scoped to function's `web_hook_url`. Default is set by SignalWire.
        data_map:
          allOf:
            - $ref: '#/components/schemas/DataMap'
          minProperties: 1
          description: |-
            An object that processes function inputs and executes operations through expressions, webhooks, or direct output.
            Properties are evaluated in strict priority order:
            1. expressions
            2. webhooks
            3. output

            Evaluation stops at the first property that returns a valid output result, similar to a return statement in a function.
            Any subsequent properties are ignored when a valid output is returned.
            If a valid output is not returned from any of the properties, a generic error message is returned.
        skip_fillers:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: A boolean value, if set to `true`, it forces generic fillers to be skipped. Only function specific fillers will be played.
        web_hook_url:
          type: string
          description: Function-specific URL to send status callbacks and reports to. Takes precedence over a default setting. Authentication can also be set in the url in the format of `username:password@url.`
        wait_file:
          type: string
          format: uri
          description: A file to play while the function is running. `wait_file_loops` can specify the amount of times that files should continously play. Default is not set.
        wait_file_loops:
          anyOf:
            - type: integer
            - type: string
          description: The number of times to loop playing the file. Default is not set.
        wait_for_fillers:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: Wait for fillers to finish before continuing. Default is not set.
        function:
          type: string
          description: The unique name for the function.
      title: functions
    ValidConfirmMethods:
      anyOf:
        - $ref: '#/components/schemas/Cond'
        - $ref: '#/components/schemas/Set'
        - $ref: '#/components/schemas/Unset'
        - $ref: '#/components/schemas/Hangup'
        - $ref: '#/components/schemas/Play'
        - $ref: '#/components/schemas/Prompt'
        - $ref: '#/components/schemas/Record'
        - $ref: '#/components/schemas/RecordCall'
        - $ref: '#/components/schemas/StopRecordCall'
        - $ref: '#/components/schemas/Tap'
        - $ref: '#/components/schemas/StopTap'
        - $ref: '#/components/schemas/SendDigits'
        - $ref: '#/components/schemas/SendSMS'
        - $ref: '#/components/schemas/Denoise'
        - $ref: '#/components/schemas/StopDenoise'
    Webhook:
      type: object
      required:
        - url
      properties:
        expressions:
          type: array
          items:
            $ref: '#/components/schemas/Expression'
          description: |-
            A list of expressions to be evaluated upon matching.
            If the following properties are set (foreach, expressions, output), they will be processed in the following order:
            1. foreach
            2. expressions
            3. output
        error_keys:
          anyOf:
            - type: string
            - type: array
              items:
                type: string
          description: A string or array of strings that represent the keys to be used for error handling. This will match the key(s) in the response from the API call.
        url:
          type: string
          description: The endpoint for the external service or API.
        foreach:
          type: object
          properties:
            input_key:
              type: string
              description: The key to be used to access the current element in the array.
            output_key:
              type: string
              description: The key that can be referenced in the output of the `foreach` iteration. The values that are stored from `append` will be stored in this key.
            max:
              anyOf:
                - type: integer
                - $ref: '#/components/schemas/SWMLVar'
              description: The max amount of elements that are iterated over in the array. This will start at the beginning of the array.
            append:
              type: string
              description: |-
                The values to append to the output_key. 
                Properties from the object can be referenced and added to the output_key by using the following syntax: 
                ${this.property_name}.
                The `this` keyword is used to reference the current object in the array.
          required:
            - input_key
            - output_key
            - append
          description: |-
            Iterates over an array of objects and processes a output based on each element in the array. Works similarly to JavaScript's forEach method.
            If the following properties are set (foreach, expressions, output), they will be processed in the following order:
            1. foreach
            2. expressions
            3. output
        headers:
          type: object
          additionalProperties: {}
          description: Any necessary headers for the API call.
        method:
          type: string
          enum:
            - GET
            - POST
            - PUT
            - DELETE
          description: The HTTP method (GET, POST, etc.) for the API call.
        input_args_as_params:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: A boolean to determine if the input arguments should be passed as parameters.
        params:
          type: object
          additionalProperties: {}
          description: An object of any necessary parameters for the API call. The key is the parameter name and the value is the parameter value.
        require_args:
          anyOf:
            - type: string
            - type: array
              items:
                type: string
          description: A string or array of strings that represent the `arguments` that are required to make the webhook request.
        output:
          allOf:
            - $ref: '#/components/schemas/Output'
          description: |-
            An object that contains a response and a list of actions to be performed upon completion of the webhook request.
            If the following properties are set (foreach, expressions, output), they will be processed in the following order:
            1. foreach
            2. expressions
            3. output
      title: Webhook object
    play_url:
      type: string
      pattern: '^(http://.*|https://.*|ring: ?[0-9.]*: ?[a-zA-Z]{2}|say: ?.*|silence: ?[0-9.]*|ring: ?[a-zA-Z]{2})$'
    uuid:
      type: string
      format: uuid
      description: Universal Unique Identifier.
  securitySchemes:
    BasicAuth:
      type: http
      scheme: Basic
servers:
  - url: https://{space_name}.signalwire.com/api/calling
    description: Endpoint
    variables:
      space_name:
        default: '{Your_Space_Name}'
