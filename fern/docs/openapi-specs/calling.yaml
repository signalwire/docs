                - dtmf
              description: The method of how to collect the payment details. Currently only `dtmf` mode is supported.
            language:
              type: string
              description: |-
                The language of the payment prompt. Default is `en-US`.

                Supported languages can be found here: https://developer.signalwire.com/swml/methods/pay/language
            max_attempts:
              anyOf:
                - type: integer
                - $ref: '#/components/schemas/SWMLVar'
              description: Number of times the `pay` method will retry to collect payment details. Default is `1`.
            min_postal_code_length:
              anyOf:
                - type: integer
                - $ref: '#/components/schemas/SWMLVar'
              description: The minimum length of the postal code the user must enter. Default is `0`.
            parameters:
              type: array
              items:
                $ref: '#/components/schemas/PayParameters'
              description: Array of parameter objects to pass to your payment processor. The parameters are user-defined key-value pairs.
            payment_method:
              type: string
              enum:
                - credit-card
              description: Indicates the payment method which is going to be used in this payment request. Currently only `credit-card` is supported.
            postal_code:
              anyOf:
                - type: boolean
                - type: string
              description: Takes `true`, `false` or real postalcode (if it's known beforehand) to let pay method know whether to prompt for postal code.
            prompts:
              type: array
              items:
                $ref: '#/components/schemas/PayPrompts'
              description: Array of prompt objects for customizing the audio prompts during different stages of the payment process.
            security_code:
              anyOf:
                - type: boolean
                - $ref: '#/components/schemas/SWMLVar'
              description: Takes true or false to let pay method know whether to prompt for security code. Default is `true`.
            status_url:
              type: string
              format: uri
              description: |-
                The URL to send requests for each status change during the payment process.

                See http://localhost:3000/swml/methods/pay#status_url_request_body for more important information.
            timeout:
              anyOf:
                - type: integer
                - $ref: '#/components/schemas/SWMLVar'
              description: Limit in seconds that pay method waits for the caller to press another digit before moving on to validate the digits captured.
            token_type:
              type: string
              enum:
                - one-time
                - reusable
              description: |-
                Whether the payment is a one off payment or re-occurring. Default is `reusable`.

                Allowed values: 
                - `one-time`
                - `reusable`
            valid_card_types:
              type: string
              description: |-
                List of payment cards allowed to use in the requested payment process separated by space.

                Allowed values: 
                - `visa`
                - `mastercard`
                - `amex`
                - `maestro`
                - `discover`
                - `jcb`
                - `diners-club`
            error_type:
              type: string
              description: |-
                Space-separated list of error types this prompt applies to.

                Allowed Error Types: 
                - `payment-card-number` - Collect the payment card number.
                - `expiration-date` - Collect the payment card expiration date.
                - `security-code` - Collect the payment card security code.
                - `postal-code` - Collect the payment card postal code.
                - `payment-processing` - The step used during the payment processing.
                - `payment-completed` - The step used when the payment is completed.
                - `payment-failed` - The step used when the payment fails.
                - `payment-canceled` - The step used when the payment is cancelled.
            voice:
              type: string
              description: Text-to-speech voice to use. Defaults is 'woman'. Please refer to https://developer.signalwire.com//voice/getting-started/voice-and-languages for more information.
          required:
            - payment_connector_url
          description: |-
            The `pay` object. Enables secure payment processing during a call.
             When implemented, it handles the complete payment flow including data collection, validation, and processing through your configured
             payment gateway.
    PayParameters:
      type: object
      required:
        - name
        - value
      properties:
        name:
          type: string
          description: The identifier for your custom parameter. This will be the key in the parameters object.
        value:
          type: string
          description: The value associated with the parameter. This will be the value in the parameters object.
    PayPromptAction:
      anyOf:
        - $ref: '#/components/schemas/PayPromptSayAction'
        - $ref: '#/components/schemas/PayPromptPlayAction'
    PayPromptPlayAction:
      type: object
      required:
        - type
        - phrase
      properties:
        type:
          type: string
          enum:
            - Play
          description: When the action `type` is `Say`, this value is the text to be spoken; when the type is `Play`, it should be a URL to the audio file.
        phrase:
          type: string
          format: uri
          pattern: ^(http|https)://
          description: The URL of the audio file to play
    PayPromptSayAction:
      type: object
      required:
        - type
        - phrase
      properties:
        type:
          type: string
          enum:
            - Say
          description: When the action `type` is `Say`, this value is the text to be spoken; when the type is `Play`, it should be a URL to the audio file.
        phrase:
          type: string
          description: The phrase to speak
    PayPrompts:
      type: object
      required:
        - actions
        - for
      properties:
        actions:
          type: array
          items:
            $ref: '#/components/schemas/PayPromptAction'
          description: Array of action objects to execute for this prompt. These actions can either play an audio file or speak a phrase.
        for:
          type: string
          description: |-
            The payment step this prompt is for. See Payment Steps for a list of available steps.

            - `payment-card-number`: Collect the payment card number.
            - `expiration-date`: Collect the payment card expiration date.
            - `security-code`: Collect the payment card security code.
            - `postal-code`: Collect the payment card postal code.
            - `payment-processing`: The step used during the payment processing.
            - `payment-completed`: The step used when the payment is completed.
            - `payment-failed`: The step used when the payment fails.
            - `payment-cancelled`: The step used when the payment is cancelled.
        attempts:
          type: string
          description: |-
            Specifies which payment attempt(s) this prompt applies to. The value increments when a payment fails.
             Use a single number (e.g., "1") or space-separated numbers (e.g., "2 3") to target the specific attempts.
        card_type:
          type: string
          description: |-
            Space-seperated list of card types that are allowed to be used for this prompt.

            Supported card types:
                - `visa`
                - `mastercard`
                - `amex`
                - `maestro`
                - `discover`
                - `optima`
                - `jcb`
                - `diners-club`
        error_type:
          type: string
          description: |
            Space-separated list of error types this prompt applies to

            Available error types:
                - `timeout` - User input timeout
                - `invalid-card-number` - Failed card validation
                - `invalid-card-type` - Unsupported card type
                - `invalid-date` - Invalid expiration date
                - `invalid-security-code` - Invalid CVV format
                - `invalid-postal-code` - Invalid postal code format
                - `session-in-progress` - Concurrent session attempt
                - `card-declined` - Payment declined
    Play:
      type: object
      required:
        - play
      properties:
        play:
          anyOf:
            - $ref: '#/components/schemas/PlayWithURL'
            - $ref: '#/components/schemas/PlayWithURLS'
          description: Play file(s), ringtones, speech or silence.
          title: play
      title: Play object
    PlayWithURL:
      type: object
      required:
        - url
      properties:
        auto_answer:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: If `true`, the call will automatically answer as the sound is playing. If `false`, you will start playing the audio during early media
        volume:
          anyOf:
            - type: number
            - $ref: '#/components/schemas/SWMLVar'
          minimum: -40
          maximum: 40
          description: |-
            Volume level for the audio file.
            Default is `0`.
            Valid range is -40 to 40
        say_voice:
          type: string
          description: |-
            The voice to use for the text to speech.
            Default is `Polly.Salli`
        say_language:
          type: string
          description: |-
            The language to use for the text to speech.
            Default is `en-US`
        say_gender:
          type: string
          description: |-
            Gender to use for the text to speech.
            Default is `female`.
        status_url:
          type: string
          format: uri
          description: http or https URL to deliver play status events
        url:
          anyOf:
            - $ref: '#/components/schemas/play_url'
            - $ref: '#/components/schemas/SWMLVar'
          description: |-
            URL to play.
            Required if `urls` is not present.
            Allowed URLs are:
                - http:// or https:// - audio file to GET
                - ring:[duration:]<country code> - ring tone to play. For example: ring:us to play single ring or ring:20.0:us to play ring for 20 seconds.
                - say:<text to speak> - Sentence to say
                - silence: <duration> - seconds of silence to play
      description: Play with a single URL
      title: PlayWithURL object
    PlayWithURLS:
      type: object
      required:
        - urls
      properties:
        auto_answer:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: If `true`, the call will automatically answer as the sound is playing. If `false`, you will start playing the audio during early media
        volume:
          anyOf:
            - type: number
            - $ref: '#/components/schemas/SWMLVar'
          minimum: -40
          maximum: 40
          description: |-
            Volume level for the audio file.
            Default is `0`.
            Valid range is -40 to 40
        say_voice:
          type: string
          description: |-
            The voice to use for the text to speech.
            Default is `Polly.Salli`
        say_language:
          type: string
          description: |-
            The language to use for the text to speech.
            Default is `en-US`
        say_gender:
          type: string
          description: |-
            Gender to use for the text to speech.
            Default is `female`.
        status_url:
          type: string
          format: uri
          description: http or https URL to deliver play status events
        urls:
          anyOf:
            - type: array
              items:
                $ref: '#/components/schemas/play_url'
            - type: array
              items:
                $ref: '#/components/schemas/SWMLVar'
          description: |-
            Array of URLs to play.
            Required if `url` is not present.
            Allowed URLs are:
                - http:// or https:// - audio file to GET
                - ring:[duration:]<country code> - ring tone to play. For example: ring:us to play single ring or ring:20.0:us to play ring for 20 seconds.
                - say:<text to speak> - Sentence to say
                - silence: <duration> - seconds of silence to play
      title: PlayWithURLS object
    PlaybackBGAction:
      type: object
      required:
        - playback_bg
      properties:
        playback_bg:
          type: object
          properties:
            file:
              type: string
              format: uri
              description: URL or filepath of the audio file to play.
            wait:
              anyOf:
                - type: boolean
                - $ref: '#/components/schemas/SWMLVar'
              description: Whether to wait for the audio file to finish playing before continuing. Default is `false`.
          required:
            - file
          description: A JSON object containing the audio file to play.
          title: playback_bg
      title: PlaybackBGAction object
    PomSectionBodyContent:
      type: object
      required:
        - body
      properties:
        title:
          type: string
          minLength: 1
          description: Title for the section
        subsections:
          minItems: 1
          description: Optional array of nested subsections
          type: array
          items:
            $ref: '#/components/schemas/POM'
        numbered:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: Whether to number the section
        numberedBullets:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: Whether to number the bullets
        body:
          type: string
          description: Body text for the section
        bullets:
          type: array
          items:
            type: string
          minItems: 1
          description: Optional array of bullet points
      description: Content model with body text and optional bullets
    PomSectionBulletsContent:
      type: object
      required:
        - bullets
      properties:
        title:
          type: string
          minLength: 1
          description: Title for the section
        subsections:
          minItems: 1
          description: Optional array of nested subsections
          type: array
          items:
            $ref: '#/components/schemas/POM'
        numbered:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: Whether to number the section
        numberedBullets:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: Whether to number the bullets
        body:
          type: string
          description: Body text for the section (optional)
        bullets:
          type: array
          items:
            type: string
          minItems: 1
          description: Array of bullet points
      description: Content model with bullets and optional body
    Prompt:
      type: object
      required:
        - prompt
      properties:
        prompt:
          type: object
          properties:
            play:
              anyOf:
                - $ref: '#/components/schemas/play_url'
                - type: array
                  items:
                    $ref: '#/components/schemas/play_url'
                - $ref: '#/components/schemas/SWMLVar'
                - type: array
                  items:
                    $ref: '#/components/schemas/SWMLVar'
              description: |-
                URL or array of URLs to play.
                Allowed URLs are:
                    http:// or https:// - audio file to GET
                    ring:[duration:]<country code> - ring tone to play. For example: ring:us to play single ring or ring:20.0:us to play ring for 20 seconds.
                    say:<text to speak> - Sentence to say
                    silence: <duration> - seconds of silence to play
            volume:
              type: number
              minimum: -40
              maximum: 40
              description: |-
                Volume level for the audio file.
                Default is 0.
                Valid range is -40 to 40.
            say_voice:
              type: string
              description: |-
                The voice to use for the text to speech.
                Default is `Polly.Salli`.
            say_language:
              type: string
              description: |-
                The language to use for the text to speech.
                Default is `en-US`.
            say_gender:
              type: string
              description: |-
                The gender to use for the text to speech.
                Default is `female`.
            max_digits:
              anyOf:
                - type: integer
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                Number of digits to collect.
                Default is `1`.
            terminators:
              type: string
              description: |-
                Digits that terminate digit collection.
                Default is not set.
            digit_timeout:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                Time in seconds to wait for next digit.
                Default is `5.0` seconds.
            initial_timeout:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                Time in seconds to wait for start of input.
                Default is `5.0` seconds.
            speech_timeout:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              description: Max time in seconds to wait for speech result.
            speech_end_timeout:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              description: Time in seconds to wait for end of speech utterance.
            speech_language:
              type: string
              description: Language to detect speech in.
            speech_hints:
              anyOf:
                - type: array
                  items:
                    type: string
                - type: array
                  items:
                    $ref: '#/components/schemas/SWMLVar'
              description: Words or phrases to help the speech recognition.
            speech_engine:
              type: array
              items:
                type: string
              description: |-
                The engine that is selected for speech recognition. The engine must support the specified language.
                [Deepgram|Google| etc...] Default is not set (SignalWire picks the engine).
            status_url:
              type: string
              format: uri
              description: http or https URL to deliver prompt status events
          required:
            - play
          description: |-
            Play a prompt and wait for digit or speech input.
            Speech detection is not enabled unless at least one speech parameter is set.
            If only speech parameters are set (and no digit parameters), digit detection is not enabled.
            To enable both digit and speech detection, set at least one parameter for each.
          title: prompt
      title: Prompt object
    Pronounce:
      type: object
      required:
        - replace
        - with
      properties:
        replace:
          type: string
          description: The expression to replace.
        with:
          type: string
          description: The phonetic spelling of the expression.
        ignore_case:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: Whether the pronunciation replacement should ignore case.
      title: Pronounce object
    ReceiveFax:
      type: object
      required:
        - receive_fax
      properties:
        receive_fax:
          type: object
          properties:
            status_url:
              type: string
              format: uri
              description: http or https URL to deliver receive_fax status events
          description: Receive a fax being delivered to this call.
          title: receive_fax
      title: ReceiveFax object
    Record:
      type: object
      required:
        - record
      properties:
        record:
          type: object
          properties:
            stereo:
              anyOf:
                - type: boolean
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                If true, record in stereo.
                Default is false.
            format:
              type: string
              enum:
                - wav
                - mp3
              description: |-
                The format to record in. Can be `wav` or `mp3`.
                Default is "wav".
            direction:
              type: string
              enum:
                - speak
                - listen
              description: |-
                Direction of the audio to record: "speak" for what party says, "listen" for what party hears.
                Default is `speak`.
            terminators:
              type: string
              description: String of digits that will stop the recording when pressed.
            beep:
              anyOf:
                - type: boolean
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                Play a beep before recording.
                Default is `false`.
            input_sensitivity:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                Input sensitivity for the recording.
                Default is `44.0`.
            initial_timeout:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                Time in seconds to wait for the start of speech.
                Default is `4.0` seconds.
            end_silence_timeout:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                Time in seconds to wait in silence before ending the recording.
                Default is `5.0` seconds.
            max_length:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              description: Maximum length of the recording in seconds.
            status_url:
              type: string
              description: URL to send recording status events to.
          description: Record the call audio in the foreground. Use this, for example, to record voicemails.
          title: record
      title: Record object
    RecordCall:
      type: object
      required:
        - record_call
      properties:
        record_call:
          type: object
          properties:
            control_id:
              type: string
              description: Identifier for this recording, to use with `stop_call_record`.
            stereo:
              anyOf:
                - type: boolean
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                If `true`, record in stereo.
                Default is `false`.
            format:
              type: string
              enum:
                - wav
                - mp3
              description: |-
                The format to record in. It can be `wav` or `mp3`.
                Default is `wav`.
            direction:
              type: string
              enum:
                - speak
                - listen
                - both
              description: |-
                Direction of the audio to record: "speak" for what party says, "listen" for what party hears, "both" for what the party hears and says.
                Default is `both`.
            terminators:
              type: string
              description: String of digits that will stop the recording when pressed.
            beep:
              anyOf:
                - type: boolean
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                Play a beep before recording.
                Default is `false`.
            input_sensitivity:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                Input sensitivity for the recording.
                Default is `44.0`.
            initial_timeout:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                Time in seconds to wait for the start of speech.
                Default is `0.0` seconds.
            end_silence_timeout:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                Time in seconds to wait in silence before ending the recording.
                Default is `0.0` seconds.
            max_length:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              description: Maximum length of the recording in seconds.
            status_url:
              type: string
              format: uri
              description: http or https URL to deliver record_call status events
          description: |-
            Record call in the background.
            Unlike the `record` method, the `record_call` method will start the recording and continue executing the SWML script without allowing the recording to happen in the background.
            To stop call recordings started with `record_call`, use the `stop_call_record` method.
          title: record_call
      title: RecordCall object
    Request:
      type: object
      required:
        - request
      properties:
        request:
          type: object
          properties:
            url:
              type: string
              description: The URL to which the request is to be sent.
            method:
              type: string
              enum:
                - GET
                - POST
                - PUT
                - DELETE
              description: The HTTP method to be used for the request. Can be `GET`, `POST`, `PUT`, or `DELETE`.
            headers:
              type: object
              additionalProperties: {}
              description: An object representing the headers to be included in the request.
            body:
              anyOf:
                - type: string
                - type: object
                  additionalProperties: {}
              description: The body of the request. Can be a `string` or an `object`.
            timeout:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                Maximum time in seconds to wait for a response.
                Default is `5.0` seconds.
            connect_timeout:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                Maximum time in seconds to wait for a connection.
                Default is `5.0` seconds.
            result:
              anyOf:
                - $ref: '#/components/schemas/Switch'
                - type: array
                  items:
                    $ref: '#/components/schemas/Cond'
              description: '`switch` on `return_value` if result is an object (`{}`), or use as a cond if result is an array (`[]`).'
            save_variables:
              anyOf:
                - type: boolean
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                Store parsed JSON response as variables.
                Default is `false`.
          required:
            - url
            - method
          description: Send a GET, POST, PUT, or DELETE request to a remote URL.
          title: request
      title: Request object
    Return:
      type: object
      required:
        - return
      properties:
        return:
          description: Return from `execute` or exit script. Takes user-defined key to be used to store the value.
          title: return
      title: Return object
    SIPRefer:
      type: object
      required:
        - sip_refer
      properties:
        sip_refer:
          type: object
          properties:
            to_uri:
              type: string
              description: The SIP URI to send the REFER to.
            status_url:
              type: string
              format: uri
              description: The HTTP or HTTPS URL to send status callback events to.
            sip_auth_username:
              type: string
              description: SIP authentication username
            sip_auth_password:
              type: string
              description: SIP authentication password
          required:
            - to_uri
          description: Send SIP REFER to a SIP call.
          title: sip_refer
      title: SIPRefer object
    SMSWithBody:
      type: object
      required:
        - to_number
        - from_number
        - body
      properties:
        to_number:
          type: string
          description: The phone number to send the SMS to.
        from_number:
          type: string
          description: |-
            The phone number to send the SMS from.
            Default is the calling party's caller ID number.
        region:
          type: string
          description: The region to use for the SMS.
        tags:
          type: array
          items:
            type: string
          description: Array of tags to associate with the message to facilitate log searches.
        body:
          type: string
          description: Required if `media` is not present. The body of the SMS message.
      title: SMSWithBody object
    SMSWithMedia:
      type: object
      required:
        - to_number
        - from_number
        - media
      properties:
        to_number:
          type: string
          description: The phone number to send the SMS to.
        from_number:
          type: string
          description: |-
            The phone number to send the SMS from.
            Default is the calling party's caller ID number.
        region:
          type: string
          description: The region to use for the SMS.
        tags:
          type: array
          items:
            type: string
          description: Array of tags to associate with the message to facilitate log searches.
        media:
          type: array
          items:
            type: string
          description: Required if `body` is not present. Array of media URLs to include in the message.
        body:
          type: string
