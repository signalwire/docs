      properties:
        detect_machine:
          type: object
          properties:
            detect_message_end:
              anyOf:
                - type: boolean
                - $ref: '#/components/schemas/SWMLVar'
              description: If `true`, stops detection on beep / end of voicemail greeting. Default `false`.
            detectors:
              type: string
              description: 'Comma-separated string: detectors to enable. Default: `amd,fax`.'
