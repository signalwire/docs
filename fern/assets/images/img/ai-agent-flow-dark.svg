<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 580" width="1000" height="580" role="img" aria-label="How a call flows: a caller converses with an AI agent on the SignalWire platform; SWAIG delivers function calls to your backend over HTTP and returns the JSON reply to the conversation.">
  <g class="swflow-theme">
  <defs>
    <radialGradient id="swflow-orb-purple" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-opacity="0.10"/>
      <stop offset="1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="swflow-orb-fuchsia" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-opacity="0.07"/>
      <stop offset="1" stop-opacity="0"/>
    </radialGradient>
    <pattern id="swflow-dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="currentColor" opacity="0.05"/>
    </pattern>
    <clipPath id="swflow-card">
      <rect x="8" y="8" width="984" height="564" rx="20"/>
    </clipPath>
    <!-- refX=1 anchors the arrow BASE at the path end so animated dashes stop
         under the head instead of poking past the tip; every marked path is
         drawn ~10px short (the arrow's rendered length) to compensate. -->
    <marker id="swflow-arrow-n" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="currentColor" fill-opacity="0.55"/>
    </marker>
    <marker id="swflow-arrow-f" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9 z" class="swflow-accent"/>
    </marker>
    <style>
      /* DARK variant — keep in sync with ai-agent-flow-light.svg; the two
         files differ only in the --swflow-* values. Palette mirrors brand-tokens.css;
         declared locally because an img-embedded SVG is its own document —
         page CSS variables can't cascade in. var() is invalid in SVG
         presentation attributes, so colored fills/strokes use the classes
         below. */
      .swflow-theme {
        --sw-blue: #044EF4;
        --sw-fuchsia: #F72A72;
        --sw-purple: #601BE6;
        --sw-turquoise: #40E0D0;
        --swflow-ink: #f0f0f4;
        --swflow-chip: var(--sw-turquoise);
        --swflow-on-chip: #0e0e18;
        --swflow-caller-icon: var(--sw-turquoise);
        color: var(--swflow-ink);
      }
      .swflow-accent { fill: var(--sw-fuchsia); }
      .swflow-accent-stroke { stroke: var(--sw-fuchsia); }
      .swflow-chip { fill: var(--swflow-chip); }
      .swflow-glyph { fill: var(--swflow-on-chip); }
      .swflow-caller-glyph { fill: var(--swflow-caller-icon); }
      #swflow-orb-purple stop { stop-color: var(--sw-purple); }
      #swflow-orb-fuchsia stop { stop-color: var(--sw-fuchsia); }
      .swflow-hd { font-family: 'Instrument Sans', -apple-system, 'Segoe UI', sans-serif; }
      .swflow-mono { font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace; }
      .swflow-dash { stroke: var(--sw-fuchsia); stroke-width: 2; stroke-dasharray: 7 7; animation: swflow-dashmove 1.4s linear infinite; }
      .swflow-dash-long { stroke: var(--sw-fuchsia); stroke-width: 2; stroke-dasharray: 12 6; animation: swflow-dashmove-long 1.8s linear infinite; }
      @keyframes swflow-dashmove { to { stroke-dashoffset: -28; } }
      @keyframes swflow-dashmove-long { to { stroke-dashoffset: -36; } }
      @media (prefers-reduced-motion: reduce) { .swflow-dash, .swflow-dash-long { animation: none; } }
    </style>
  </defs>

