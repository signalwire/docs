    get:
      x-fern-sdk-group-name:
        - addresses
      x-fern-sdk-method-name: list_addresses
    post:
      x-fern-sdk-group-name:
        - addresses
      x-fern-sdk-method-name: create_address
  /addresses/{id}:
    get:
      x-fern-sdk-group-name:
        - addresses
      x-fern-sdk-method-name: get_address
    delete:
      x-fern-sdk-group-name:
        - addresses
      x-fern-sdk-method-name: delete_address
  /registry/beta/brands:
    get:
      x-fern-sdk-group-name:
        - campaignRegistryBeta
      x-fern-sdk-method-name: list_brands
    post:
      x-fern-sdk-group-name:
        - campaignRegistryBeta
      x-fern-sdk-method-name: create_brand
  /registry/beta/brands/{id}:
    get:
      x-fern-sdk-group-name:
        - campaignRegistryBeta
      x-fern-sdk-method-name: retrieve_brand
  /registry/beta/brands/{id}/campaigns:
