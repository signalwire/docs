        - send_digits
      properties:
        send_digits:
          type: object
          properties:
            digits:
              type: string
              description: The digits to send. Valid values are 0123456789*#ABCDWw. Character W is a 1 second delay, and w is a 500ms delay.
              example: 1234#
          required:
            - digits
          description: Send digit presses as DTMF tones.
          title: send_digits
      title: SendDigits object
    SendFax:
      type: object
      required:
        - send_fax
      properties:
        send_fax:
          type: object
          properties:
            document:
              type: string
              format: uri
              description: URL to the PDF document to fax.
              example: https://example.com/document.pdf
            header_info:
              type: string
              description: Header text to include on the fax.
              example: 'Invoice #12345'
            identity:
              type: string
              description: |-
                Station identity to report.
                Default is the calling party's caller ID number.
              example: '+15551234567'
            status_url:
              type: string
              format: uri
              description: http or https URL to deliver send_fax status events
              example: https://example.com/fax-status
          required:
            - document
          description: Send a fax.
          title: send_fax
      title: SendFax object
    SendSMS:
      type: object
      required:
        - send_sms
      properties:
        send_sms:
          anyOf:
            - $ref: '#/components/schemas/SMSWithBody'
            - $ref: '#/components/schemas/SMSWithMedia'
          description: Send an outbound SMS or MMS message to a PSTN phone number.
          title: send_sms
      title: SendSMS object
    Set:
      type: object
      required:
        - set
      properties:
        set:
          type: object
          additionalProperties: {}
          description: |-
            Set script variables to the specified values.
            Accepts an object mapping variable names to values.
            Variables set using set can be removed using unset.
          title: set
          example:
            my_var: hello
            counter: 1
            is_valid: true
      title: Set object
    SetGlobalDataAction:
      type: object
      required:
        - set_global_data
      properties:
        set_global_data:
          type: object
          additionalProperties: {}
          description: A JSON object containing any global data, as a key-value map. This action sets the data in the `global_data` to be globally referenced.
          title: set_global_data
          example:
            order_id: ord_456
            customer_tier: premium
      title: SetGlobalDataAction object
    SetMetaDataAction:
      type: object
      required:
        - set_meta_data
      properties:
        set_meta_data:
          type: object
          additionalProperties: {}
          description: A JSON object containing any metadata, as a key-value map. This action sets the data in the `meta_data` to be referenced locally in the function.
          title: set_meta_data
          example:
            last_action: lookup
            retry_count: 2
      title: SetMetaDataAction object
    Sleep:
      type: object
      required:
        - sleep
      properties:
        sleep:
          anyOf:
            - type: object
              properties:
                duration:
                  anyOf:
                    - type: integer
                    - $ref: '#/components/schemas/SWMLVar'
                  minimum: -1
                  description: |-
                    The amount of time to sleep in milliseconds.
                    Must be a positive integer. Can also be set to `-1` for the sleep to never end.
                  example: 5000
              required:
                - duration
            - type: integer
            - $ref: '#/components/schemas/SWMLVar'
          description: Pause execution for a specified duration.
          title: sleep
      title: Sleep object
    SpeechEngine:
      type: string
      enum:
        - deepgram
        - google
      description: Speech recognition engine options.
    StartAction:
      type: object
      required:
        - start
      properties:
        start:
          type: object
          properties:
            webhook:
              type: string
              description: The webhook URL to be called.
              example: https://example.com/translation-webhook
            from_lang:
              type: string
              description: The language to translate from.
              example: en-US
            to_lang:
              type: string
              description: The language to translate to.
              example: es-ES
            from_voice:
              type: string
              description: The TTS voice you want to use for the source language.
              example: Polly.Joanna
            to_voice:
              type: string
              description: The TTS voice you want to use for the target language.
              example: Polly.Lucia
            filter_from:
              anyOf:
                - $ref: '#/components/schemas/TranslationFilterPreset'
                - $ref: '#/components/schemas/CustomTranslationFilter'
              description: Translation filter for the source language direction.
            filter_to:
              anyOf:
                - $ref: '#/components/schemas/TranslationFilterPreset'
                - $ref: '#/components/schemas/CustomTranslationFilter'
              description: Translation filter for the target language direction.
            live_events:
              anyOf:
                - type: boolean
                - $ref: '#/components/schemas/SWMLVar'
              description: Whether to enable live events.
              example: true
            ai_summary:
              anyOf:
                - type: boolean
                - $ref: '#/components/schemas/SWMLVar'
              description: Whether to enable AI summarization.
              example: true
            speech_timeout:
              anyOf:
                - type: integer
                - $ref: '#/components/schemas/SWMLVar'
              description: The timeout for speech recognition in milliseconds.
              example: 30000
              default: 60000
            vad_silence_ms:
              anyOf:
                - type: integer
                - $ref: '#/components/schemas/SWMLVar'
              description: 'Voice activity detection silence time in milliseconds. Default depends on speech engine: `300` for Deepgram, `500` for Google.'
              example: 500
              default: 300
            vad_thresh:
              anyOf:
                - type: integer
                - $ref: '#/components/schemas/SWMLVar'
              description: Voice activity detection threshold (0-1800).
              example: 400
              default: 400
            debug_level:
              anyOf:
                - type: integer
                - $ref: '#/components/schemas/SWMLVar'
              description: Debug level for logging (0-2).
              example: 0
              default: 0
            direction:
              type: array
              items:
                $ref: '#/components/schemas/TranslateDirection'
              description: The direction of the call that should be translated.
            speech_engine:
              allOf:
                - $ref: '#/components/schemas/SpeechEngine'
              description: The speech engine to use for speech recognition.
              example: google
              default: deepgram
            ai_summary_prompt:
              type: string
              description: The AI prompt that instructs how to summarize the conversation when `ai_summary` is enabled.
              example: Summarize the key points of this bilingual conversation.
          required:
            - from_lang
            - to_lang
            - direction
          description: Starts live translation of the call. The translation will be sent to the specified URL.
      title: StartAction object
    StartUpHookSWAIGFunction:
      type: object
      required:
        - description
        - function
      properties:
        description:
          type: string
          description: A description of the context and purpose of the function, to explain to the agent when to use it.
          example: Get the weather information
        purpose:
          type: string
          description: |-
            The purpose field has been deprecated and is replaced by the `description` field.
            A description of the context and purpose of the function, to explain to the agent when to use it.
          deprecated: true
          example: Get the weather information
        parameters:
          allOf:
            - $ref: '#/components/schemas/FunctionParameters'
          description: A JSON object that defines the expected user input parameters and their validation rules for the function.
        fillers:
          allOf:
            - $ref: '#/components/schemas/FunctionFillers'
          description: A JSON object defining the fillers that should be played when calling a `swaig function`. This helps the AI break silence between responses. The filler is played asynchronously during the function call.
        argument:
          allOf:
            - $ref: '#/components/schemas/FunctionParameters'
          description: |-
            The argument field has been deprecated and is replaced by the `parameters` field. 
            A JSON object defining the input that should be passed to the function. 
            The fields of this object are the following two parameters.
          deprecated: true
        active:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: Whether the function is active. **Default:** `true`.
          example: true
          default: true
        meta_data:
          type: object
          additionalProperties: {}
          description: |-
            A powerful and flexible environmental variable which can accept arbitrary data that is set initially in the SWML script or from the SWML set_meta_data action.
            This data can be referenced locally to the function.
            All contained information can be accessed and expanded within the prompt - for example, by using a template string.
            Default is not set.
          example:
            api_key: key_123
            endpoint: https://api.example.com
        meta_data_token:
          type: string
          description: Scoping token for meta_data. If not supplied, metadata will be scoped to function's `web_hook_url`. Default is set by SignalWire.
          example: my-function-scope
        data_map:
          allOf:
            - $ref: '#/components/schemas/DataMap'
          minProperties: 1
          description: |-
            An object that processes function inputs and executes operations through expressions, webhooks, or direct output.
            Properties are evaluated in strict priority order:
            1. expressions
            2. webhooks
            3. output

            Evaluation stops at the first property that returns a valid output result, similar to a return statement in a function.
            Any subsequent properties are ignored when a valid output is returned.
            If a valid output is not returned from any of the properties, a generic error message is returned.
        skip_fillers:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: |-
            Skips the top-level fillers specified in `ai.languages` (which includes `speech_fillers` and `function_fillers`).
            When set to `true`, only function-specific fillers defined directly on `SWAIG.functions.fillers` will play.
            **Default:** `false`.
          example: true
          default: false
        web_hook_url:
          type: string
          description: Function-specific URL to send status callbacks and reports to. Takes precedence over a default setting. Authentication can also be set in the url in the format of `username:password@url.`
          example: username:password:https://statuscallback.com
        wait_file:
          type: string
          format: uri
          description: A file to play while the function is running. `wait_file_loops` can specify the amount of times that files should continously play. Default is not set.
          example: https://cdn.signalwire.com/default-music/welcome.mp3
        wait_file_loops:
          anyOf:
            - type: integer
            - type: string
          description: The number of times to loop playing the file. Default is not set.
          example: 5
        wait_for_fillers:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: Whether to wait for fillers to finish playing before continuing with the function. **Default:** `false`.
          example: true
          default: false
        function:
          type: string
          enum:
            - startup_hook
          description: A unique name for the function. This can be any user-defined string or can reference a reserved function. Reserved functions are SignalWire functions that will be executed at certain points in the conversation. For the start_hook function, the function name is 'start_hook'.
      title: functions
    StopAction:
      type: object
      required:
        - stop
      properties:
        stop:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: Whether to stop the conversation.
          title: stop
          example: true
      title: StopAction object
    StopDenoise:
      type: object
      required:
        - stop_denoise
      properties:
        stop_denoise:
          type: object
          description: Stop noise reduction that was started with denoise.
          title: stop_denoise
          example: {}
      title: StopDenoise object
    StopPlaybackBGAction:
      type: object
      required:
        - stop_playback_bg
      properties:
        stop_playback_bg:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: Whether to stop the background audio file.
          title: stop_playback_bg
          example: true
      title: StopPlaybackBGAction object
    StopRecordCall:
      type: object
      required:
        - stop_record_call
      properties:
        stop_record_call:
          type: object
          properties:
            control_id:
              type: string
              description: |-
                Identifier for the recording to stop.
                If not set, the last recording started will be stopped.
              example: recording_001
          description: Stop an active background recording.
          title: stop_record_call
      title: StopRecordCall object
    StopTap:
      type: object
      required:
        - stop_tap
      properties:
        stop_tap:
          type: object
          properties:
            control_id:
              type: string
              description: |-
                ID of the tap to stop.
                If not set, it will shut off the most recent tap session.
              example: tap_001
          description: Stop an active tap stream.
          title: stop_tap
