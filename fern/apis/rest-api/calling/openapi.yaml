    CallRequest:
      type: object
      oneOf:
        - $ref: '#/components/schemas/CallCreateRequest'
        - $ref: '#/components/schemas/CallUpdateCurrentCallRequest'
        - $ref: '#/components/schemas/CallHangupRequest'
        - $ref: '#/components/schemas/CallHoldRequest'
        - $ref: '#/components/schemas/CallUnholdRequest'
        - $ref: '#/components/schemas/CallAIMessageRequest'
        - $ref: '#/components/schemas/CallLiveTranscribeRequest'
        - $ref: '#/components/schemas/CallLiveTranslateRequest'
      discriminator:
        propertyName: command
        mapping:
          dial: '#/components/schemas/CallCreateRequest'
          update: '#/components/schemas/CallUpdateCurrentCallRequest'
          calling.end: '#/components/schemas/CallHangupRequest'
          calling.ai_hold: '#/components/schemas/CallHoldRequest'
          calling.ai_unhold: '#/components/schemas/CallUnholdRequest'
          calling.ai_message: '#/components/schemas/CallAIMessageRequest'
          calling.live_transcribe: '#/components/schemas/CallLiveTranscribeRequest'
          calling.live_translate: '#/components/schemas/CallLiveTranslateRequest'
      description: |-
        Call request union for JSON-RPC style method dispatch. Use the `command` field to specify which call method to invoke:

        - **`dial`** - Create and initiate a new outbound call to a destination. Returns immediately with call details while the call is being established in the background.

        - **`update`** - Modify an active call's properties in real-time. Update call parameters such as routing, recording settings, or other call-specific configurations.

        - **`calling.end`** - Terminate an active call immediately. Disconnects all parties and ends the call session. Cannot be reversed once executed.

        - **`calling.ai_hold`** - Place an AI-powered call on hold. Pauses the AI conversation and typically plays hold music or a message to the caller. The AI agent becomes inactive until unhold.

        - **`calling.ai_unhold`** - Resume an AI call from hold state. Reactivates the AI agent and continues the conversation from where it was paused.

        - **`calling.ai_message`** - Inject a message into an active AI conversation. Allows you to dynamically add context, instructions, or system messages to guide the AI agent's behavior during the call.

        - **`calling.live_transcribe`** - Control live transcription on an active call. Start real-time speech-to-text transcription, stop transcription, or request an on-demand AI summary of the conversation.

        - **`calling.live_translate`** - Control live translation on an active call. Start real-time language translation between call participants, stop translation, request summaries, or inject messages to be translated and spoken.
    CallResponse:
      type: object
      required:
        - id
        - from
        - to
        - direction
        - status
        - duration
        - duration_ms
        - billing_ms
        - source
        - type
        - url
        - charge
        - created_at
        - parent_id
        - charge_details
      properties:
        id:
          type: string
          description: The unique identifier of the call on SignalWire. This can be used to update the call programmatically.
          example: 0e9c80d7-a149-4917-892d-420043709f45
        from:
          type: string
          description: The origin number or address.
          example: '+12069708643'
        to:
          type: string
          description: The destination number or address.
          example: '+18048390497'
        direction:
          type: string
          enum:
            - outbound-api
          description: The direction of the call.
          example: outbound-api
        status:
          type: string
          enum:
            - answered
            - queued
            - initiated
            - ringing
            - ending
            - ended
          description: The status of the call.
          example: queued
        duration:
          type: integer
          nullable: true
          description: The duration of the call in seconds.
          example: null
        duration_ms:
          type: integer
          nullable: true
          description: The duration of the call in milliseconds.
          example: null
        billing_ms:
          type: integer
          nullable: true
          description: The billable duration of the call in milliseconds.
          example: null
        source:
          type: string
          enum:
            - realtime_api
          description: Source of this call.
          example: realtime_api
        type:
          type: string
          enum:
            - relay_pstn_call
            - relay_sip_call
            - relay_webrtc_call
          description: Type of this call.
          example: relay_pstn_call
        url:
          type: string
          nullable: true
          description: The URL associated with this call.
          example: null
        charge:
          type: number
          format: double
          description: Total charge for this call.
          example: 0
        created_at:
          type: string
          format: date-time
          description: The date and time when the call was created.
          example: '2024-05-06T12:20:00Z'
        parent_id:
          type: string
          nullable: true
          description: The parent call ID if this is a child call.
          example: null
        charge_details:
          type: array
          items:
            $ref: '#/components/schemas/ChargeDetails'
          description: Details on charges associated with this call.
    CallStatus:
      type: string
      enum:
        - created
        - ringing
        - answered
        - ended
