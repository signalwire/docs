          example: X-Custom-Header
        value:
          type: string
          description: The value of the header.
          example: custom-value
      title: ConnectHeaders object
    ConnectSwitch:
      type: object
      required:
        - case
      properties:
        variable:
          type: string
          description: Name of the variable whose value needs to be compared. If not provided, it will check the `connect_result` variable.
          example: connect_result
        case:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/SWMLMethod'
          description: Object of values mapped to array of instructions to execute
        default:
          description: Array of instructions to execute if no cases match
          type: array
          items:
            $ref: '#/components/schemas/SWMLMethod'
      title: ConnectSwitch object
    ConstProperty:
      type: object
      required:
        - const
      properties:
        const:
          description: A constant value that can be passed to the function.
      title: Const Property
    ContextPOMSteps:
      type: object
      required:
        - name
        - pom
      properties:
        name:
          type: string
          pattern: ^(?!next$).*$
          description: The name of the step. The name must be unique within the context. The name is used for referencing the step in the context.
          example: Take Pizza order
        step_criteria:
          type: string
          description: |-
            The criteria that must be met for the AI to proceed to the next step.
            The criteria is an instruction given to the AI.
            It's **highly** recommended you create a custom criteria for the step to get the intended behavior.
          example: Customer wants to order Pizza
        functions:
          type: array
          items:
            type: string
          description: An array of strings, where each string is the name of a SWAIG.function that can be executed from this step.
          example:
            - Take Order
            - Confirm Order
            - Confirm Address
        valid_contexts:
          type: array
          items:
            type: string
          description: An array of context names that the AI can transition to from this step. This must be a valid `contexts.name` that is present in your `contexts` object.
          example:
            - Place Order
            - Confirm Order
        skip_user_turn:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: A boolean value, if set to `true`, will skip the user's turn to respond in the conversation and proceed to the next step. **Default:** `false`.
          example: true
          default: false
        end:
          type: boolean
          description: A boolean value that determines if the step is the last in the context. If `true`, the context ends after this step. Cannot be used along with the `valid_steps` parameter. **Default:** `false`.
          example: true
          default: false
        valid_steps:
          type: array
          items:
            type: string
          description: |-
            An array of valid steps that the conversation can proceed to from this step.
            If the array is empty, or the `valid_steps` key is not present, the conversation will proceed to the next step in the context.
          example:
            - get order
            - confirm order
        pom:
          type: array
          items:
            $ref: '#/components/schemas/POM'
          description: An array of objects that define the POM for the step. POM is the Post-Prompt Object Model, which is used to define the flow of the conversation.
      title: Context step with POM (Post-Prompt Object Model)
    ContextSteps:
      anyOf:
        - $ref: '#/components/schemas/ContextPOMSteps'
        - $ref: '#/components/schemas/ContextTextSteps'
      title: Context step - supports either POM or text-based steps
    ContextSwitchAction:
      type: object
      required:
        - context_switch
      properties:
        context_switch:
          type: object
          properties:
            system_prompt:
              type: string
              description: The instructions to send to the agent. Default is not set.
              example: You are now a billing specialist. Help the customer with their billing inquiry.
            consolidate:
              anyOf:
                - type: boolean
                - $ref: '#/components/schemas/SWMLVar'
              description: Whether to consolidate the context. Default is `false`.
              example: true
            user_prompt:
              type: string
              description: |-
                A string serving as simulated user input for the AI Agent.
                During a context_switch in the AI's prompt, the user_prompt offers the AI pre-established context or guidance.
                Default is not set
              example: I need help with my recent invoice.
          required:
            - system_prompt
          description: A JSON object containing the context to switch to. Default is not set.
          title: context_switch
      title: ContextSwitchAction object
    ContextTextSteps:
      type: object
      required:
        - name
        - text
      properties:
        name:
          type: string
          pattern: ^(?!next$).*$
          description: The name of the step. The name must be unique within the context. The name is used for referencing the step in the context.
          example: Take Pizza order
        step_criteria:
          type: string
          description: |-
            The criteria that must be met for the AI to proceed to the next step.
            The criteria is an instruction given to the AI.
            It's **highly** recommended you create a custom criteria for the step to get the intended behavior.
          example: Customer wants to order Pizza
        functions:
          type: array
          items:
            type: string
          description: An array of strings, where each string is the name of a SWAIG.function that can be executed from this step.
          example:
            - Take Order
            - Confirm Order
            - Confirm Address
        valid_contexts:
          type: array
          items:
            type: string
          description: An array of context names that the AI can transition to from this step. This must be a valid `contexts.name` that is present in your `contexts` object.
          example:
            - Place Order
            - Confirm Order
        skip_user_turn:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: A boolean value, if set to `true`, will skip the user's turn to respond in the conversation and proceed to the next step. **Default:** `false`.
          example: true
          default: false
        end:
          type: boolean
          description: A boolean value that determines if the step is the last in the context. If `true`, the context ends after this step. Cannot be used along with the `valid_steps` parameter. **Default:** `false`.
          example: true
          default: false
        valid_steps:
          type: array
          items:
            type: string
          description: |-
            An array of valid steps that the conversation can proceed to from this step.
            If the array is empty, or the `valid_steps` key is not present, the conversation will proceed to the next step in the context.
          example:
            - get order
            - confirm order
        text:
          type: string
          description: The prompt or instructions given to the AI at this step.
          example: Your name is Franklin and you are taking orders for Franklin's Pizza.
      title: Context step with text prompt
    Contexts:
      type: object
      required:
        - default
      properties:
        default:
          allOf:
            - $ref: '#/components/schemas/ContextsObject'
          description: The default context to use at the beginning of the conversation. Additional context steps can be defined as any other key in the object.
      additionalProperties:
        $ref: '#/components/schemas/ContextsObject'
      title: contexts
    ContextsObject:
      anyOf:
        - $ref: '#/components/schemas/ContextsPOMObject'
        - $ref: '#/components/schemas/ContextsTextObject'
    ContextsPOMObject:
      type: object
      required:
        - steps
      properties:
        steps:
          type: array
          items:
            $ref: '#/components/schemas/ContextSteps'
          description: An array of step objects that define the conversation flow for this context. Steps execute sequentially unless otherwise specified.
          title: steps
        isolated:
          type: boolean
          description: When `true`, resets conversation history to only the system prompt when entering this context. Useful for focused tasks that shouldn't be influenced by previous conversation. **Default:** `false`.
          example: true
          default: false
        enter_fillers:
          type: array
          items:
            $ref: '#/components/schemas/FunctionFillers'
          description: Language-specific filler phrases played when transitioning into this context. Helps provide smooth context switches.
        exit_fillers:
          type: array
          items:
            $ref: '#/components/schemas/FunctionFillers'
          description: Language-specific filler phrases played when leaving this context. Ensures natural transitions out of specialized modes.
        pom:
          type: array
          items:
            $ref: '#/components/schemas/POM'
          minItems: 1
          description: An array of objects that define the POM for the context. POM is the Post-Prompt Object Model, which is used to define the flow of the conversation.
      title: ContextsPOMObject
    ContextsTextObject:
      type: object
      required:
        - steps
      properties:
        steps:
          type: array
          items:
            $ref: '#/components/schemas/ContextSteps'
          description: An array of step objects that define the conversation flow for this context. Steps execute sequentially unless otherwise specified.
          title: steps
        isolated:
          type: boolean
          description: When `true`, resets conversation history to only the system prompt when entering this context. Useful for focused tasks that shouldn't be influenced by previous conversation. **Default:** `false`.
          example: true
          default: false
        enter_fillers:
          type: array
          items:
            $ref: '#/components/schemas/FunctionFillers'
          description: Language-specific filler phrases played when transitioning into this context. Helps provide smooth context switches.
        exit_fillers:
          type: array
          items:
            $ref: '#/components/schemas/FunctionFillers'
          description: Language-specific filler phrases played when leaving this context. Ensures natural transitions out of specialized modes.
        text:
          type: string
          description: The text to send to the agent.
          example: You are now helping the customer with their order.
    ConversationMessage:
      type: object
      required:
        - role
        - content
      properties:
        role:
          allOf:
            - $ref: '#/components/schemas/ConversationRole'
          description: The role of the message sender.
        content:
          type: string
          description: The text content of the message.
          example: Hello, how can I assist you today?
        lang:
          type: string
          description: Optional language code for the message (e.g., 'en', 'es', 'fr').
          example: en
      description: A message object representing a single turn in the conversation history.
      title: Conversation message object
    ConversationRole:
      type: string
      enum:
        - user
        - assistant
        - system
      title: Conversation message role
    CustomTranslationFilter:
      type: string
      pattern: ^prompt:.+$
      description: Custom translation filter with a prompt prefix. Use `prompt:` followed by your custom instructions (e.g., `prompt:Use formal business language`).
      title: Custom Filter
    DataMap:
      type: object
      properties:
        output:
          allOf:
            - $ref: '#/components/schemas/Output'
          description: |-
            An object that contains a response and a list of actions to be performed upon a SWAIG function call.
            This functions like a return statement in a function.
        expressions:
          type: array
          items:
            $ref: '#/components/schemas/Expression'
          description: An array of objects that have pattern matching logic to process the user's input data. A user can define multiple expressions to match against the user's input data.
        webhooks:
          type: array
          items:
            $ref: '#/components/schemas/Webhook'
          description: An array of objects that define external API calls.
      title: DataMap object
    Denoise:
      type: object
      required:
        - denoise
      properties:
        denoise:
          type: object
          description: Start noise reduction. You can stop it at any time using `stop_denoise`.
          example: {}
      title: Denoise object
    DetectMachine:
      type: object
      required:
        - detect_machine
      properties:
        detect_machine:
          type: object
          properties:
            detect_message_end:
              anyOf:
                - type: boolean
                - $ref: '#/components/schemas/SWMLVar'
              description: If `true`, stops detection on beep / end of voicemail greeting. Default `false`.
              example: true
              default: false
            detectors:
              type: string
              description: 'Comma-separated string of detectors to enable. Valid values: `amd`, `fax`.'
              example: amd,fax
              default: amd,fax
            end_silence_timeout:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              minimum: 0
              description: How long to wait for voice to finish. Default `1.0`.
              example: 1
              default: 1
            initial_timeout:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              minimum: 0
              description: How long to wait for initial voice before giving up. Default `4.5`.
              example: 4.5
              default: 4.5
            machine_ready_timeout:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              minimum: 0
              description: How long to wait for voice to finish before firing READY event. Default is `end_silence_timeout`.
              example: 2
            machine_voice_threshold:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              minimum: 0
              description: The number of seconds of ongoing voice activity required to classify as MACHINE. Default `1.25`.
              example: 1.25
              default: 1.25
            machine_words_threshold:
              anyOf:
                - type: integer
                - $ref: '#/components/schemas/SWMLVar'
              minimum: 0
              description: The minimum number of words that must be detected in a single utterance before classifying the call as MACHINE. Default `6`.
              example: 6
              default: 6
            status_url:
              type: string
              description: The http(s) URL to deliver detector events to.
              example: https://example.com/amd-status
            timeout:
              anyOf:
                - type: number
                - $ref: '#/components/schemas/SWMLVar'
              minimum: 0
              description: The max time to run detector. Default `30.0` seconds.
              example: 30
              default: 30
            tone:
              type: string
              enum:
                - CED
                - CNG
              description: The tone to detect, will only receive remote side tone. Default `CED`.
              example: CED
              default: CED
            wait:
              anyOf:
                - type: boolean
                - $ref: '#/components/schemas/SWMLVar'
              description: |-
                If false, the detector will run asynchronously and status_url must be set.
                If true, the detector will wait for detection to complete before moving to the next SWML instruction.
                Default is `true`.
              example: true
              default: true
          description: |-
            A detection method that combines AMD (Answering Machine Detection) and fax detection.
            Detect whether the user on the other end of the call is a machine (fax, voicemail, etc.) or a human.
            The detection result(s) will be sent to the specified status_url as a POST request
            and will also be saved in the detect_result variable.
      title: DetectMachine Object
    Direction:
      type: string
      enum:
        - inbound
        - outbound
      title: Direction enum
    EnterQueue:
      type: object
      required:
        - enter_queue
      properties:
        enter_queue:
          allOf:
            - $ref: '#/components/schemas/EnterQueueObject'
          description: |-
            Place the current call in a named queue where it will wait to be connected to an available agent or resource.
            While waiting, callers will hear music or custom audio.
            When an agent connects to the queue (using the connect method), the caller and agent are bridged together.
            After the bridge completes, execution continues with the SWML script specified in transfer_after_bridge.
          title: enter_queue
      title: EnterQueue object
    EnterQueueObject:
      type: object
      required:
        - queue_name
        - transfer_after_bridge
      properties:
        queue_name:
          type: string
          description: Name of the queue to enter. If a queue with this name does not exist, it will be automatically created.
          example: support-queue
        transfer_after_bridge:
          anyOf:
            - type: string
            - $ref: '#/components/schemas/SWMLVar'
          description: |-
            SWML to execute after the bridge completes. This defines what should happen after the call is connected to an agent and the bridge ends.
            Can be either:
            - A URL (http or https) that returns a SWML document
            - An inline SWML document (as a JSON string)
          example: https://example.com/post-call-survey
        status_url:
          type: string
          format: uri
          description: HTTP or HTTPS URL to deliver queue status events. Default not set
          example: https://example.com/queue-status
        wait_url:
          anyOf:
            - type: string
              format: uri
            - $ref: '#/components/schemas/SWMLVar'
          description: URL for media to play while waiting in the queue. Default hold music will be played if not set
          example: https://example.com/queue-music.mp3
        wait_time:
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/SWMLVar'
          minimum: 1
          description: Maximum time in seconds to wait in the queue before timeout. Default `3600`
          example: 1800
          default: 3600
      title: EnterQueueObject object
    Execute:
      type: object
      required:
        - execute
      properties:
        execute:
          type: object
          properties:
            dest:
              type: string
              description: |-
                Specifies what to execute. The value can be one of:
                - `<section_name>` - section in the current document to execute
                - A URL (http or https) that returns a SWML document - Sends HTTP POST
                - An inline SWML document (as a JSON string)
              example: https://example.com/swml-handler
            params:
              type: object
              additionalProperties: {}
              description: Named parameters to send to section or URL
              example:
                caller_id: '+15551234567'
                language: en-US
            meta:
              type: object
              additionalProperties: {}
              description: User-defined metadata, ignored by SignalWire
              example:
                request_id: req_abc123
                source: ivr
            on_return:
              description: The list of SWML instructions to be executed when the executed section or URL returns
              type: array
              items:
                $ref: '#/components/schemas/SWMLMethod'
            result:
              anyOf:
                - $ref: '#/components/schemas/ExecuteSwitch'
                - type: array
                  items:
                    $ref: '#/components/schemas/CondParams'
                  description: Execute a sequence of instructions depending on the value of a JavaScript condition.
                  title: cond
              description: |-
                Action to take based on the result of the call. This will run once the peer leg of the call has ended.
                Will use the switch method when the return_value is an object, and will use the cond method when the return_value is an array.
          required:
            - dest
          description: |-
            Execute a specified section or URL as a subroutine, and upon completion, return to the current document.
            Use the return statement to pass any return values or objects back to the current document.
      title: Execute object
    ExecuteSwitch:
      type: object
      required:
        - case
      properties:
        variable:
          type: string
          description: |-
            Name of the variable whose value needs to be compared. If not provided, it will check the `return_value` variable.
            Can be one of the listed set of variables, or a string to represent a custom variable.
          example: return_value
        case:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/SWMLMethod'
          description: Object of values mapped to array of instructions to execute
        default:
          description: Array of instructions to execute if no cases match
          type: array
          items:
            $ref: '#/components/schemas/SWMLMethod'
      title: ExecuteSwitch object
    Expression:
      type: object
      required:
        - string
        - pattern
        - output
      properties:
        string:
          type: string
          description: The actual input or value from the user or system.
          example: I want a refund
        pattern:
          type: string
          description: A regular expression pattern to validate or match the string.
          example: refund|return|money back
        output:
          allOf:
            - $ref: '#/components/schemas/Output'
          description: An object that contains a response and a list of actions to be performed upon a expression match.
      title: Expression object
