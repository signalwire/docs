            - ended
        serial_parallel:
          type: array
          items:
            type: array
            items:
              $ref: '#/components/schemas/ConnectDeviceSingle'
          description: |-
            Array of arrays.
            Inner arrays contain destinations to dial simultaneously.
            Outer array attempts each parallel group in order.
      title: ConnectDeviceSerialParallel object
