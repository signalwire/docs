    CreateDomainApplicationRequest:
      type: object
      required:
        - name
        - identifier
        - call_handler
      properties:
        name:
          type: string
          description: A string representing the friendly name for this domain application.
          example: Test App
        identifier:
          type: string
          description: A string representing the identifier portion of the domain application.
        user:
          type: string
          description: A string representing the user portion of the domain application. Default is '*'.
          example: helpdesk
        ip_auth_enabled:
          type: boolean
          description: Whether the domain application will enforce IP authentication for incoming requests.
          example: true
        ip_auth:
          type: array
          items:
            type: string
          description: A list containing whitelisted IP addresses and IP blocks used if ip_auth_enabled is true.
        encryption:
          type: string
          description: A string representing whether connections to this domain application require encryption or if encryption is optional. Valid values are optional and required.
          example: required
        codecs:
          type: array
          items:
            type: string
          description: 'A list of codecs this domain application will support. Currently supported values are: OPUS, G722, PCMU, PCMA, VP8, and H264.'
        ciphers:
          type: array
          items:
            type: string
          description: 'A list of encryption ciphers this domain application will support. Currently supported values are: AEAD_AES_256_GCM_8, AES_256_CM_HMAC_SHA1_80, AES_CM_128_HMAC_SHA1_80, AES_256_CM_HMAC_SHA1_32, and AES_CM_128_HMAC_SHA1_32.'
