          example: https://myapplication/handle_relay_callbacks
        call_relay_application:
          type: string
          description: A string representing the Relay Application to forward incoming calls to.
          example: my-relay-app
        call_relay_connector_id:
          type: string
          description: The ID of the Relay Connector to use when using the relay_connector call handler.
        call_sip_endpoint_id:
          type: string
          description: The ID of the SIP Endpoint to use when using the relay_sip_endpoint call handler.
        call_verto_resource:
          type: string
          description: The Verto resource to use when using the relay_verto_endpoint call handler.
        call_video_room_id:
          allOf:
            - $ref: '#/components/schemas/uuid'
          format: uuid
          description: The ID of the Video Room to forward incoming calls to when using the video_room call handler.
        message_handler:
          type: string
          description: The message handler for the phone number.
        message_request_url:
          type: string
          description: The message request URL for the phone number.
        message_request_method:
          type: string
          enum:
            - GET
            - POST
          description: The message request method for the phone number.
        message_fallback_url:
          type: string
          description: The message fallback URL for the phone number.
        message_fallback_method:
          type: string
          enum:
            - GET
            - POST
          description: The message fallback method for the phone number.
        message_laml_application_id:
          type: string
          description: The ID of the LaML Application to use for messages.
        message_relay_topic:
          type: string
          description: A string representing the Relay topic to forward incoming messages to.
        message_relay_context:
          type: string
          description: This handler type is deprecated. Please use message_relay_application or message_relay_topic instead.
          deprecated: true
        message_relay_application:
          type: string
          description: A string representing the Relay Application to forward incoming messages to.
      description: Request body for updating a phone number.
    UpdateQueueRequest:
      type: object
      properties:
        name:
          type: string
          description: The name of the queue.
          example: Name 2
        max_size:
          type: integer
          format: int32
          description: The maximum number of callers allowed in the queue.
          example: 600
      description: Request body for updating a queue.
    UpdateSipEndpointRequest:
      type: object
      properties:
        username:
          type: string
          description: String representing the username portion of the endpoint. Must be unique across your project and must not contain white space characters or @.
          example: c3p0
        password:
          type: string
          description: A password to authenticate registrations to this endpoint.
          example: yavinOrBust
        caller_id:
          type: string
          description: Friendly Caller ID used as the CNAM when dialing a phone number or the From when dialing another SIP Endpoint.
          example: C-3P0
        send_as:
          type: string
          description: When dialing a PSTN phone number, you must send it From a number you have purchased or verified. send_as indicates which number this endpoint has set as its origination. random indicates it will randomly choose a purchased or verified number from within the project.
          example: random
        ciphers:
          type: array
          items:
            type: string
          description: A list of encryption ciphers this endpoint will support.
        codecs:
          type: array
          items:
            type: string
          description: A list of codecs this endpoint will support.
        encryption:
          type: string
          enum:
            - default
            - required
            - optional
          description: A string representing whether connections to this endpoint require encryption or if encryption is optional. Possible values are default, required, optional.
          example: required
        call_handler:
          type: string
          enum:
            - relay_context
            - relay_topic
            - relay_script
            - laml_webhooks
            - laml_application
            - dialogflow
            - video_room
            - call_flow
            - ai_agent
          description: What type of handler you want to run on inbound calls.
          example: ai_agent
        call_request_url:
          type: string
          description: A string representing the LaML URL to access when a call is received. This is only used (and required) when call_handler is set to laml_webhooks.
        call_request_method:
          type: string
          enum:
            - GET
            - POST
          description: A string representing the HTTP method to use with call_request_url. Valid values are GET and POST.
          example: POST
        call_fallback_url:
          type: string
          description: A string representing the LaML URL to access when the call to call_request_url fails. This is only used (and required) when call_handler is set to laml_webhooks.
        call_fallback_method:
          type: string
          enum:
            - GET
            - POST
          description: A string representing the HTTP method to use with call_fallback_url. Valid values are GET and POST.
          example: POST
        call_status_callback_url:
          type: string
          description: A string representing a URL to send status change messages to. This is only used (and required) when call_handler is set to laml_webhooks.
        call_status_callback_method:
          type: string
          enum:
            - GET
            - POST
          description: A string representing the HTTP method to use with call_status_callback_url. Valid values are GET and POST.
          example: POST
        call_laml_application_id:
          type: string
          description: A string representing the ID of the LaML application to forward incoming calls to. This is only used (and required) when call_handler is set to laml_application.
        call_relay_topic:
          type: string
          description: A string representing the Relay topic to forward incoming calls to. This is only used (and required) when call_handler is set to relay_topic.
          example: office
        call_relay_topic_status_callback_url:
          type: string
          description: A string representing a URL to send status change messages to. This is only used (and required) when call_handler is set to relay_topic.
          example: https://myapplication/handle_relay_callbacks
        call_relay_context:
          type: string
          description: A string representing the Relay context to forward incoming calls to. This is only used (and required) when call_handler is set to relay_context.
          example: office
        call_relay_context_status_callback_url:
          type: string
          description: A string representing a URL to send status change messages to. This is only used (and required) when call_handler is set to relay_context.
          example: https://myapplication/handle_relay_callbacks
        call_video_room_id:
          type: string
          format: uuid
          description: A string representing the ID of the Video Room to forward incoming calls to. This is only used (and required) when call_handler is set to video_room.
        call_flow_id:
          type: string
          format: uuid
          description: A string representing the ID of the Call Flow to forward incoming calls to. This is only used (and required) when call_handler is set to call_flow.
        call_ai_agent_id:
          type: string
          format: uuid
          description: A string representing the ID of the AI Agent to forward incoming calls to. This is only used (and required) when call_handler is set to ai_agent.
        call_relay_script_url:
          type: string
          description: A string representing a URL of a SWML script to respond to incoming calls. This is only used (and required) when call_handler is set to relay_script.
          example: https://dev.signalwire.com/relay-bins/f9d13f68-f71e-4042-95bb-b07b9e2f2f92
      description: Request body for updating a SIP endpoint.
    UpdateSipProfileRequest:
      type: object
      properties:
        domain_identifier:
          type: string
          description: String representing the domain_identifier portion of the profile. Must be unique across your project.
          example: example
        default_codecs:
          type: array
          items:
            type: string
          description: 'A list of codecs this profile will support. Currently supported values are: OPUS, G722, PCMU, PCMA, VP8, H264.'
        default_ciphers:
          type: array
          items:
            type: string
          description: 'A list of encryption ciphers this profile will support. Currently supported values are: AEAD_AES_256_GCM_8, AES_256_CM_HMAC_SHA1_80, AES_CM_128_HMAC_SHA1_80, AES_256_CM_HMAC_SHA1_32, AES_CM_128_HMAC_SHA1_32.'
        default_encryption:
          type: string
          enum:
            - required
            - optional
          description: A string representing whether connections to an endpoint that uses this profile require encryption or if encryption is optional. Encryption will always be used if possible. Possible values are required or optional.
          example: optional
        default_send_as:
          type: string
          description: The e164 formatted number you wish to set as the originating number when dialing PSTN phone numbers from a SIP Endpoint that uses this profile. Specify null or an empty string to randomly choose a purchased or verified number from within the project.
          example: '+15551234567'
      description: Request body for updating the SIP profile.
    UpdateVerifiedCallerIdRequest:
      type: object
      properties:
        name:
          type: string
          description: String representing the name portion of the caller ID.
          example: C-3P0
        extension:
          type: string
          description: String representing the extension of the phone number for the caller ID.
          example: '1234'
      description: Request body for updating a verified caller ID.
    VerifiedCallerId:
      type: object
      required:
        - id
        - number
        - verified
      properties:
        type:
          type: string
          description: The type of the returned object, this should be verified_caller_id.
          example: verified_caller_id
        id:
          allOf:
            - $ref: '#/components/schemas/uuid'
          format: uuid
          description: The unique identifier of the Verified Caller ID on SignalWire.
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        number:
          type: string
          description: String representing the phone number for the caller ID. This must be a valid, routeable phone number in E.164 format.
          example: '+15551234567'
        name:
          type: string
          description: String representing the name portion of the caller ID. If not provided, the default will be the formatted number that has been provided.
          example: C-3P0
        extension:
          type: string
          description: String representing the extension of the phone number for the caller ID. This is only used when placing the verification call.
          example: '1234'
        verified:
          type: boolean
          description: A boolean representing whether the number has been verified or not.
          example: false
        verified_at:
          type: string
          format: date-time
          description: Nullable DateTime field representing the date and time that the number was verified. If the number has not been verified, it will be null.
        status:
          type: string
          enum:
            - Verified
            - Awaiting Verification
          description: String representing the verification status for the caller ID. Current values are Verified and Awaiting Verification.
          example: Awaiting Verification
      description: Verified caller ID model.
    VerifiedCallerIdListResponse:
      type: object
      properties:
        links:
          allOf:
            - $ref: '#/components/schemas/PaginationLinks'
          description: Pagination links.
        data:
          type: array
          items:
            $ref: '#/components/schemas/VerifiedCallerId'
          description: List of verified caller IDs.
      description: Response containing a list of verified caller IDs.
    VerifiedCallerIdResponse:
      type: object
      required:
        - id
        - number
        - verified
      properties:
        type:
          type: string
          description: The type of the returned object, this should be verified_caller_id.
          example: verified_caller_id
        id:
          allOf:
            - $ref: '#/components/schemas/uuid'
          format: uuid
          description: The unique identifier of the Verified Caller ID on SignalWire.
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        number:
          type: string
          description: String representing the phone number for the caller ID. This must be a valid, routeable phone number in E.164 format.
          example: '+15551234567'
        name:
          type: string
          description: String representing the name portion of the caller ID. If not provided, the default will be the formatted number that has been provided.
          example: C-3P0
        extension:
          type: string
          description: String representing the extension of the phone number for the caller ID. This is only used when placing the verification call.
          example: '1234'
        verified:
          type: boolean
          description: A boolean representing whether the number has been verified or not.
          example: false
        verified_at:
          type: string
          format: date-time
          description: Nullable DateTime field representing the date and time that the number was verified. If the number has not been verified, it will be null.
        status:
          type: string
          enum:
            - Verified
            - Awaiting Verification
          description: String representing the verification status for the caller ID. Current values are Verified and Awaiting Verification.
          example: Awaiting Verification
      description: Response containing a single verified caller ID.
    VerifyCallerIdRequest:
      type: object
      required:
        - verification_code
      properties:
        verification_code:
          type: string
          description: The verification code received via call or SMS.
          example: '123456'
      description: Request body for verifying a caller ID.
    uuid:
      type: string
      format: uuid
      description: Universal Unique Identifier.
  securitySchemes:
    BasicAuth:
      type: http
      scheme: Basic
servers:
  - url: https://{space_name}.signalwire.com/api/relay/rest
    description: Endpoint
    variables:
      space_name:
        default: YOUR_SPACE
        description: Your SignalWire Space's subdomain.
