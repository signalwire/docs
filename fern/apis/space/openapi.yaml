openapi: 3.0.0
info:
  title: RELAY REST API
  version: 1.0.0
  contact:
    name: SignalWire
    url: https://support.signalwire.com/portal/en/newticket?departmentId=1029313000000006907&layoutId=1029313000000074011
    email: support@signalwire.com
  license:
    name: MIT
    url: https://github.com/signalwire/docs/blob/main/LICENSE
  termsOfService: https://signalwire.com/legal/signalwire-cloud-agreement
externalDocs:
  url: https://developer.signalwire.com
  description: Find more information about this and other SignalWire APIs.
tags:
  - name: Queues
    description: Manage call queues for handling incoming calls.
  - name: Verified Caller IDs
    description: Manage verified caller IDs for phone numbers not purchased through SignalWire.
  - name: Multi-Factor Authentication
    description: Multi-factor authentication adds security to your application by requesting a user to be verified via voice or via text message. It can also be used for One Time Password flows (OTP).
  - name: SIP Profile
    description: Manage SIP profile settings.
  - name: SIP Endpoints
    description: Manage SIP endpoints for voice communication.
  - name: Recordings
    description: Manage call recordings.
  - name: Phone Number Lookup
    description: Look up information about phone numbers.
  - name: Imported Phone Numbers
    description: Import and manage phone numbers from external providers.
  - name: Phone Numbers
    description: Manage phone numbers for your SignalWire project.
  - name: Number Group Membership
    description: Manage phone number memberships within number groups.
  - name: Number Groups
    description: Manage number groups for organizing phone numbers.
  - name: Domain Applications
    description: Manage domain applications for call handling configuration.
  - name: Campaign Registry (Beta)
    description: Manage 10DLC campaign registration for A2P messaging compliance.
  - name: Addresses
    description: Manage addresses for regulatory compliance and phone number provisioning.
paths:
  /addresses:
    get:
      operationId: list_addresses
      summary: List all Addresses.
      description: |-
        Returns a list of your Addresses. The addresses are returned sorted by creation date, with the most recent appearing first.

        #### Permissions
        The API token must include the following scopes: _Numbers_.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressListResponse'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Types.StatusCodes.StatusCode401'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Types.StatusCodes.StatusCode500'
      tags:
        - Addresses
    post:
      operationId: create_address
      summary: Create an address
      description: |-
        To create a new Address, make a POST request to the Address resource.

        #### Permissions
        The API token must include the following scopes: _Numbers_.
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressResponse'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Types.StatusCodes.StatusCode401'
        '422':
          description: Flat validation error response (not wrapped in errors array).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Types.StatusCodes.ValidationError'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Types.StatusCodes.StatusCode500'
      tags:
        - Addresses
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAddressRequest'
  /addresses/{id}:
    get:
      operationId: get_address
      summary: Retrieve an Address
      description: |-
        Retrieves the details of an Address that has been previously created.
        Use the unique ID that was returned from your previous request to identify the specific instance.

        #### Permissions
        The API token must include the following scopes: _Numbers_.
      parameters:
        - $ref: '#/components/parameters/AddressPathID'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressResponse'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Types.StatusCodes.StatusCode401'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Types.StatusCodes.StatusCode404'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Types.StatusCodes.StatusCode500'
      tags:
        - Addresses
    delete:
      operationId: delete_address
      summary: Delete an Address
      description: |-
        Permanently deletes an Address. It cannot be undone.

        #### Permissions
        The API token must include the following scopes: _Numbers_.
      parameters:
        - $ref: '#/components/parameters/AddressPathID'
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Types.StatusCodes.StatusCode401'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Types.StatusCodes.StatusCode404'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Types.StatusCodes.StatusCode500'
      tags:
        - Addresses
  /domain_applications:
    get:
      operationId: list_domain_applications
      summary: List all Domain Applications
      description: |-
        Returns a list of your domain applications. The domain applications are returned sorted by creation date, with the most recent domain applications appearing first.

        #### Permissions
        The API token must include the following scopes: _Voice_.
      parameters:
        - name: filter_domain
          in: query
          required: false
          description: String representing the domain portion of the domain application. Will return all domain applications containing this value as a substring.
          schema:
            type: string
          explode: false
        - name: filter_name
          in: query
          required: false
          description: String representing the name portion of the domain application. Will return all domain applications containing this value as a substring.
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainApplicationListResponse'
        '401':
          description: Access is unauthorized.
