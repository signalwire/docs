    TokenResponse:
      type: object
      properties:
        id:
          type: string
          description: The ID of the created API Token.
          example: ea14556a-984f-11ee-b9d1-0242ac120002
        name:
          type: string
          description: The name of the created API Token.
          example: John Doe's Token
        permissions:
          type: array
          items:
            type: string
          description: The permissions enabled for this token.
          example:
            - calling
            - fax
            - messaging
        token:
          type: string
          description: The API token that can be used along with the project ID for basic authentication.
          example: PT037258e533e87ac63174ee136ed0798dc85d4f4f9e6d7191
      description: Response containing a single token.
    Transcription:
      type: object
      properties:
        account_sid:
          type: string
          format: uuid
          description: The unique identifier for the account that created this transcription.
          example: b3877c40-da60-4998-90ad-b792e98472ac
        api_version:
          type: string
          description: The version of the SignalWire API.
          example: '2010-04-01'
        date_created:
          type: string
          description: The date, in RFC 2822 GMT format, this transcription was created.
          example: Thur, 27 Sept 2018 02:00:00 +0000
        date_updated:
          type: string
          description: The date, in RFC 2822 GMT format, this transcription was updated.
          example: Fri, 28 Sept 2018 03:00:00 +0000
        duration:
          type: string
          description: The time, in seconds, of the transcribed audio.
          example: '1'
        price:
          type: string
          description: The charge for the transcription.
          example: '-0.00025'
        price_unit:
          type: string
          description: The currency, in ISO 4127 format, for the price of the transcription.
          example: USD
        recording_sid:
          type: string
          description: The unique identifier for the recording that this transcription was created from.
          example: b3877c40-da60-4998-90ad-b792e98472re
        sid:
          type: string
          description: The unique identifier for the transcription.
          example: b3877c40-da60-4998-90ad-b792e98472tr
        status:
          allOf:
            - $ref: '#/components/schemas/TranscriptionStatus'
          description: The status of the transcription.
        transcription_text:
          type: string
          description: The text content of a transcription.
          example: Hello, this is a test transcription.
        type:
          type: string
          description: Type of the transcription.
          example: fast
        uri:
          type: string
          description: The URI of the transcription.
          example: /api/laml/2010-04-01/Accounts/b3877c40-da60-4998-90ad-b792e98472ac/Transcriptions/b3877c40-da60-4998-90ad-b792e98472tr.json
      description: Transcription model.
    TranscriptionListResponse:
      type: object
