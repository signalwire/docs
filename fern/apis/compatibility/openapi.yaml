                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTokenRequest'
    delete:
      operationId: delete_token
      summary: Delete an API Token
      description: Delete an API Token. This action cannot be undone.
      parameters:
        - $ref: '#/components/parameters/TokensAccountSidPath'
        - $ref: '#/components/parameters/TokenIdPath'
      responses:
        '204':
          description: 204 No Content response.
        '401':
          description: 401 Unauthorized response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 404 Not Found response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Tokens
  /Accounts/{Sid}:
    get:
      operationId: get_account
      summary: Find an Account by ID
      description: |-
        Find a Project (also referred to as _Account_) by ID.

        #### Permissions
        The API token must include the following scopes: _Management_.
      parameters:
        - $ref: '#/components/parameters/AccountPathSid'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '401':
          description: 401 Unauthorized response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 404 Not Found response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Accounts
    post:
      operationId: update_account
      summary: Update an Account
      description: |-
        Update a Project (also referred to as _Account_).

        #### Permissions
        The API token must include the following scopes: _Management_.
      parameters:
        - $ref: '#/components/parameters/AccountPathSid'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '401':
          description: 401 Unauthorized response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 404 Not Found response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Accounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccountRequest'
