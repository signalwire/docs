          example: false
        capabilities:
          allOf:
            - $ref: '#/components/schemas/PhoneNumberCapabilities'
          description: Whether or not a number can receive calls and messages.
        friendly_name:
          type: string
          description: A formatted version of the number.
          example: 253-218-6751
        iso_country:
          type: string
          description: The ISO country code of the number.
          example: US
        lata:
          type: string
          description: The LATA of the number. Only available for numbers in US and Canada.
          example: '888'
        latitude:
          type: string
          description: The latitude of the number. Only available for numbers in US and Canada.
          example: '47.3'
        longitude:
          type: string
          description: The longitude of the number. Only available for numbers in US and Canada.
          example: '-122.2'
        phone_number:
          type: string
          description: The number in E.164 format.
          example: '+12532186751'
        postal_code:
          type: string
          description: The postal/zip code of the number. Only available for numbers in US and Canada.
          example: '98002'
        rate_center:
          type: string
          description: The rate center of the number. Only available for numbers in US and Canada.
          example: AUBURN
        region:
          type: string
          description: The state or province abbreviation of the number. Only available for numbers in US and Canada.
          example: WA
