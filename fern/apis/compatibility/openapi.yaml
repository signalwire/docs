          type: string
          description: The number this call was forwarded from.
          example: '+13102259067'
        from:
          type: string
          description: The address that initiated the call.
          example: '+13103384645'
        formatted_from:
          type: string
          description: The formatted number that initiated the call.
          example: '+13102259067'
        parent_call_sid:
