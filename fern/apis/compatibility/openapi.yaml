          example: 1200
          default: 1200
        MachineDetectionTimeout:
          type: integer
          format: int32
          description: The time SignalWire will wait for machine detection before timing out. Default is `30` seconds.
          example: 30
          default: 30
        MachineWordsThreshold:
          type: integer
          format: int32
          description: How many words to count to decide it is a machine. Must be at least one to a maximum of `100`. Default is `6`.
          example: 6
          default: 6
        MaxPricePerMinute:
          type: number
          format: float
          description: The maximum price in USD acceptable for the call to be created.
          example: 0.0075
        Method:
          type: string
          enum:
            - GET
            - POST
          description: Whether the request to `Url` is a `GET` or a `POST`. Default is `POST`.
          example: POST
          default: POST
        Record:
          type: boolean
          description: Whether or not to record a call.
          example: false
        RecordingChannels:
          type: string
          enum:
            - mono
            - dual
          description: The number of channels in the recording.
          example: mono
        RecordingStatusCallback:
          type: string
          description: The URL to request when recording is available.
          example: https://your-api-endpoint.com/path
        RecordingStatusCallbackMethod:
          type: string
          enum:
            - GET
            - POST
          description: Whether the request to `RecordingStatusCallback` URL is a `GET` or a `POST`. Default is `POST`.
          example: POST
          default: POST
        RecordingTrack:
          type: string
          enum:
            - inbound
            - outbound
            - both
          description: Specifies whether to record the `inbound`, `outbound`, or `both` audio. Defaults to `both`.
          example: both
          default: both
        SipAuthUsername:
          type: string
          nullable: true
          description: The username to authenticate the caller when making an outbound SIP call.
          example: null
        SipAuthPassword:
          type: string
          nullable: true
          description: The password to authenticate the caller when making an outbound SIP call.
          example: null
        SendDigits:
          type: string
          description: The digits to press after a call is connected.
          example: w
        StatusCallback:
          type: string
          description: The URL SignalWire will send webhooks to on every requested `StatusCallbackEvent` event.
          example: https://your-api-endpoint.com/path
        StatusCallbackEvent:
          type: array
