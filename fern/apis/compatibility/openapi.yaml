openapi: 3.0.0
info:
  title: Compatibility API
  version: 1.0.0
tags:
  - name: Accounts
  - name: Applications
  - name: Available Phone Numbers
  - name: Calls
  - name: Call Recordings
  - name: Streams
  - name: Conferences
  - name: Conference Participants
  - name: Conference Streams
  - name: Faxes
  - name: Fax Media
  - name: Incoming Phone Numbers
  - name: Imported Phone Numbers
  - name: cXML Bins
  - name: Messages
  - name: Media
  - name: Recordings
  - name: Recording Transcriptions
  - name: Queues
  - name: Queue Members
  - name: Tokens
paths:
  /Accounts:
    get:
      operationId: list_accounts
      summary: List Accounts
      description: |-
        This endpoint will return a list that contains Project you are connecting as and any subprojects.

        #### Permissions
        The API token must include the following scopes: _Management_.
      parameters:
        - name: FriendlyName
          in: query
          required: false
          description: 'A named unique identifier for the resource. Allowed characters: `A-Za-z0-9_-`. Maximum of 100 characters.'
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountListResponse'
        '401':
          description: 401 Unauthorized response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Accounts
    post:
      operationId: create_subprojects
      summary: Create Subprojects
      description: |-
        This endpoint creates a subproject on the Project you are connecting as.

        #### Permissions
        The API token must include the following scopes: _Management_.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '400':
          description: 400 Bad Request response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 401 Unauthorized response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Accounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubprojectRequest'
  /Accounts/{AccountSid}/Applications:
    get:
      operationId: list_applications
      summary: List Applications
      description: |-
        The ability to read all of the applications that are associated with your Account. This will be returned as a list of applications.

        #### Permissions
        The API token must include one of the following scopes: _Voice_ or _Messaging_ or _Fax_.
      parameters:
        - $ref: '#/components/parameters/AccountSidPath'
        - name: FriendlyName
          in: query
          required: false
          description: 'A named unique identifier for the resource. Allowed characters: `A-Za-z0-9_-`. Maximum of 100 characters.'
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationListResponse'
        '401':
          description: 401 Unauthorized response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Applications
    post:
      operationId: create_application
      summary: Create an Application
      description: |-
        Create an Application.

        #### Permissions
        The API token must include one of the following scopes: _Voice_ or _Messaging_ or _Fax_.
      parameters:
        - $ref: '#/components/parameters/AccountSidPath'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationResponse'
        '400':
          description: 400 Bad Request response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 401 Unauthorized response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Applications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApplicationRequest'
  /Accounts/{AccountSid}/Applications/{Sid}:
    get:
      operationId: get_application
      summary: Find an Application by ID
      description: |-
        Find an Application by ID.

        #### Permissions
        The API token must include one of the following scopes: _Voice_ or _Messaging_ or _Fax_.
      parameters:
        - $ref: '#/components/parameters/AccountSidPath'
        - $ref: '#/components/parameters/ApplicationPathSid'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationResponse'
        '401':
          description: 401 Unauthorized response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 404 Not Found response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Applications
    post:
      operationId: update_application
      summary: Update an Application
      description: |-
        Update an Application.

        #### Permissions
        The API token must include one of the following scopes: _Voice_ or _Messaging_ or _Fax_.
      parameters:
        - $ref: '#/components/parameters/AccountSidPath'
        - $ref: '#/components/parameters/ApplicationPathSid'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationResponse'
        '401':
          description: 401 Unauthorized response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 404 Not Found response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Applications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateApplicationRequest'
    delete:
      operationId: delete_application
      summary: Delete an Application
      description: |-
        Delete an Application.

        #### Permissions
        The API token must include one of the following scopes: _Voice_ or _Messaging_ or _Fax_.
      parameters:
        - $ref: '#/components/parameters/AccountSidPath'
        - $ref: '#/components/parameters/ApplicationPathSid'
      responses:
        '204':
          description: 204 No Content response.
        '401':
          description: 401 Unauthorized response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 404 Not Found response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Applications
  /Accounts/{AccountSid}/AvailablePhoneNumbers:
    get:
      operationId: list_available_phone_number_resources
      summary: List of AvailablePhoneNumber resources
      description: |-
        Returns a list of URIs to phone number resources available to the account, categorized by type (Local, Toll-Free, Mobile, etc) and ISO country.

        #### Permissions
        The API token must include the following scopes: _Numbers_.
      parameters:
        - $ref: '#/components/parameters/AvailablePhoneNumbersAccountSidPath'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailablePhoneNumberResourcesResponse'
        '401':
          description: 401 Unauthorized response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Available Phone Numbers
  /Accounts/{AccountSid}/AvailablePhoneNumbers/{IsoCountry}:
    get:
      operationId: list_available_phone_number_resources_by_country
      summary: List of AvailablePhoneNumber resources by country
      description: |-
        Returns a list of URIs to phone number resources available to the account in the specified ISO country, categorized by type (Local, Toll-Free, Mobile, etc).

        #### Permissions
        The API token must include the following scopes: _Numbers_.
      parameters:
        - $ref: '#/components/parameters/AvailablePhoneNumbersAccountSidPath'
        - $ref: '#/components/parameters/IsoCountryPath'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailablePhoneNumberResourcesResponse'
        '401':
          description: 401 Unauthorized response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Available Phone Numbers
  /Accounts/{AccountSid}/AvailablePhoneNumbers/{IsoCountry}/Local:
    get:
      operationId: search_local_available_phone_numbers
      summary: Search for available phone numbers that match your criteria.
      description: |-
        Search for Local AvailablePhoneNumbers.

        #### Permissions
        The API token must include the following scopes: _Numbers_.
      parameters:
        - $ref: '#/components/parameters/AvailablePhoneNumbersAccountSidPath'
        - $ref: '#/components/parameters/IsoCountryPath'
        - name: AreaCode
          in: query
          required: false
          description: Find numbers in the provided area code. Only available for numbers in US and Canada.
          schema:
            type: string
          explode: false
        - name: Beta
          in: query
          required: false
          description: New numbers on SignalWire are marked as `beta`. Possible values are `true` or `false`.
          schema:
            type: boolean
          explode: false
        - name: Contains
          in: query
          required: false
          description: Find numbers based off of a pattern. Valid characters are `[0-9a-zA-Z]`.
          schema:
            type: string
          explode: false
        - name: ExcludeAllAddressRequired
          in: query
          required: false
          description: Whether or not to exclude numbers that require an address anywhere in the world.
          schema:
            type: boolean
          explode: false
        - name: ExcludeForeignAddressRequired
          in: query
          required: false
          description: Whether or not to exclude numbers that require a foreign address.
          schema:
            type: boolean
          explode: false
        - name: ExcludeLocalAddressRequired
          in: query
          required: false
          description: Whether or not to exclude numbers that require a local address.
          schema:
            type: boolean
          explode: false
        - name: FaxEnabled
          in: query
          required: false
          description: Whether or not a number can receive faxes.
          schema:
            type: boolean
          explode: false
        - name: InRegion
          in: query
          required: false
          description: Limits search to same region as number.
          schema:
            type: string
          explode: false
        - name: MmsEnabled
          in: query
          required: false
          description: Whether or not a number can receive MMS messages.
          schema:
            type: boolean
          explode: false
        - name: SmsEnabled
          in: query
          required: false
          description: Whether or not a number can receive SMS messages.
          schema:
            type: boolean
          explode: false
        - name: VoiceEnabled
          in: query
          required: false
          description: Whether or not a number can receive calls.
          schema:
            type: boolean
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailablePhoneNumberListResponse'
        '401':
          description: 401 Unauthorized response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Available Phone Numbers
  /Accounts/{AccountSid}/AvailablePhoneNumbers/{IsoCountry}/TollFree:
    get:
      operationId: search_toll_free_available_phone_numbers
      summary: Find toll-free numbers.
      description: |-
        Search for toll-free AvailablePhoneNumbers.

        #### Permissions
        The API token must include the following scopes: _Numbers_.
      parameters:
        - $ref: '#/components/parameters/AvailablePhoneNumbersAccountSidPath'
        - $ref: '#/components/parameters/IsoCountryPath'
        - name: AreaCode
          in: query
          required: false
          description: Find numbers in the provided area code. Only available for numbers in US and Canada.
          schema:
            type: string
          explode: false
        - name: Beta
          in: query
          required: false
          description: New numbers on SignalWire are marked as `beta`. Possible values are `true` or `false`.
          schema:
            type: boolean
          explode: false
        - name: Contains
          in: query
          required: false
          description: Find numbers based off of a pattern. Valid characters are `[0-9a-zA-Z]`.
          schema:
            type: string
          explode: false
        - name: ExcludeAllAddressRequired
          in: query
          required: false
          description: Whether or not to exclude numbers that require an address anywhere in the world.
          schema:
            type: boolean
          explode: false
        - name: ExcludeForeignAddressRequired
          in: query
          required: false
          description: Whether or not to exclude numbers that require a foreign address.
          schema:
            type: boolean
          explode: false
        - name: ExcludeLocalAddressRequired
          in: query
          required: false
          description: Whether or not to exclude numbers that require a local address.
          schema:
            type: boolean
          explode: false
        - name: FaxEnabled
          in: query
          required: false
          description: Whether or not a number can receive faxes.
          schema:
            type: boolean
          explode: false
        - name: InRegion
          in: query
          required: false
          description: Limits search to same region as number.
          schema:
            type: string
          explode: false
        - name: MmsEnabled
          in: query
          required: false
          description: Whether or not a number can receive MMS messages.
          schema:
            type: boolean
          explode: false
        - name: SmsEnabled
          in: query
          required: false
          description: Whether or not a number can receive SMS messages.
          schema:
            type: boolean
          explode: false
        - name: VoiceEnabled
          in: query
          required: false
          description: Whether or not a number can receive calls.
          schema:
            type: boolean
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailablePhoneNumberListResponse'
        '401':
          description: 401 Unauthorized response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Available Phone Numbers
  /Accounts/{AccountSid}/Calls:
    get:
      operationId: list_all_calls
      summary: List all Calls
      description: |-
        List all calls.

        #### Permissions
        The API token must include the following scopes: _Voice_.
      parameters:
        - $ref: '#/components/parameters/CallsAccountSidPath'
        - name: EndTime
          in: query
          required: false
          description: The time, in RFC 2822 GMT format, on which the call was terminated.
          schema:
            type: string
          explode: false
        - name: EndTime<
          in: query
          required: false
          description: The time before which the call was terminated.
          schema:
            type: string
          explode: false
        - name: EndTime>
          in: query
          required: false
          description: The time after which the call was terminated.
          schema:
            type: string
          explode: false
        - name: From
          in: query
          required: false
          description: The address that initiated the call.
          schema:
            type: string
          explode: false
        - name: ParentCallSid
          in: query
          required: false
          description: The unique identifier for the call that created this call.
          schema:
            type: string
            format: uuid
          explode: false
        - name: StartTime
          in: query
          required: false
          description: The time, in RFC 2822 GMT format, on which the call began.
          schema:
            type: string
          explode: false
        - name: StartTime<
          in: query
          required: false
          description: The time before which the call began.
          schema:
            type: string
          explode: false
        - name: StartTime>
          in: query
          required: false
          description: The time after which the call began.
          schema:
            type: string
          explode: false
        - name: Status
          in: query
          required: false
          description: The status of the call.
          schema:
            type: string
            enum:
              - queued
              - ringing
              - in-progress
              - canceled
              - completed
              - busy
              - failed
          explode: false
        - name: To
          in: query
          required: false
          description: The address that received the call.
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallListResponse'
        '401':
          description: 401 Unauthorized response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Calls
    post:
      operationId: create_a_call
      summary: Create a Call
      description: |-
        Create a call.

        #### Permissions
        The API token must include the following scopes: _Voice_.
      parameters:
        - $ref: '#/components/parameters/CallsAccountSidPath'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallResponse'
        '400':
          description: 400 Bad Request response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 401 Unauthorized response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Calls
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCallRequest'
  /Accounts/{AccountSid}/Calls/{CallSid}/Recordings:
    post:
      operationId: create_recording
      summary: Create a Recording.
      description: |-
        Create a recording.

        #### Permissions
        The API token must include the following scopes: _Voice_.
      parameters:
        - $ref: '#/components/parameters/CallsAccountSidPath'
        - $ref: '#/components/parameters/CallSidPathForRecording'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallRecordingResponse'
        '400':
          description: 400 Bad Request response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 401 Unauthorized response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Call Recordings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCallRecordingRequest'
  /Accounts/{AccountSid}/Calls/{CallSid}/Recordings/{Sid}:
    post:
      operationId: update_recording
      summary: Update a Recording
      description: |-
        Pause, resume or stop a Recording. You can control what happens while recording is paused (replace pause with silence or skip it).

        #### Permissions
        The API token must include the following scopes: _Voice_.
      parameters:
        - $ref: '#/components/parameters/CallsAccountSidPath'
        - $ref: '#/components/parameters/CallSidPathForRecording'
        - $ref: '#/components/parameters/CallSidPath'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallRecordingResponse'
        '401':
          description: 401 Unauthorized response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 404 Not Found response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Call Recordings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCallRecordingRequest'
  /Accounts/{AccountSid}/Calls/{CallSid}/Streams:
    post:
      operationId: create_stream
      summary: Create a Stream.
      description: |-
        Create a stream.

        #### Permissions
        The API token must include the following scopes: _Voice_.
      parameters:
        - $ref: '#/components/parameters/CallsAccountSidPath'
        - $ref: '#/components/parameters/CallSidPathForRecording'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallStreamResponse'
        '400':
          description: 400 Bad Request response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 401 Unauthorized response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Streams
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCallStreamRequest'
  /Accounts/{AccountSid}/Calls/{CallSid}/Streams/{Sid}:
    post:
      operationId: update_stream
      summary: Stop a Stream
      description: |-
        Stop a Stream.

        #### Permissions
        The API token must include the following scopes: _Voice_.
      parameters:
        - $ref: '#/components/parameters/CallsAccountSidPath'
        - $ref: '#/components/parameters/CallSidPathForRecording'
        - $ref: '#/components/parameters/CallSidPath'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallStreamResponse'
        '401':
          description: 401 Unauthorized response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 404 Not Found response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Streams
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCallStreamRequest'
  /Accounts/{AccountSid}/Calls/{Sid}:
    get:
      operationId: retrieve_a_call
      summary: Retrieve a Call
      description: |-
        Retrieve a call.

        #### Permissions
        The API token must include the following scopes: _Voice_.
      parameters:
        - $ref: '#/components/parameters/CallsAccountSidPath'
        - $ref: '#/components/parameters/CallSidPath'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallResponse'
        '401':
          description: 401 Unauthorized response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 404 Not Found response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Calls
    post:
      operationId: update_a_call
      summary: Update a Call
      description: |-
        Update a call.

        #### Permissions
        The API token must include the following scopes: _Voice_.
      parameters:
        - $ref: '#/components/parameters/CallsAccountSidPath'
        - $ref: '#/components/parameters/CallSidPath'
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallResponse'
        '401':
          description: 401 Unauthorized response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 404 Not Found response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Calls
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCallRequest'
    delete:
      operationId: delete_a_call
      summary: Delete a Call
      description: |-
        Delete a call record from your account. If the delete is successful, a 204 response, with no body, will be returned.

        #### Permissions
        The API token must include the following scopes: _Voice_.
      parameters:
        - $ref: '#/components/parameters/CallsAccountSidPath'
        - $ref: '#/components/parameters/CallSidPath'
      responses:
        '204':
          description: 204 No Content response.
        '401':
          description: 401 Unauthorized response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 404 Not Found response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - Calls
  /Accounts/{AccountSid}/Conferences:
    get:
      operationId: list_all_conferences
      summary: List All Conferences
      description: |-
        The ability to read all of the conferences that are associated with your Account. This will be returned as a list of conferences.

        #### Permissions
        The API token must include the following scopes: _Voice_.
      parameters:
        - $ref: '#/components/parameters/ConferencesAccountSidPath'
        - name: DateCreated
          in: query
          required: false
          description: Shows conferences that were created on the date provided.
          schema:
            type: string
          explode: false
        - name: DateUpdated
          in: query
          required: false
          description: Shows conferences that were updated on the date provided.
          schema:
            type: string
          explode: false
        - name: FriendlyName
          in: query
          required: false
          description: A description, up to 64 characters, of the conference room.
          schema:
            type: string
          explode: false
        - name: Status
