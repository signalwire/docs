          example:
            - completed
        StatusCallbackMethod:
          type: string
          enum:
            - GET
            - POST
          description: Whether the request to `StatusCallback` URL is a `GET` or a `POST`. Default is `POST`.
          example: GET
          default: POST
        Timeout:
          type: string
          description: The time SignalWire will wait before assuming the call has no answer. Max wait time is `600 seconds`. Default is `60` seconds.
          example: '60'
          default: '60'
        Trim:
          type: string
          enum:
            - trim-silence
            - do-not-trim
          description: Whether leading and trailing silence is trimmed from a recording. Possible values are `trim-silence` or `do-not-trim`. Default is `trim-silence`.
          example: trim-silence
          default: trim-silence
      description: Request body for creating a call.
    CreateCallStreamRequest:
