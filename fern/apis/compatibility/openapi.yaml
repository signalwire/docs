  schemas:
    Account:
      type: object
      properties:
        auth_token:
          type: string
          description: The authorization token for this Project. This token should be kept a secret and is not returned in a normal request.
          example: Redacted
        date_created:
          type: string
          description: The date, in RFC 2822 GMT format, this Project was created.
          example: Sat, 15 Sept 2018 10:00:00 +0000
        date_updated:
          type: string
          description: The date, in RFC 2822 GMT format, this Project was updated.
          example: Sat, 16 Sept 2018 10:00:00 +0000
        friendly_name:
          type: string
          description: The name of the Project, up to 250 characters long.
          example: My Project
        owner_account_sid:
          type: string
          format: uuid
          description: The Project ID that uniquely identifies the parent of the Project.
          example: b3877c40-da60-4998-90ad-b792e98472af
        sid:
          type: string
          format: uuid
          description: The Project ID that uniquely identifies the Project.
          example: b3877c40-da60-4998-90ad-b792e98472af
        status:
          type: string
          description: 'The status of the Project. Possible values are: active, suspended, or closed.'
          example: active
        subproject:
          type: boolean
          description: Whether or not the project is a sub-project.
          example: false
        subresource_uris:
          allOf:
            - $ref: '#/components/schemas/SubresourceUris'
          description: A Map of sub-resources that are linked to the given Project.
        type:
          type: string
          description: 'The type of the Project. Possible values are: Trial and Full.'
          example: Full
        uri:
          type: string
          format: uri
          description: The URI for the Project.
          example: /api/laml/2010-04-01/Accounts/b3877c40-da60-4998-90ad-b792e98472af.json
      description: Account/Project model representing a SignalWire project.
    AccountListResponse:
      type: object
