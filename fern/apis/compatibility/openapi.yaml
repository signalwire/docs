      description: Response containing a single transcription.
    TranscriptionStatus:
      type: string
      enum:
        - in-progress
        - completed
        - failed
      description: Transcription status.
    UpdateAccountRequest:
      type: object
      properties:
        FriendlyName:
          type: string
          description: The name of the Project, up to 250 characters long.
          example: My Project
      description: Request body for updating an account.
    UpdateApplicationRequest:
      type: object
      properties:
        FriendlyName:
          type: string
          description: 'A named unique identifier for the resource. Allowed characters: `A-Za-z0-9_-`. Maximum of 100 characters.'
          example: My Friendly Name
        MessageStatusCallback:
          type: string
          description: If a message's `ApplicationSid` is set to this Application's `Sid`, when a message receives a status change, SignalWire will send a `POST` request to this URL with the message's details.
          example: http://www.example.com/sms-status-callback
        SmsFallbackMethod:
          type: string
          enum:
            - GET
            - POST
          description: Whether the request to `SmsFallbackUrl` is a `GET` or a `POST`. Default is `POST`.
          example: GET
          default: POST
        SmsFallbackUrl:
          type: string
          description: The URL SignalWire will request if errors occur when fetching the `SmsUrl`.
          example: http://www.example.com/sms-fallback
        SmsMethod:
          type: string
          enum:
            - GET
            - POST
          description: Whether the request to `SmsUrl` is a `GET` or a `POST`. Default is `POST`.
          example: GET
          default: POST
        SmsStatusCallback:
          type: string
          description: If a message's `ApplicationSid` is set to this Application's `Sid`, when a message receives a status change, SignalWire will send a `POST` request to this URL with the message's details.
          example: http://www.example.com/sms-status-callback
        SmsUrl:
          type: string
          description: The URL to request when an SMS is received.
          example: http://example.com
        StatusCallback:
          type: string
          description: The URL to pass status updates to the Application.
          example: http://example.com
        StatusCallbackMethod:
          type: string
          enum:
            - GET
            - POST
          description: Whether the request to the `StatusCallback` URL is a `GET` or a `POST`. Default is `POST`.
          example: POST
          default: POST
        VoiceCallerIdLookup:
          type: boolean
          description: Whether or not to look up a caller's ID from the database. Possible values are `true` or `false`. Default is `false`.
          example: false
          default: false
        VoiceFallbackMethod:
          type: string
          enum:
            - GET
            - POST
          description: Whether the request to `VoiceFallbackUrl` is a `GET` or a `POST`. Default is `POST`.
          example: GET
          default: POST
        VoiceFallbackUrl:
          type: string
          description: The URL SignalWire will request if errors occur when fetching the `Url`.
          example: http://example.com
        VoiceMethod:
          type: string
          enum:
            - GET
            - POST
          description: Whether the request to `VoiceUrl` is a `GET` or a `POST`. Default is `POST`.
          example: GET
          default: POST
        VoiceUrl:
          type: string
          description: The URL to request when a phone number receives a call or fax.
          example: http://example.com
      description: Request body for updating an application.
    UpdateCallRecordingRequest:
      type: object
      required:
        - Status
      properties:
        Status:
          type: string
          enum:
            - paused
            - in-progress
            - stopped
          description: The status of the recording.
          example: paused
        PauseBehavior:
          type: string
          enum:
            - skip
            - silence
          description: What to do while recording is paused.
          example: silence
      description: Request body for updating a call recording.
    UpdateCallRequest:
      type: object
      properties:
        Url:
          type: string
          description: The URL to handle the call.
          example: http://your-application.com/docs/voice.xml
        Method:
          type: string
          enum:
            - GET
            - POST
          description: Whether the request to `Url` is a `GET` or a `POST`.
          example: POST
        Status:
          type: string
          enum:
            - canceled
            - completed
          description: The status to update the call to.
          example: completed
        FallbackUrl:
          type: string
          description: The URL SignalWire will request if errors occur.
          example: https://your-api-endpoint.com/fallback
        FallbackMethod:
          type: string
          enum:
            - GET
            - POST
          description: Whether the request to `FallbackUrl` is a `GET` or a `POST`.
          example: POST
        StatusCallback:
          type: string
          description: The URL SignalWire will send webhooks to.
          example: https://your-api-endpoint.com/status
        StatusCallbackMethod:
          type: string
          enum:
            - GET
            - POST
          description: Whether the request to `StatusCallback` is a `GET` or a `POST`.
          example: POST
      description: Request body for updating a call.
    UpdateCallStreamRequest:
      type: object
      required:
        - Status
      properties:
        Status:
          type: string
          enum:
            - in-progress
            - stopped
          description: The status of the stream.
          example: stopped
      description: Request body for updating a call stream.
    UpdateConferenceParticipantRequest:
      type: object
      properties:
        AnnounceUrl:
          type: string
          description: The URL to send conference announcements to.
          example: https://your-api-endpoint.com/announce
        AnnounceMethod:
          type: string
          enum:
            - GET
            - POST
          description: Whether the request to `AnnounceUrl` is a `GET` or a `POST`. Default is `POST`.
          example: POST
          default: POST
        Beep:
          type: boolean
          description: Whether or not to play the beep sound when updating the Participant.
          example: false
        Coaching:
          type: boolean
          description: Whether the participant is coaching another call.
          example: false
        CallSidToCoach:
          type: string
          nullable: true
          format: uuid
          description: The unique identifier of the participant who is being coached.
          example: null
        Hold:
          type: boolean
          description: Whether or not a participant is on hold.
          example: false
        HoldMethod:
          type: string
          enum:
            - GET
            - POST
          description: Whether the request to `HoldUrl` is a `GET` or a `POST`. Default is `POST`.
          example: POST
          default: POST
        HoldUrl:
          type: string
          description: The URL to send hold music to that will be played when participant is on hold.
          example: https://your-api-endpoint.com/hold-music
        Muted:
          type: boolean
          description: Whether or not a participant is muted.
          example: false
      description: Request body for updating a conference participant.
    UpdateConferenceRequest:
      type: object
      properties:
        AnnounceMethod:
          type: string
          enum:
            - GET
            - POST
          description: Whether the request to `AnnounceUrl` is a `GET` or a `POST`. Default is `POST`.
          example: POST
          default: POST
        AnnounceUrl:
          type: string
          description: The URL to send conference announcements to.
          example: https://your-api-endpoint.com/announce
        Status:
          type: string
          description: The status of this conference.
          example: completed
      description: Request body for updating a conference.
    UpdateConferenceStreamRequest:
      type: object
      required:
        - Status
      properties:
        Status:
          type: string
          enum:
            - in-progress
            - stopped
          description: The status of the stream.
          example: stopped
      description: Request body for updating a conference stream.
    UpdateFaxRequest:
      type: object
      properties:
        Status:
          type: string
          enum:
            - queued
            - processing
            - sending
            - delivered
            - receiving
            - received
            - no-answer
            - busy
            - failed
            - canceled
          description: The status of the fax.
          example: canceled
      description: Request body for updating a fax.
    UpdateIncomingPhoneNumberRequest:
      type: object
      properties:
        AddressSid:
          type: string
          description: The unique identifier for the address associated with this phone number.
          example: b3877c40-da60-4998-90ad-b792e98472ad
        FriendlyName:
          type: string
          description: A formatted version of the number.
          example: 310-338-6745
        SmsApplicationSid:
          type: string
          nullable: true
          description: The unique identifier for the application associated with SMS handling on this phone number.
          example: null
        SmsFallbackMethod:
          type: string
          enum:
            - GET
            - POST
          description: Whether the request to `SmsFallbackUrl` is a `GET` or a `POST`.
          example: POST
        SmsFallbackUrl:
          type: string
          nullable: true
          description: The URL to request if errors occur when fetching SmsUrl.
          example: null
        SmsMethod:
          type: string
          enum:
            - GET
            - POST
          description: Whether the request to SmsUrl is a `GET` or a `POST`.
          example: POST
        SmsUrl:
          type: string
          nullable: true
          description: The URL to request when an incoming SMS is received.
          example: null
        StatusCallback:
          type: string
          description: The URL to request to pass status updates to.
          example: example.com
        StatusCallbackMethod:
          type: string
          enum:
            - GET
            - POST
          description: Whether the request to StatusCallback is a `GET` or a `POST`.
          example: POST
        TrunkSid:
          type: string
          nullable: true
          description: The unique identifier for the Trunk associated with this phone number.
          example: null
        VoiceApplicationSid:
          type: string
          nullable: true
          description: The unique identifier for the application associated with call handling on this phone number.
          example: null
        VoiceCallerIdLookup:
          type: boolean
          description: Whether or not to look up a caller's name in the database.
          example: false
        VoiceFallbackMethod:
          type: string
          enum:
            - GET
            - POST
          description: Whether the request to VoiceFallbackUrl is a `GET` or a `POST`.
          example: POST
        VoiceFallbackUrl:
          type: string
          description: The URL to request if errors occur when fetching `Url`.
          example: example.com
        VoiceMethod:
          type: string
          enum:
            - GET
            - POST
          description: Whether the request to Url is a `GET` or a `POST`.
          example: POST
        VoiceUrl:
          type: string
          description: The URL to request when an incoming call is received.
          example: http://your-application.com/docs/voice.xml
      description: Request body for updating an incoming phone number.
    UpdateLamlBinRequest:
      type: object
      properties:
        Name:
          type: string
          description: A friendly name given to the cXML bin.
          example: Death Star IVR
        Contents:
          type: string
          description: The contents of the cXML bins.
          example: <Response><Say>Hello!</Say></Response>
      description: Request body for updating a cXML Bin.
    UpdateMessageRequest:
      type: object
      required:
        - Body
      properties:
        Body:
          type: string
          description: The text of the message.
          example: ''
      description: Request body for updating a message.
    UpdateQueueMemberRequest:
      type: object
      required:
        - Url
      properties:
        Url:
          type: string
          description: The URL to send the dequeued member to.
          example: http://your-application.com/docs/voice.xml
        Method:
          type: string
          enum:
            - GET
            - POST
          description: Whether the request to Url is a `GET` or a `POST`. Default is `POST`.
          example: POST
          default: POST
      description: Request body for updating a queue member.
    UpdateQueueRequest:
      type: object
      required:
        - FriendlyName
      properties:
        FriendlyName:
          type: string
          description: A description that distinguishes a queue.
          example: Queue1
        MaxSize:
          type: string
          description: The maximum number of calls that are allowed to wait in a queue.
          example: '123'
      description: Request body for updating a queue.
    UpdateTokenRequest:
      type: object
      properties:
        name:
          type: string
          description: The name representing the project API token.
          example: John Doe's Token
        permissions:
          type: array
          items:
            type: string
          description: The permissions you would like to enable for this project API token. Valid permissions are calling, chat, fax, management, messaging, numbers, pubsub, storage, tasking, and video.
          example:
            - calling
            - fax
            - messaging
      description: Request body for updating an API token.
servers:
  - url: https://{space_url}/api/laml/2010-04-01
    description: SignalWire Compatibility API
    variables:
      space_url:
        default: ''
