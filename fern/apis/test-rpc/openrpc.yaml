openrpc: 1.3.2
info:
  title: Calculator API
  version: 1.0.0
  description: A simple calculator API for testing OpenRPC support.
servers:
  - name: production
    url: https://api.example.com/rpc
    description: Production JSON-RPC server
methods:
  - name: add
    summary: Add two numbers
    description: Performs addition of two numeric values
    params:
      - name: a
        schema:
          type: number
        required: true
        description: First number to add
      - name: b
        schema:
          type: number
        required: true
        description: Second number to add
    result:
      name: sum
      schema:
        type: number
      description: The sum of the two numbers
    examples:
      - name: AddExample
        description: Example of adding two numbers
        params:
          - name: a
            value: 5
          - name: b
            value: 3
        result:
          name: sum
          value: 8
  - name: subtract
    summary: Subtract two numbers
    description: Performs subtraction of two numeric values
    params:
      - name: a
        schema:
          type: number
        required: true
        description: Number to subtract from
      - name: b
        schema:
          type: number
        required: true
        description: Number to subtract
    result:
      name: difference
      schema:
        type: number
      description: The difference of the two numbers
