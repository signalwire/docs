x-fern-base-path: /project

components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
      x-fern-auth:
        scheme: basic
        username:
          name: project_id
          env: SIGNALWIRE_PROJECT_ID
        password:
          name: token
          env: SIGNALWIRE_API_TOKEN

security:
  - BasicAuth: []

paths:
  /tokens:
    post:
      x-fern-sdk-group-name:
        - tokens
      x-fern-sdk-method-name: create_token
  /tokens/{token_id}:
    delete:
      x-fern-sdk-group-name:
        - tokens
      x-fern-sdk-method-name: delete_token
    patch:
      x-fern-sdk-group-name:
        - tokens
      x-fern-sdk-method-name: update_token
