openapi: 3.0.0
info:
  title: Project API
  version: 1.0.0
  contact:
    name: SignalWire
    url: https://support.signalwire.com/portal/en/newticket?departmentId=1029313000000006907&layoutId=1029313000000074011
    email: support@signalwire.com
  license:
    name: MIT
    url: https://github.com/signalwire/docs/blob/main/LICENSE
  termsOfService: https://signalwire.com/legal/signalwire-cloud-agreement
  description: An API to programmatically manage your SignalWire projects.
externalDocs:
  url: https://developer.signalwire.com
  description: Find more information about this and other SignalWire APIs.
tags:
  - name: Tokens
paths:
  /tokens:
    post:
      operationId: create_token
      summary: Generate a new API Token
      description: |-
        Generate an API Token for a project to be used to authenticate requests within the project.


        #### Permissions

        You must set the functions allowed by this API Token by selecting which types of requests this API Token is allowed to make.

        Valid options are: calling, chat, fax, management, messaging, numbers, pubsub, storage, tasking, and video
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Unauthorized error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Types.StatusCodes.StatusCode401'
        '422':
          description: Alias for RestApiValidationError for backward compatibility.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenStatusCode422'
        '500':
          description: Internal server error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Types.StatusCodes.StatusCode500'
      tags:
        - Tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTokenRequest'
  /tokens/{token_id}:
    patch:
      operationId: update_token
      summary: Update an API Token
      description: |-
        Update an API Token's name or permissions.


        #### Permissions

        You can modify the functions allowed by this API Token by selecting which types of requests this API Token is allowed to make.

        Valid options are: calling, chat, fax, management, messaging, numbers, pubsub, storage, tasking, and video
      parameters:
        - name: token_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Unauthorized error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Types.StatusCodes.StatusCode401'
        '404':
          description: Not found error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Types.StatusCodes.StatusCode404'
        '422':
          description: Alias for RestApiValidationError for backward compatibility.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenStatusCode422'
        '500':
          description: Internal server error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Types.StatusCodes.StatusCode500'
      tags:
        - Tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTokenRequest'
    delete:
      operationId: delete_token
      summary: Delete an API Token
      description: Delete an API Token. This action cannot be undone.
      parameters:
        - name: token_id
          in: path
          required: true
          description: The unique identifier of the token that you want to update.
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '401':
          description: Unauthorized error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Types.StatusCodes.StatusCode401'
        '404':
          description: Not found error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Types.StatusCodes.StatusCode404'
        '500':
          description: Internal server error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Types.StatusCodes.StatusCode500'
      tags:
        - Tokens
security:
  - BasicAuth: []
components:
  schemas:
    CreateTokenRequest:
      type: object
      required:
        - name
        - permissions
      properties:
        name:
          type: string
          description: The name representing the API token.
          example: John Doe's Token
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/TokenPermission'
          description: The permissions you would like to enable for this token. Valid permissions are calling, chat, fax, management, messaging, numbers, pubsub, storage, tasking, and video
          example:
            - calling
            - fax
            - messaging
        subproject_id:
          type: string
          description: The unique identifier of the subproject you would like to create a token for. The subproject passed must be a child of the project used to authenticate the request.
          example: 9a7fc048-984f-11ee-b9d1-0242ac120002
      description: Request body for creating a new API Token.
    TokenPermission:
      type: string
      enum:
        - calling
        - chat
        - fax
        - management
        - messaging
        - numbers
        - pubsub
        - storage
        - tasking
        - video
      description: Valid permission types for API tokens.
    TokenResponse:
      type: object
      required:
        - id
        - name
        - permissions
        - token
      properties:
        id:
          type: string
          description: The ID of the created API Token.
          example: ea14556a-984f-11ee-b9d1-0242ac120002
        name:
          type: string
          description: The name of the created API Token.
          example: John Doe's Token
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/TokenPermission'
          description: The permissions enabled for this token.
          example:
            - calling
            - fax
            - messaging
        token:
          type: string
          description: The API token that can be used along with the project ID for basic authentication
          example: PT037258e533e87ac63174ee136ed0798dc85d4f4f9e6d7191
      title: API Token Response
    TokenStatusCode422:
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/Types.StatusCodes.RestApiErrorItem'
          description: Array of validation errors.
      description: Alias for RestApiValidationError for backward compatibility.
      example:
        statusCode: 422
        errors:
          - type: validation_error
            code: invalid_parameter
            message: Name must be present
            attribute: name
            url: https://developer.signalwire.com/rest/signalwire-rest/overview/error-codes#field-invalid-parameter
    Types.StatusCodes.RestApiErrorItem:
      type: object
      required:
        - type
        - code
        - message
        - url
      properties:
        type:
          type: string
          description: Error category type.
          example: validation_error
        code:
          type: string
          description: Error code identifier.
          example: invalid_parameter
        message:
          type: string
          description: Human-readable error message.
          example: Name must be present
        attribute:
          type: string
          nullable: true
          description: Request parameter associated with this error. Null for base errors.
          example: name
        url:
          type: string
          description: Link to error documentation.
          example: https://developer.signalwire.com/rest/signalwire-rest/overview/error-codes#invalid_parameter
      description: Individual error item for REST/Fabric API format.
    Types.StatusCodes.StatusCode401:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          enum:
            - Unauthorized
      description: Unauthorized error response.
    Types.StatusCodes.StatusCode404:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          enum:
            - Not Found
      description: Not found error response.
    Types.StatusCodes.StatusCode500:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          enum:
            - Internal Server Error
      description: Internal server error response.
    UpdateTokenRequest:
      type: object
      properties:
        name:
          type: string
          description: The name representing the API token.
          example: John Doe's Token
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/TokenPermission'
          description: The permissions you would like to enable for this token. Valid permissions are calling, chat, fax, management, messaging, numbers, pubsub, storage, tasking, and video
          example:
            - calling
            - fax
            - messaging
      description: Request body for updating an API Token.
  securitySchemes:
    BasicAuth:
      type: http
      scheme: Basic
servers:
  - url: https://{space_name}.signalwire.com/api/project
    description: Endpoint
    variables:
      space_name:
        default: '{your_space_name}'
        description: The domain of the users SignalWire space.
