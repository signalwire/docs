      title: Fabric Subscriber Device Leg
    Calling.HangupReason:
      type: string
      enum:
        - hangup
        - cancel
        - busy
        - noAnswer
        - decline
        - error
      description: The reason for hanging up the call.
    Calling.LiveTranscribeStartAction:
      type: object
      required:
        - start
      properties:
        start:
          type: object
          properties:
            lang:
              type: string
              description: The language to transcribe (e.g., 'en-US', 'es-ES').
              examples:
                - en-US
            direction:
              type: array
              items:
                $ref: '#/components/schemas/TranscribeDirection'
              description: The direction(s) of the call to transcribe.
              examples:
                - - local-caller
                  - remote-caller
            webhook:
              type: string
              description: The webhook URL to receive transcription events.
              examples:
                - https://example.com/webhook
            live_events:
              type: boolean
              description: Whether to send real-time utterance events as speech is recognized.
              examples:
                - true
            ai_summary:
              type: boolean
              description: Whether to generate an AI summary when transcription ends.
              examples:
                - true
            ai_summary_prompt:
              type: string
              description: The AI prompt that instructs how to summarize the conversation when `ai_summary` is enabled.
              examples:
                - Summarize the key points of this conversation.
            speech_engine:
              allOf:
                - $ref: '#/components/schemas/SpeechEngine'
              description: The speech recognition engine to use.
              examples:
                - deepgram
              default: deepgram
            speech_timeout:
              type: integer
              format: int32
              description: Speech timeout in milliseconds.
              examples:
                - 60000
              default: 60000
            vad_silence_ms:
              type: integer
              format: int32
              description: 'Voice activity detection silence time in milliseconds. Default depends on speech engine: `300` for Deepgram, `500` for Google.'
              examples:
                - 300
            vad_thresh:
              type: integer
              format: int32
              description: Voice activity detection threshold (0-1800).
              examples:
                - 400
              default: 400
            debug_level:
              type: integer
              format: int32
              description: Debug level for logging (0-2).
              examples:
                - 0
              default: 0
          required:
            - lang
            - direction
          description: Starts live transcription of the call.
      title: start Action
    Calling.LiveTranscribeStopAction:
      type: string
      enum:
        - stop
      description: Stops the live transcription session.
      title: stop Action
    Calling.LiveTranscribeSummarizeAction:
      type: object
      required:
        - summarize
      properties:
        summarize:
          type: object
          properties:
            webhook:
              type: string
              description: The webhook URL to receive the summary.
              examples:
                - https://example.com/webhook
            prompt:
              type: string
              description: The AI prompt that instructs how to summarize the conversation.
              examples:
                - Provide a bullet-point summary of the main topics discussed.
          description: Request an on-demand AI summary of the conversation.
      title: summarize Action
    Calling.LiveTranslateInjectAction:
      type: object
      required:
        - inject
      properties:
        inject:
          type: object
          properties:
            message:
              type: string
              description: The text message to inject and translate.
              examples:
                - Please hold while I transfer you to a specialist.
            direction:
              allOf:
                - $ref: '#/components/schemas/TranscribeDirection'
              description: The direction to send the translated message.
              examples:
                - remote-caller
          required:
            - message
            - direction
          description: Inject a message into the conversation to be translated and spoken.
      title: inject Action
    Calling.LiveTranslateStartAction:
      type: object
      required:
        - start
      properties:
        start:
          type: object
          properties:
            from_lang:
              type: string
              description: The language to translate from (e.g., 'en-US').
              examples:
                - en-US
            to_lang:
              type: string
              description: The language to translate to (e.g., 'es-ES').
              examples:
                - es-ES
            direction:
              type: array
              items:
                $ref: '#/components/schemas/TranscribeDirection'
              description: The direction(s) of the call to translate.
              examples:
                - - local-caller
                  - remote-caller
            from_voice:
              type: string
              description: The TTS voice for the source language.
              examples:
