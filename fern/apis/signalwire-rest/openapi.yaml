          examples:
            - https://example.com/handle_callback
        created_at:
          type: string
          format: date-time
          description: Timestamp when the campaign was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the campaign was last updated.
      description: Campaign model for 10DLC registration.
