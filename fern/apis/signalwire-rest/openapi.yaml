          type: boolean
          description: Will this campaign include any age gated content as defined by carrier and CTA guidelines?
          examples:
            - true
        lead_generation:
          type: boolean
          description: Is there any intent of this campaign to generate leads?
          examples:
            - true
        csp_campaign_reference:
          type: string
