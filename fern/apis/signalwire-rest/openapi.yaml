      required:
        - id
        - project_id
        - created_at
        - updated_at
        - duration_in_seconds
        - price
        - price_unit
        - status
        - url
        - stereo
        - track
        - relay_webrtc_leg_id
      properties:
        id:
          allOf:
            - $ref: '#/components/schemas/uuid'
          format: uuid
          description: Unique ID of the recording.
          examples:
            - d369a402-7b43-4512-8735-9d5e1f387814
        project_id:
          allOf:
            - $ref: '#/components/schemas/uuid'
          format: uuid
          description: Unique ID of the project.
          examples:
            - d369a402-7b43-4512-8735-9d5e1f387814
        created_at:
          type: string
          format: date-time
          description: Date and time when the recording was created.
        updated_at:
          type: string
          format: date-time
          description: Date and time when the recording was last updated.
        duration_in_seconds:
          type: integer
          format: int32
          description: Duration of the recording in seconds.
          examples:
            - 2
        error_code:
          type: string
          description: Error code if the recording failed.
        price:
          type: number
          format: double
          description: Price of the recording.
          examples:
            - 0.05
        price_unit:
          type: string
          description: Currency unit for the price.
          examples:
            - USD
        status:
          type: string
          description: Status of the recording.
          examples:
            - completed
        url:
          type: string
          description: URL of the recording file.
          examples:
            - https://example.com/recording.mp3
        stereo:
          type: boolean
          description: Indicates whether the recording is stereo.
          examples:
            - false
        byte_size:
          type: integer
          format: int32
          description: Size of the recording file in bytes.
          examples:
            - 10
        track:
          type: string
          description: Audio track of the recording.
          examples:
            - inbound
        relay_webrtc_leg_id:
          allOf:
            - $ref: '#/components/schemas/uuid'
          format: uuid
          description: ID of the WebRTC leg associated with the recording.
      description: Recording from a WebRTC call leg.
    Webhook:
      type: object
      required:
        - url
      properties:
        expressions:
          type: array
          items:
            $ref: '#/components/schemas/Expression'
          description: |-
            A list of expressions to be evaluated upon matching.
            If the following properties are set (foreach, expressions, output), they will be processed in the following order:
            1. foreach
            2. expressions
            3. output
        error_keys:
          anyOf:
            - type: string
            - type: array
              items:
                type: string
          description: A string or array of strings that represent the keys to be used for error handling. This will match the key(s) in the response from the API call.
          examples:
            - failed
        url:
          type: string
          description: The endpoint for the external service or API.
          examples:
            - https://example.com
        foreach:
          type: object
          properties:
            input_key:
              type: string
              description: The key to be used to access the current element in the array.
              examples:
                - success
            output_key:
              type: string
              description: The key that can be referenced in the output of the `foreach` iteration. The values that are stored from `append` will be stored in this key.
              examples:
                - deliverer
            max:
              anyOf:
                - type: integer
                - $ref: '#/components/schemas/SWMLVar'
              description: The max amount of elements that are iterated over in the array. This will start at the beginning of the array.
              examples:
                - 5
            append:
              type: string
              description: |-
                The values to append to the output_key.
                Properties from the object can be referenced and added to the output_key by using the following syntax:
                ${this.property_name}.
                The `this` keyword is used to reference the current object in the array.
              examples:
                - 'title: ${this.title}, contact: ${this.phone}'
          required:
            - input_key
            - output_key
            - append
          description: |-
            Iterates over an array of objects and processes a output based on each element in the array. Works similarly to JavaScript's forEach method.
            If the following properties are set (foreach, expressions, output), they will be processed in the following order:
            1. foreach
            2. expressions
            3. output
        headers:
          type: object
          unevaluatedProperties: {}
          description: Any necessary headers for the API call.
          examples:
            - Content-Type: application/json
              X-API-Key: your-api-key
        method:
          type: string
          enum:
            - GET
            - POST
            - PUT
            - DELETE
          description: The HTTP method (GET, POST, etc.) for the API call.
          examples:
            - POST
        input_args_as_params:
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/SWMLVar'
          description: A boolean to determine if the input arguments should be passed as parameters.
          examples:
            - true
        params:
          type: object
          unevaluatedProperties: {}
          description: An object of any necessary parameters for the API call. The key is the parameter name and the value is the parameter value.
          examples:
            - account_id: acc_123
              include_details: true
        require_args:
          anyOf:
            - type: string
            - type: array
              items:
                type: string
          description: A string or array of strings that represent the `arguments` that are required to make the webhook request.
          examples:
            - - order_id
              - customer_email
        output:
          allOf:
            - $ref: '#/components/schemas/Output'
          description: |-
            An object that contains a response and a list of actions to be performed upon completion of the webhook request.
            If the following properties are set (foreach, expressions, output), they will be processed in the following order:
            1. foreach
            2. expressions
            3. output
      title: Webhook object
    jwt:
      type: string
      format: jwt
    play_url:
      type: string
      pattern: '^(http://.*|https://.*|ring: ?[0-9.]*: ?[a-zA-Z]{2}|say: ?.*|silence: ?[0-9.]*|ring: ?[a-zA-Z]{2})$'
    uuid:
      type: string
      format: uuid
      description: Universal Unique Identifier.
  securitySchemes:
    SignalWireBasicAuth:
      type: http
      scheme: Basic
      description: |-
        SignalWire Basic Authentication using Project ID and API Token.

        The client sends HTTP requests with the Authorization header containing
        the word Basic followed by a space and a base64-encoded string of project_id:token.
        The project ID will be used as the username and the API token as the password.

        Example:
        ```
        Authorization: Basic base64(project_id:token)
        ```
      x-fern-basic:
        username:
          name: project_id
          env: SIGNALWIRE_PROJECT_ID
        password:
          name: api_token
          env: SIGNALWIRE_API_TOKEN
    SignalWireBearerAuth:
      type: http
      scheme: Bearer
      description: |-
        SignalWire Bearer Token Authentication for subscriber endpoints.
        The client sends HTTP requests with the Authorization header containing
        the word Bearer followed by a space and the subscriber token.

        Example:
        ```
        Authorization: Bearer <subscriber_token>
        ```
servers:
  - url: https://{space_name}.signalwire.com
    description: SignalWire API
    variables:
      space_name:
        default: '{Your_Space_Name}'
        description: Your SignalWire Space name
webhooks:
  tenDlcStatusCallback:
    post:
      operationId: ten_dlc_status_callback
      summary: 10DLC status callback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                project_id:
                  type: string
                  description: The unique ID of the project this object is associated with.
                event_at:
                  type: string
                  description: The timestamp of when the event occurred, in ISO 8601 format.
                event_category:
                  type: string
                  enum:
                    - brand
                    - campaign
                    - number_assignment_order
                    - number_assignment
                  description: The category of the event.
                event_type:
                  type: string
                  enum:
                    - brand_activated
                    - brand_unverified
                    - campaign_activated
                    - campaign_deactivated
                    - number_assignment_order_processed
                    - number_assignment_failed
                    - number_assignment_pending
                    - number_assignment_activated
                  description: |-
                    The specific type of event that occurred.
                    One of: `brand_activated`, `brand_unverified`, `campaign_activated`, `campaign_deactivated`,
                    `number_assignment_order_processed`, `number_assignment_failed`, `number_assignment_pending`,
                    `number_assignment_activated`.
                state:
                  type: string
                  description: The current state of the object after the event. Possible values depend on the object type.
                brand_id:
                  type: string
                  description: The unique identifier for the brand. Present in all event types.
                campaign_id:
                  type: string
                  description: The unique identifier for the campaign. Present in campaign, number assignment order, and number assignment events.
                number_assignment_order_id:
                  type: string
                  description: The unique identifier for the number assignment order. Present in number assignment order and number assignment events.
                number_assignment_id:
                  type: string
                  description: The unique identifier for the number assignment. Present only in number assignment events.
                phone_number_id:
                  type: string
                  description: The unique identifier for the phone route itself. Present only in number assignment events.
                phone_number:
                  type: string
                  description: The phone number in E.164 format. Present only in number assignment events.
              required:
                - project_id
                - event_at
                - event_category
                - event_type
                - state
                - brand_id
              description: |-
                Payload sent by SignalWire to your 10DLC Status Callback URL when the state of a 10DLC registration
                object changes. Use this webhook to monitor the lifecycle of messaging brands, campaigns, number
                assignment orders, and number assignments in real time.

                Configure `status_callback_url` when
                [creating a brand](/docs/apis/rest/messaging/campaign-registry/brands/create-brand),
                [creating a campaign](/docs/apis/rest/messaging/campaign-registry/campaigns/create-campaign), or
                [creating a number assignment order](/docs/apis/rest/messaging/campaign-registry/phone-number-assignments/create-order).

                ### Brand event types

                | State transition | Event type | Description |
                |------------------|------------|-------------|
                | `pending` → `completed` | `brand_activated` | The brand has been successfully verified and activated. |
                | `pending` → `unverified` | `brand_unverified` | Brand verification failed or additional information is required. |
                | `unverified` → `completed` | `brand_activated` | The brand was previously unverified but is now active. |

                ### Campaign event types

                | State transition | Event type | Description |
                |------------------|------------|-------------|
                | `pending` → `active` | `campaign_activated` | The campaign has been approved and is now active. |
                | `active` → `inactive` | `campaign_deactivated` | The campaign has been deactivated and can no longer send. |

                ### Number assignment order event types

                | State transition | Event type | Description |
                |------------------|------------|-------------|
                | `pending` → `processed` | `number_assignment_order_processed` | The order has been processed and numbers assigned. |

                ### Number assignment event types

                | State transition | Event type | Description |
                |------------------|------------|-------------|
                | `pending` → `failed` | `number_assignment_failed` | The number was not assigned to the campaign. |
                | `failed` → `pending` | `number_assignment_pending` | A failed assignment is being retried. |
                | `pending` → `completed` | `number_assignment_activated` | The number has been successfully assigned to the campaign. |
      responses:
        '200':
          description: Webhook received
      description: |-
        Payload sent by SignalWire to your 10DLC Status Callback URL when the state of a 10DLC registration
        object changes. Use this webhook to monitor the lifecycle of messaging brands, campaigns, number
        assignment orders, and number assignments in real time.

        Configure `status_callback_url` when
        [creating a brand](/docs/apis/rest/messaging/campaign-registry/brands/create-brand),
        [creating a campaign](/docs/apis/rest/messaging/campaign-registry/campaigns/create-campaign), or
        [creating a number assignment order](/docs/apis/rest/messaging/campaign-registry/phone-number-assignments/create-order).

        ### Brand event types

        | State transition | Event type | Description |
        |------------------|------------|-------------|
        | `pending` → `completed` | `brand_activated` | The brand has been successfully verified and activated. |
        | `pending` → `unverified` | `brand_unverified` | Brand verification failed or additional information is required. |
        | `unverified` → `completed` | `brand_activated` | The brand was previously unverified but is now active. |

        ### Campaign event types

        | State transition | Event type | Description |
        |------------------|------------|-------------|
        | `pending` → `active` | `campaign_activated` | The campaign has been approved and is now active. |
        | `active` → `inactive` | `campaign_deactivated` | The campaign has been deactivated and can no longer send. |

        ### Number assignment order event types

        | State transition | Event type | Description |
        |------------------|------------|-------------|
        | `pending` → `processed` | `number_assignment_order_processed` | The order has been processed and numbers assigned. |

        ### Number assignment event types

        | State transition | Event type | Description |
        |------------------|------------|-------------|
        | `pending` → `failed` | `number_assignment_failed` | The number was not assigned to the campaign. |
        | `failed` → `pending` | `number_assignment_pending` | A failed assignment is being retried. |
        | `pending` → `completed` | `number_assignment_activated` | The number has been successfully assigned to the campaign. |
      tags:
        - Campaign Registry
