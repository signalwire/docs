            - '#'
        digit_timeout:
          type: number
          format: double
          description: Time in seconds to wait between digit presses.
          examples:
            - 5
      description: Parameters for collecting DTMF digit input.
    Calling.CollectSpeechParams:
      type: object
      properties:
        end_silence_timeout:
          type: number
          format: double
          description: Time in seconds of silence after speech to consider input complete.
          examples:
            - 3
        speech_timeout:
          type: number
          format: double
          description: Maximum time in seconds to wait for speech input.
          examples:
            - 30
        language:
          type: string
          description: The language for speech recognition (e.g., 'en-US').
          examples:
            - en-US
        hints:
          type: array
          items:
            type: string
          description: Array of words or phrases to bias the speech recognition.
          examples:
            - - 'yes'
              - 'no'
              - maybe
        engine:
          type: string
          description: The speech recognition engine to use.
          examples:
            - default
      description: Parameters for collecting speech input.
    Calling.DetectConfig:
      type: object
      required:
        - type
      properties:
        type:
          allOf:
            - $ref: '#/components/schemas/Calling.DetectType'
          description: The type of detection to perform.
          examples:
            - machine
        params:
          allOf:
            - $ref: '#/components/schemas/Calling.DetectParams'
          description: Type-specific detection parameters.
          examples:
            - initial_timeout: 5
              end_silence_timeout: 3
      description: Detection configuration specifying what to detect and how.
    Calling.DetectParams:
      type: object
      properties:
        initial_timeout:
          type: number
          format: double
          description: Maximum time in seconds to wait for initial detection.
          examples:
            - 5
        end_silence_timeout:
          type: number
          format: double
          description: Time in seconds of silence after detection to finalize the result.
          examples:
            - 3
        machine_ready_timeout:
          type: number
          format: double
          description: Time in seconds to wait for the machine to be ready (machine detection only).
          examples:
            - 5
        machine_voice_threshold:
          type: number
          format: double
          description: Voice duration threshold in seconds for machine vs. human detection.
          examples:
            - 1.25
        machine_words_threshold:
          type: integer
          format: int32
          description: Number of words threshold for machine vs. human detection.
          examples:
            - 6
        detect_interruptions:
          type: boolean
          description: Whether to detect interruptions during machine greeting playback.
          examples:
            - false
        detect_message_end:
          type: boolean
          description: Whether to detect the end of a machine message.
          examples:
            - false
        tone:
          type: string
          description: The DTMF tone to detect (digit detection only).
          examples:
            - '1'
        digits:
          type: string
          description: The DTMF digits to detect (digit detection only).
          examples:
            - 0123456789#*
      description: Parameters for call detection configuration.
    Calling.DetectType:
      type: string
      enum:
        - machine
        - fax
        - digit
      description: The type of detection to perform.
    Calling.FabricDeviceLeg:
      type: object
      required:
        - id
        - from
        - to
        - direction
        - source
        - url
        - charge
        - created_at
        - charge_details
        - status
        - type
      properties:
        id:
          allOf:
            - $ref: '#/components/schemas/uuid'
          description: The unique identifier of the call on SignalWire. This can be used to update the call programmatically.
          examples:
            - 0e9c80d7-a149-4917-892d-420043709f45
        from:
          type: string
          description: The origin number or address.
          examples:
            - '+12069708643'
        to:
          type: string
          description: The destination number or address.
          examples:
            - '+15550198765'
        direction:
          allOf:
            - $ref: '#/components/schemas/Calling.CallDirection'
          description: The direction of the call.
          examples:
            - outbound-api
        source:
          type: string
          enum:
            - realtime_api
          description: Source of this call.
          examples:
            - realtime_api
        url:
          anyOf:
            - type: string
            - type: 'null'
          description: The URL associated with this call.
          examples:
            - null
        charge:
          type: number
          format: double
          description: Total charge for this call.
          examples:
            - 0
        created_at:
          type: string
          format: date-time
          description: The date and time when the call was created.
          examples:
            - '2024-05-06T12:20:00Z'
        charge_details:
          type: array
          items:
            $ref: '#/components/schemas/Calling.ChargeDetails'
          description: Details on charges associated with this call.
          examples:
            - - description: Outbound Voice
                charge: 0.004
        status:
          type: 'null'
          description: The status of the call. Always null for Fabric subscriber device legs.
          examples:
            - null
