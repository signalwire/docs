          examples:
            - this is a sample message your customer might receive
        sample2:
          type: string
          description: Sample 2.
          examples:
            - this is a sample message your customer might receive
        sample3:
          type: string
          description: Sample 3.
        sample4:
          type: string
          description: Sample 4.
        sample5:
          type: string
          description: Sample 5.
