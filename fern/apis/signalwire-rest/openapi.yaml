        write:
          type: boolean
          description: Gives the token write access to the channel.
          examples:
            - false
      title: Read Permission
    Chat.ChatPermissionWithWrite:
      type: object
      required:
        - write
      properties:
        read:
          type: boolean
          description: Gives the token read access to the channel.
          examples:
            - true
        write:
          type: boolean
          description: Gives the token write access to the channel.
          examples:
            - false
      title: Write Permission
