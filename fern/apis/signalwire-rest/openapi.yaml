    Calling.CallAIMessageRequest:
      type: object
      required:
        - id
        - command
        - params
      properties:
        id:
          allOf:
            - $ref: '#/components/schemas/uuid'
          description: The unique identifying ID of a existing call.
          examples:
            - 3fa85f64-5717-4562-b3fc-2c963f66afa6
        command:
          type: string
          enum:
            - calling.ai_message
          description: The `calling.ai_message` command is used to inject a message into the AI conversation.
          examples:
            - calling.ai_message
        params:
          type: object
          properties:
            role:
              type: string
              enum:
                - system
                - user
                - assistant
              description: |-
                The role that the message is from. Required when `reset` is not provided. Each role type has a different purpose and will influence how the AI will interpret the message.
                - `system`: Inject instructions or context that modify the AI's behavior mid-conversation without the caller hearing it. This could change the AI's personality, add new constraints, provide context about the conversation, or give the AI information it should know going forward.
                - `user`: Inject a message as if the caller said it. This would appear in the conversation history as coming from the caller, and the AI would respond to it as if the caller just spoke it.
                - `assistant`: Inject a message as if the AI said it. This would appear as an AI response in the conversation history. The AI would treat this as its own previous response when generating future replies.
              examples:
                - system
            message_text:
              type: string
              description: The text content that will be sent to the AI. Required when `reset` is not provided.
              examples:
                - You are now in expert mode. Provide detailed technical responses.
            reset:
              allOf:
                - $ref: '#/components/schemas/Calling.CallAIMessageResetParams'
              description: Parameters for resetting the AI conversation state. When provided, `role` and `message_text` are optional.
              examples:
                - full_reset: true
                  system_prompt: You are a helpful assistant.
            global_data:
              type: object
              unevaluatedProperties: {}
              description: Arbitrary JSON data to merge into the AI session's global data store.
              examples:
                - customer_tier: premium
                  language: en
          description: An object of parameters that will be utilized by the active command.
      title: calling.ai_message
    Calling.CallAIMessageResetParams:
      type: object
      properties:
        full_reset:
          type: boolean
          description: Whether to perform a full reset of the AI conversation, clearing all history.
          examples:
            - true
        user_prompt:
          type: string
          description: A new user prompt to set after resetting the conversation.
          examples:
            - You are a helpful assistant.
        system_prompt:
          type: string
          description: A new system prompt to set after resetting the conversation.
          examples:
            - You are a customer support agent for SignalWire.
      description: Parameters for resetting the AI conversation state.
