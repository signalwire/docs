servers:
  - url: https://fern.signalwire.com/api/fabric
    x-fern-server-name: Demo
x-fern-base-path: /calling

components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
      x-fern-auth:
        scheme: basic
        username:
          name: project_id
          env: SIGNALWIRE_PROJECT_ID
        password:
          name: token
          env: SIGNALWIRE_API_TOKEN

security:
  - BasicAuth: []

paths:
  /calls:
    post:
      x-fern-sdk-group-name:
        - calls
      x-fern-sdk-method-name: create
