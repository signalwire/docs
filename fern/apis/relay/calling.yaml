    AiParams:
      type: object
      properties:
        node_id:
          type: string
          description: Node the call is on.
        call_id:
          type: string
          description: The call id.
        control_id:
          type: string
          description: Identifier used to control (e.g. stop) this AI session.
        agent:
          type: string
          description: |-
            Pre-configured agent UUID. If an inline `prompt` is also present, the inline
            configuration takes precedence.
        prompt:
          description: Inline prompt configuration for the AI agent.
          allOf:
            - $ref: "#/components/schemas/AiPrompt"
        post_prompt:
          description: Post-conversation prompt configuration.
          allOf:
            - $ref: "#/components/schemas/AiPostPrompt"
        post_prompt_url:
          type: string
          format: uri
          description: URL to receive post-prompt status callbacks.
        post_prompt_auth_user:
          type: string
          description: Basic-auth username for `post_prompt_url`.
        post_prompt_auth_password:
          type: string
          description: Basic-auth password for `post_prompt_url`.
        global_data:
          type: object
          additionalProperties: {}
          description: Global data accessible to all SWAIG functions.
        pronounce:
          type: array
          items:
            $ref: "#/components/schemas/AiPronounce"
          description: Global pronunciation rules.
        hints:
          type: array
          items:
            $ref: "#/components/schemas/AiHint"
          description: Context hints biasing speech recognition.
        languages:
          type: array
          items:
            $ref: "#/components/schemas/AiLanguage"
          description: Supported language configurations.
        SWAIG:
          description: SWAIG function configuration.
          allOf:
            - $ref: "#/components/schemas/AiSwaig"
        params:
          type: object
          additionalProperties: {}
          description: |-
            Open-ended AI behavior parameters (ASR, TTS, turn detection, barge-in, LLM
            config, video, …). Loose-modeled — the full enumeration lives with the SWML
            `ai` verb. Example fields: `end_of_speech_timeout`, `attention_timeout` (ms).
      required:
        - node_id
        - call_id
        - control_id
    AiPrompt:
      type: object
      properties:
        text:
          type: string
          description: Instructions sent to the agent (plain text or SSML).
        top_p:
          type: number
          format: double
          description: Nucleus-sampling cutoff (0.0–1.0). Alternative to `temperature`.
          minimum: 0
          maximum: 1
        temperature:
          type: number
          format: double
          description: Randomness of generation (0.0–1.5). Lower is more deterministic.
          minimum: 0
          maximum: 1.5
        confidence:
          type: number
          format: double
          description: End-of-utterance speech-detect threshold (0.0–1.0).
          minimum: 0
          maximum: 1
        barge_confidence:
          type: number
          format: double
          description: Confidence threshold for the user barging in over the agent (0.0–1.0).
          minimum: 0
          maximum: 1
        presence_penalty:
          type: number
          format: double
          description: Aversion to new topics (-2.0–2.0). Positive values encourage new topics.
          minimum: -2
          maximum: 2
        frequency_penalty:
          type: number
          format: double
          description: Aversion to repetition (-2.0–2.0). Positive values reduce verbatim repeats.
          minimum: -2
          maximum: 2
        model:
          type: string
          description: LLM model identifier to use for this prompt.
      description: |-
        Inline prompt configuration for the AI agent. Overrides a pre-configured
        `agent` UUID when both are present.
    AiPostPrompt:
      type: object
      properties:
        text:
          type: string
          description: Instructions sent to the agent after the conversation ends.
        top_p:
          type: number
          format: double
          description: Nucleus-sampling cutoff (0.0–1.0). Alternative to `temperature`.
          minimum: 0
          maximum: 1
        temperature:
          type: number
          format: double
          description: Randomness of generation (0.0–1.5). Lower is more deterministic.
          minimum: 0
          maximum: 1.5
        barge_confidence:
          type: number
          format: double
          description: Confidence threshold for the user barging in over the agent (0.0–1.0).
          minimum: 0
          maximum: 1
        presence_penalty:
          type: number
          format: double
          description: Aversion to new topics (-2.0–2.0). Positive values encourage new topics.
          minimum: -2
          maximum: 2
        frequency_penalty:
          type: number
          format: double
          description: Aversion to repetition (-2.0–2.0). Positive values reduce verbatim repeats.
          minimum: -2
          maximum: 2
        model:
          type: string
          description: LLM model identifier to use for this post-prompt.
      description: |-
        Post-conversation prompt configuration. Same shape as `AiPrompt` minus
        `confidence` (which has no meaning after the conversation has ended).
    AiPronounce:
      type: object
      properties:
        replace:
          type: string
          description: The expression to replace.
        with:
          type: string
          description: The phonetic spelling to substitute.
        ignore_case:
          type: boolean
          description: Match case-insensitively. Default `true`.
          default: true
      required:
        - replace
        - with
      description: |-
        A global pronunciation rule. Replaces a matched expression with a phonetic
        spelling so the TTS engine pronounces it correctly.
    AiHint:
      type: object
      properties:
        hint:
          type: string
          description: The hint phrase to match exactly.
        pattern:
          type: string
          description: A regular expression the hint must match before replacement.
        replace:
          type: string
          description: Text to replace the matched portion of the hint with.
        ignore_case:
          type: boolean
          description: Match case-insensitively. Default `false`.
          default: false
      required:
        - hint
      description: |-
        A context hint biasing speech recognition. May be a bare string, or an object
        that rewrites a matched phrase before it reaches the model.
    AiLanguage:
      type: object
      properties:
        name:
          type: string
          description: Human-readable language name, used in the system prompt (e.g. `French`).
        code:
          type: string
          description: ASR language code (e.g. `fr-FR`).
        voice:
          type: string
          description: Voice in `<engine>.<voice>` form (e.g. `gcloud.fr-FR-Neural2-B`).
        model:
          type: string
          description: TTS model for the selected engine.
      required:
        - name
        - code
        - voice
      description: |-
        A supported language configuration for the dialogue. (Modeled per the SWML
        `ai` verb; additional TTS engine-specific knobs may be accepted.)
    AiSwaig:
      type: object
      properties:
        defaults:
          description: Default settings inherited by all functions.
          allOf:
