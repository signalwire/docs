      description: SWAIG (SignalWire AI Gateway) function configuration.
    AiSwaigDefaults:
      type: object
      properties:
        web_hook_url:
          type: string
          description: |-
            Default webhook URL for function status callbacks. Basic auth may be inlined
            as `username:password@url`.
      description: Default settings applied to all SWAIG functions unless overridden.
    AiSwaigFunction:
      type: object
      properties:
        function:
          type: string
          description: Unique function name (or a reserved SignalWire hook name).
        purpose:
          type: string
          description: Description of when/why the agent should call this function.
        argument:
          description: Description of the input the function expects.
        web_hook_url:
          type: string
          description: Per-function webhook URL override.
      required:
        - function
      description: |-
        A single SWAIG function definition. Only the historically documented fields
        (`function`, `purpose`, `argument`) are typed; the live SWAIG schema accepts
        many more (`description`, `parameters`, `data_map`, `web_hook_url`, fillers,
        …) — see openQuestions.
    AiSwaigIncludes:
      type: object
      properties:
        url:
          type: string
          description: URL hosting the remote functions. Basic auth may be inlined.
        functions:
          type: array
          items:
            type: string
          description: Names of the remote functions to include.
      required:
        - url
        - functions
      description: Remote SWAIG function include — pull function signatures from a URL.
