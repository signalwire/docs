          description: Digits that terminate collection (e.g. `"#*"`). Default not set.
        digit_timeout:
          type: number
          format: double
          description: |-
            Maximum seconds to wait for the next digit after a digit is received.
            Default `5.0`.
          exclusiveMinimum: 0
          default: 5
      required:
        - max
      description: DTMF-digit collection settings.
    CollectSpeech:
