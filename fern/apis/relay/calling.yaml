components:
  schemas:
    BeginParams:
      type: object
      properties:
        tag:
          type: string
          description: Identifier added to all call events.
        region:
          type: string
          description: Region to originate from (account/device default if unset).
        device:
          description: The single device to call (only `phone` is documented for this method).
          allOf:
            - $ref: "#/components/schemas/DialDevice"
      required:
        - device
    DialDevice:
      type: object
      properties:
        type:
          type: string
      required:
        - type
      description: A device to dial (`calling.dial` / `calling.begin`). Discriminated on `type`.
      discriminator: type
    DialPhoneDevice:
      allOf:
        - $ref: "#/components/schemas/DialDevice"
        - type: object
          properties:
            type:
              type: string
              const: phone
            params:
              $ref: "#/components/schemas/PhoneDeviceParams"
          required:
            - type
            - params
    PhoneDeviceParams:
      type: object
      properties:
        from_number:
          type: string
          description: Origination number, E.164.
        to_number:
          type: string
          description: Destination number, E.164.
        timeout:
          type: integer
          format: int32
          description: Seconds to ring before giving up.
          minimum: 0
          default: 30
        max_duration:
          type: integer
          format: int32
          description: Maximum call duration in seconds.
          minimum: 0
        call_state_url:
          type: string
          format: uri
          description: Webhook to receive call-state events for this leg.
        call_state_events:
          type: array
          items:
            $ref: "#/components/schemas/CallStateEventName"
          description: Which call states to deliver to `call_state_url`. Default `["ended"]`.
        confirm:
          description: |-
            A confirmation prompt to require before bridging: a SWML URL string or an
            inline compact SWML document. (Modeled loosely — SWML is documented
            separately.)
      required:
        - from_number
        - to_number
      description: "`phone` device params."
    CallStateEventName:
      type: string
      enum:
        - created
        - ringing
        - answered
        - ended
    DialSipDevice:
      allOf:
        - $ref: "#/components/schemas/DialDevice"
        - type: object
          properties:
            type:
              type: string
              const: sip
            params:
              $ref: "#/components/schemas/SipDeviceParams"
          required:
            - type
            - params
    SipDeviceParams:
      type: object
      properties:
        from:
          type: string
          description: Origination SIP URI / address.
        from_name:
          type: string
          description: Caller name to present.
        to:
          type: string
          description: Destination SIP URI / address.
        timeout:
          type: integer
          format: int32
          description: Seconds to ring before giving up.
          minimum: 0
          default: 30
        max_duration:
          type: integer
          format: int32
          description: Maximum call duration in seconds.
          minimum: 0
        headers:
          type: array
          items:
            $ref: "#/components/schemas/SipHeader"
          description: Custom `X-` SIP headers.
        codecs:
          type: array
          items:
            $ref: "#/components/schemas/SipCodec"
          description: Negotiable codecs (SignalWire-picked if unset).
        webrtc_media:
          type: boolean
          description: Use WebRTC media for this leg.
        call_state_url:
          type: string
          format: uri
          description: Webhook to receive call-state events for this leg.
        call_state_events:
          type: array
          items:
            $ref: "#/components/schemas/CallStateEventName"
          description: Which call states to deliver to `call_state_url`. Default `["ended"]`.
        confirm:
          description: A confirmation prompt (SWML URL or inline SWML).
      required:
        - from
        - to
      description: "`sip` device params."
    SipHeader:
      type: object
      properties:
        name:
          type: string
          description: Header name (must start with `X-`).
        value:
          type: string
          description: Header value.
      required:
        - name
        - value
      description: A SIP header. Only `X-`-prefixed custom headers are permitted.
    SipCodec:
      type: string
      enum:
        - PCMU
        - PCMA
        - OPUS
        - G729
        - G722
        - VP8
        - H264
    DialWebrtcDevice:
      allOf:
        - $ref: "#/components/schemas/DialDevice"
        - type: object
          properties:
            type:
              type: string
              const: webrtc
            params:
              $ref: "#/components/schemas/WebrtcDeviceParams"
          required:
            - type
            - params
    WebrtcDeviceParams:
      type: object
      properties:
        from:
          type: string
          description: Origination — E.164 or a registered endpoint URI.
        to:
          type: string
          description: Destination — a WebRTC endpoint URI / resource name.
        timeout:
          type: integer
          format: int32
          description: Seconds to ring before giving up.
          minimum: 0
          default: 30
        max_duration:
          type: integer
          format: int32
          description: Maximum call duration in seconds.
          minimum: 0
        codecs:
          type: array
          items:
            $ref: "#/components/schemas/WebrtcCodec"
          description: Negotiable codecs (SignalWire-picked if unset).
        call_state_url:
          type: string
          format: uri
          description: Webhook to receive call-state events for this leg.
        call_state_events:
          type: array
          items:
            $ref: "#/components/schemas/CallStateEventName"
          description: Which call states to deliver to `call_state_url`. Default `["ended"]`.
        confirm:
          description: A confirmation prompt (SWML URL or inline SWML).
      required:
        - from
        - to
      description: "`webrtc` device params."
    WebrtcCodec:
      type: string
      enum:
        - PCMU
        - PCMA
        - OPUS
        - VP8
        - H264
    CallingBeginRequest:
      type: object
      required:
        - jsonrpc
        - id
        - method
        - params
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        method:
          type: string
          const: calling.begin
        params:
          $ref: "#/components/schemas/BeginParams"
    BeginResult:
      type: object
      properties:
        code:
          type: string
          description: Result code (string), e.g. `"200"`, `"400"`, `"404"`.
        message:
          type: string
          description: Human-readable result message.
        call_id:
          type: string
          description: The created call id.
        node_id:
          type: string
          description: Node the call is on.
      required:
        - code
        - message
    CallingBeginResponse:
      type: object
      required:
        - jsonrpc
        - id
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        result:
          $ref: "#/components/schemas/BeginResult"
    DialParams:
      type: object
      properties:
        tag:
          type: string
          description: Identifier added to all call and dial events.
        region:
          type: string
          description: Region to originate from.
        devices:
          type: array
          items:
            type: array
            items:
              $ref: "#/components/schemas/DialDevice"
          description: |-
            Devices to dial. The outer array is sequential ringing groups; the inner
            array is simultaneous (parallel) dials within a group. The first device to
            answer wins.
        max_price_per_minute:
          type: number
          format: double
          description: Maximum price per minute willing to be paid.
      required:
        - tag
        - devices
    CallingDialRequest:
      type: object
      required:
        - jsonrpc
        - id
        - method
        - params
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        method:
          type: string
          const: calling.dial
        params:
          $ref: "#/components/schemas/DialParams"
    DialResult:
      type: object
      properties:
        code:
          type: string
          description: Result code (string), e.g. `"200"`, `"400"`, `"404"`.
        message:
          type: string
          description: Human-readable result message.
      required:
        - code
        - message
    CallingDialResponse:
      type: object
      required:
        - jsonrpc
        - id
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        result:
          $ref: "#/components/schemas/DialResult"
    AnswerParams:
      type: object
      properties:
        node_id:
          type: string
          description: Node the call is on.
        call_id:
          type: string
          description: The call id.
        codecs:
          type: array
          items:
            $ref: "#/components/schemas/AnswerCodec"
          description: |-
            Codecs to negotiate (SignalWire-picked if unset). If a listed codec is
            unsupported by the call type the request fails with `"400"`.
      required:
        - node_id
        - call_id
    AnswerCodec:
      type: string
      enum:
        - PCMU
        - PCMA
        - OPUS
        - G729
        - G722
        - AMR-WB
        - VP8
        - H264
    CallingAnswerRequest:
      type: object
      required:
        - jsonrpc
        - id
        - method
        - params
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        method:
          type: string
          const: calling.answer
        params:
          $ref: "#/components/schemas/AnswerParams"
    AnswerResult:
      type: object
      properties:
        code:
          type: string
          description: Result code (string), e.g. `"200"`, `"400"`, `"404"`.
        message:
          type: string
          description: Human-readable result message.
      required:
        - code
        - message
    CallingAnswerResponse:
      type: object
      required:
        - jsonrpc
        - id
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        result:
          $ref: "#/components/schemas/AnswerResult"
    EndParams:
      type: object
      properties:
        node_id:
          type: string
          description: Node the call is on.
        call_id:
          type: string
          description: The call id.
        reason:
          description: Why the call is ending.
          default: hangup
          allOf:
            - $ref: "#/components/schemas/CallEndReason"
      required:
        - node_id
        - call_id
    CallEndReason:
      type: string
      enum:
        - hangup
        - cancel
        - busy
        - noAnswer
        - decline
        - error
    CallingEndRequest:
      type: object
      required:
        - jsonrpc
        - id
        - method
        - params
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        method:
          type: string
          const: calling.end
        params:
          $ref: "#/components/schemas/EndParams"
    EndResult:
      type: object
      properties:
        code:
          type: string
