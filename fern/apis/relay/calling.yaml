          items:
            $ref: "#/components/schemas/AiSwaigFunction"
          description: User-defined functions the agent may call.
        includes:
          type: array
          items:
            $ref: "#/components/schemas/AiSwaigIncludes"
          description: Remote function-signature includes.
        native_functions:
          type: array
          items:
            type: string
          description: |-
            Names of prebuilt native functions the agent may call (e.g. `check_time`,
