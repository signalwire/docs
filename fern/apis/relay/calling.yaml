    PayParams:
      type: object
      properties:
        node_id:
          type: string
          description: Node the call is on.
        call_id:
          type: string
          description: The call id.
        control_id:
          type: string
          description: Identifier used to control this active pay (e.g. `calling.pay.stop`).
        input:
          description: How payment details are collected. Default `dtmf`. (Only `dtmf` supported.)
          default: dtmf
          allOf:
            - $ref: "#/components/schemas/PayInput"
        status_url:
          type: string
          format: uri
          description: URL to request on each status change during the payment process.
        payment_method:
          description: Payment method to use. Default `credit-card`. (Only `credit-card` supported.)
          default: credit-card
          allOf:
            - $ref: "#/components/schemas/PayMethod"
        bank_account_type:
          description: |-
            Bank account type (relevant only for `ach-debit`). Undocumented in the
            protocol reference but accepted by the gateway. Default `consumer-checking`.
          default: consumer-checking
          allOf:
            - $ref: "#/components/schemas/PayBankAccountType"
        timeout:
          type: integer
          format: int32
          description: |-
            Seconds the Pay IVR waits for the next digit before validating the captured
            digits. Default `5`. (Sent as a JSON string on the wire, e.g. `"6"`.)
          minimum: 0
          default: 5
        max_attempts:
          type: integer
          format: int32
          description: |-
            Number of times the Pay IVR retries when collecting card details. Default
            `1`. (Sent as a JSON string on the wire, e.g. `"3"`.)
          minimum: 1
          default: 1
        security_code:
          type: boolean
          description: |-
            Whether to prompt for the card security code. Default `true`. (Sent as a JSON
            string on the wire, e.g. `"false"`.)
          default: true
        postal_code:
          type: boolean
          description: |-
            Whether to prompt for the billing postal code. Default `true`. (Sent as a
            JSON string on the wire, e.g. `"false"`. A known postcode may instead be
            supplied so the IVR skips the prompt — see open questions.)
          default: true
        min_postal_code_length:
          type: integer
          format: int32
          description: |-
            Minimum number of digits a caller must enter for the postal code. Default
            `0`. (Sent as a JSON string on the wire, e.g. `"6"`.)
          minimum: 0
          default: 0
        payment_connector_url:
          type: string
          format: uri
          description: URL to POST collected payment details to upon completion.
        token_type:
          description: Whether the payment token is one-off or reusable. Default `reusable`.
          default: reusable
          allOf:
            - $ref: "#/components/schemas/PayTokenType"
        charge_amount:
          type: string
          description: |-
            Amount to charge against the payment method. Decimal value with no currency
            prefix, passed as a string (e.g. `"15.00"`). Default `"0.00"`.
          default: "0.00"
        currency:
          type: string
          description: Currency of the charge amount. Default `usd`.
          default: usd
        language:
          type: string
          description: Language for prompts played to the caller. Default `en-US`.
          default: en-US
        voice:
          type: string
          description: |-
            Text-to-speech voice for prompts (free-form; passed through to TTS, e.g.
            `woman`, `man`, `polly.Sally`). Default `woman`.
          default: woman
        description:
          type: string
          description: Custom description of the payment.
        valid_card_types:
          type: string
          description: |-
            SPACE-DELIMITED list of card types allowed in this payment (not an array) —
            subset of `visa mastercard amex maestro discover jcb diners-club`. Default
            `"visa mastercard amex"`.
          default: visa mastercard amex
        parameters:
          type: array
          items:
            $ref: "#/components/schemas/PayParameter"
          description: Additional name/value pairs to POST to the payment connector.
        prompts:
          type: array
          items:
            $ref: "#/components/schemas/PayPrompt"
          description: Custom prompts that override the IVR defaults.
      required:
        - node_id
        - call_id
        - control_id
        - payment_connector_url
    PayInput:
      type: string
      enum:
        - dtmf
        - speech
    PayMethod:
      type: string
      enum:
        - credit-card
        - ach-debit
    PayBankAccountType:
      type: string
      enum:
        - consumer-checking
        - consumer-savings
        - commercial-checking
    PayTokenType:
      type: string
      enum:
        - one-time
        - reusable
    PayParameter:
      type: object
      properties:
        name:
          type: string
          description: Parameter name.
        value:
          type: string
          description: Parameter value.
      required:
        - name
        - value
      description: A name/value pair POSTed to the payment connector alongside payment details.
    PayPrompt:
      type: object
      properties:
        for:
          description: The situation this prompt applies to.
          allOf:
            - $ref: "#/components/schemas/PayPromptFor"
        card_type:
          type: string
          description: |-
            Space-delimited card-type tokens this prompt applies to (subset of
            `visa mastercard amex maestro discover jcb diners-club`). Applies to all
            card types if unset.
        error_type:
          type: string
          description: |-
            Space-delimited error-type tokens this prompt applies to. Documented tokens:
            timeout, invalid-card-number, invalid-card-type, invalid-date,
            invalid-security-code, invalid-postal-code, session-in-progress,
            card-declined. (The gateway parser additionally recognizes
            invalid-bank-routing-number, invalid-bank-account-number, and
            input-matching-failed.)
        actions:
          type: array
          items:
            $ref: "#/components/schemas/PayPromptAction"
          description: Actions to execute for this prompt.
      required:
        - for
        - actions
      description: |-
        A custom prompt overriding the Pay IVR default for a given situation.

        `card_type` and `error_type` are SPACE-DELIMITED token strings on the wire (not
        arrays) — e.g. `error_type: "timeout invalid-card-number invalid-card-type"`.
    PayPromptFor:
      type: string
      enum:
        - payment-card-number
        - expiration-date
        - security-code
        - postal-code
        - bank-routing-number
        - bank-account-number
        - payment-processing
        - payment-completed
        - payment-failed
        - payment-canceled
    PayPromptAction:
      type: object
      properties:
        type:
          description: "`Say` for text-to-speech, `Play` for playing an audio file."
          allOf:
            - $ref: "#/components/schemas/PayPromptActionType"
        phrase:
          type: string
          description: Sentence to speak (for `Say`) or audio URL to play (for `Play`).
      required:
        - type
        - phrase
      description: A single action (Say/Play) executed when a custom prompt is reached.
    PayPromptActionType:
