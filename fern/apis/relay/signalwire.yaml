asyncapi: 3.0.0
info:
  title: SignalWire Relay — Signalwire (handshake & control)
  version: 1.0.0
  description: |-
    The `signalwire` protocol bootstraps a Relay connection: it authenticates the
    client to the network, returns the authorization block and ICE servers, and
    controls context (event) subscriptions. Every other Relay service
    (`calling`, `messaging`, `tasking`, …) rides on top of a connection
    established here.
defaultContentType: application/json
servers:
  production:
    host: relay.signalwire.com
    protocol: wss
    pathname: /api/relay/wss
    description: SignalWire Relay WebSocket endpoint.
    security:
      - $ref: "#/components/securitySchemes/httpBearer"
    bindings:
      ws: {}
channels:
  signalwire:
    address: null
    title: SignalWire Relay — Signalwire (handshake & control)
    servers:
      - $ref: "#/servers/production"
    messages:
      signalwireConnectRequest:
        $ref: "#/components/messages/signalwireConnectRequest"
      signalwireConnectResponse:
        $ref: "#/components/messages/signalwireConnectResponse"
      signalwireDisconnectRequest:
        $ref: "#/components/messages/signalwireDisconnectRequest"
      signalwireDisconnectResponse:
        $ref: "#/components/messages/signalwireDisconnectResponse"
      signalwireReceiveRequest:
        $ref: "#/components/messages/signalwireReceiveRequest"
      signalwireReceiveResponse:
        $ref: "#/components/messages/signalwireReceiveResponse"
      signalwireUnreceiveRequest:
        $ref: "#/components/messages/signalwireUnreceiveRequest"
      signalwireUnreceiveResponse:
        $ref: "#/components/messages/signalwireUnreceiveResponse"
      setupRequest:
        $ref: "#/components/messages/setupRequest"
      setupResponse:
        $ref: "#/components/messages/setupResponse"
      authorizationStateEvent:
        $ref: "#/components/messages/authorizationStateEvent"
    bindings:
      ws: {}
operations:
  signalwireConnect:
    action: send
    channel:
      $ref: "#/channels/signalwire"
    title: signalwire.connect
    summary: Authenticate and establish a Relay connection
    messages:
      - $ref: "#/channels/signalwire/messages/signalwireConnectRequest"
    reply:
      channel:
        $ref: "#/channels/signalwire"
      messages:
        - $ref: "#/channels/signalwire/messages/signalwireConnectResponse"
  signalwireDisconnect:
    action: send
    channel:
      $ref: "#/channels/signalwire"
    title: signalwire.disconnect
    summary: Service is about to disconnect the client
    messages:
      - $ref: "#/channels/signalwire/messages/signalwireDisconnectRequest"
    reply:
      channel:
        $ref: "#/channels/signalwire"
      messages:
        - $ref: "#/channels/signalwire/messages/signalwireDisconnectResponse"
  signalwireReceive:
    action: send
    channel:
      $ref: "#/channels/signalwire"
    title: signalwire.receive
    summary: Subscribe to inbound events on one or more contexts
    messages:
      - $ref: "#/channels/signalwire/messages/signalwireReceiveRequest"
    reply:
      channel:
        $ref: "#/channels/signalwire"
      messages:
        - $ref: "#/channels/signalwire/messages/signalwireReceiveResponse"
  signalwireUnreceive:
    action: send
    channel:
      $ref: "#/channels/signalwire"
    title: signalwire.unreceive
    summary: Unsubscribe from inbound events on one or more contexts
    messages:
      - $ref: "#/channels/signalwire/messages/signalwireUnreceiveRequest"
    reply:
      channel:
        $ref: "#/channels/signalwire"
      messages:
        - $ref: "#/channels/signalwire/messages/signalwireUnreceiveResponse"
  setup:
    action: send
    channel:
      $ref: "#/channels/signalwire"
    title: setup
    summary: (Deprecated) Request a Relay protocol — use signalwire.connect
    messages:
      - $ref: "#/channels/signalwire/messages/setupRequest"
    reply:
      channel:
        $ref: "#/channels/signalwire"
      messages:
        - $ref: "#/channels/signalwire/messages/setupResponse"
  onSignalwireEvent:
    action: receive
    channel:
      $ref: "#/channels/signalwire"
    title: signalwire.event
    summary: Asynchronous events pushed by the server over the signalwire.event carrier.
    messages:
      - $ref: "#/channels/signalwire/messages/authorizationStateEvent"
components:
  schemas:
    ConnectParams:
      type: object
      properties:
        version:
          description: Protocol version the client speaks.
          allOf:
            - $ref: "#/components/schemas/Version"
        authentication:
          description: The authentication token block.
          allOf:
            - $ref: "#/components/schemas/Authentication"
        agent:
          type: string
          description: Descriptive information about the SDK and application (e.g. `somesdk-1.2.3`).
        protocol:
          type: string
          description: |-
            When provided, lets the client attempt to "hijack" a previously-established
            protocol (provided the project and signature allow it).
        authorization_state:
          type: string
          description: |-
            Encrypted authorization state from a previous `signalwire.authorization.state`
            event, used to reestablish permissions/state on a new node after reconnect.
            Format: `<encryptedAuthStateBase64>:<tagBase64>`.
        contexts:
          type: array
          items:
            type: string
          description: Contexts to begin receiving inbound events for on connect.
      required:
        - version
        - authentication
    Version:
      type: object
      properties:
        major:
          type: integer
          format: int32
          description: Major version. Currently `3`.
        minor:
          type: integer
          format: int32
          description: Minor version. Currently `0`.
        revision:
          type: integer
          format: int32
          description: Revision. Currently `0`.
      required:
        - major
        - minor
        - revision
      description: Relay protocol version. Clients currently send `3.0.0`.
    Authentication:
      type: object
      properties:
        jwt_token:
          type: string
          description: The project JWT used to authenticate the client.
      required:
        - jwt_token
      description: Authentication material for the connection.
    SignalwireConnectRequest:
      type: object
      required:
        - jsonrpc
        - id
        - method
        - params
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        method:
          type: string
          const: signalwire.connect
        params:
          $ref: "#/components/schemas/ConnectParams"
    ConnectResult:
      type: object
      properties:
        identity:
          type: string
          description: The identity of the client on the BLADE network (`<nodeid>@<hagridnodeid>.<fabrichost>`).
        authorization:
          type: object
          additionalProperties: {}
          description: |-
            The current authorization block granted to the client. Opaque to clients;
            stored and echoed back. (Field shapes are backend-internal — modeled as a
            free-form object pending source confirmation.)
        protocol:
          type: string
          description: The protocol the client should use for subsequent requests.
        ice_servers:
          type: array
          items:
            $ref: "#/components/schemas/IceServer"
          description: ICE servers for media.
      required:
        - identity
        - authorization
        - protocol
        - ice_servers
    IceServer:
      type: object
      properties:
        urls:
          type: array
          items:
            type: string
          description: ICE server URLs.
        credential:
          type: string
          description: Credential for the ICE servers (HMAC-SHA1, base64).
        credentialType:
          type: string
          description: Credential type. Currently always `password`.
        username:
          type: string
          description: Username to use — the project id with an expiration-encoded prefix.
      required:
        - urls
        - credential
        - credentialType
        - username
      description: A STUN/TURN ICE server the client should use for media.
    SignalwireConnectResponse:
      type: object
      required:
        - jsonrpc
        - id
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        result:
          $ref: "#/components/schemas/ConnectResult"
    DisconnectParams:
      type: object
      properties:
        restart:
          type: boolean
          description: Indicates the client should restart with a fresh connection.
    SignalwireDisconnectRequest:
      type: object
      required:
        - jsonrpc
        - id
        - method
        - params
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        method:
          type: string
          const: signalwire.disconnect
        params:
          $ref: "#/components/schemas/DisconnectParams"
    DisconnectResult:
      type: object
      properties: {}
      description: Empty acknowledgement.
    SignalwireDisconnectResponse:
      type: object
      required:
        - jsonrpc
        - id
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        result:
          $ref: "#/components/schemas/DisconnectResult"
    ReceiveParams:
      type: object
      properties:
        context:
          type: string
          description: |-
            A single context to set up for receiving inbound events.
            Deprecated — use `contexts`.
          deprecated: true
        contexts:
          type: array
          items:
            type: string
          description: Multiple contexts to set up for receiving inbound events at once.
    SignalwireReceiveRequest:
      type: object
      required:
        - jsonrpc
        - id
        - method
        - params
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        method:
          type: string
          const: signalwire.receive
        params:
          $ref: "#/components/schemas/ReceiveParams"
    Acknowledgement:
      type: object
      properties:
        code:
          type: string
          description: Result code (string). `"200"` on success; e.g. `"402"` Payment required.
        message:
          type: string
          description: Human-readable result message.
      required:
        - code
        - message
      description: Standard `{code, message}` acknowledgement used by receive/unreceive.
    SignalwireReceiveResponse:
      type: object
      required:
        - jsonrpc
        - id
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        result:
          $ref: "#/components/schemas/Acknowledgement"
    UnreceiveParams:
      type: object
      properties:
        contexts:
          type: array
          items:
            type: string
          description: Contexts to stop receiving events for.
      required:
        - contexts
    SignalwireUnreceiveRequest:
      type: object
      required:
        - jsonrpc
        - id
        - method
        - params
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        method:
          type: string
          const: signalwire.unreceive
        params:
          $ref: "#/components/schemas/UnreceiveParams"
    SignalwireUnreceiveResponse:
      type: object
      required:
        - jsonrpc
        - id
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        result:
          $ref: "#/components/schemas/Acknowledgement"
    SetupParams:
      type: object
      properties:
        protocol:
          type: string
          description: A protocol to recover.
    SetupRequest:
      type: object
      required:
        - jsonrpc
        - id
        - method
        - params
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        method:
          type: string
          const: setup
        params:
          $ref: "#/components/schemas/SetupParams"
    SetupResult:
      type: object
      properties:
        protocol:
          type: string
          description: The protocol string the client should use for subsequent requests.
      required:
        - protocol
    SetupResponse:
      type: object
      required:
        - jsonrpc
        - id
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        result:
          $ref: "#/components/schemas/SetupResult"
    AuthorizationStateEvent:
      type: object
      properties:
        authorization_state:
          type: string
          description: |-
            Encrypted authorization state (and validation tag) the client can present on
            reconnect via `connect.authorization_state`.
            Format: `<encryptedAuthStateBase64>:<tagBase64>`.
      required:
        - authorization_state
      description: |-
        Provides updated authorization state to the client so it can reestablish that
        state if it reconnects to another node.
    AuthorizationStateEventFrame:
      type: object
      required:
        - jsonrpc
        - method
        - id
        - params
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        method:
          type: string
          const: signalwire.event
        id:
          type: string
          format: uuid
        params:
          type: object
          required:
            - event_type
            - params
          properties:
            event_type:
              type: string
              const: signalwire.authorization.state
            event_channel:
              type: string
            timestamp:
              type: number
            space_id:
              type: string
            project_id:
              type: string
            params:
              $ref: "#/components/schemas/AuthorizationStateEvent"
  messages:
    signalwireConnectRequest:
      name: signalwire.connect.request
      title: signalwire.connect request
      contentType: application/json
      correlationId:
        location: $message.payload#/id
      payload:
        $ref: "#/components/schemas/SignalwireConnectRequest"
    signalwireConnectResponse:
      name: signalwire.connect.response
      title: signalwire.connect response
      contentType: application/json
      correlationId:
        location: $message.payload#/id
      payload:
        $ref: "#/components/schemas/SignalwireConnectResponse"
    signalwireDisconnectRequest:
      name: signalwire.disconnect.request
      title: signalwire.disconnect request
      contentType: application/json
      correlationId:
        location: $message.payload#/id
      payload:
        $ref: "#/components/schemas/SignalwireDisconnectRequest"
    signalwireDisconnectResponse:
      name: signalwire.disconnect.response
      title: signalwire.disconnect response
      contentType: application/json
      correlationId:
        location: $message.payload#/id
      payload:
        $ref: "#/components/schemas/SignalwireDisconnectResponse"
    signalwireReceiveRequest:
      name: signalwire.receive.request
      title: signalwire.receive request
      contentType: application/json
      correlationId:
        location: $message.payload#/id
      payload:
        $ref: "#/components/schemas/SignalwireReceiveRequest"
    signalwireReceiveResponse:
      name: signalwire.receive.response
      title: signalwire.receive response
      contentType: application/json
      correlationId:
        location: $message.payload#/id
      payload:
        $ref: "#/components/schemas/SignalwireReceiveResponse"
    signalwireUnreceiveRequest:
      name: signalwire.unreceive.request
      title: signalwire.unreceive request
      contentType: application/json
      correlationId:
        location: $message.payload#/id
      payload:
        $ref: "#/components/schemas/SignalwireUnreceiveRequest"
    signalwireUnreceiveResponse:
      name: signalwire.unreceive.response
      title: signalwire.unreceive response
      contentType: application/json
      correlationId:
        location: $message.payload#/id
      payload:
        $ref: "#/components/schemas/SignalwireUnreceiveResponse"
    setupRequest:
      name: setup.request
      title: setup request
      contentType: application/json
      correlationId:
        location: $message.payload#/id
      payload:
        $ref: "#/components/schemas/SetupRequest"
    setupResponse:
      name: setup.response
      title: setup response
      contentType: application/json
      correlationId:
        location: $message.payload#/id
      payload:
        $ref: "#/components/schemas/SetupResponse"
    authorizationStateEvent:
      name: signalwire.authorization.state
      title: signalwire.authorization.state event
      contentType: application/json
      payload:
        $ref: "#/components/schemas/AuthorizationStateEventFrame"
  securitySchemes:
    httpBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
