          description: Present on partial failures. Contains the array of per-device `user_errors` explaining which devices failed and why.
        call_id:
          type: string
          description: The call this result is for, echoed from your request.
          examples:
            - c2a1e9f4-6b3d-4e7a-8f1c-2d3e4f5a6b7c
      required:
        - code
      description: Result of `calling.user_event`.
    Calling.CallUserEvent:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Event id.
        method:
          type: string
          enum:
            - signalwire.event
          description: Always `signalwire.event`.
        params:
          type: object
          properties:
            event_type:
              type: string
              enum:
                - calling.user_event
              description: The event type — identifies which event this is.
            event_channel:
              type: string
              description: The channel the event was delivered on.
              examples:
                - calling
            timestamp:
              type: number
              format: double
              description: When the event was emitted, as a Unix timestamp in seconds.
              examples:
                - 1712345678.842
            project_id:
              type: string
              description: Your project ID.
              examples:
                - b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e
            space_id:
              type: string
              description: Your space ID.
              examples:
                - c3d4e5f6-a7b8-9c0d-1e2f-3a4b5c6d7e8f
            params:
              type: object
              properties:
                node_id:
                  type: string
                  description: Opaque identifier that, paired with `call_id`, addresses this call. Echo back the value you received; treat it as opaque.
                  examples:
                    - a3f1c2d4-5e6f-7a8b-9c0d-1e2f3a4b5c6d
                call_id:
                  type: string
                  description: Unique identifier of the call.
                  examples:
                    - c2a1e9f4-6b3d-4e7a-8f1c-2d3e4f5a6b7c
                segment_id:
                  type: string
                  description: Identifier of the call segment this event belongs to, for correlating events within the same segment of a call.
                  examples:
                    - e5c3f2b1-8d0a-4b4c-9f3e-2a1b0c9d8e7f
                tag:
                  type: string
                  description: The `tag` you set when placing the call, echoed back so you can match the event to your request.
                  examples:
                    - my-tag-1
              required:
                - node_id
                - call_id
              description: The event-specific payload.
          required:
            - event_type
            - params
          description: The event envelope.
      required:
        - jsonrpc
        - id
        - method
        - params
      description: |-
        A custom event on the call. You receive one whenever a `calling.user_event` is
        emitted on the call — by your own application, by another subscriber, or by a
        SWML `user_event` method running server-side — so it can arrive without your
        application emitting anything. The payload is whatever object the sender
        provided, plus the call address.
    Messaging.SendRequest:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Request id, echoed on the correlated response.
        method:
          type: string
          enum:
            - messaging.send
          description: The JSON-RPC method.
        params:
          description: Method parameters.
          allOf:
            - $ref: "#/components/schemas/Messaging.SendParams"
      required:
        - jsonrpc
        - id
        - method
        - params
      description: A JSON-RPC request frame. `Method` is the method name; `Params` is the method's input.
    Messaging.SendParams:
      type: object
      properties:
        context:
          type: string
          description: The context that delivery and reply events for this message are sent to.
          examples:
            - office
        tags:
          type: array
          items:
            type: string
          description: Your own labels to attach to the message, so you can search for it in the UI later.
          examples:
            - - order-98765
              - priority
        region:
          type: string
          description: |-
            The region of the world to send the message from. If you leave this out,
            SignalWire picks one based on your account settings.
          examples:
            - us
        to_number:
          type: string
          description: The recipient's phone number, in E.164 format (for example, `+15551231234`).
          examples:
            - "+15551230002"
        from_number:
          type: string
          description: The phone number to send from, in E.164 format. Must be a number on your account.
          examples:
            - "+15551230001"
        body:
          type: string
          description: |-
            The text of the message. You must include `body`, `media`, or both — at
            least one is required.
          examples:
            - Your order has shipped!
        media:
          type: array
          items:
            type: string
          description: |-
            One or more media URLs to send as an MMS. You must include `body`, `media`,
            or both — at least one is required.
          examples:
            - - https://example.com/receipt.png
      required:
        - context
        - to_number
        - from_number
    Messaging.SendReply:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: The id of the request this responds to.
        result:
          description: The method result.
          allOf:
            - $ref: "#/components/schemas/Messaging.SendResult"
      required:
        - jsonrpc
        - id
        - result
      description: A JSON-RPC response frame correlated to a request by `id`. `Result` is the method result.
    Messaging.SendResult:
      type: object
      properties:
        code:
          type: string
          description: Result code as a string. `"200"` means success; anything else is an error.
          examples:
            - "200"
        message:
          type: string
          description: A human-readable explanation of the result.
          examples:
            - Message accepted
        message_id:
          type: string
          description: The ID of the accepted message, present on success only. Use it to match up later state events.
          examples:
            - e5c3f2b1-8d0a-4b4c-9f3e-2a1b0c9d8e7f
        data:
          type: object
          properties:
            user_errors:
              type: array
              items: {}
              description: Per-recipient error details, present only on partial or full failure.
          description: "Present on failure: per-recipient error details. Each entry describes why the message was rejected for that recipient."
      required:
        - code
        - message
    Messaging.StateEvent:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Event id.
        method:
          type: string
          enum:
            - signalwire.event
          description: Always `signalwire.event`.
        params:
          type: object
          properties:
            event_type:
              type: string
              enum:
                - messaging.state
              description: The event type — identifies which event this is.
            context:
              type: string
              description: The context the message belongs to.
              examples:
                - office
            timestamp:
              type: number
              format: double
              description: When the event was emitted, as a Unix timestamp in seconds.
              examples:
                - 1712345678.842
            project_id:
              type: string
              description: Your project ID.
              examples:
                - b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e
            space_id:
              type: string
              description: Your space ID.
              examples:
                - c3d4e5f6-a7b8-9c0d-1e2f-3a4b5c6d7e8f
            params:
              description: The event-specific payload.
              allOf:
                - $ref: "#/components/schemas/Messaging.StateEventData"
          required:
            - event_type
            - context
            - params
          description: The event envelope.
      required:
        - jsonrpc
        - id
        - method
        - params
      description: |-
        Fires each time a message's delivery state changes. Match `message_id` to the
        one you got from `messaging.send` and read `message_state` to see where the
        message is in its journey. The event keeps firing until the message reaches a
        final state of `delivered`, `undelivered`, or `failed`.
    Messaging.StateEventData:
      type: object
      properties:
        message_id:
          type: string
          description: The ID of the message, matching the one returned by `messaging.send`.
          examples:
            - e5c3f2b1-8d0a-4b4c-9f3e-2a1b0c9d8e7f
        context:
          type: string
          description: The context the message belongs to.
          examples:
            - office
        direction:
          description: The direction of the message, `inbound` or `outbound`.
          examples:
            - outbound
          allOf:
            - $ref: "#/components/schemas/Messaging.MessageDirection"
        tags:
          type: array
          items:
            type: string
          description: Any tags attached to the message.
          examples:
            - - order-98765
              - priority
        from_number:
          type: string
          description: The sender's phone number, in E.164 format.
          examples:
            - "+15551230001"
        to_number:
          type: string
          description: The recipient's phone number, in E.164 format.
          examples:
            - "+15551230002"
        body:
          type: string
          description: The text of the message.
          examples:
            - Your order has shipped!
        media:
          type: array
          items:
            type: string
          description: Any media URLs included with the message. Absent for text-only messages.
          examples:
            - - https://example.com/receipt.png
        segments:
          type: integer
          format: int32
          description: How many SMS segments the message was split into.
          examples:
            - 1
        message_state:
          description: The message's new delivery state.
          examples:
            - delivered
          allOf:
            - $ref: "#/components/schemas/Messaging.MessageState"
        reason:
          type: string
          description: Why the message ended up in this state. Included only when it is `undelivered` or `failed`.
          examples:
            - spam
      required:
        - message_id
        - context
        - direction
        - from_number
        - to_number
        - body
        - segments
        - message_state
    Messaging.MessageDirection:
      type: string
      enum:
        - inbound
        - outbound
    Messaging.MessageState:
      type: string
      enum:
        - queued
        - initiated
        - sent
        - delivered
        - undelivered
        - failed
    Messaging.ReceiveEvent:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Event id.
        method:
          type: string
          enum:
            - signalwire.event
          description: Always `signalwire.event`.
        params:
          type: object
          properties:
            event_type:
              type: string
              enum:
                - messaging.receive
              description: The event type — identifies which event this is.
            context:
              type: string
              description: The context the message belongs to.
              examples:
                - office
            timestamp:
              type: number
              format: double
              description: When the event was emitted, as a Unix timestamp in seconds.
              examples:
                - 1712345678.842
            project_id:
              type: string
              description: Your project ID.
              examples:
                - b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e
            space_id:
              type: string
              description: Your space ID.
              examples:
                - c3d4e5f6-a7b8-9c0d-1e2f-3a4b5c6d7e8f
            params:
              description: The event-specific payload.
              allOf:
                - $ref: "#/components/schemas/Messaging.ReceiveEventData"
          required:
            - event_type
            - context
            - params
          description: The event envelope.
      required:
        - jsonrpc
        - id
        - method
        - params
      description: |-
        Fires when someone sends a message to one of your numbers. The payload gives
        you the full incoming message — who it's from, the text, and any media — so
        you can react or reply.
    Messaging.ReceiveEventData:
      type: object
      properties:
        message_id:
          type: string
          description: The ID of the message.
          examples:
            - e5c3f2b1-8d0a-4b4c-9f3e-2a1b0c9d8e7f
        context:
          type: string
          description: The context this message arrived on.
          examples:
            - office
        direction:
          description: The direction of the message. Always `inbound` here.
          examples:
            - inbound
          allOf:
            - $ref: "#/components/schemas/Messaging.MessageDirection"
        tags:
          type: array
          items:
            type: string
          description: Any tags attached to the message.
          examples:
            - - support
        from_number:
          type: string
          description: The sender's phone number, in E.164 format.
          examples:
            - "+15551230002"
        to_number:
          type: string
          description: The number it was sent to, in E.164 format.
          examples:
            - "+15551230001"
        body:
          type: string
          description: The text of the message.
          examples:
            - Is my order on the way?
        media:
          type: array
          items:
            type: string
          description: Any media URLs included with the message.
          examples:
            - - https://example.com/photo.jpg
        segments:
          type: integer
          format: int32
          description: How many SMS segments the message was split into.
          examples:
            - 1
        message_state:
          type: string
          enum:
            - received
          description: The message state. Always `received` for an incoming message.
          examples:
            - received
      required:
        - message_id
        - context
        - direction
        - from_number
        - to_number
        - body
        - segments
        - message_state
    Tasking.TasksEvent:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Event id.
        method:
          type: string
          enum:
            - signalwire.event
          description: Always `signalwire.event`.
        params:
          type: object
          properties:
            event_type:
              type: string
              enum:
                - queuing.relay.tasks
              description: The event type — identifies which event this is.
            context:
              type: string
              description: The context this task arrived on.
              examples:
                - office
            message:
              type: object
              additionalProperties: {}
              description: The message payload, exactly as the sender passed it to the Tasking REST endpoint. Arbitrary JSON — no fixed structure.
            timestamp:
              type: integer
              format: int64
              description: When the event was emitted, as a Unix timestamp in seconds (integer).
              examples:
                - 1712345678
            project_id:
              type: string
              description: Your project ID.
              examples:
                - b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e
            space_id:
              type: string
              description: Your space ID.
              examples:
                - c3d4e5f6-a7b8-9c0d-1e2f-3a4b5c6d7e8f
          required:
            - event_type
            - context
            - message
            - timestamp
            - project_id
            - space_id
          description: The flat event envelope.
      required:
        - jsonrpc
        - id
        - method
        - params
      description: |-
        Fires when a task arrives on a context you're subscribed to. The payload tells
        you which `context` the task came in on and carries the `message` exactly as
        the sender passed it to the Tasking REST endpoint (`POST /api/relay/rest/tasks`).
    Provisioning.ConfigureRequest:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Request id, echoed on the correlated response.
        method:
          type: string
          enum:
            - provisioning.configure
          description: The JSON-RPC method.
        params:
          description: Method parameters.
          allOf:
            - $ref: "#/components/schemas/Provisioning.ConfigureParams"
      required:
        - jsonrpc
        - id
        - method
        - params
      description: A JSON-RPC request frame. `Method` is the method name; `Params` is the method's input.
    Provisioning.ConfigureParams:
      type: object
      properties:
        target:
          description: The connector type to provision. Currently only `freeswitch` is supported.
          examples:
            - freeswitch
          allOf:
            - $ref: "#/components/schemas/Provisioning.ConnectorTarget"
        local_endpoint:
          type: string
          description: The connector's local endpoint, as an IPv4 address, e.g. `10.10.0.2`.
          examples:
            - 10.10.0.2
        external_endpoint:
          type: string
          description: The connector's external (public) endpoint as an IPv4 address, e.g. `8.8.8.8`.
          examples:
            - 8.8.8.8
        relay_connector_id:
          type: string
          description: UUID of the Relay connector being configured.
          examples:
            - b6ef5331-dce8-4c56-890d-949039398361
      required:
        - target
        - local_endpoint
        - external_endpoint
        - relay_connector_id
    Provisioning.ConnectorTarget:
      oneOf:
        - type: string
        - type: string
          enum:
            - freeswitch
    Provisioning.ConfigureReply:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: The id of the request this responds to.
        result:
          description: The method result.
          allOf:
            - $ref: "#/components/schemas/Provisioning.ConfigureResult"
      required:
        - jsonrpc
        - id
        - result
      description: A JSON-RPC response frame correlated to a request by `id`. `Result` is the method result.
    Provisioning.ConfigureResult:
      type: object
      properties:
        configuration:
          description: The rendered connector configuration.
          allOf:
            - $ref: "#/components/schemas/Provisioning.Configuration"
      required:
        - configuration
      description: The provisioning result payload, carrying the rendered connector configuration.
    Provisioning.Configuration:
      type: object
      properties:
        profile:
          type: string
          description: |-
            The FreeSWITCH SIP profile, rendered as an XML document. It embeds the gateway
            credentials your connector needs, including a plaintext SIP gateway password —
            treat this value as a secret and handle it over a secure channel.
          examples:
            - <profile name="signalwire"><settings><param name="sip-ip" value="10.10.0.2"/></settings></profile>
      required:
        - profile
      description: |-
        The runtime configuration returned for your connector. For a `freeswitch`
        target, this contains the SIP profile your connector should run with.
    WebRTC.VertoRequest:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Request id, echoed on the correlated response.
        method:
          type: string
          enum:
            - webrtc.verto
          description: The JSON-RPC method.
        params:
          description: Method parameters.
          allOf:
            - $ref: "#/components/schemas/WebRTC.MessageParams"
      required:
        - jsonrpc
        - id
        - method
        - params
      description: A JSON-RPC request frame. `Method` is the method name; `Params` is the method's input.
    WebRTC.MessageParams:
      type: object
      properties:
        node_id:
          type: string
          description: |-
            Opaque identifier that scopes this call. Once a call exists, set this to the
            `node_id` you received in an earlier event or response so the frame reaches
            the right place. Leave it absent on your first message, before a call has been
            established — SignalWire assigns one for you.
          examples:
            - a3f1c2d4-5e6f-7a8b-9c0d-1e2f3a4b5c6d
        message:
          type: object
          additionalProperties: {}
          description: |-
            The Verto frame (the WebRTC signaling message format used for peer calls) to
            send — for example a `verto.invite` carrying
            `dialogParams`/`sdp`/`layout`/`positions`. The frame is passed through
            as-is; see SignalWire's Verto message reference for the full list of Verto
            methods and their `params`. The Verto call ID belongs inside this frame, at
            `dialogParams.callID` — generate one when you create a call and reuse it on
            every frame for that call. There is no top-level `callID`.
        subscribe:
          type: array
          items:
            type: string
          description: |-
            Event channels to subscribe to alongside this request — useful when you
            join a conference and want its event feed. Values are conference/room event
            channels such as `member.joined`, `member.left`, `room.ended`,
            `room.updated`, `layout.changed`, and `member.updated` (illustrative, not
            exhaustive).
          examples:
            - - member.joined
              - member.left
              - room.ended
      required:
        - message
    WebRTC.VertoReply:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: The id of the request this responds to.
        result:
          description: The method result.
          allOf:
            - $ref: "#/components/schemas/WebRTC.MessageResult"
      required:
        - jsonrpc
        - id
        - result
      description: A JSON-RPC response frame correlated to a request by `id`. `Result` is the method result.
    WebRTC.MessageResult:
      type: object
      properties:
        code:
          type: string
          description: |-
            Result code as a string. `"200"` means success. On failure this is a lowercase
            error identifier such as `not_allowed`, `invalid_params`, `internal_error`, or
            `response_timeout`. Always check `code` to tell success from failure.
          examples:
            - "200"
        result:
          type: object
          additionalProperties: {}
          description: The Verto reply payload — for example the answer to a `verto.invite`. The shape depends on the Verto method.
        message:
          type: string
          description: A human-readable status message. Present on errors and on some informational replies.
          examples:
            - Received
        node_id:
          type: string
          description: The node now hosting the call. Capture it and send it on later frames for this call.
          examples:
            - a3f1c2d4-5e6f-7a8b-9c0d-1e2f3a4b5c6d
      required:
        - code
      description: "The reply to a Verto frame (the WebRTC signaling message format used for peer calls): the Verto outcome plus the node now hosting the call."
    WebRTC.MessageEvent:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Event id.
        method:
          type: string
          enum:
            - signalwire.event
          description: Always `signalwire.event`.
        params:
          type: object
          properties:
            event_type:
              type: string
              enum:
                - webrtc.message
              description: The event type — identifies which event this is.
            node_id:
              type: string
              description: |-
                The node that sent this event. Capture it once your call starts and reuse
                it as the `node_id` on your subsequent `message` requests so they reach the
                same node.
              examples:
                - a3f1c2d4-5e6f-7a8b-9c0d-1e2f3a4b5c6d
            event_channel:
              type: string
              description: The channel the event was delivered on.
              examples:
                - webrtc
            timestamp:
              type: number
              format: double
              description: When the event was emitted, as a Unix timestamp in seconds.
              examples:
                - 1712345678.842
            project_id:
              type: string
              description: Your project ID.
              examples:
                - b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e
            space_id:
              type: string
              description: Your space ID.
              examples:
                - c3d4e5f6-a7b8-9c0d-1e2f-3a4b5c6d7e8f
            params:
              type: object
              additionalProperties: {}
              description: |-
                The event-specific payload for this WebRTC signaling event — either a signaling
                response or a conference/room event.
          required:
            - event_type
            - params
          description: The event envelope.
      required:
        - jsonrpc
        - id
        - method
        - params
      description: |-
        Delivers a Verto frame (the WebRTC signaling message format used for peer calls)
        from SignalWire back to your client. This fires when SignalWire has a Verto
        response to one of your `message` requests, or when a conference/room event
        arrives on a channel you subscribed to. Read the frame in `params` to learn the
        outcome.

        The frame in `params` is passed through as-is; see SignalWire's Verto message
        reference for the full set of Verto methods and their `params`.
  messages:
