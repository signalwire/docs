      type: object
      properties:
        change_context:
          type: string
          description: The name of the context to switch to. The context must be defined in the AI's prompt.contexts configuration.
          examples:
            - sales
      required:
        - change_context
    SWML.Calling.ChangeStepAction:
      type: object
      properties:
        change_step:
          type: string
          description: The name of the step to switch to. The step must be defined in the current context's steps array.
          examples:
            - confirm_order
      required:
        - change_step
    SWML.Calling.ContextSwitchAction:
      type: object
      properties:
        context_switch:
          type: object
          properties:
            system_prompt:
              type: string
              description: The instructions to send to the agent. Default is not set.
              examples:
                - You are now a billing specialist. Help the customer with their billing inquiry.
            consolidate:
              type: boolean
              description: Whether to consolidate the context. Default is `false`.
              examples:
                - true
            user_prompt:
              type: string
              description: |-
                A string serving as simulated user input for the AI Agent.
                During a context_switch in the AI's prompt, the user_prompt offers the AI pre-established context or guidance.
                Default is not set
              examples:
                - I need help with my recent invoice.
          required:
            - system_prompt
          description: A JSON object containing the context to switch to. Default is not set.
      required:
        - context_switch
    SWML.Calling.HangupAction:
      type: object
      properties:
        hangup:
          type: boolean
          description: Whether to hang up the call. When set to `true`, the call will be terminated after the AI agent finishes speaking.
          examples:
            - true
      required:
        - hangup
    SWML.Calling.HoldAction:
      type: object
      properties:
        hold:
          oneOf:
            - type: integer
              format: int32
            - type: object
              properties:
                timeout:
                  type: integer
                  format: int32
                  description: The duration to hold the caller in seconds. Can be a number or an object with timeout property.
                  maximum: 900
                  default: 300
                  examples:
                    - 300
          description: |-
            Places the caller on hold while playing hold music (configured via params.hold_music).
            During hold, speech detection is paused and the AI agent will not respond to the caller.
            The value specifies the hold timeout in seconds.
            Can be a number or an object with timeout property.
          maximum: 900
          examples:
            - 120
      required:
        - hold
