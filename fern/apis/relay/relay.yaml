            - remote-caller
        content:
          type: string
          description: The text of this turn.
          examples:
            - I'd like to check my balance.
        confidence:
          type: number
          format: double
          description: Recognition confidence for this turn, roughly 0.0-1.0. Absent for non-speech turns.
          examples:
            - 0.94
        language:
          type: string
          description: BCP-47 language code of this turn (e.g. `en`, `es-ES`).
          examples:
            - en
        filter_type:
          type: string
          description: The kind of content filter that matched this turn, when one did.
        filter_value:
          type: string
          description: The value the content filter matched, when one did.
        tool_call_id:
          type: string
          description: Correlation id for a tool/function-call turn. Present only on `tool`-role entries.
