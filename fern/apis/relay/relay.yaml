            - remote-caller
        content:
          type: string
          description: The transcribed text.
          examples:
            - Hello, I'd like to check my balance.
        lang:
          type: string
          description: The language of the utterance as a BCP-47 language code (e.g. `en`, `es-ES`).
          examples:
            - en
        confidence:
          type: number
          format: double
          description: Recognition confidence for the utterance, roughly 0.0-1.0.
          examples:
            - 0.94
      required:
        - role
