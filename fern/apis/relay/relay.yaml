        codec:
          description: Codec for the tapped audio. Matches the tapped audio if not set.
          allOf:
            - $ref: "#/components/schemas/Calling.TapCodec"
        ptime:
          type: integer
          format: int32
          description: Packetization time in ms — matches the tapped audio if not set.
        rate:
          type: integer
          format: int32
          description: Sample rate in Hz (present in the resolved `source_device` echo).
      required:
        - addr
