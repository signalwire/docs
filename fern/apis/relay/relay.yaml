      required:
        - node_id
        - call_id
        - action
    Calling.LiveTranscribeAction:
      type: object
      properties:
        start:
          description: Start live transcription.
          allOf:
            - $ref: "#/components/schemas/Calling.LiveTranscribeStart"
        stop:
          description: Stop live transcription.
          allOf:
            - $ref: "#/components/schemas/Calling.LiveActionStop"
        summarize:
          description: Summarize the live transcription so far.
          allOf:
            - $ref: "#/components/schemas/Calling.LiveSummarize"
      description: |-
        The live-transcribe action to perform. Set exactly one of `start`, `stop`, or
        `summarize`.
    Calling.LiveTranscribeStart:
      type: object
      properties:
        lang:
          type: string
          description: The language to transcribe, e.g. `en-US`.
          examples:
            - en-US
        direction:
          type: array
          items:
            $ref: "#/components/schemas/Calling.TranscribeDirection"
          description: Which side(s) of the call to transcribe.
          examples:
            - - remote-caller
        webhook:
          type: string
          format: uri
          description: An `http` or `https` URL to receive the transcription as it is produced.
          examples:
            - https://example.com/webhooks/relay
        ai_summary:
          type: boolean
          description: Generate an AI summary of the conversation. The summary is delivered when the call ends.
          examples:
            - true
        ai_summary_prompt:
          type: string
          description: Instructions telling the AI how to summarize, used when `ai_summary` is enabled.
          examples:
            - Summarize the key points and any action items discussed on this call.
        live_events:
          type: boolean
          description: Deliver transcription results live as the conversation happens, rather than only at the end.
          examples:
            - true
        speech_timeout:
          type: integer
          format: int32
          description: Speech-recognition timeout in milliseconds. Default `60000`.
          minimum: 0
          default: 60000
          examples:
            - 60000
        vad_silence_ms:
          type: integer
          format: int32
          description: |-
            Voice-activity-detection silence time in milliseconds. The default is
            engine-dependent (Deepgram vs Google) and is not fixed by this method.
          minimum: 0
          examples:
            - 500
        vad_thresh:
          type: integer
          format: int32
          description: Voice-activity-detection threshold (0-1800). Default `400`.
          minimum: 0
          default: 400
          examples:
            - 400
        debug_level:
          type: integer
          format: int32
          description: Debug log level (0-2). Default `0`.
          minimum: 0
          default: 0
          examples:
            - 0
        speech_engine:
          description: Speech engine to use. Default `deepgram`.
          default: deepgram
          examples:
            - deepgram
          allOf:
            - $ref: "#/components/schemas/Calling.LiveSpeechEngine"
        hints:
          type: array
          items:
            type: string
          description: Words or phrases to bias speech recognition toward, improving accuracy for names, jargon, or uncommon terms.
          examples:
            - - SignalWire
              - Relay
              - webhook
        verbose_utterances:
          type: boolean
          description: Emit verbose, word-level utterance detail in the transcription results rather than only finalized segments.
          examples:
            - false
      required:
        - lang
        - direction
      description: Settings for starting live transcription. `lang` and `direction` are required.
    Calling.TranscribeDirection:
      type: string
      enum:
        - local-caller
        - remote-caller
    Calling.LiveSpeechEngine:
      type: string
      enum:
        - deepgram
        - google
    Calling.LiveActionStop:
      type: object
      properties: {}
      description: A stop action takes no fields — pass an empty object.
    Calling.LiveSummarize:
