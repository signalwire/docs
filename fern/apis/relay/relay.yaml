    Calling.CallDialEvent:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Event id.
        method:
          type: string
          enum:
            - signalwire.event
          description: Always `signalwire.event`.
        params:
          type: object
          properties:
            event_type:
              type: string
              enum:
                - calling.call.dial
              description: The event type — identifies which event this is.
            event_channel:
              type: string
              description: The channel the event was delivered on.
              examples:
                - calling
            timestamp:
              type: number
              format: double
              description: When the event was emitted, as a Unix timestamp in seconds.
              examples:
                - 1712345678.842
            project_id:
              type: string
              description: Your project ID.
              examples:
                - b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e
            space_id:
              type: string
              description: Your space ID.
              examples:
                - c3d4e5f6-a7b8-9c0d-1e2f-3a4b5c6d7e8f
            params:
              description: The event-specific payload.
              allOf:
                - $ref: "#/components/schemas/Calling.CallDialParams"
          required:
            - event_type
            - params
          description: The event envelope.
      required:
        - jsonrpc
        - id
        - method
        - params
      description: Fires as a `calling.dial` request progresses. Watch `dial_state` to know when your call is ringing, has been answered, or failed; when it is answered the `call` field gives you the call that picked up.
    Calling.CallDialParams:
      type: object
      properties:
        node_id:
          type: string
          description: Opaque identifier that, paired with `call_id`, scopes this dial and its resulting call. Echo it back on follow-up commands; treat it as opaque.
          examples:
            - a3f1c2d4-5e6f-7a8b-9c0d-1e2f3a4b5c6d
        tag:
          type: string
          description: The `tag` you set on the `calling.dial` request, so you can match this event to it.
          examples:
            - my-tag-1
        dial_state:
          type: string
          enum:
            - dialing
            - answered
            - failed
          description: "Where the dial stands: `dialing`, `answered`, or `failed`."
          examples:
            - answered
        call:
          description: The call that answered, as a full call-state payload (the same shape as a `calling.call.state` event). Present only when `dial_state` is `answered`; the winning leg is marked by `dial_winner`.
          allOf:
            - $ref: "#/components/schemas/Calling.CallStateParams"
        reason:
          type: string
          description: Why the dial failed. Present when `dial_state` is `failed`.
          examples:
            - NO_ANSWER
        source:
          type: string
          description: What caused the dial to fail. Present when `dial_state` is `failed`.
          examples:
