          type: string
          description: Digits that terminate collection (e.g. `"#*"`). Default not set.
        digit_timeout:
          type: number
          format: double
          description: |-
            Maximum seconds to wait for the next digit after a digit is received.
            Default `5.0`.
          exclusiveMinimum: 0
          default: 5
      required:
        - max
      description: DTMF-digit collection settings.
    Calling.CollectSpeech:
      type: object
      properties:
        end_silence_timeout:
          type: number
          format: double
          description: Silence (seconds) to wait for before declaring end of speech. Default `1`.
          exclusiveMinimum: 0
          default: 1
        speech_timeout:
          type: number
          format: double
          description: Maximum seconds to collect speech. Default `60`.
          exclusiveMinimum: 0
          default: 60
        language:
          type: string
          description: Language to detect. Default `en-US`.
          default: en-US
        hints:
          type: array
          items:
            type: string
          description: Expected phrases to bias detection toward. Default not set.
        engine:
          description: Force a specific speech-recognition engine. Default unset (auto-selected).
          allOf:
            - $ref: "#/components/schemas/Calling.CollectSpeechEngine"
      description: Speech-recognition collection settings.
