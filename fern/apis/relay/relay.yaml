    SWML.Calling.ChangeContextAction:
      type: object
      properties:
        change_context:
          type: string
          description: The name of the context to switch to. The context must be defined in the AI's prompt.contexts configuration.
          examples:
            - sales
      required:
        - change_context
    SWML.Calling.ChangeStepAction:
      type: object
      properties:
        change_step:
          type: string
          description: The name of the step to switch to. The step must be defined in the current context's steps array.
          examples:
            - confirm_order
      required:
        - change_step
    SWML.Calling.ContextSwitchAction:
      type: object
      properties:
        context_switch:
          type: object
          properties:
            system_prompt:
              type: string
              description: The instructions to send to the agent. Default is not set.
              examples:
                - You are now a billing specialist. Help the customer with their billing inquiry.
            consolidate:
              type: boolean
              description: Whether to consolidate the context. Default is `false`.
              examples:
                - true
            user_prompt:
              type: string
              description: |-
                A string serving as simulated user input for the AI Agent.
                During a context_switch in the AI's prompt, the user_prompt offers the AI pre-established context or guidance.
                Default is not set
              examples:
                - I need help with my recent invoice.
          required:
            - system_prompt
          description: A JSON object containing the context to switch to. Default is not set.
      required:
        - context_switch
    SWML.Calling.HangupAction:
      type: object
      properties:
        hangup:
          type: boolean
          description: Whether to hang up the call. When set to `true`, the call will be terminated after the AI agent finishes speaking.
          examples:
            - true
      required:
        - hangup
    SWML.Calling.HoldAction:
      type: object
      properties:
        hold:
          oneOf:
            - type: integer
              format: int32
            - type: object
              properties:
                timeout:
                  type: integer
                  format: int32
                  description: The duration to hold the caller in seconds. Can be a number or an object with timeout property.
                  maximum: 900
                  default: 300
                  examples:
                    - 300
          description: |-
            Places the caller on hold while playing hold music (configured via params.hold_music).
            During hold, speech detection is paused and the AI agent will not respond to the caller.
            The value specifies the hold timeout in seconds.
            Can be a number or an object with timeout property.
          maximum: 900
          examples:
            - 120
      required:
        - hold
    SWML.Calling.PlaybackBGAction:
      type: object
      properties:
        playback_bg:
          type: object
          properties:
            file:
              type: string
              format: uri
              description: URL or filepath of the audio file to play.
              examples:
                - https://cdn.signalwire.com/default-music/welcome.mp3
            wait:
              type: boolean
              description: Whether to wait for the audio file to finish playing before continuing. Default is `false`.
              examples:
                - true
          required:
            - file
          description: A JSON object containing the audio file to play.
      required:
        - playback_bg
    SWML.Calling.SayAction:
      type: object
      properties:
        say:
          type: string
          description: A message to be spoken by the AI agent.
          examples:
            - Welcome to Franklin's Pizza.
      required:
        - say
    SWML.Calling.SetGlobalDataAction:
      type: object
      properties:
        set_global_data:
          type: object
          properties: {}
          description: A JSON object containing any global data, as a key-value map. This action sets the data in the `global_data` to be globally referenced.
          examples:
            - order_id: ord_456
              customer_tier: premium
      required:
        - set_global_data
    SWML.Calling.SetMetaDataAction:
      type: object
      properties:
        set_meta_data:
          type: object
          properties: {}
          description: A JSON object containing any metadata, as a key-value map. This action sets the data in the `meta_data` to be referenced locally in the function.
          examples:
            - last_action: lookup
              retry_count: 2
      required:
        - set_meta_data
    SWML.Calling.StopAction:
      type: object
      properties:
        stop:
          type: boolean
          description: Whether to stop the conversation.
          examples:
            - true
      required:
        - stop
    SWML.Calling.StopPlaybackBGAction:
      type: object
      properties:
        stop_playback_bg:
          type: boolean
          description: Whether to stop the background audio file.
          examples:
            - true
      required:
        - stop_playback_bg
    SWML.Calling.ToggleFunctionsAction:
      type: object
      properties:
        toggle_functions:
          type: array
          items:
            type: object
            properties:
              active:
                type: boolean
                description: Whether to activate or deactivate the functions. Default is `true`
                examples:
                  - true
              function:
                oneOf:
                  - type: string
                  - type: array
                    items:
                      type: string
                description: The function names to toggle.
                examples:
                  - Discount
            required:
              - active
              - function
          description: Whether to toggle the functions on or off.
      required:
        - toggle_functions
    SWML.Calling.UnsetGlobalDataAction:
      type: object
      properties:
        unset_global_data:
          oneOf:
            - type: string
            - type: object
              properties: {}
          description: The key of the global data to unset from the `global_data`. You can also reset the `global_data` by passing in a new object.
          examples:
            - session_id
      required:
        - unset_global_data
    SWML.Calling.UnsetMetaDataAction:
      type: object
      properties:
        unset_meta_data:
          oneOf:
            - type: string
            - type: object
              properties: {}
          description: The key of the local data to unset from the `meta_data`. You can also reset the `meta_data` by passing in a new object.
          examples:
            - temp_data
      required:
        - unset_meta_data
    SWML.Calling.UserInputAction:
      type: object
