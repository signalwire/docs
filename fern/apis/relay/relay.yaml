          examples:
            - d4b2e1a0-7c9f-4a3b-8e2d-1f0a9b8c7d6e
        state:
          description: Where the recording currently stands.
          examples:
            - finished
          allOf:
            - $ref: "#/components/schemas/Calling.CallRecordState"
        recording_id:
          type: string
          description: The unique identifier of the recording.
          examples:
            - c2a1e9f4-6b3d-4e7a-8f1c-2d3e4f5a6b7c
        url:
          type: string
          format: uri
          description: Where to download the finished recording. Not available until the state is `finished`.
          examples:
            - https://example.com/recordings/c2a1e9f4.mp3
        duration:
          type: number
          format: double
          description: How long the recording is, in seconds. Set once the state is `finished`.
          examples:
            - 20
        size:
          type: integer
          format: int32
          description: How large the recording file is, in bytes. Set once the state is `finished`.
          examples:
            - 123456788
        start_time:
          type: number
          format: double
          description: Unix timestamp for when the recording started, in seconds. Set once the state is `finished`.
          examples:
            - 1712345678.842
        first_frame_time:
          type: number
          format: double
          description: Unix timestamp, in seconds, of the first captured audio. Present when available; more precise than `start_time`.
          examples:
            - 1712345678.123
        end_time:
          type: number
