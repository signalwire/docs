      discriminator: type
    Calling.FaxPage:
      allOf:
        - $ref: "#/components/schemas/Calling.CallFax"
        - type: object
          properties:
            type:
              type: string
              const: page
            params:
              type: object
              properties:
                direction:
                  description: Whether this page was sent or received.
                  examples:
                    - send
                  allOf:
                    - $ref: "#/components/schemas/Calling.FaxDirection"
                number:
                  type: integer
                  format: int32
                  description: The page number that was just transmitted.
                  examples:
                    - 1
              required:
                - direction
                - number
          required:
            - type
            - params
