          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        result:
          $ref: "#/components/schemas/Calling.DisconnectResult"
    Calling.CollectResult:
      type: object
      properties:
        code:
          type: string
          description: Result code as a string, e.g. `"200"` (success), `"400"`, `"404"`.
        message:
          type: string
          description: Human-readable description of the result. On failure, explains what went wrong.
        call_id:
          type: string
          description: The call this result is for, echoed from your request. Absent on `calling.dial`, which has no call yet.
        control_id:
          type: string
          description: Your control identifier for the started action, echoed when your request included one.
      required:
        - code
        - message
    Calling.CollectParams:
      type: object
      properties:
        node_id:
          type: string
          description: Identifier of the node handling the call. Pair it with `call_id` to address the call.
        call_id:
          type: string
          description: Unique identifier of the call.
        control_id:
          type: string
          description: Your own identifier for this collect. It is attached to every event the collect produces so you can match events back to this request.
        initial_timeout:
          type: number
          format: double
          description: |-
            How long to wait, in seconds, for the caller to start giving input. This
            timer only runs once it has been started — either at the outset when
            `start_input_timers` is `true`, or later via `calling.collect.start_input_timers`.
            Defaults to `4.0`.
          exclusiveMinimum: 0
          default: 4
        digits:
          description: How to collect DTMF key presses. Provide this, `speech`, or both; at least one is required.
          allOf:
            - $ref: "#/components/schemas/Calling.CollectDigits"
        speech:
          description: How to collect spoken input. Provide this, `digits`, or both; at least one is required.
          allOf:
            - $ref: "#/components/schemas/Calling.CollectSpeech"
        partial_results:
          type: boolean
          description: When `true`, emit partial-result events as input comes in rather than only a final result. Defaults to `false`.
          default: false
        continuous:
          type: boolean
          description: |-
            When `true`, keep listening for speech and digits until you stop the collect
            yourself, instead of finishing after the first complete input. Defaults to `false`.
          default: false
        send_start_of_input:
          type: boolean
          description: When `true`, fire a `start_of_input` event the moment the caller begins giving input. Defaults to `false`.
          default: false
        start_input_timers:
          type: boolean
          description: When `true`, start the `initial_timeout` timer immediately. Set `false` to start it later with `calling.collect.start_input_timers`. Defaults to `false`.
          default: false
        status_url:
          type: string
          format: uri
          description: HTTP or HTTPS URL that collect events are also POSTed to as they occur.
      required:
        - node_id
        - call_id
        - control_id
    Calling.CollectDigits:
      type: object
      properties:
        max:
          type: integer
          format: int32
          description: Maximum number of digits to collect before collection finishes. Must be a positive integer.
          minimum: 1
        terminators:
          type: string
          description: Keys that end collection early when pressed, such as `"#*"`. Not set by default.
        digit_timeout:
          type: number
          format: double
          description: |-
            How long to wait, in seconds, for the next key press after one is received
            before giving up. Defaults to `5.0`.
          exclusiveMinimum: 0
          default: 5
      required:
        - max
      description: Settings that control how the caller's DTMF key presses are collected.
    Calling.CollectSpeech:
      type: object
      properties:
        end_silence_timeout:
          type: number
          format: double
          description: |-
            How much silence, in seconds, to wait for before treating the caller as
            finished speaking. Defaults to `1`.
          exclusiveMinimum: 0
          default: 1
        speech_timeout:
          type: number
          format: double
          description: Maximum time, in seconds, to spend collecting speech. Defaults to `60`.
          exclusiveMinimum: 0
          default: 60
        language:
          type: string
          description: Language to recognize, as a BCP-47 tag such as `en-US`. Defaults to `en-US`.
          default: en-US
        hints:
          type: array
          items:
            type: string
          description: Words or phrases you expect to hear, used to bias recognition toward them. Not set by default.
        engine:
          description: Pins recognition to a specific engine. Defaults to unset, which lets SignalWire choose.
          allOf:
            - $ref: "#/components/schemas/Calling.CollectSpeechEngine"
        model:
          type: string
          description: |-
            Recognition model to use. One of `default`, `enhanced`, `enhanced.phone_call`,
            or `enhanced.video`. Not set by default.
      description: Settings that control how the caller's speech is recognized and collected.
    Calling.CollectSpeechEngine:
      type: string
      enum:
        - Deepgram
        - Google
        - Google.V2
    CallingCollectRequest:
      type: object
      required:
        - jsonrpc
        - id
        - method
        - params
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        method:
          type: string
          const: calling.collect
        params:
          $ref: "#/components/schemas/Calling.CollectParams"
    CallingCollectResponse:
      type: object
      required:
        - jsonrpc
        - id
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        result:
          $ref: "#/components/schemas/Calling.CollectResult"
    Calling.CallCollectEvent:
      type: object
      properties:
        node_id:
          type: string
          description: Identifier of the node handling the call. Pair it with `call_id` to address the call.
        call_id:
          type: string
          description: Unique identifier of the call.
        control_id:
          type: string
          description: The `control_id` of the collection this event refers to, returned when you started it with `calling.collect`.
        state:
          description: Where the collection currently stands. `error` means it stopped because something went wrong. Present for partial and continuous collections; a one-shot collect reports its `result` without a `state`.
          allOf:
            - $ref: "#/components/schemas/Calling.CallCollectState"
        result:
          description: What the caller gave you. Check its `type` to handle digits, speech, or a no-input/no-match marker.
          allOf:
            - $ref: "#/components/schemas/Calling.CallCollectResult"
        final:
          type: boolean
          description: |-
            Relevant when you requested partial or continuous results: `true` once the
            recognizer has finished the current utterance. With `continuous: true`, the
            collector then restarts to listen for the next one.
      required:
        - node_id
        - call_id
        - control_id
      description: Fires as you collect input from a caller — DTMF digits or speech — reporting partial and final results so you can react to what they said or pressed.
    Calling.CallCollectState:
      type: string
      enum:
        - collecting
        - error
        - finished
    Calling.CallCollectResult:
      type: object
      properties:
        type:
          type: string
      required:
        - type
      description: |-
        What the caller gave you. Read `type` to know which kind of result this is. The
        `error`, `no_input`, `no_match`, and `start_of_input` types are markers with no
        extra data, while `digit` and `speech` include a `params` object with the
        collected input.
      discriminator: type
    Calling.CallCollectResultError:
      allOf:
        - $ref: "#/components/schemas/Calling.CallCollectResult"
        - type: object
          properties:
            type:
              type: string
              const: error
          required:
            - type
    Calling.CallCollectResultNoInput:
      allOf:
        - $ref: "#/components/schemas/Calling.CallCollectResult"
        - type: object
          properties:
            type:
              type: string
              const: no_input
          required:
            - type
    Calling.CallCollectResultNoMatch:
      allOf:
        - $ref: "#/components/schemas/Calling.CallCollectResult"
        - type: object
          properties:
            type:
              type: string
              const: no_match
          required:
            - type
    Calling.CallCollectResultStartOfInput:
      allOf:
        - $ref: "#/components/schemas/Calling.CallCollectResult"
        - type: object
          properties:
            type:
              type: string
              const: start_of_input
          required:
            - type
          description: Signals that the caller has started speaking. You only receive this when you collect with `calling.collect`.
    Calling.CallCollectResultDigit:
      allOf:
        - $ref: "#/components/schemas/Calling.CallCollectResult"
        - type: object
          properties:
            type:
              type: string
              const: digit
            params:
              type: object
              properties:
                digits:
                  type: string
                  description: The DTMF digits the caller pressed.
                terminator:
                  type: string
                  description: The digit that ended collection, if the caller pressed your terminator key.
              required:
                - digits
          required:
            - type
            - params
    Calling.CallCollectResultSpeech:
      allOf:
        - $ref: "#/components/schemas/Calling.CallCollectResult"
        - type: object
          properties:
            type:
              type: string
              const: speech
            params:
              type: object
              properties:
                text:
                  type: string
                  description: The text the speech recognizer heard the caller say.
                confidence:
                  type: number
                  format: double
                  description: How confident the recognizer is in the result (for example `83.2`).
              required:
                - text
          required:
            - type
            - params
    CallCollectEventFrame:
      type: object
      required:
        - jsonrpc
        - method
        - id
        - params
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        method:
          type: string
          const: signalwire.event
        id:
          type: string
          format: uuid
        params:
          type: object
          required:
            - event_type
            - params
          properties:
            event_type:
              type: string
              const: calling.call.collect
            event_channel:
              type: string
            timestamp:
              type: number
            space_id:
              type: string
            project_id:
              type: string
            params:
              $ref: "#/components/schemas/Calling.CallCollectEvent"
    Calling.CollectStopResult:
      type: object
      properties:
        code:
          type: string
          description: Result code as a string, e.g. `"200"` (success), `"400"`, `"404"`.
        message:
          type: string
          description: Human-readable description of the result. On failure, explains what went wrong.
        call_id:
          type: string
          description: The call this result is for, echoed from your request. Absent on `calling.dial`, which has no call yet.
        control_id:
          type: string
          description: Your control identifier for the started action, echoed when your request included one.
      required:
        - code
        - message
    Calling.CollectStopParams:
      type: object
      properties:
        node_id:
          type: string
          description: Identifier of the node handling the call. Pair it with `call_id` to address the call.
        call_id:
          type: string
          description: Unique identifier of the call.
        control_id:
          type: string
          description: The `control_id` you gave to the `calling.collect` you want to stop.
      required:
        - node_id
