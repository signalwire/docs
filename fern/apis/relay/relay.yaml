          type: string
          description: The call this result is for, echoed from your request. Absent on `calling.dial`, which has no call yet.
        control_id:
          type: string
          description: Your control identifier for the started action, echoed when your request included one.
      required:
        - code
        - message
    Calling.ConnectParams:
      type: object
      properties:
        node_id:
          type: string
          description: Identifier of the node handling the call. Pair it with `call_id` to address the call.
        call_id:
          type: string
          description: Unique identifier of the call.
        ringback:
          type: array
          items:
            $ref: "#/components/schemas/Calling.Ringback"
          description: Audio to play to the existing caller while the new device rings. Plays in order until the device answers.
        tag:
          type: string
          description: Your label for the new call leg. Its `calling.call.*` events carry this `tag`.
        devices:
          type: array
          items:
            type: array
            items:
              $ref: "#/components/schemas/Calling.ConnectDevice"
          description: |-
            Devices to call and connect. Uses the same layout as `calling.dial`: the outer
            array rings groups in sequence, the inner array rings devices in a group at
            once, and the first device to answer is the one that gets connected.
        max_duration:
          type: integer
          format: int32
          description: Maximum length of the connected call, in seconds. The call ends automatically once this is reached.
        timeout:
          type: number
          format: double
          description: Default ring timeout, in seconds, used when a device doesn't set its own.
          exclusiveMinimum: 0
        send_digits:
          type: string
          description: DTMF digits to send once the call is answered. Use `w` or `W` to insert pauses.
        max_price_per_minute:
          type: number
          format: double
          description: Highest price per minute you're willing to pay. Devices that would exceed this rate aren't called.
        status_url:
          type: string
          format: uri
          description: |-
            URL to receive `calling.call.connect` events via POST as the connection
            progresses through the `connecting`, `connected`, `failed`, and `disconnected`
            statuses.
      required:
        - node_id
        - call_id
        - devices
    Calling.Ringback:
      type: object
