      discriminator: type
    Calling.DetectMachine:
      allOf:
        - $ref: "#/components/schemas/Calling.DetectConfig"
        - type: object
          properties:
            type:
              type: string
              const: machine
            params:
              $ref: "#/components/schemas/Calling.DetectMachineParams"
          required:
            - type
    Calling.DetectMachineParams:
      type: object
      properties:
        initial_timeout:
          type: number
          format: double
          description: How long to wait (sec > 0) for initial voice before giving up. Default `4.5`.
          exclusiveMinimum: 0
        end_silence_timeout:
          type: number
          format: double
          description: How long to wait (sec > 0) for voice to finish. Default `1.0`.
          exclusiveMinimum: 0
        machine_ready_timeout:
          type: number
          format: double
          description: |-
            How long to wait (sec > 0) for voice to finish before firing the READY
            event. Default is `end_silence_timeout`.
          exclusiveMinimum: 0
        machine_voice_threshold:
          type: number
          format: double
          description: How much voice (sec > 0) to decide MACHINE. Default `1.25`.
          exclusiveMinimum: 0
        machine_words_threshold:
          type: integer
          format: int32
          description: How many words (count > 0) to count to decide MACHINE. Default `6`.
          exclusiveMinimum: 0
        detect_interruptions:
          type: boolean
          description: |-
            If true, a NOT_READY event is fired if VAD detects speech after READY. This
            lets the application restart message delivery to the answering machine.
            Default `false`.
          default: false
        detect_message_end:
          type: boolean
          description: |-
