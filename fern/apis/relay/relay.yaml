        call_id:
          type: string
          description: The call this result is for, echoed from your request.
          examples:
            - c2a1e9f4-6b3d-4e7a-8f1c-2d3e4f5a6b7c
        control_id:
          type: string
          description: Your control identifier for the started action, echoed from your request.
          examples:
            - d4b2e1a0-7c9f-4a3b-8e2d-1f0a9b8c7d6e
      required:
        - code
    Calling.ReferRequest:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Request id, echoed on the correlated response.
        method:
          type: string
          enum:
            - calling.refer
          description: The JSON-RPC method.
        params:
          description: Method parameters.
          allOf:
            - $ref: "#/components/schemas/Calling.ReferParams"
      required:
        - jsonrpc
        - id
        - method
        - params
      description: A JSON-RPC request frame. `Method` is the method name; `Params` is the method's input.
    Calling.ReferParams:
      type: object
      properties:
        node_id:
          type: string
          description: Opaque identifier that, paired with `call_id`, addresses this call. Echo back the value you received; treat it as opaque.
          examples:
            - a3f1c2d4-5e6f-7a8b-9c0d-1e2f3a4b5c6d
        call_id:
          type: string
          description: Unique identifier of the call.
          examples:
            - c2a1e9f4-6b3d-4e7a-8f1c-2d3e4f5a6b7c
        device:
          description: 'Where to transfer the call. Only SIP destinations are supported (`type: "sip"`).'
          allOf:
            - $ref: "#/components/schemas/Calling.ReferDevice"
        status_url:
          type: string
          format: uri
          description: HTTPS URL where SignalWire POSTs the outcome of the transfer.
          examples:
            - https://example.com/webhooks/relay
      required:
        - node_id
        - call_id
        - device
    Calling.ReferDevice:
      type: object
      properties:
        type:
          type: string
          enum:
            - sip
          description: The transfer destination type. Only `sip` is supported.
      required:
        - type
      description: Where to transfer the call. Set `type` to `sip` and supply the SIP destination in `params`.
      discriminator: type
    Calling.ReferSipDevice:
      allOf:
        - $ref: "#/components/schemas/Calling.ReferDevice"
        - type: object
          properties:
            type:
              type: string
              const: sip
            params:
              description: The SIP destination and any auth/headers for the transfer.
              allOf:
                - $ref: "#/components/schemas/Calling.ReferSipDeviceParams"
          required:
            - type
            - params
          description: A SIP transfer destination.
    Calling.ReferSipDeviceParams:
      type: object
      properties:
        to:
          type: string
          description: SIP URI to transfer the call to. Must be a `sip:` or `sips:` URI, for example `sip:userb@example.com`.
          examples:
            - sip:userb@example.com
        from:
          type: string
          description: SIP URI for the referral From address; must begin with `sip:` or `sips:`.
          examples:
            - sip:alice@example.com
        username:
          type: string
          description: Username for authenticating against the destination SIP endpoint, if it requires credentials.
          examples:
            - foo
        password:
          type: string
          description: Password for authenticating against the destination SIP endpoint, if it requires credentials.
          examples:
            - bar
        headers:
          type: array
          items:
            $ref: "#/components/schemas/Calling.SipHeader"
          description: Custom SIP headers to add to the REFER.
      required:
        - to
      description: Where to send a SIP call when transferring it with `calling.refer`.
    Calling.ReferReply:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: The id of the request this responds to.
        result:
          description: The method result.
          allOf:
            - $ref: "#/components/schemas/Calling.ReferResult"
      required:
        - jsonrpc
        - id
        - result
      description: A JSON-RPC response frame correlated to a request by `id`. `Result` is the method result.
    Calling.ReferResult:
      type: object
      properties:
        code:
          type: string
          description: Result code as a string, e.g. `"200"` (success), `"400"`, `"404"`.
          examples:
            - "200"
        message:
          type: string
          description: Human-readable description of the result. On failure, it explains what went wrong. Always check `code`; `message` may be omitted when there is nothing extra to report.
          examples:
            - Starting SIP REFER
        data:
          type: array
          items: {}
          description: Present on partial failures. Contains the array of per-device `user_errors` explaining which devices failed and why.
      required:
        - code
      description: Result of `calling.refer`.
    Calling.CallReferEvent:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Event id.
        method:
          type: string
          enum:
            - signalwire.event
          description: Always `signalwire.event`.
        params:
          type: object
          properties:
            event_type:
              type: string
              enum:
                - calling.call.refer
              description: The event type — identifies which event this is.
            event_channel:
              type: string
              description: The channel the event was delivered on.
              examples:
                - calling
            timestamp:
              type: number
              format: double
              description: When the event was emitted, as a Unix timestamp in seconds.
              examples:
                - 1712345678.842
            project_id:
              type: string
              description: Your project ID.
              examples:
                - b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e
            space_id:
              type: string
              description: Your space ID.
              examples:
                - c3d4e5f6-a7b8-9c0d-1e2f-3a4b5c6d7e8f
            params:
              description: The event-specific payload.
              allOf:
                - $ref: "#/components/schemas/Calling.CallReferParams"
          required:
            - event_type
            - params
          description: The event envelope.
      required:
        - jsonrpc
        - id
        - method
        - params
      description: Fires each time a transferred call (SIP REFER) changes state, so you can follow the handoff from start to success or failure.
    Calling.CallReferParams:
      type: object
      properties:
        node_id:
          type: string
          description: Opaque identifier that, paired with `call_id`, addresses this call. Echo back the value you received; treat it as opaque.
          examples:
            - a3f1c2d4-5e6f-7a8b-9c0d-1e2f3a4b5c6d
        call_id:
          type: string
          description: Unique identifier of the call.
          examples:
            - c2a1e9f4-6b3d-4e7a-8f1c-2d3e4f5a6b7c
        segment_id:
          type: string
          description: Identifier of the call segment this event belongs to, for correlating events within the same segment of a call.
          examples:
            - e5c3f2b1-8d0a-4b4c-9f3e-2a1b0c9d8e7f
        tag:
          type: string
          description: The `tag` you set when placing the call, echoed back so you can match the event to your request.
          examples:
            - my-tag-1
        state:
          description: Where the transfer currently stands.
          examples:
            - success
          allOf:
            - $ref: "#/components/schemas/Calling.ReferState"
        sip_refer_to:
          type: string
          description: The SIP URI (the SIP address of the endpoint, e.g. `sip:bob@example.com`) the call is being transferred to. Always present on the event.
          examples:
            - sip:bob@example.com
        sip_refer_response_code:
          type: string
          description: The SIP response code the far end returned to the REFER request, as a string (for example `"202"`).
          examples:
            - "202"
        sip_notify_response_code:
          type: string
          description: |-
            The SIP response code from the NOTIFY messages (the follow-up SIP status
            messages that report the transfer's final outcome) that follow the REFER, as a
            string (for example `"200"`). This tells you whether the transfer ultimately
            succeeded.
          examples:
            - "200"
      required:
        - node_id
        - call_id
        - state
        - sip_refer_to
    Calling.ReferState:
      type: string
      enum:
        - inProgress
        - cancel
        - busy
        - noAnswer
        - error
        - success
    Calling.PassRequest:
      type: object
      properties:
        jsonrpc:
          type: string
