    Calling.CollectRequest:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Request id, echoed on the correlated response.
        method:
          type: string
          enum:
            - calling.collect
          description: The JSON-RPC method.
        params:
          description: Method parameters.
          allOf:
            - $ref: "#/components/schemas/Calling.CollectParams"
      required:
        - jsonrpc
        - id
        - method
        - params
      description: A JSON-RPC request frame. `Method` is the method name; `Params` is the method's input.
    Calling.CollectParams:
      type: object
      properties:
        node_id:
          type: string
          description: Opaque identifier that, paired with `call_id`, addresses this call. Echo back the value you received; treat it as opaque.
          examples:
            - a3f1c2d4-5e6f-7a8b-9c0d-1e2f3a4b5c6d
        call_id:
          type: string
          description: Unique identifier of the call.
          examples:
            - c2a1e9f4-6b3d-4e7a-8f1c-2d3e4f5a6b7c
        control_id:
          type: string
          description: Your own identifier for this collect. It is attached to every event the collect produces so you can match events back to this request.
          examples:
            - d4b2e1a0-7c9f-4a3b-8e2d-1f0a9b8c7d6e
        initial_timeout:
          type: number
          format: double
          description: |-
            How long to wait, in seconds, for the caller to start giving input. This
            timer only runs once it has been started — either at the outset when
            `start_input_timers` is `true`, or later via `calling.collect.start_input_timers`.
            Defaults to `4.0`.
          exclusiveMinimum: 0
          default: 4
          examples:
            - 5
        digits:
          description: How to collect DTMF key presses. Provide this, `speech`, or both; at least one is required.
          allOf:
            - $ref: "#/components/schemas/Calling.CollectDigits"
        speech:
          description: How to collect spoken input. Provide this, `digits`, or both; at least one is required.
          allOf:
            - $ref: "#/components/schemas/Calling.CollectSpeech"
        partial_results:
          type: boolean
          description: When `true`, emit partial-result events as input comes in rather than only a final result. Defaults to `false`.
          default: false
          examples:
            - false
        continuous:
          type: boolean
          description: |-
            When `true`, keep listening for speech and digits until you stop the collect
            yourself, instead of finishing after the first complete input. Defaults to `false`.
          default: false
          examples:
            - false
        send_start_of_input:
          type: boolean
          description: When `true`, fire a `start_of_input` event the moment the caller begins giving input. Defaults to `false`.
          default: false
          examples:
            - true
        start_input_timers:
          type: boolean
          description: When `true`, start the `initial_timeout` timer immediately. Set `false` to start it later with `calling.collect.start_input_timers`. Defaults to `false`.
          default: false
          examples:
            - false
        status_url:
          type: string
          format: uri
          description: HTTP or HTTPS URL that collect events are also POSTed to as they occur.
      required:
        - node_id
        - call_id
        - control_id
    Calling.CollectDigits:
      type: object
      properties:
        max:
          type: integer
          format: int32
          description: Maximum number of digits to collect before collection finishes. Must be a positive integer.
          minimum: 1
          examples:
            - 4
        terminators:
          type: string
          description: Keys that end collection early when pressed, such as `"#*"`. Not set by default.
          examples:
            - "#*"
        digit_timeout:
          type: number
          format: double
          description: |-
            How long to wait, in seconds, for the next key press after one is received
            before giving up. Defaults to `5.0`.
          exclusiveMinimum: 0
          default: 5
          examples:
            - 1
      required:
        - max
      description: Settings that control how the caller's DTMF (touch-tone) key presses are collected.
    Calling.CollectSpeech:
      type: object
      properties:
        end_silence_timeout:
          type: number
          format: double
          description: |-
            How much silence, in seconds, to wait for before treating the caller as
            finished speaking. Defaults to `1`.
          exclusiveMinimum: 0
          default: 1
          examples:
            - 1
        speech_timeout:
          type: number
          format: double
          description: Maximum time, in seconds, to spend collecting speech. Defaults to `60`.
          exclusiveMinimum: 0
          default: 60
          examples:
            - 5
        language:
          type: string
          description: Language to recognize, as a BCP-47 tag such as `en-US`. Defaults to `en-US`.
          default: en-US
          examples:
            - en-US
        hints:
          type: array
          items:
            type: string
          description: Words or phrases you expect to hear, used to bias recognition toward them. Not set by default.
          examples:
            - - sales
              - support
              - representative
        engine:
          description: (DEPRECATED — use `model` instead.) Pins recognition to a specific engine. Defaults to unset, which lets SignalWire choose.
          examples:
            - Google
          deprecated: true
          allOf:
            - $ref: "#/components/schemas/Calling.CollectSpeechEngine"
        model:
          type: string
          description: |-
            Recognition model to use. One of `default`, `enhanced`, `enhanced.phone_call`,
            or `enhanced.video`. Not set by default.
          examples:
            - enhanced.phone_call
      description: Settings that control how the caller's speech is recognized and collected.
    Calling.CollectSpeechEngine:
      type: string
      enum:
        - Deepgram
        - Google
        - Google.V2
    Calling.CollectReply:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: The id of the request this responds to.
        result:
          description: The method result.
