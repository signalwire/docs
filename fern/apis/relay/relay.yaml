        - jsonrpc
        - id
        - method
        - params
      description: Fires as a pay session progresses and once more when it completes — reporting the field being collected, any errors, and the final masked payment details.
    Calling.CallPayParams:
      type: object
      properties:
        node_id:
          type: string
          description: Opaque identifier that, paired with `call_id`, addresses this call. Echo back the value you received; treat it as opaque.
          examples:
            - a3f1c2d4-5e6f-7a8b-9c0d-1e2f3a4b5c6d
        call_id:
          type: string
          description: Unique identifier of the call.
          examples:
            - c2a1e9f4-6b3d-4e7a-8f1c-2d3e4f5a6b7c
        control_id:
          type: string
          description: The `control_id` of the pay session this event belongs to.
          examples:
            - d4b2e1a0-7c9f-4a3b-8e2d-1f0a9b8c7d6e
        status_url:
          type: string
          format: uri
          description: The `status_url` you set on the request, echoed back.
          examples:
            - https://example.com/webhooks/relay
        status_url_method:
          type: string
          description: Constant "POST"; present when status_url is set.
          examples:
            - POST
        for:
          description: "Progress: the field currently being collected, or a lifecycle marker (`payment-processing`, `payment-completed`, `payment-failed`, `payment-canceled`)."
          examples:
            - payment-card-number
          allOf:
            - $ref: "#/components/schemas/Calling.PayPromptFor"
        error_type:
          description: "Progress: why the most recent collection attempt failed, if it did."
          examples:
            - invalid-card-number
          allOf:
            - $ref: "#/components/schemas/Calling.PayErrorType"
        attempt:
          type: string
          description: "Progress: the current attempt number, as a string."
          examples:
            - "1"
        security_code:
          type: string
          description: "Progress: masked security code collected so far."
          examples:
            - xxx
        expiration_date:
          type: string
          description: "Progress: card expiration date collected so far."
          examples:
            - 12/2028
        result:
          description: "Final: the outcome of the pay session."
          examples:
            - success
          allOf:
            - $ref: "#/components/schemas/Calling.PayOutcome"
        payment_token:
          description: "Final: token type issued for the payment."
          examples:
            - one-time
          allOf:
            - $ref: "#/components/schemas/Calling.PayTokenType"
        payment_confirmation_code:
          type: string
          description: "Final: the payment connector's confirmation / charge identifier."
          examples:
            - ch_3Nk9c2Ij8xLm4Qp0
        payment_error:
          description: "Final: why the payment failed, if it did."
          examples:
            - card-declined
          allOf:
            - $ref: "#/components/schemas/Calling.PayErrorType"
        payment_error_code:
          type: string
          description: "Final: additional error code for the failure, if any."
          examples:
            - card_declined
        payment_connector_error_code:
          type: string
          description: "Final: the payment connector's own error code, if any."
          examples:
            - card_declined
        payment_connector_error_message:
          type: string
          description: "Final: the payment connector's own error message, if any."
          examples:
            - Your card was declined.
        payment_card_security_code:
          type: string
          description: "Final: masked security code."
          examples:
            - xxx
        payment_card_expiration_date:
          type: string
          description: "Final: card expiration date."
          examples:
            - 12/2028
        payment_method:
          description: Payment method being collected.
          examples:
            - credit-card
          allOf:
            - $ref: "#/components/schemas/Calling.PayMethod"
        payment_card_number:
          type: string
          description: Masked card number (only the last digits are shown).
          examples:
            - xxxxxxxxxxxx4242
        payment_card_type:
          description: Detected card brand.
