    Calling.ConferenceEvent:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Event id.
        method:
          type: string
          enum:
            - signalwire.event
          description: Always `signalwire.event`.
        params:
          type: object
          properties:
            event_type:
              type: string
              enum:
                - calling.conference
              description: The event type — identifies which event this is.
            event_channel:
              type: string
              description: The channel the event was delivered on.
              examples:
                - calling
            timestamp:
              type: number
              format: double
              description: When the event was emitted, as a Unix timestamp in seconds.
              examples:
                - 1712345678.842
            project_id:
              type: string
              description: Your project ID.
              examples:
                - b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e
            space_id:
              type: string
              description: Your space ID.
              examples:
                - c3d4e5f6-a7b8-9c0d-1e2f-3a4b5c6d7e8f
            params:
              description: The event-specific payload.
              allOf:
                - $ref: "#/components/schemas/Calling.ConferenceParams"
          required:
            - event_type
            - params
          description: The event envelope.
      required:
        - jsonrpc
        - id
        - method
        - params
      description: "Fires throughout a conference's life: when it starts and ends, and each time a participant joins, leaves, mutes, holds, speaks, or an announcement plays. Check `status` to see what happened."
    Calling.ConferenceParams:
      type: object
      properties:
        node_id:
          type: string
          description: Opaque identifier that, paired with `call_id`, addresses this call. Present on participant and stream events; absent on `conference-start`/`conference-end`. Treat it as opaque and echo back the value you received.
          examples:
            - a3f1c2d4-5e6f-7a8b-9c0d-1e2f3a4b5c6d
        conference_id:
          type: string
          description: The UUID of the conference.
          examples:
            - d02c88a9-cf83-4a5a-9c8b-2f4e6b1a0f77
        name:
          type: string
          description: The name of the conference — or, on stream events, the name of the stream.
          examples:
            - my_conference
        region:
          type: string
          description: The region the conference is running in (`global`, `us`, `eu`, or `ch`).
          examples:
            - eu
        size:
          type: integer
          format: int32
          description: The number of members currently in the conference.
          examples:
            - 3
        status:
          description: What happened in the conference.
          examples:
            - participant-join
          allOf:
            - $ref: "#/components/schemas/Calling.ConferenceStatus"
        status_detail:
          type: string
          description: Extra detail about the change. Present only when `status` is `participant-modify`.
          examples:
            - muted
        call_id:
          type: string
          description: The `call_id` of the participant this event is about. Present on participant events.
          examples:
            - c2a1e9f4-6b3d-4e7a-8f1c-2d3e4f5a6b7c
        muted:
          type: boolean
          description: Whether the participant is muted. Present on participant events.
          examples:
            - false
        hold:
          type: boolean
          description: Whether the participant is on hold. Present on participant events.
          examples:
            - false
        coaching:
          type: boolean
          description: Whether the participant is coaching another participant. Present on participant events.
          examples:
            - false
        call_id_to_coach:
          type: string
          description: The `call_id` of the participant being coached. Present on coaching participant events.
          examples:
            - c2a1e9f4-6b3d-4e7a-8f1c-2d3e4f5a6b7c
        end_on_leave:
          type: boolean
          description: Whether the conference ends when this participant leaves. Present on participant events.
          examples:
            - false
        start_on_join:
          type: boolean
          description: Whether the conference starts when this participant joins. Present on participant events.
          examples:
            - true
        call_id_ending_conf:
          type: string
          description: The `call_id` of the participant whose departure ended the conference. Present on `conference-end`.
          examples:
            - c2a1e9f4-6b3d-4e7a-8f1c-2d3e4f5a6b7c
        reason_ended:
          description: Why the conference ended. Present on `conference-end`.
          examples:
            - last-participant-left
          allOf:
            - $ref: "#/components/schemas/Calling.ConferenceReasonEnded"
        recording_url:
          type: string
          format: uri
          description: Link to the conference recording. Present on `conference-end`.
          examples:
            - https://example.com/recordings/conf.mp3
        recording_duration:
          type: integer
          format: int32
          description: Recording duration in seconds. Present on `conference-end`.
          examples:
            - 42
        recording_file_size:
          type: integer
          format: int32
          description: Recording file size in bytes. Present on `conference-end`.
          examples:
            - 524288
        announce_url:
          type: string
          format: uri
          description: The URL of the announcement being played. Present on announcement events.
          examples:
            - https://example.com/announce.mp3
      required:
        - conference_id
        - status
      description: |-
        The details of a conference event. Read `status` first: it tells you what
        happened and therefore which of the optional fields below are filled in.
