    Calling.PayParams:
      type: object
      properties:
        node_id:
          type: string
          description: Node the call is on.
        call_id:
          type: string
          description: The call id.
        control_id:
          type: string
          description: Identifier used to control this active pay (e.g. `calling.pay.stop`).
        input:
          description: How payment details are collected. Default `dtmf`. (Only `dtmf` supported.)
          default: dtmf
          allOf:
            - $ref: "#/components/schemas/Calling.PayInput"
        status_url:
          type: string
          format: uri
          description: URL to request on each status change during the payment process.
        payment_method:
          description: Payment method to use. Default `credit-card`. (Only `credit-card` supported.)
          default: credit-card
          allOf:
            - $ref: "#/components/schemas/Calling.PayMethod"
        bank_account_type:
          description: Bank account type, for bank-debit payment flows. Default `consumer-checking`.
          default: consumer-checking
          allOf:
            - $ref: "#/components/schemas/Calling.PayBankAccountType"
        timeout:
          type: string
          description: |-
            Seconds the Pay IVR waits for the next digit before validating the captured
            digits, as a string of digits on the wire (e.g. `"6"`). Default `"5"`.
          pattern: ^[0-9]+$
          default: "5"
        max_attempts:
          type: string
          description: |-
            Number of times the Pay IVR retries when collecting card details, as a string
            of digits on the wire (e.g. `"3"`). Default `"1"`.
          pattern: ^[0-9]+$
          default: "1"
        security_code:
          type: string
          description: |-
            Whether to prompt for the card security code, as a string boolean on the wire
            (`"true"` or `"false"`). Default `"true"`.
          default: "true"
        postal_code:
          type: string
          description: |-
            Whether to prompt for the billing postal code, as a string on the wire
            (`"true"`, `"false"`, or a known postcode so the IVR skips the prompt).
            Default `"true"`.
          default: "true"
        min_postal_code_length:
          type: string
          description: |-
            Minimum number of digits a caller must enter for the postal code, as a string
            of digits on the wire (e.g. `"6"`). Default `"0"`.
          pattern: ^[0-9]+$
          default: "0"
        payment_connector_url:
          type: string
          format: uri
          description: URL to POST collected payment details to upon completion.
        token_type:
          description: Whether the payment token is one-off or reusable. Default `reusable`.
          default: reusable
          allOf:
            - $ref: "#/components/schemas/Calling.PayTokenType"
        charge_amount:
          type: string
          description: |-
            Amount to charge against the payment method. Decimal value with no currency
            prefix, passed as a string (e.g. `"15.00"`). Default `"0.00"`.
          default: "0.00"
        currency:
          type: string
          description: Currency of the charge amount. Default `usd`.
          default: usd
        language:
          type: string
          description: Language for prompts played to the caller. Default `en-US`.
          default: en-US
        voice:
          type: string
          description: |-
            Text-to-speech voice for prompts (free-form; passed through to TTS, e.g.
            `woman`, `man`, `polly.Sally`). Default `woman`.
          default: woman
        description:
          type: string
          description: Custom description of the payment.
        valid_card_types:
          type: string
          description: |-
            SPACE-DELIMITED list of card types allowed in this payment (not an array) —
            subset of `visa mastercard amex maestro discover jcb diners-club`. Default
            `"visa mastercard amex"`.
          default: visa mastercard amex
        parameters:
          type: array
          items:
            $ref: "#/components/schemas/Calling.PayParameter"
          description: Additional name/value pairs to POST to the payment connector.
        prompts:
          type: array
          items:
            $ref: "#/components/schemas/Calling.PayPrompt"
          description: Custom prompts that override the IVR defaults.
      required:
        - node_id
        - call_id
        - control_id
        - payment_connector_url
    Calling.PayInput:
      type: string
      enum:
        - dtmf
        - voice
    Calling.PayMethod:
      type: string
      enum:
        - credit-card
    Calling.PayBankAccountType:
      type: string
      enum:
        - consumer-checking
        - consumer-savings
        - commercial-checking
    Calling.PayTokenType:
      type: string
      enum:
        - one-time
        - reusable
    Calling.PayParameter:
      type: object
      properties:
        name:
          type: string
          description: Parameter name.
        value:
          type: string
          description: Parameter value.
      required:
        - name
        - value
      description: A name/value pair POSTed to the payment connector alongside payment details.
    Calling.PayPrompt:
      type: object
      properties:
        for:
          description: The situation this prompt applies to.
          allOf:
            - $ref: "#/components/schemas/Calling.PayPromptFor"
        card_type:
          type: string
          description: |-
            Space-delimited card-type tokens this prompt applies to (subset of
            `visa mastercard amex maestro discover jcb diners-club`). Applies to all
            card types if unset.
        attempt:
          type: string
          description: |-
            Which collection attempt(s) this prompt applies to, as a space-delimited list
            of attempt numbers (e.g. `"1 2"`). Applies to all attempts if unset.
        require_matching_inputs:
          type: string
          description: |-
            Whether the caller must enter the same value twice for it to be accepted,
            as a string boolean (e.g. `"true"`). Applies to confirmation-style prompts.
        error_type:
          type: string
          description: |-
            Space-delimited error-type tokens this prompt applies to. Documented tokens:
            timeout, invalid-card-number, invalid-card-type, invalid-date,
            invalid-security-code, invalid-postal-code, session-in-progress,
            card-declined. (The gateway parser additionally recognizes
            invalid-bank-routing-number, invalid-bank-account-number, and
            input-matching-failed.)
        actions:
          type: array
          items:
            $ref: "#/components/schemas/Calling.PayPromptAction"
          description: Actions to execute for this prompt.
      required:
        - for
      description: |-
        A custom prompt overriding the Pay IVR default for a given situation.

        `card_type` and `error_type` are SPACE-DELIMITED token strings on the wire (not
        arrays) — e.g. `error_type: "timeout invalid-card-number invalid-card-type"`.
    Calling.PayPromptFor:
      type: string
      enum:
        - payment-card-number
        - expiration-date
        - security-code
        - postal-code
        - bank-routing-number
        - bank-account-number
        - payment-processing
        - payment-completed
        - payment-failed
        - payment-canceled
    Calling.PayPromptAction:
      type: object
      properties:
        type:
          description: "`Say` for text-to-speech, `Play` for playing an audio file."
          allOf:
            - $ref: "#/components/schemas/Calling.PayPromptActionType"
        phrase:
          type: string
          description: Sentence to speak (for `Say`) or audio URL to play (for `Play`).
      required:
        - type
        - phrase
      description: A single action (Say/Play) executed when a custom prompt is reached.
    Calling.PayPromptActionType:
      type: string
      enum:
        - Say
        - Play
    CallingPayRequest:
