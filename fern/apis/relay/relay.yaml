    Calling.FaxDirection:
      type: string
      enum:
        - send
        - receive
    Calling.FaxFinished:
      allOf:
        - $ref: "#/components/schemas/Calling.CallFax"
        - type: object
          properties:
            type:
              type: string
              const: finished
            params:
              type: object
              properties:
                direction:
                  description: Whether the fax was sent or received.
                  examples:
                    - send
                  allOf:
                    - $ref: "#/components/schemas/Calling.FaxDirection"
                identity:
                  type: string
                  description: Your side's fax identity, typically an E.164 phone number.
                  examples:
                    - "+15551230001"
                remote_identity:
                  type: string
                  description: The other party's fax identity, typically an E.164 phone number.
                  examples:
                    - "+15551230002"
                document:
                  type: string
                  format: uri
                  description: Link to the transmitted fax document.
                  examples:
                    - https://example.com/my_doc_to_fax.pdf
                format:
                  type: string
                  description: Document format, for example `tif` or `pdf`.
                pages:
                  type: integer
                  format: int32
                  description: Total number of pages sent or received.
                  examples:
                    - 1
                success:
                  type: boolean
                  description: "`true` if the fax completed successfully, `false` if it failed."
                  examples:
                    - true
                result:
                  type: integer
                  format: int32
                  description: Numeric fax result code. `0` means the fax succeeded; a non-zero code indicates why it failed. For example, `0`.
                  examples:
                    - 0
                result_text:
                  type: string
                  description: Human-readable explanation of the fax result.
                  examples:
                    - OK
              required:
                - direction
          required:
            - type
            - params
          description: Fires once the whole fax is done, with the final result and a link to the document.
