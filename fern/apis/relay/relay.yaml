          description: A unique name for the function. This can be any user-defined string or can reference a reserved function. Reserved functions are SignalWire functions that will be executed at certain points in the conversation. For the stop_hook function, the function name is 'stop_hook'.
      required:
        - description
        - function
      description: The template for picking properties.
    PickProperties<SWML.Calling.SummarizeConversationSWAIGFunction, SWML.Calling.PickedSWAIGFunctionProps>:
      type: object
      properties:
        description:
          type: string
          description: A description of the context and purpose of the function, to explain to the agent when to use it.
          examples:
            - Get the weather information
        parameters:
          description: A JSON object that defines the expected user input parameters and their validation rules for the function.
          allOf:
            - $ref: "#/components/schemas/SWML.Calling.FunctionParameters"
        active:
          type: boolean
          description: Whether the function is active. **Default:** `true`.
          default: true
          examples:
            - true
        meta_data:
          type: object
          properties: {}
          description: |-
            A powerful and flexible environmental variable which can accept arbitrary data that is set initially in the SWML script or from the SWML set_meta_data action.
            This data can be referenced locally to the function.
            All contained information can be accessed and expanded within the prompt - for example, by using a template string.
            Default is not set.
          examples:
            - api_key: key_123
              endpoint: https://api.example.com
        meta_data_token:
          type: string
          description: Scoping token for meta_data. If not supplied, metadata will be scoped to function's `web_hook_url`. Default is set by SignalWire.
          examples:
            - my-function-scope
        data_map:
          description: |-
            An object that processes function inputs and executes operations through expressions, webhooks, or direct output.
            Properties are evaluated in strict priority order:
            1. expressions
            2. webhooks
            3. output

            Evaluation stops at the first property that returns a valid output result, similar to a return statement in a function.
            Any subsequent properties are ignored when a valid output is returned.
            If a valid output is not returned from any of the properties, a generic error message is returned.
          allOf:
            - $ref: "#/components/schemas/SWML.Calling.DataMap"
        web_hook_url:
          type: string
          description: Function-specific URL to send status callbacks and reports to. Takes precedence over a default setting. Authentication can also be set in the url in the format of `username:password@url.`
          examples:
            - username:password:https://statuscallback.com
        function:
          type: string
          enum:
            - summarize_conversation
          description: A unique name for the function. This can be any user-defined string or can reference a reserved function. Reserved functions are SignalWire functions that will be executed at certain points in the conversation.. For the summarize_conversation function, the function name is 'summarize_conversation'.
      required:
        - description
        - function
      description: The template for picking properties.
    SWML.Calling.BedrockSWAIGFunction:
      oneOf:
        - $ref: "#/components/schemas/PickProperties<SWML.Calling.UserSWAIGFunction, SWML.Calling.PickedSWAIGFunctionProps>"
        - $ref: "#/components/schemas/PickProperties<SWML.Calling.StartUpHookSWAIGFunction, SWML.Calling.PickedSWAIGFunctionProps>"
        - $ref: "#/components/schemas/PickProperties<SWML.Calling.HangUpHookSWAIGFunction, SWML.Calling.PickedSWAIGFunctionProps>"
        - $ref: "#/components/schemas/PickProperties<SWML.Calling.SummarizeConversationSWAIGFunction, SWML.Calling.PickedSWAIGFunctionProps>"
    SWML.Calling.Cond:
      type: object
      properties:
        cond:
          type: array
          items:
            $ref: "#/components/schemas/SWML.Calling.CondParams"
          description: Execute a sequence of instructions depending on the value of a JavaScript condition.
      required:
        - cond
    SWML.Calling.CondReg:
      type: object
      properties:
        when:
          type: string
          description: The JavaScript condition to act on.
          examples:
            - vars.digit == '1'
        then:
          type: array
          items:
            $ref: "#/components/schemas/SWML.Calling.SWMLMethod"
          description: Sequence of SWML methods to execute when the condition evaluates to true.
        else:
          type: array
          items:
            $ref: "#/components/schemas/SWML.Calling.SWMLMethod"
          description: Sequence of SWML methods to execute when none of the other conditions evaluate to true.
      required:
        - when
        - then
    SWML.Calling.Connect:
      type: object
      properties:
        connect:
          oneOf:
            - $ref: "#/components/schemas/SWML.Calling.ConnectDeviceSingle"
            - $ref: "#/components/schemas/SWML.Calling.ConnectDeviceSerial"
            - $ref: "#/components/schemas/SWML.Calling.ConnectDeviceParallel"
            - $ref: "#/components/schemas/SWML.Calling.ConnectDeviceSerialParallel"
          description: Connect to a phone number, SIP URI, Call Fabric resource, queue, or WebSocket stream.
      required:
        - connect
    SWML.Calling.ConnectDeviceSingle:
      type: object
      properties:
        from:
          type: string
          description: The caller ID to use when dialing the number.
          examples:
            - "+15551234567"
        from_name:
          type: string
          description: |-
            The caller ID name shown to the person you're calling, displayed alongside the `from` number
            (sometimes called CNAM).
            Applies to SIP calls only — it has no effect on calls to phone numbers.
            When set at the top level, every destination in a `serial`, `parallel`, or `serial_parallel`
            group uses this name, unless that destination sets its own `from_name`.
          examples:
            - Support Team
        headers:
          type: array
          items:
            $ref: "#/components/schemas/SWML.Calling.ConnectHeaders"
          description: Custom SIP headers to add to INVITE. It Has no effect on calls to phone numbers.
        codecs:
          type: string
          description: |-
            Comma-separated string of codecs to offer.
            It has no effect on calls to phone numbers.
            Based on SignalWire settings.
          examples:
            - PCMU,PCMA,OPUS
        webrtc_media:
          type: boolean
          description: |-
            If true, WebRTC media is offered to the SIP endpoint.
            It has no effect on calls to phone numbers.
            Default is `false`.
          default: false
          examples:
            - true
        session_timeout:
          type: integer
          description: |-
            Time, in seconds, to set the SIP `Session-Expires` header in INVITE.
            Must be a positive, non-zero number.
            It has no effect on calls to phone numbers.
            Based on SignalWire settings.
          minimum: 1
          default: 0
          examples:
            - 1800
        ringback:
          type: array
          items:
            type: string
          description: Array of URIs to play as ringback tone. If not specified, plays audio from the provider.
          examples:
            - - https://example.com/ringback.mp3
        result:
          oneOf:
            - $ref: "#/components/schemas/SWML.Calling.ConnectSwitch"
            - {}
          description: |-
            Action to take based on the result of the call. This will run once the peer leg of the call has ended.
            Will use the switch method when the return_value is an object, and will use the cond method when the return_value is an array.
        timeout:
          type: integer
          description: |-
            Time, in seconds, to wait for the call to be answered.
            Default is 60 seconds.
          default: 60
          examples:
            - 30
        max_duration:
          type: integer
          description: |-
            Maximum duration, in seconds, allowed for the call.
            Default is `14400` seconds.
          default: 14400
          examples:
            - 3600
        answer_on_bridge:
          type: boolean
          description: |-
            Delay answer until the B-leg answers.
            Default is `false`.
          default: false
          examples:
            - true
        confirm:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: "#/components/schemas/SWML.Calling.ValidConfirmMethods"
          description: |-
            Confirmation to execute when the call is connected. Can be either:
            - A URL (string) that returns a SWML document
            - An array of SWML methods to execute inline
          examples:
            - https://example.com/confirm.swml
        confirm_timeout:
          type: integer
          description: The amount of time, in seconds, to wait for the `confirm` URL to return a response
          examples:
            - 30
        username:
          type: string
          description: SIP username to use for authentication when dialing a SIP URI. Has no effect on calls to phone numbers.
          examples:
            - sipuser
        password:
          type: string
          description: SIP password to use for authentication when dialing a SIP URI. Has no effect on calls to phone numbers.
          examples:
            - sippassword
        encryption:
          type: string
          enum:
            - mandatory
            - optional
            - forbidden
          description: Encryption setting to use. **Possible values:** `mandatory`, `optional`, `forbidden`
          default: optional
          examples:
            - optional
        call_state_url:
          type: string
          format: uri
          description: Webhook URL to send call status change notifications to. Authentication can also be set in the URL in the format of `username:password@url`.
          examples:
            - https://example.com/call-status
        transfer_after_bridge:
          type: string
          description: |-
            SWML to execute after the bridge completes. This defines what should happen after the call is connected and the bridge ends.
            Can be either:
            - A URL (http or https) that returns a SWML document
            - An inline SWML document (as a JSON string)

            **Note:** This parameter is REQUIRED when connecting to a queue (when `to` starts with "queue:")
          examples:
            - https://example.com/after-bridge.swml
        call_state_events:
          type: array
          items:
            type: string
            enum:
              - created
              - ringing
              - answered
              - ended
          description: |-
            An array of call state event names to be notified about.
            Allowed event names are:
                - `created`
                - `ringing`
                - `answered`
                - `ended`
          default:
            - ended
        status_url:
          type: string
          format: uri
          description: |-
            HTTP or HTTPS URL to deliver connect status events.
            These events report the overall status of the connect operation
            (connecting, connected, failed, disconnected) via a `calling.call.connect` event.
          examples:
            - https://example.com/connect-status
        to:
          type: string
          description: |-
            Destination to dial. Can be:
            - Phone number in E.164 format (e.g., "+15552345678")
            - SIP URI (e.g., "sip:alice@example.com")
            - Call Fabric Resource address (e.g., "/public/test_room")
            - Queue (e.g., "queue:support")
            - WebSocket stream (e.g., "stream:wss://example.com/audio")
          examples:
            - "+15559876543"
        name:
          type: string
          description: Stream name identifier. Only applies to stream destinations.
          examples:
            - my-stream
        codec:
          type: string
          description: |-
            Audio codec for the stream. Supported values: `PCMU`, `PCMA`, `G722`, `L16`.
            Codec can include rate and ptime modifiers (e.g., `PCMU@40i`, `L16@24000h@40i`).
            Only applies to stream destinations.
          examples:
            - PCMU
        realtime:
          type: boolean
          description: |-
            Enable realtime mode for bidirectional audio.
            Only applies to stream destinations.
          default: false
          examples:
            - true
        status_url_method:
          type: string
          enum:
            - GET
            - POST
          description: |-
            HTTP method for the stream status webhook.
            Only applies to stream destinations.
          default: POST
          examples:
            - POST
        authorization_bearer_token:
          type: string
          description: Bearer token sent as an `Authorization` header during the WebSocket handshake. Only applies to stream destinations.
          examples:
            - my-secret-token
        custom_parameters:
          type: object
          additionalProperties:
            type: string
          description: Custom key-value pairs sent in the WebSocket start message. Only applies to stream destinations.
      required:
        - to
    SWML.Calling.ConnectHeaders:
      type: object
      properties:
        name:
          type: string
          description: The name of the header.
          examples:
            - X-Custom-Header
        value:
          type: string
          description: The value of the header.
          examples:
            - custom-value
      required:
        - name
        - value
    SWML.Calling.ConnectSwitch:
      type: object
      properties:
        variable:
          type: string
          description: Name of the variable whose value needs to be compared. If not provided, it will check the `connect_result` variable.
          examples:
            - connect_result
        case:
          type: object
          properties: {}
          description: Object of values mapped to array of instructions to execute
        default:
          type: array
          items:
            $ref: "#/components/schemas/SWML.Calling.SWMLMethod"
          description: Array of instructions to execute if no cases match
      required:
        - case
    SWML.Calling.Denoise:
      type: object
      properties:
        denoise:
          type: object
          properties: {}
          description: Start noise reduction. You can stop it at any time using `stop_denoise`.
          examples:
            - {}
      required:
        - denoise
    SWML.Calling.EnterQueue:
      type: object
      properties:
        enter_queue:
          description: |-
            Place the current call in a named queue where it will wait to be connected to an available agent or resource.
            While waiting, callers will hear music or custom audio.
            When an agent connects to the queue (using the connect method), the caller and agent are bridged together.
            After the bridge completes, execution continues with the SWML script specified in transfer_after_bridge.
          allOf:
            - $ref: "#/components/schemas/SWML.Calling.EnterQueueObject"
      required:
        - enter_queue
    SWML.Calling.EnterQueueObject:
      type: object
      properties:
        queue_name:
          type: string
          description: Name of the queue to enter. If a queue with this name does not exist, it will be automatically created.
          examples:
            - support-queue
        transfer_after_bridge:
          type: string
          description: |-
            SWML to execute after the bridge completes. This defines what should happen after the call is connected to an agent and the bridge ends.
            Can be either:
            - A URL (http or https) that returns a SWML document
            - An inline SWML document (as a JSON string)
          examples:
            - https://example.com/post-call-survey
        status_url:
          type: string
          format: uri
          description: HTTP or HTTPS URL to deliver queue status events. Default not set
          examples:
            - https://example.com/queue-status
        wait_url:
          type: string
          format: uri
          description: URL for media to play while waiting in the queue. Default hold music will be played if not set
          examples:
            - https://example.com/queue-music.mp3
        wait_time:
          type: integer
          description: Maximum time in seconds to wait in the queue before timeout. Default `3600`
          minimum: 1
          default: 3600
          examples:
            - 1800
      required:
        - queue_name
        - transfer_after_bridge
    SWML.Calling.Execute:
      type: object
      properties:
        execute:
          type: object
          properties:
            dest:
              type: string
              description: |-
                Specifies what to execute. The value can be one of:
                - `<section_name>` - section in the current document to execute
                - A URL (http or https) that returns a SWML document - Sends HTTP POST
                - An inline SWML document (as a JSON string)
              examples:
                - https://example.com/swml-handler
            params:
              type: object
              properties: {}
              description: Named parameters to send to section or URL
              examples:
                - caller_id: "+15551234567"
                  language: en-US
            meta:
              type: object
              properties: {}
              description: User-defined metadata, ignored by SignalWire
              examples:
                - request_id: req_abc123
                  source: ivr
            on_return:
              type: array
              items:
                $ref: "#/components/schemas/SWML.Calling.SWMLMethod"
              description: The list of SWML instructions to be executed when the executed section or URL returns
            result:
              oneOf:
                - $ref: "#/components/schemas/SWML.Calling.ExecuteSwitch"
                - {}
              description: |-
                Action to take based on the result of the call. This will run once the peer leg of the call has ended.
                Will use the switch method when the return_value is an object, and will use the cond method when the return_value is an array.
          required:
            - dest
          description: |-
            Execute a specified section or URL as a subroutine, and upon completion, return to the current document.
            Use the return statement to pass any return values or objects back to the current document.
      required:
        - execute
    SWML.Calling.Goto:
      type: object
      properties:
        goto:
          type: object
          properties:
            label: {}
            when:
              type: string
              description: A JavaScript condition that determines whether to perform the jump. If the condition evaluates to true, the jump is executed. If omitted, the jump is unconditional.
              examples:
                - vars.retry_count < 3
            max:
              type: integer
              description: The maximum number of times to perform the jump. Must be a number between 1 and 100. Default `100`.
              minimum: 1
              maximum: 100
              default: 100
              examples:
                - 3
          required:
            - label
          description: |-
            Jump to a label within the current section, optionally based on a condition.
            The goto method will only navigate to a label within the same section.
      required:
        - goto
    SWML.Calling.Label:
      type: object
      properties:
        label:
          type: string
          description: Mark any point of the SWML section with a label so that goto can jump to it.
          examples:
            - greeting
      required:
        - label
    SWML.Calling.LiveTranscribe:
      type: object
      properties:
        live_transcribe:
          type: object
          properties:
            action:
              description: The action to perform during live transcription.
              allOf:
                - $ref: "#/components/schemas/SWML.Calling.TranscribeAction"
          required:
            - action
          description: Start live transcription of the call. The transcription will be sent to the specified webhook URL.
      required:
        - live_transcribe
    SWML.Calling.TranscribeStartAction:
      type: object
      properties:
        start:
          type: object
          properties:
            ai_summary:
              type: boolean
              description: Enables AI summarization of the transcription. The summary will be sent to the specified URL at the end of the conversation.
              examples:
                - true
            webhook:
              type: string
              description: The webhook URL the transcription will be sent to.
              examples:
                - https://example.com/transcription-webhook
            lang:
              type: string
              description: The language to transcribe.
              examples:
                - en-US
            live_events:
              type: boolean
              description: Whether to enable live events.
              examples:
                - true
            speech_timeout:
              type: integer
              description: The timeout for speech recognition in milliseconds.
              default: 60000
              examples:
                - 30000
            vad_silence_ms:
              type: integer
              description: "Voice activity detection silence time in milliseconds. Default depends on speech engine: `300` for Deepgram, `500` for Google."
              default: 300
              examples:
                - 500
            vad_thresh:
              type: integer
              description: Voice activity detection threshold (0-1800).
              default: 400
              examples:
                - 400
            debug_level:
              type: integer
              description: Debug level for logging (0-2).
              default: 0
              examples:
                - 0
            direction:
              type: array
              items:
                type: string
                enum:
                  - remote-caller
                  - local-caller
              description: The direction of the call that should be transcribed.
            speech_engine:
              type: string
              enum:
                - deepgram
                - google
              description: The speech engine to use for speech recognition.
              default: deepgram
              examples:
                - google
            ai_summary_prompt:
              type: string
              description: The AI prompt that instructs how to summarize the conversation when `ai_summary` is enabled.
              examples:
                - Summarize the key points of this conversation.
          required:
            - lang
            - direction
          description: Starts live transcription of the call. The transcription will be sent to the specified URL.
      required:
        - start
    SWML.Calling.TranscribeSummarizeAction:
      type: object
      properties:
        summarize:
          type: object
          properties:
            webhook:
              type: string
              description: The webhook URL to be called.
              examples:
                - https://example.com/summary-webhook
            prompt:
              type: string
              description: The prompt for summarization.
              examples:
                - Provide a brief summary of the conversation including main topics discussed.
          description: Summarizes the conversation as an object, allowing you to specify the webhook url and prompt for the summary.
      required:
        - summarize
    SWML.Calling.TranscribeSummarizeActionUnion:
      oneOf:
        - $ref: "#/components/schemas/SWML.Calling.TranscribeSummarizeAction"
        - type: string
          enum:
            - summarize
    SWML.Calling.TranscribeAction:
      oneOf:
        - $ref: "#/components/schemas/SWML.Calling.TranscribeStartAction"
        - type: string
          enum:
            - stop
        - $ref: "#/components/schemas/SWML.Calling.TranscribeSummarizeActionUnion"
    SWML.Calling.LiveTranslate:
      type: object
      properties:
        live_translate:
          type: object
          properties:
            action:
              description: The action to perform during live translation.
              allOf:
                - $ref: "#/components/schemas/SWML.Calling.TranslateAction"
          required:
            - action
          description: Start live translation of the call. The translation will be sent to the specified webhook URL.
      required:
        - live_translate
    SWML.Calling.StartAction:
      type: object
      properties:
        start:
          type: object
          properties:
            webhook:
              type: string
              description: The webhook URL to be called.
              examples:
                - https://example.com/translation-webhook
            from_lang:
              type: string
              description: The language to translate from.
              examples:
                - en-US
            to_lang:
              type: string
              description: The language to translate to.
              examples:
                - es-ES
            from_voice:
              type: string
              description: The TTS voice you want to use for the source language.
              examples:
                - Polly.Joanna
            to_voice:
              type: string
              description: The TTS voice you want to use for the target language.
              examples:
                - Polly.Lucia
            filter_from:
              oneOf:
                - type: string
                  enum:
                    - polite
                    - rude
                    - professional
                    - shakespeare
                    - gen-z
                - type: string
                  pattern: ^prompt:.+$
              description: Translation filter for the source language direction.
            filter_to:
              oneOf:
                - type: string
                  enum:
                    - polite
                    - rude
                    - professional
                    - shakespeare
                    - gen-z
                - type: string
                  pattern: ^prompt:.+$
              description: Translation filter for the target language direction.
            live_events:
              type: boolean
              description: Whether to enable live events.
              examples:
                - true
            ai_summary:
              type: boolean
              description: Whether to enable AI summarization.
              examples:
                - true
            speech_timeout:
              type: integer
              description: The timeout for speech recognition in milliseconds.
              default: 60000
              examples:
                - 30000
            vad_silence_ms:
              type: integer
              description: "Voice activity detection silence time in milliseconds. Default depends on speech engine: `300` for Deepgram, `500` for Google."
              default: 300
              examples:
                - 500
            vad_thresh:
              type: integer
              description: Voice activity detection threshold (0-1800).
              default: 400
              examples:
                - 400
            debug_level:
              type: integer
              description: Debug level for logging (0-2).
              default: 0
              examples:
                - 0
            direction:
              type: array
              items:
                type: string
                enum:
                  - remote-caller
                  - local-caller
              description: The direction of the call that should be translated.
            speech_engine:
              type: string
              enum:
                - deepgram
                - google
              description: The speech engine to use for speech recognition.
              default: deepgram
              examples:
                - google
            ai_summary_prompt:
              type: string
              description: The AI prompt that instructs how to summarize the conversation when `ai_summary` is enabled.
              examples:
                - Summarize the key points of this bilingual conversation.
          required:
            - from_lang
            - to_lang
            - direction
          description: Starts live translation of the call. The translation will be sent to the specified URL.
      required:
        - start
    SWML.Calling.SummarizeAction:
      type: object
      properties:
        summarize:
          type: object
          properties:
            webhook:
              type: string
              description: The webhook URL to be called.
              examples:
                - https://example.com/summary-webhook
            prompt:
              type: string
              description: The AI prompt that instructs how to summarize the conversation.
              examples:
                - Provide a brief summary of the translated conversation.
          description: Summarizes the conversation as an object, allowing you to specify the webhook url and prompt for the summary.
      required:
        - summarize
    SWML.Calling.SummarizeActionUnion:
      oneOf:
        - $ref: "#/components/schemas/SWML.Calling.SummarizeAction"
        - type: string
          enum:
            - summarize
    SWML.Calling.InjectAction:
      type: object
      properties:
        inject:
          type: object
          properties:
            message:
              type: string
              description: The message to be injected
              examples:
                - Please hold while I transfer you to a specialist.
            direction:
              type: string
              enum:
                - remote-caller
                - local-caller
              description: The direction of the message.
          required:
            - message
            - direction
          description: Injects a message into the conversation to be translated and spoken to the specified party.
      required:
        - inject
    SWML.Calling.TranslateAction:
      oneOf:
        - $ref: "#/components/schemas/SWML.Calling.StartAction"
        - type: string
          enum:
            - stop
        - $ref: "#/components/schemas/SWML.Calling.SummarizeActionUnion"
        - $ref: "#/components/schemas/SWML.Calling.InjectAction"
    SWML.Calling.Hangup:
      type: object
      properties:
        hangup:
          type: object
          properties:
            reason:
              type: string
              enum:
                - hangup
                - busy
                - decline
              description: The reason for hanging up the call.
              examples:
                - busy
          description: End the call with an optional reason.
      required:
        - hangup
    SWML.Calling.JoinRoom:
      type: object
      properties:
        join_room:
          type: object
          properties:
            name:
              type: string
              description: "Name of the room to join. Allowed characters: A-Z, a-z, 0-9, underscore, and hyphen."
              examples:
                - my-video-room
          required:
            - name
          description: Join a RELAY room. If the room doesn't exist, it creates a new room.
      required:
        - join_room
    SWML.Calling.JoinConference:
      type: object
      properties:
        join_conference:
          description: |-
            Join an ad-hoc audio conference started on either the SignalWire or Compatibility API.
            This method allows you to connect the current call to a named conference where multiple participants can communicate simultaneously.
          allOf:
            - $ref: "#/components/schemas/SWML.Calling.JoinConferenceObject"
      required:
        - join_conference
    SWML.Calling.JoinConferenceObject:
      type: object
      properties:
        name:
          type: string
          description: Name of conference
          examples:
            - my-conference-room
        muted:
          type: boolean
          description: Whether to join the conference in a muted state. If set to `true`, the participant will be muted upon joining. Default `false`.
          default: false
          examples:
            - false
        beep:
          type: string
          enum:
            - "true"
            - "false"
            - onEnter
            - onExit
          description: Sets the behavior of the beep sound when joining or leaving the conference. Default `"true"`.
          default: "true"
          examples:
            - onEnter
        start_on_enter:
          type: boolean
          description: Starts the conference when the main participant joins. This means the start action will not wait on more participants to join before starting. Default `true`.
          default: true
          examples:
            - true
        end_on_exit:
          type: boolean
          description: Ends the conference when the main participant leaves. This means the end action will not wait on more participants to leave before ending. Default `false`.
          default: false
          examples:
            - false
        wait_url:
          type: string
          format: uri
          description: A URL that will play media when the conference is put on hold. Default hold music will be played if not set
          examples:
            - https://example.com/hold-music.mp3
        max_participants:
          type: integer
          description: The maximum number of participants allowed in the conference. If the limit is reached, new participants will not be able to join. Default `100000`.
          minimum: 2
          maximum: 100000
          default: 100000
          examples:
            - 50
        record:
          type: string
          enum:
            - do-not-record
            - record-from-start
          description: Enables or disables recording of the conference. Default `"do-not-record"`.
          default: do-not-record
          examples:
            - record-from-start
        region:
          type: string
          enum:
            - global
            - us
            - eu
            - ch
          description: Specifies the geographical region where the conference will be hosted. Default not set
          examples:
            - us
        trim:
          type: string
          enum:
            - trim-silence
            - do-not-trim
          description: If set to `trim-silence`, it will remove silence from the start of the recording. If set to `do-not-trim`, it will keep the silence. Default `"trim-silence"`.
          default: trim-silence
          examples:
            - trim-silence
        coach:
          type: string
          description: |-
            Coach accepts a call SID of a call that is currently connected to an in-progress conference.
            Specifying a call SID that does not exist or is no longer connected will result in a failure.
          examples:
            - b3877ee3-6f3c-4985-8066-6d24e3f65e12
        status_callback_event:
          type: string
          description: |-
            Space-separated list of one or more events to send to the status callback URL.
            Possible values: `start`, `end`, `join`, `leave`, `mute`, `hold`, `modify`, `speaker`, `announcement`. Default not set
          examples:
            - join leave
        status_callback_event_type:
          type: string
          enum:
            - cxml
            - laml
            - relay
          description: The content type used when sending status events to the status callback URL. Default not set
          examples:
            - relay
        status_callback:
          type: string
          format: uri
          description: The URL to which status events will be sent. This URL must be publicly accessible and able to handle HTTP requests. Default not set
          examples:
            - https://example.com/conference-status
        status_callback_method:
          type: string
          enum:
            - GET
            - POST
          description: The HTTP method to use when sending status events to the status callback URL. Default `"POST"`.
          default: POST
          examples:
            - POST
        recording_status_callback:
          type: string
          format: uri
          description: The URL to which recording status events will be sent. This URL must be publicly accessible and able to handle HTTP requests. Default not set
          examples:
            - https://example.com/recording-status
        recording_status_callback_method:
          type: string
          enum:
            - GET
            - POST
          description: The HTTP method to use when sending recording status events to the recording status callback URL. Default `"POST"`.
          default: POST
          examples:
            - POST
        recording_status_callback_event:
          type: string
          description: |-
            Space-separated list of one or more events to send to the recording status callback URL.
            Possible values: `in-progress`, `completed`, `absent`. Default not set
          examples:
            - completed
        recording_status_callback_event_type:
          type: string
          enum:
            - cxml
            - laml
            - relay
          description: The content type used when sending recording status events to the recording status callback URL. Default not set
          examples:
            - relay
        result:
          oneOf:
            - {}
            - {}
          description: |-
            Allows the user to specify a custom action to be executed when the conference result is returned (typically when it has ended).
            The actions can a `switch` object or a `cond` array.
            The `switch` object allows for conditional execution based on the result of the conference, while
            the `cond` array allows for multiple conditions to be checked in sequence.
            If neither is provided, the default action will be to end the conference.
        stream:
          description: |-
            Attach a bidirectional WebSocket stream to the conference. Conference audio is streamed to
            the `url`, enabling real-time audio processing, transcription, or AI agents that listen to
            the conference. Uses the same stream schema as the `stream` device type in `connect`.
          allOf:
            - $ref: "#/components/schemas/SWML.Calling.JoinConferenceStream"
      required:
        - name
    SWML.Calling.JoinConferenceStream:
      type: object
      properties:
        url:
          type: string
          format: uri
          description: Secure WebSocket URL (must start with `wss://`) that the conference audio is streamed to. Plain `ws://` is not supported.
          examples:
            - wss://example.com/conference-audio
        name:
          type: string
          description: A friendly name to identify the stream at the WebSocket endpoint. Default not set
          examples:
            - conference-audio
        codec:
          type: string
          description: |-
            Audio codec for the streamed audio. Supported values: `PCMU`, `PCMA`, `G722`, `L16`.
            Codec can include rate and ptime modifiers (e.g., `PCMU@40i`, `L16@24000h@40i`). Default not set
          examples:
            - PCMU
        status_url:
          type: string
          format: uri
          description: HTTP or HTTPS URL to which stream status events will be sent. Default not set
          examples:
            - https://example.com/stream-status
        status_url_method:
          type: string
          enum:
            - GET
            - POST
          description: The HTTP method to use when sending stream status events to the status URL. Default `"POST"`.
          default: POST
          examples:
            - POST
        realtime:
          type: boolean
          description: When `true`, enables bidirectional audio so your endpoint can stream audio back into the conference (not just receive it). Default `false`.
          default: false
          examples:
            - true
        authorization_bearer_token:
          type: string
          description: Bearer token sent in the `Authorization` header when the WebSocket connection is opened, so your endpoint can authenticate the request. Default not set
          examples:
            - my-secret-token
        custom_parameters:
          type: object
          additionalProperties:
            type: string
          description: Custom key-value pairs delivered to your WebSocket endpoint when the stream connects. Use them to pass context such as a session or customer ID. Default not set
      required:
        - url
    SWML.Calling.Play:
      type: object
      properties:
        play:
          oneOf:
            - $ref: "#/components/schemas/SWML.Calling.PlayWithURL"
            - $ref: "#/components/schemas/SWML.Calling.PlayWithURLS"
          description: Play file(s), ringtones, speech or silence.
      required:
        - play
    SWML.Calling.PlayWithURL:
      type: object
      properties:
        auto_answer:
          type: boolean
          description: If `true`, the call will automatically answer as the sound is playing. If `false`, you will start playing the audio during early media. Default `true`.
          default: true
          examples:
            - true
        volume:
          type: number
          description: |-
            Volume level for the audio file.
            Default is `0`.
            Valid range is -40 to 40.
          minimum: -40
          maximum: 40
          default: 0
          examples:
            - 10
        say_voice:
          type: string
          description: The voice to use for the text to speech.
          default: Polly.Salli
          examples:
            - Polly.Joanna
        say_language:
          type: string
          description: The language to use for the text to speech.
          default: en-US
          examples:
            - en-US
        say_gender:
          type: string
          description: Gender to use for the text to speech.
          default: female
          examples:
            - female
        status_url:
          type: string
          format: uri
          description: http or https URL to deliver play status events
          examples:
            - https://example.com/play-status
        url:
          type: string
          pattern: "^(http://.*|https://.*|ring: ?[0-9.]*: ?[a-zA-Z]{2}|say: ?.*|silence: ?[0-9.]*|ring: ?[a-zA-Z]{2})$"
          description: |-
            URL to play.
            Required if `urls` is not present.
            Allowed URLs are:
                - http:// or https:// - audio file to GET
                - ring:[duration:]<country code> - ring tone to play. For example: ring:us to play single ring or ring:20.0:us to play ring for 20 seconds.
                - say:<text to speak> - Sentence to say
                - silence: <duration> - seconds of silence to play
          examples:
            - https://example.com/welcome.mp3
      required:
        - url
      description: Play with a single URL
    SWML.Calling.PlayWithURLS:
      type: object
      properties:
        auto_answer:
          type: boolean
          description: If `true`, the call will automatically answer as the sound is playing. If `false`, you will start playing the audio during early media. Default `true`.
          default: true
          examples:
            - true
        volume:
          type: number
          description: |-
            Volume level for the audio file.
            Default is `0`.
            Valid range is -40 to 40.
          minimum: -40
          maximum: 40
          default: 0
          examples:
            - 10
        say_voice:
          type: string
          description: The voice to use for the text to speech.
          default: Polly.Salli
          examples:
            - Polly.Joanna
        say_language:
          type: string
          description: The language to use for the text to speech.
          default: en-US
          examples:
            - en-US
        say_gender:
          type: string
          description: Gender to use for the text to speech.
          default: female
          examples:
            - female
        status_url:
          type: string
          format: uri
          description: http or https URL to deliver play status events
          examples:
            - https://example.com/play-status
        urls:
          oneOf:
            - type: array
              items:
                type: string
                pattern: "^(http://.*|https://.*|ring: ?[0-9.]*: ?[a-zA-Z]{2}|say: ?.*|silence: ?[0-9.]*|ring: ?[a-zA-Z]{2})$"
            - type: array
              items:
                type: string
                pattern: ^[\$%]\{.*\}$
          description: |-
            Array of URLs to play.
            Required if `url` is not present.
            Allowed URLs are:
                - http:// or https:// - audio file to GET
                - ring:[duration:]<country code> - ring tone to play. For example: ring:us to play single ring or ring:20.0:us to play ring for 20 seconds.
                - say:<text to speak> - Sentence to say
                - silence: <duration> - seconds of silence to play
          examples:
            - - https://example.com/intro.mp3
              - say:Welcome to our service
              - silence:2
      required:
        - urls
    SWML.Calling.Prompt:
      type: object
      properties:
        prompt:
          type: object
          properties:
            play:
              oneOf:
                - type: string
                  pattern: "^(http://.*|https://.*|ring: ?[0-9.]*: ?[a-zA-Z]{2}|say: ?.*|silence: ?[0-9.]*|ring: ?[a-zA-Z]{2})$"
                - type: array
                  items:
                    type: string
                    pattern: "^(http://.*|https://.*|ring: ?[0-9.]*: ?[a-zA-Z]{2}|say: ?.*|silence: ?[0-9.]*|ring: ?[a-zA-Z]{2})$"
                - type: array
                  items:
                    type: string
                    pattern: ^[\$%]\{.*\}$
              description: |-
                URL or array of URLs to play.
                Allowed URLs are:
                    http:// or https:// - audio file to GET
                    ring:[duration:]<country code> - ring tone to play. For example: ring:us to play single ring or ring:20.0:us to play ring for 20 seconds.
                    say:<text to speak> - Sentence to say
                    silence: <duration> - seconds of silence to play
              examples:
                - say:Please press 1 for sales or 2 for support
            volume:
              type: number
              description: |-
                Volume level for the audio file.
                Default is `0`.
                Valid range is -40 to 40.
              minimum: -40
              maximum: 40
              default: 0
              examples:
                - 0
            say_voice:
              type: string
              description: The voice to use for the text to speech.
              default: Polly.Salli
              examples:
                - Polly.Joanna
            say_language:
              type: string
              description: The language to use for the text to speech.
              default: en-US
              examples:
                - en-US
            say_gender:
              type: string
              description: The gender to use for the text to speech.
              default: female
              examples:
                - female
            max_digits:
              type: integer
              description: |-
                Number of digits to collect.
                Default is `1`.
              default: 1
              examples:
                - 4
            terminators:
              type: string
              description: |-
                Digits that terminate digit collection.
                Default is not set.
              examples:
                - "#"
            digit_timeout:
              type: number
              description: |-
                Time in seconds to wait for next digit.
                Default is `5.0` seconds.
              default: 5
              examples:
                - 5
            initial_timeout:
              type: number
              description: |-
                Time in seconds to wait for start of input.
                Default is `5.0` seconds.
              default: 5
              examples:
                - 10
            speech_timeout:
              type: number
              description: Max time in seconds to wait for speech result.
              examples:
                - 15
            speech_end_timeout:
              type: number
              description: Time in seconds to wait for end of speech utterance.
              examples:
                - 2
            speech_language:
              type: string
              description: Language to detect speech in.
              examples:
                - en-US
            speech_hints:
              oneOf:
                - type: array
                  items:
                    type: string
                - type: array
                  items:
                    type: string
                    pattern: ^[\$%]\{.*\}$
              description: Expected words or phrases to help the speech recognition.
              examples:
                - - sales
                  - support
                  - billing
            speech_engine:
              type: string
              description: |-
                The engine that is selected for speech recognition. The engine must support the specified language.
                [Deepgram|Google| etc...] Default is not set (SignalWire picks the engine).
              examples:
                - Deepgram
            status_url:
              type: string
              format: uri
              description: http or https URL to deliver prompt status events
              examples:
                - https://example.com/prompt-status
          required:
            - play
          description: |-
            Play a prompt and wait for input. The input can be received either as digits from the keypad,
            or from speech, or both depending on what parameters are set.
            By default, only digit input is enabled. To enable speech input, set at least one speech parameter.
            To enable both digit and speech input, set at least one parameter for each.
      required:
        - prompt
    SWML.Calling.ReceiveFax:
      type: object
      properties:
        receive_fax:
          type: object
          properties:
            status_url:
              type: string
              format: uri
              description: http or https URL to deliver receive_fax status events
              examples:
                - https://example.com/fax-received
          description: Receive a fax being delivered to this call.
      required:
        - receive_fax
    SWML.Calling.RecordCall:
      type: object
      properties:
        record_call:
          type: object
          properties:
            control_id:
              type: string
              description: Identifier for this recording, to use with `stop_call_record`.
              examples:
                - recording_001
            stereo:
              type: boolean
              description: |-
                If `true`, record in stereo.
                Default is `false`.
              default: false
              examples:
                - true
            format:
              type: string
              enum:
                - wav
                - mp3
                - mp4
              description: |-
                The format to record in. It can be `wav`, `mp3`, or `mp4`.
                Default is `"wav"`.
              default: wav
              examples:
                - mp3
            direction:
              type: string
              enum:
                - speak
                - listen
                - both
              description: |-
                Direction of the audio to record: "speak" for what party says, "listen" for what party hears, "both" for what the party hears and says.
                Default is `"both"`.
              default: both
              examples:
                - both
            terminators:
              type: string
              description: String of digits that will stop the recording when pressed. Default is `""` (empty).
              default: ""
              examples:
                - "#*"
            beep:
              type: boolean
              description: |-
                Play a beep before recording.
                Default is `false`.
              default: false
              examples:
                - true
            input_sensitivity:
              type: number
              description: |-
                How sensitive the recording voice activity detector is to background noise.
                A larger value is more sensitive. Allowed values from 0.0 to 100.0.
                Default is `44.0`.
              default: 44
              examples:
                - 44
            initial_timeout:
              type: number
              description: |-
                Time in seconds to wait for the start of speech.
                Default is `0.0` seconds.
              default: 0
              examples:
                - 0
            end_silence_timeout:
              type: number
              description: |-
                Time in seconds to wait in silence before ending the recording.
                Default is `0.0` seconds.
              default: 0
              examples:
                - 0
            max_length:
              type: number
              description: Maximum length of the recording in seconds.
              examples:
                - 300
            status_url:
              type: string
              format: uri
              description: http or https URL to deliver record_call status events
              examples:
                - https://example.com/record-call-status
          description: |-
            Record call in the background.
            Unlike the record method, the record_call method will start the recording and continue executing
            the SWML script while allowing the recording to happen in the background.
            To stop call recordings started with record_call, use the stop_record_call method.
      required:
        - record_call
    SWML.Calling.Request:
      type: object
      properties:
        request:
          type: object
          properties:
            url:
              type: string
              description: URL to send the HTTPS request to. Authentication can also be set in the URL in the format of username:password@url.
              examples:
                - https://api.example.com/webhook
            method:
              type: string
              enum:
                - GET
                - POST
                - PUT
                - DELETE
              description: The HTTP method to be used for the request. Can be `GET`, `POST`, `PUT`, or `DELETE`.
              examples:
                - POST
            headers:
              type: object
              properties: {}
              description: Object containing HTTP headers to set. Valid header values are Accept, Authorization, Content-Type, Range, and custom X- headers.
              examples:
                - Content-Type: application/json
                  Authorization: Bearer token123
            body:
              oneOf:
                - type: string
                - type: object
                  properties: {}
              description: |-
                Request body. Content-Type header should be explicitly set, but if not set, the most likely type
                will be set based on the first non-whitespace character.
              examples:
                - action: notify
                  message: Call completed
            timeout:
              type: number
              description: |-
                Maximum time in seconds to wait for a response.
                Default is `0` (no timeout).
              default: 0
              examples:
                - 10
            connect_timeout:
              type: number
              description: |-
                Maximum time in seconds to wait for a connection.
                Default is `0` (no timeout).
              default: 0
              examples:
                - 5
            save_variables:
              type: boolean
              description: |-
                Store parsed JSON response as variables.
                Default is `false`.
              default: false
              examples:
                - true
          required:
            - url
            - method
          description: Send a GET, POST, PUT, or DELETE request to a remote URL.
      required:
        - request
    SWML.Calling.Return:
      type: object
      properties:
        return:
          description: Return a value from an execute call or exit the script. The value can be any type.
          examples:
            - status: success
              result: completed
      required:
        - return
    SWML.Calling.SendDigits:
      type: object
      properties:
        send_digits:
          type: object
          properties:
            digits:
              type: string
              description: The digits to send. Valid values are 0123456789*#ABCDWw. Character W is a 1 second delay, and w is a 500ms delay.
              examples:
                - 1234#
          required:
            - digits
          description: Send digit presses as DTMF tones.
      required:
        - send_digits
    SWML.Calling.SendFax:
      type: object
      properties:
        send_fax:
          type: object
          properties:
            document:
              type: string
              format: uri
              description: URL to the PDF document to fax.
              examples:
                - https://example.com/document.pdf
            header_info:
              type: string
              description: Header text to include on the fax.
              examples:
                - "Invoice #12345"
            identity:
              type: string
              description: |-
                Station identity to report.
                Default is the calling party's caller ID number.
              examples:
                - "+15551234567"
            status_url:
              type: string
              format: uri
              description: http or https URL to deliver send_fax status events
              examples:
                - https://example.com/fax-status
          required:
            - document
          description: Send a fax.
      required:
        - send_fax
    SWML.Calling.SendSMS:
      type: object
      properties:
        send_sms:
          oneOf:
            - $ref: "#/components/schemas/SWML.Calling.SMSWithBody"
            - $ref: "#/components/schemas/SWML.Calling.SMSWithMedia"
          description: Send an outbound SMS or MMS message to a PSTN phone number.
      required:
        - send_sms
    SWML.Calling.SMSWithBody:
      type: object
      properties:
        to_number:
          type: string
          description: Phone number to send SMS message to in E.164 format.
          examples:
            - "+15559876543"
        from_number:
          type: string
          description: Phone number the SMS message will be sent from in E.164 format.
          examples:
            - "+15551234567"
        region:
          type: string
          description: Region of the world to originate the message from. Chosen based on account preferences or device location if not specified.
          examples:
            - us
        tags:
          type: array
          items:
            type: string
          description: Array of tags to associate with the message to facilitate log searches.
          examples:
            - - notification
              - order-confirmation
        status_callback:
          type: string
          description: URL to receive delivery status callbacks for the outbound message (e.g., `queued`, `sent`, `delivered`, `failed`). Not set if not specified. The callback uses the [message status callback payload](/docs/apis/rest/messages/webhooks/message-status-callback).
          examples:
            - https://example.com/message_status
        body:
          type: string
          description: Required if `media` is not present. The body of the SMS message.
          examples:
            - Your order has been confirmed. Thank you!
      required:
        - to_number
        - from_number
        - body
    SWML.Calling.SMSWithMedia:
      type: object
      properties:
        to_number:
          type: string
          description: Phone number to send SMS message to in E.164 format.
          examples:
            - "+15559876543"
        from_number:
          type: string
          description: Phone number the SMS message will be sent from in E.164 format.
          examples:
            - "+15551234567"
        region:
          type: string
          description: Region of the world to originate the message from. Chosen based on account preferences or device location if not specified.
          examples:
            - us
        tags:
          type: array
          items:
            type: string
          description: Array of tags to associate with the message to facilitate log searches.
          examples:
            - - notification
              - order-confirmation
        status_callback:
          type: string
          description: URL to receive delivery status callbacks for the outbound message (e.g., `queued`, `sent`, `delivered`, `failed`). Not set if not specified. The callback uses the [message status callback payload](/docs/apis/rest/messages/webhooks/message-status-callback).
          examples:
            - https://example.com/message_status
        media:
          type: array
          items:
            type: string
          description: Required if `body` is not present. Array of media URLs to include in the message.
          examples:
            - - https://example.com/image.png
        body:
          type: string
          description: Optional if `media` is present. The body of the SMS message.
          examples:
            - Check out this image!
      required:
        - to_number
        - from_number
        - media
    SWML.Calling.Set:
      type: object
      properties:
        set:
          type: object
          properties: {}
          description: |-
            Set script variables to the specified values.
            Accepts an object mapping variable names to values.
            Variables set using set can be removed using unset.
          examples:
            - my_var: hello
              counter: 1
              is_valid: true
      required:
        - set
    SWML.Calling.Sleep:
      type: object
      properties:
        sleep:
          oneOf:
            - type: object
              properties:
                duration:
                  type: integer
                  description: |-
                    The amount of time to sleep in milliseconds.
                    Must be a positive integer. Can also be set to `-1` for the sleep to never end.
                  minimum: -1
                  examples:
                    - 5000
              required:
                - duration
            - type: integer
          description: Pause execution for a specified duration.
      required:
        - sleep
    SWML.Calling.SIPRefer:
      type: object
      properties:
        sip_refer:
          type: object
          properties:
            to_uri:
              type: string
              description: The SIP URI to send the REFER to.
              examples:
                - sip:user@example.com
            status_url:
              type: string
              format: uri
              description: The HTTP or HTTPS URL to send status callback events to.
              examples:
                - https://example.com/refer-status
            username:
              type: string
              description: Username to use for SIP authentication.
              examples:
                - sipuser
            password:
              type: string
              description: Password to use for SIP authentication.
              examples:
                - sippassword
          required:
            - to_uri
          description: Send SIP REFER to a SIP call.
      required:
        - sip_refer
    SWML.Calling.StopDenoise:
      type: object
      properties:
        stop_denoise:
          type: object
          properties: {}
          description: Stop noise reduction that was started with denoise.
          examples:
            - {}
      required:
        - stop_denoise
    SWML.Calling.StopRecordCall:
      type: object
      properties:
        stop_record_call:
          type: object
          properties:
            control_id:
              type: string
              description: |-
                Identifier for the recording to stop.
                If not set, the last recording started will be stopped.
              examples:
                - recording_001
          description: Stop an active background recording.
      required:
        - stop_record_call
    SWML.Calling.StopStream:
      type: object
      properties:
        stop_stream:
          type: object
          properties:
            control_id:
              type: string
              description: |-
                ID of the stream to stop.
                If not set, it will stop the most recent stream started.
              examples:
                - stream_001
          description: Stop an active audio stream.
      required:
        - stop_stream
    SWML.Calling.StopTap:
      type: object
      properties:
        stop_tap:
          type: object
          properties:
            control_id:
              type: string
              description: |-
                ID of the tap to stop.
                If not set, it will shut off the most recent tap session.
              examples:
                - tap_001
          description: Stop an active tap stream.
      required:
        - stop_tap
    SWML.Calling.Stream:
      type: object
      properties:
        stream:
          type: object
          properties:
            url:
              type: string
              description: Secure WebSocket URI (wss://) to stream the call audio to.
              examples:
                - wss://example.com/audio-stream
            control_id:
              type: string
              description: Identifier for this stream to use with `stop_stream`. If not set, one is generated and stored in the `stream_control_id` variable.
              examples:
                - stream_001
            name:
              type: string
              description: Friendly name for the stream.
              examples:
                - my-stream
            track:
              type: string
              enum:
                - inbound_track
                - outbound_track
                - both_tracks
              description: |-
                Audio track to stream:
                    `inbound_track` for what the caller says,
                    `outbound_track` for what the caller hears,
                    `both_tracks` for both.
                    Default is `"inbound_track"`.
              default: inbound_track
              examples:
                - both_tracks
            codec:
              type: string
              description: |-
                Codec to use for the streamed audio. Freeform and endpoint-specific.
                Common values include `PCMU`, `PCMA`, and `OPUS`.
              examples:
                - PCMU
            status_url:
              type: string
              format: uri
              description: HTTP or HTTPS URL to deliver stream status events.
              examples:
                - https://example.com/stream-status
            status_url_method:
              type: string
              enum:
                - GET
                - POST
              description: |-
                HTTP method used to deliver stream status events to `status_url`.
                Possible Values: [`GET`, `POST`]. Default is `"POST"`.
              default: POST
              examples:
                - POST
            authorization_bearer_token:
              type: string
              description: Bearer token sent as an `Authorization` header during the WebSocket handshake.
              examples:
                - my-secret-token
            custom_parameters:
              type: object
              additionalProperties:
                type: string
              description: Custom key-value pairs sent to the WebSocket endpoint in the start message.
          required:
            - url
          description: Start a background audio stream from the call to a WebSocket endpoint. Runs alongside the call as an independent operation.
      required:
        - stream
    SWML.Calling.Switch:
      type: object
      properties:
        switch:
          type: object
          properties:
            variable:
              type: string
              description: Name of the variable whose value needs to be compared.
              examples:
                - prompt_result
            case:
              type: object
              properties: {}
              description: Object of key-mapped values to array of SWML methods to execute.
            default:
              type: array
              items:
                $ref: "#/components/schemas/SWML.Calling.SWMLMethod"
              description: Array of SWML methods to execute if no cases match.
          required:
            - variable
            - case
          description: Execute different instructions based on a variable's value.
      required:
        - switch
    SWML.Calling.Tap:
      type: object
      properties:
        tap:
          type: object
          properties:
            uri:
              type: string
              description: "Destination of the tap media stream: rtp://IP:port, ws://example.com, or wss://example.com."
              examples:
                - wss://example.com/tap-stream
            control_id:
              type: string
              description: Identifier for this tap to use with `stop_tap`.
              examples:
                - tap_001
            direction:
              type: string
              enum:
                - speak
                - listen
                - both
              description: |-
                Direction of the audio to tap:
                    `speak` for what party says,
                    `listen` for what party hears,
                    `both` for what party hears and says.
                    Default is `"speak"`.
              default: speak
              examples:
                - both
            codec:
              type: string
              enum:
                - PCMU
                - PCMA
              description: |-
                Codec to use for the tap media stream.
                Possible Values: [`PCMU`, `PCMA`]
                Default is `"PCMU"`.
              default: PCMU
              examples:
                - PCMU
            rtp_ptime:
              type: integer
              description: |-
                If `uri` is a `rtp://` this will set the packetization time of the media in milliseconds.
                Default is `20` milliseconds.
              default: 20
              examples:
                - 20
            status_url:
              type: string
              format: uri
              description: http or https URL to deliver tap status events
              examples:
                - https://example.com/tap-status
          required:
            - uri
          description: Start background call tap. Media is streamed over Websocket or RTP to customer controlled URI.
      required:
        - tap
    SWML.Calling.Transcribe:
      type: object
      properties:
        transcribe:
          type: object
          properties:
            status_url:
              type: string
              format: uri
              description: An HTTP or HTTPS URL that receives the status callback when the transcription finishes
              examples:
                - https://example.com/transcribe-status
          description: |-
            Transcribe the entire call in the background.
            Execution continues to the next instruction while the call proceeds; the transcription covers the whole call and completes when the call ends.
            For real-time transcription delivered as the call happens, use `live_transcribe` instead.
            Only one transcription can be active on a call at a time.
            To stop it, use the `transcribe_stop` method.
      required:
        - transcribe
    SWML.Calling.TranscribeStop:
      type: object
      properties:
        transcribe_stop:
          type: object
          properties: {}
          description: |-
            Stop the transcription currently running on the call, started with `transcribe`.
            No parameters are required.
          examples:
            - {}
      required:
        - transcribe_stop
    SWML.Calling.Transfer:
      type: object
      properties:
        transfer:
          type: object
          properties:
            dest:
              type: string
              description: |-
                Specifies where to transfer to. The value can be one of:
                - <section_name> - section in the SWML document to jump to
                - A URL (http or https) - URL to fetch next document from. Sends HTTP POST.
                  Authentication can also be set in the URL in the format of username:password@url.
                - An inline SWML document (as a JSON string)
              examples:
                - https://example.com/transfer-handler
            params:
              type: object
              properties: {}
              description: |-
                Named parameters to send to transfer destination.
                Accepts an object mapping variable names to values.
                Default is not set.
              examples:
                - department: sales
                  priority: high
            meta:
              type: object
              properties: {}
              description: |-
                User data, ignored by SignalWire.
                Accepts an object mapping variable names to values.
                Default is not set.
              examples:
                - transfer_reason: escalation
                  original_agent: agent_001
          required:
            - dest
          description: |-
            Transfer the execution of the script to a different SWML section, URL, or Relay application.
            Once the transfer is complete, the script will continue executing SWML from the new location.
      required:
        - transfer
    SWML.Calling.Unset:
      type: object
      properties:
        unset:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          description: |-
            Unset specified variables. The variables may have been set using the set method
            or as a byproduct of other statements or methods.
            Accepts a single variable name as a string or an array of variable names.
          examples:
            - temp_data
      required:
        - unset
    SWML.Calling.Pay:
      type: object
      properties:
        pay:
          type: object
          properties:
            payment_connector_url:
              type: string
              format: uri
              description: |-
                The URL to make POST requests with all the gathered payment details.
                This URL is used to process the final payment transaction and return the results through the response.

                Visit [pay documentation](/docs/swml/reference/pay#payment_connector_url) for more important information.
              examples:
                - https://example.com/payment-connector
            charge_amount:
              type: string
              description: The amount to charge against payment method passed in the request. `Float` value with no currency prefix passed as string.
              examples:
                - "29.99"
            currency:
              type: string
              description: Uses the ISO 4217 currency code of the charge amount.
              default: usd
              examples:
                - usd
            description:
              type: string
              description: Custom description of the payment provided in the request.
              examples:
                - Monthly subscription payment
            input:
              type: string
              enum:
                - dtmf
              description: The method of how to collect the payment details. Currently only `dtmf` mode is supported.
              default: dtmf
              examples:
                - dtmf
            language:
              type: string
              description: Language to use for prompts being played to the caller by the `pay` method.
              default: en-US
              examples:
                - en-US
            max_attempts:
              type: integer
              description: Number of times the `pay` method will retry to collect payment details.
              default: 1
              examples:
                - 3
            min_postal_code_length:
              type: integer
              description: The minimum length of the postal code the user must enter.
              default: 0
              examples:
                - 5
            parameters:
              type: array
              items:
                $ref: "#/components/schemas/SWML.Calling.PayParameters"
              description: Array of parameter objects to pass to your payment processor. The parameters are user-defined key-value pairs.
            payment_method:
              type: string
              enum:
                - credit-card
              description: Indicates the payment method which is going to be used in this payment request. Currently only `credit-card` is supported.
              examples:
                - credit-card
            postal_code:
              oneOf:
                - type: boolean
                - type: string
              description: Takes `true`, `false` or real postalcode (if it's known beforehand) to let pay method know whether to prompt for postal code. Default is `true`.
              default: true
              examples:
                - true
            prompts:
              type: array
              items:
                $ref: "#/components/schemas/SWML.Calling.PayPrompts"
              description: Array of prompt objects for customizing the audio prompts during different stages of the payment process.
            security_code:
              type: boolean
              description: Takes true or false to let pay method know whether to prompt for security code.
              default: true
              examples:
                - true
            status_url:
              type: string
              format: uri
              description: |-
                The URL to send requests for each status change during the payment process.

                Visit [pay documentation](/docs/swml/reference/pay#status_url-request-body) for more important information.
              examples:
                - https://example.com/payment-status
            timeout:
              type: integer
              description: Limit in seconds that pay method waits for the caller to press another digit before moving on to validate the digits captured.
              default: 5
              examples:
                - 5
            token_type:
              type: string
              enum:
                - one-time
                - reusable
              description: |-
                Whether the payment is a one off payment or re-occurring.

                Allowed values:
                - `one-time`
                - `reusable`
              default: reusable
              examples:
                - one-time
            valid_card_types:
              type: string
              description: |-
                List of payment cards allowed to use in the requested payment process separated by space.

                Allowed values:
                - `visa`
                - `mastercard`
                - `amex`
                - `maestro`
                - `discover`
                - `jcb`
                - `diners-club`
              default: visa mastercard amex
              examples:
                - visa mastercard amex
            voice:
              type: string
              description: Text-to-speech voice to use. Please refer to [TTS documentation](/docs/platform/voice/tts) for more information.
              default: woman
              examples:
                - woman
          required:
            - payment_connector_url
          description: |-
            Enables secure payment processing during voice calls. When implemented, it manages the entire payment flow
            including data collection, validation, and processing through your configured payment gateway.
      required:
        - pay
    SWML.Calling.PayParameters:
      type: object
      properties:
        name:
          type: string
          description: The identifier for your custom parameter. This will be the key in the parameters object.
          examples:
            - merchant_id
        value:
          type: string
          description: The value associated with the parameter. This will be the value in the parameters object.
          examples:
            - "12345"
      required:
        - name
        - value
    SWML.Calling.PayPrompts:
      type: object
      properties:
        actions:
          type: array
          items:
            $ref: "#/components/schemas/SWML.Calling.PayPromptAction"
          description: Array of action objects to execute for this prompt. These actions can either play an audio file or speak a phrase.
        for:
          type: string
          description: |-
            The payment step this prompt is for. See Payment Steps for a list of available steps.

            - `payment-card-number`: Collect the payment card number.
            - `expiration-date`: Collect the payment card expiration date.
            - `security-code`: Collect the payment card security code.
            - `postal-code`: Collect the payment card postal code.
            - `payment-processing`: The step used during the payment processing.
            - `payment-completed`: The step used when the payment is completed.
            - `payment-failed`: The step used when the payment fails.
            - `payment-cancelled`: The step used when the payment is cancelled.
          examples:
            - payment-card-number
        attempts:
          type: string
          description: |-
            Specifies which payment attempt(s) this prompt applies to. The value increments when a payment fails.
             Use a single number (e.g., "1") or space-separated numbers (e.g., "2 3") to target the specific attempts.
          examples:
            - 1 2
        card_type:
          type: string
          description: |-
            Space-seperated list of card types that are allowed to be used for this prompt.

            Supported card types:
                - `visa`
                - `mastercard`
                - `amex`
                - `maestro`
                - `discover`
                - `optima`
                - `jcb`
                - `diners-club`
          examples:
            - visa mastercard amex
        error_type:
          type: string
          description: |-
            Space-separated list of error types this prompt applies to.

            Available error types:
                - `timeout` - User input timeout
                - `invalid-card-number` - Failed card validation
                - `invalid-card-type` - Unsupported card type
                - `invalid-date` - Invalid expiration date
                - `invalid-security-code` - Invalid CVV format
                - `invalid-postal-code` - Invalid postal code format
                - `invalid-bank-routing-number` - Invalid bank routing number
                - `invalid-bank-account-number` - Invalid bank account number
                - `input-matching-failed` - Input matching failed
                - `session-in-progress` - Concurrent session attempt
                - `card-declined` - Payment declined
          examples:
            - timeout invalid-card-number
      required:
        - actions
        - for
    SWML.Calling.PayPromptSayAction:
      type: object
      properties:
        type:
          type: string
          enum:
            - Say
          description: When the action `type` is `Say`, this value is the text to be spoken; when the type is `Play`, it should be a URL to the audio file.
        phrase:
          type: string
          description: The phrase to speak
          examples:
            - Please enter your 16-digit card number.
      required:
        - type
        - phrase
    SWML.Calling.PayPromptPlayAction:
      type: object
      properties:
        type:
          type: string
          enum:
            - Play
          description: When the action `type` is `Say`, this value is the text to be spoken; when the type is `Play`, it should be a URL to the audio file.
        phrase:
          type: string
          format: uri
          description: The URL of the audio file to play
          pattern: ^(http|https)://
          examples:
            - https://example.com/audio/enter-card-number.mp3
      required:
        - type
        - phrase
    SWML.Calling.PayPromptAction:
      oneOf:
        - $ref: "#/components/schemas/SWML.Calling.PayPromptSayAction"
        - $ref: "#/components/schemas/SWML.Calling.PayPromptPlayAction"
    SWML.Calling.DetectMachine:
      type: object
      properties:
        detect_machine:
          type: object
          properties:
            detect_message_end:
              type: boolean
              description: If `true`, stops detection on beep / end of voicemail greeting. Default `false`.
              default: false
              examples:
                - true
            detectors:
              type: string
              description: "Comma-separated string of detectors to enable. Valid values: `amd`, `fax`."
              default: amd,fax
              examples:
                - amd,fax
            end_silence_timeout:
              type: number
              description: How long to wait for voice to finish. Default `1.0`.
              minimum: 0
              default: 1
              examples:
                - 1
            initial_timeout:
              type: number
              description: How long to wait for initial voice before giving up. Default `4.5`.
              minimum: 0
              default: 4.5
              examples:
                - 4.5
            machine_ready_timeout:
              type: number
              description: How long to wait for voice to finish before firing READY event. Default is `end_silence_timeout`.
              minimum: 0
              examples:
                - 2
            machine_voice_threshold:
              type: number
              description: The number of seconds of ongoing voice activity required to classify as MACHINE. Default `1.25`.
              minimum: 0
              default: 1.25
              examples:
                - 1.25
            machine_words_threshold:
              type: integer
              description: The minimum number of words that must be detected in a single utterance before classifying the call as MACHINE. Default `6`.
              minimum: 0
              default: 6
              examples:
                - 6
            status_url:
              type: string
              format: uri
              description: The http(s) URL to deliver detector events to.
              examples:
                - https://example.com/amd-status
            timeout:
              type: number
              description: The max time to run detector. Default `30.0` seconds.
              minimum: 0
              default: 30
              examples:
                - 30
            tone:
              type: string
              enum:
                - CED
                - CNG
              description: The tone to detect, will only receive remote side tone. Default `CED`.
              default: CED
              examples:
                - CED
            wait:
              type: boolean
              description: |-
                If false, the detector will run asynchronously and status_url must be set.
                If true, the detector will wait for detection to complete before moving to the next SWML instruction.
                Default is `true`.
              default: true
              examples:
                - true
          description: |-
            A detection method that combines AMD (Answering Machine Detection) and fax detection.
            Detect whether the user on the other end of the call is a machine (fax, voicemail, etc.) or a human.
            The detection result(s) will be sent to the specified status_url as a POST request
            and will also be saved in the detect_result variable.
      required:
        - detect_machine
    SWML.Calling.UserEvent:
      type: object
      properties:
        user_event:
          type: object
          properties:
            event:
              type: object
              properties: {}
              examples:
                - type: call_update
                  status: connected
                  caller_name: John Doe
          required:
            - event
          description: |-
            Allows the user to set and send events to the connected client on the call.
            This is useful for triggering actions on the client side.
            Commonly used with the [browser-sdk](/docs/browser-sdk/v3/js/reference/signalwire/client).
            The event object can be any valid JSON object.
            Any key-value pair in the object is sent to the client as an event type called `user_event`.
      required:
        - user_event
    SWML.Calling.SWMLMethod:
      oneOf:
        - $ref: "#/components/schemas/SWML.Calling.Answer"
        - $ref: "#/components/schemas/SWML.Calling.AI"
        - $ref: "#/components/schemas/SWML.Calling.AISidecar"
        - $ref: "#/components/schemas/SWML.Calling.AmazonBedrock"
        - $ref: "#/components/schemas/SWML.Calling.Cond"
        - $ref: "#/components/schemas/SWML.Calling.Connect"
        - $ref: "#/components/schemas/SWML.Calling.Denoise"
        - $ref: "#/components/schemas/SWML.Calling.EnterQueue"
        - $ref: "#/components/schemas/SWML.Calling.Execute"
        - $ref: "#/components/schemas/SWML.Calling.Goto"
        - $ref: "#/components/schemas/SWML.Calling.Label"
        - $ref: "#/components/schemas/SWML.Calling.LiveTranscribe"
        - $ref: "#/components/schemas/SWML.Calling.LiveTranslate"
        - $ref: "#/components/schemas/SWML.Calling.Hangup"
        - $ref: "#/components/schemas/SWML.Calling.JoinRoom"
        - $ref: "#/components/schemas/SWML.Calling.JoinConference"
        - $ref: "#/components/schemas/SWML.Calling.Play"
        - $ref: "#/components/schemas/SWML.Calling.Prompt"
        - $ref: "#/components/schemas/SWML.Calling.ReceiveFax"
        - type: object
          properties:
            record:
              type: object
              properties:
                stereo:
                  type: boolean
                  description: |-
                    If true, record in stereo.
                    Default is `false`.
                  default: false
                  examples:
                    - true
                format:
                  type: string
                  enum:
                    - wav
                    - mp3
                    - mp4
                  description: |-
                    The format to record in. Can be `wav`, `mp3`, or `mp4`.
                    Default is `"wav"`.
                  default: wav
                  examples:
                    - mp3
                direction:
                  type: string
                  enum:
                    - speak
                    - listen
                  description: |-
                    Direction of the audio to record: "speak" for what party says, "listen" for what party hears.
                    Default is `"speak"`.
                  default: speak
                  examples:
                    - speak
                terminators:
                  type: string
                  description: String of digits that will stop the recording when pressed. Default is `"#"`.
                  default: "#"
                  examples:
                    - "#"
                beep:
                  type: boolean
                  description: |-
                    Play a beep before recording.
                    Default is `false`.
                  default: false
                  examples:
                    - true
                input_sensitivity:
                  type: number
                  description: |-
                    How sensitive the recording voice activity detector is to background noise.
                    A larger value is more sensitive. Allowed values from 0.0 to 100.0.
                    Default is `44.0`.
                  default: 44
                  examples:
                    - 44
                initial_timeout:
                  type: number
                  description: |-
                    Time in seconds to wait for the start of speech.
                    Default is `4.0` seconds.
                  default: 4
                  examples:
                    - 4
                end_silence_timeout:
                  type: number
                  description: |-
                    Time in seconds to wait in silence before ending the recording.
                    Default is `5.0` seconds.
                  default: 5
                  examples:
                    - 5
                max_length:
                  type: number
                  description: Maximum length of the recording in seconds.
                  examples:
                    - 60
                status_url:
                  type: string
                  format: uri
                  description: URL to send recording status events to.
                  examples:
                    - https://example.com/recording-status
              description: |-
                Record the call audio in the foreground, pausing further SWML execution until recording ends.
                Use this, for example, to record voicemails.
                To record calls in the background in a non-blocking fashion, use the record_call method.
          required:
            - record
        - $ref: "#/components/schemas/SWML.Calling.RecordCall"
        - $ref: "#/components/schemas/SWML.Calling.Request"
        - $ref: "#/components/schemas/SWML.Calling.Return"
