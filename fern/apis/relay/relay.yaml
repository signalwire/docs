          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        result:
          $ref: "#/components/schemas/WebRTC.ConferenceListResult"
    WebRTC.MessageEvent:
      type: object
      properties:
        node_id:
          type: string
          description: |-
            The FreeSWITCH node id sending the event. Sent by FS so the client can
            capture the specific nodeid once a call is started.
        params:
          type: object
          additionalProperties: {}
          description: |-
            The Verto JSON-RPC frame being transported (a Verto response or a
            conference/room event). Loose pass-through — see `verto_messages.md`.
      required:
        - params
      description: |-
        Transport event delivering a Verto JSON-RPC message from FreeSWITCH back to
        the client — both Verto responses and subscribed conference/room events.

        The inner `params` is the opaque Verto frame; its full union is out of scope
        here (see `verto_messages.md`).
    MessageEventFrame:
      type: object
      required:
        - jsonrpc
        - method
        - id
        - params
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        method:
          type: string
          const: signalwire.event
        id:
          type: string
          format: uuid
        params:
          type: object
          required:
            - event_type
            - params
          properties:
            event_type:
              type: string
              const: webrtc.message
            event_channel:
              type: string
            timestamp:
              type: number
            space_id:
              type: string
            project_id:
              type: string
            params:
              $ref: "#/components/schemas/WebRTC.MessageEvent"
