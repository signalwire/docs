          description: The UUID of the node. Present on participant and stream events; absent on `conference-start`/`conference-end`.
        conference_id:
          type: string
          description: The UUID of the conference.
        name:
          type: string
          description: The name of the conference.
        region:
          type: string
          description: The region the conference is running in (`global`, `us`, `eu`, or `ch`).
        size:
