          description: Whether the conference starts when this participant enters. Defaults to `true`.
          default: true
          examples:
            - true
        end_on_exit:
          type: boolean
          description: Whether the conference ends for everyone when this participant leaves. Defaults to `false`.
          default: false
          examples:
            - false
        wait_url:
          type: string
          format: uri
          description: A URL to cXML, or to an mp3/wav file, to play while this participant waits for the conference to start. Defaults to hold music.
          examples:
            - https://example.com/hold.mp3
        max_participants:
          type: integer
          format: int32
          description: The maximum number of participants allowed in the conference, up to 250. Defaults to `250`.
          maximum: 250
          exclusiveMinimum: 0
          examples:
            - 3
        record:
          description: Whether and when to record the conference. Defaults to `do-not-record`.
          examples:
            - record-from-start
          allOf:
            - $ref: "#/components/schemas/Calling.ConferenceRecord"
        region:
          description: The region where the conference media is hosted. Defaults to `global`.
          examples:
            - eu
          allOf:
            - $ref: "#/components/schemas/Calling.ConferenceRegion"
        trim:
          description: Whether to trim silence from the recording. Defaults to `trim-silence`.
          examples:
            - do-not-trim
          allOf:
            - $ref: "#/components/schemas/Calling.ConferenceTrim"
        acl:
          description: "Controls who can access the conference recording: `private` or `public-read`."
          examples:
            - private
          allOf:
            - $ref: "#/components/schemas/Calling.ConferenceAcl"
        coach:
          type: string
          description: The `call_id` (UUID) of the participant being coached. A coach can be heard only by the call being coached, not by the rest of the conference. Not set by default.
          examples:
            - c2a1e9f4-6b3d-4e7a-8f1c-2d3e4f5a6b7c
        status_callback:
          type: string
          format: uri
          description: A URL to receive conference status callbacks. Not set by default.
          examples:
            - https://example.com/webhooks/relay
        status_callback_event:
          type: string
          description: |-
            A space-separated list of which conference events to deliver to
            `status_callback`. Available events: `start`, `end`, `join`, `leave`,
            `mute`, `hold`, `modify`, `speaker`, `announcement`. Not set by default.
          examples:
            - start end join leave
        status_callback_event_type:
          description: The payload format for `status_callback`. Defaults to `relay`.
          examples:
            - relay
          allOf:
            - $ref: "#/components/schemas/Calling.ConferenceCallbackEventType"
        status_callback_method:
          description: The HTTP method used to deliver `status_callback`. Defaults to `POST`. Ignored when `status_callback_event_type` is `relay`.
          examples:
            - POST
          allOf:
            - $ref: "#/components/schemas/Calling.ConferenceCallbackMethod"
        recording_status_callback:
          type: string
          format: uri
          description: A URL to receive recording status callbacks. Not set by default.
          examples:
            - https://example.com/webhooks/relay
        recording_status_callback_event:
          type: string
          description: |-
            A space-separated list of which recording lifecycle events to deliver to
            `recording_status_callback`. Available events: `in-progress completed absent`
            (for example, `"in-progress completed"`). Defaults to `completed`.
          examples:
            - in-progress completed
        recording_status_callback_event_type:
          description: The payload format for `recording_status_callback`. Defaults to `relay`.
          examples:
            - relay
          allOf:
            - $ref: "#/components/schemas/Calling.ConferenceCallbackEventType"
        recording_status_callback_method:
          description: The HTTP method used to deliver `recording_status_callback`. Defaults to `POST`. Ignored when `recording_status_callback_event_type` is `relay`.
          examples:
            - POST
          allOf:
            - $ref: "#/components/schemas/Calling.ConferenceCallbackMethod"
        stream:
          description: |-
            Attach a bidirectional WebSocket audio stream to the conference, for example to
            feed audio to a bot or transcription service. Uses the same stream settings as
            the stream device in `calling.connect`.
          allOf:
            - $ref: "#/components/schemas/Calling.StreamDeviceParams"
        emit_call_quality:
          type: boolean
          description: |-
            Opt into per-participant call-quality reporting. When `true`, the conference
            emits `participant-call-quality` events carrying voice-quality (QoS) metrics for
            each participant. Defaults to `false`.
          default: false
      required:
        - node_id
        - call_id
        - name
