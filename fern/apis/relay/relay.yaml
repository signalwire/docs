    SWML.Calling.Expression:
      type: object
      properties:
        string:
          type: string
          description: The actual input or value from the user or system.
          examples:
            - I want a refund
        pattern:
          type: string
          description: A regular expression pattern to validate or match the string.
          examples:
            - refund|return|money back
        output:
          description: An object that contains a response and a list of actions to be performed upon a expression match.
          allOf:
            - $ref: "#/components/schemas/SWML.Calling.Output"
      required:
        - string
        - pattern
        - output
    SWML.Calling.Webhook:
      type: object
      properties:
        expressions:
          type: array
          items:
            $ref: "#/components/schemas/SWML.Calling.Expression"
          description: |-
            A list of expressions to be evaluated upon matching.
            If the following properties are set (foreach, expressions, output), they will be processed in the following order:
            1. foreach
            2. expressions
            3. output
        error_keys:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          description: A string or array of strings that represent the keys to be used for error handling. This will match the key(s) in the response from the API call.
          examples:
            - failed
        url:
          type: string
          description: The endpoint for the external service or API.
          examples:
            - https://example.com
        foreach:
          type: object
          properties:
            input_key:
              type: string
              description: The key to be used to access the current element in the array.
              examples:
                - success
            output_key:
              type: string
              description: The key that can be referenced in the output of the `foreach` iteration. The values that are stored from `append` will be stored in this key.
              examples:
                - deliverer
            max:
              type: integer
              description: The max amount of elements that are iterated over in the array. This will start at the beginning of the array.
              examples:
                - 5
            append:
              type: string
              description: |-
                The values to append to the output_key.
                Properties from the object can be referenced and added to the output_key by using the following syntax:
                ${this.property_name}.
                The `this` keyword is used to reference the current object in the array.
              examples:
                - "title: ${this.title}, contact: ${this.phone}"
          required:
            - input_key
            - output_key
            - append
          description: |-
            Iterates over an array of objects and processes a output based on each element in the array. Works similarly to JavaScript's forEach method.
            If the following properties are set (foreach, expressions, output), they will be processed in the following order:
            1. foreach
            2. expressions
            3. output
        headers:
          type: object
          properties: {}
          description: Any necessary headers for the API call.
          examples:
            - Content-Type: application/json
              X-API-Key: your-api-key
        method:
          type: string
          enum:
            - GET
            - POST
            - PUT
            - DELETE
          description: The HTTP method (GET, POST, etc.) for the API call.
          examples:
            - POST
        input_args_as_params:
          type: boolean
          description: A boolean to determine if the input arguments should be passed as parameters.
          examples:
            - true
        params:
          type: object
          properties: {}
          description: An object of any necessary parameters for the API call. The key is the parameter name and the value is the parameter value.
          examples:
            - account_id: acc_123
              include_details: true
        require_args:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          description: A string or array of strings that represent the `arguments` that are required to make the webhook request.
          examples:
            - - order_id
              - customer_email
        output:
          description: |-
            An object that contains a response and a list of actions to be performed upon completion of the webhook request.
            If the following properties are set (foreach, expressions, output), they will be processed in the following order:
            1. foreach
            2. expressions
            3. output
          allOf:
            - $ref: "#/components/schemas/SWML.Calling.Output"
      required:
        - url
    SWML.Calling.StartUpHookSWAIGFunction:
      type: object
      properties:
        description:
          type: string
          description: A description of the context and purpose of the function, to explain to the agent when to use it.
          examples:
            - Get the weather information
        purpose:
          type: string
          description: |-
            The purpose field has been deprecated and is replaced by the `description` field.
            A description of the context and purpose of the function, to explain to the agent when to use it.
          examples:
            - Get the weather information
          deprecated: true
        parameters:
          description: A JSON object that defines the expected user input parameters and their validation rules for the function.
          allOf:
            - $ref: "#/components/schemas/SWML.Calling.FunctionParameters"
        fillers:
          description: A JSON object defining the fillers that should be played when calling a `swaig function`. This helps the AI break silence between responses. The filler is played asynchronously during the function call.
          allOf:
            - $ref: "#/components/schemas/SWML.Calling.FunctionFillers"
        argument:
          description: |-
            The argument field has been deprecated and is replaced by the `parameters` field. 
            A JSON object defining the input that should be passed to the function. 
            The fields of this object are the following two parameters.
          deprecated: true
          allOf:
            - $ref: "#/components/schemas/SWML.Calling.FunctionParameters"
        active:
          type: boolean
          description: Whether the function is active. **Default:** `true`.
          default: true
          examples:
            - true
        meta_data:
          type: object
          properties: {}
          description: |-
            A powerful and flexible environmental variable which can accept arbitrary data that is set initially in the SWML script or from the SWML set_meta_data action.
            This data can be referenced locally to the function.
            All contained information can be accessed and expanded within the prompt - for example, by using a template string.
            Default is not set.
          examples:
            - api_key: key_123
              endpoint: https://api.example.com
        meta_data_token:
          type: string
          description: Scoping token for meta_data. If not supplied, metadata will be scoped to function's `web_hook_url`. Default is set by SignalWire.
          examples:
            - my-function-scope
        data_map:
          description: |-
            An object that processes function inputs and executes operations through expressions, webhooks, or direct output.
            Properties are evaluated in strict priority order:
            1. expressions
            2. webhooks
            3. output

            Evaluation stops at the first property that returns a valid output result, similar to a return statement in a function.
            Any subsequent properties are ignored when a valid output is returned.
            If a valid output is not returned from any of the properties, a generic error message is returned.
          allOf:
            - $ref: "#/components/schemas/SWML.Calling.DataMap"
        skip_fillers:
          type: boolean
          description: |-
            Skips the top-level fillers specified in `ai.languages` (which includes `speech_fillers` and `function_fillers`).
            When set to `true`, only function-specific fillers defined directly on `SWAIG.functions.fillers` will play.
            **Default:** `false`.
          default: false
          examples:
            - true
        web_hook_url:
          type: string
          description: Function-specific URL to send status callbacks and reports to. Takes precedence over a default setting. Authentication can also be set in the url in the format of `username:password@url.`
          examples:
            - username:password:https://statuscallback.com
        wait_file:
          type: string
          format: uri
          description: A file to play while the function is running. `wait_file_loops` can specify the amount of times that files should continously play. Default is not set.
          examples:
            - https://cdn.signalwire.com/default-music/welcome.mp3
        wait_file_loops:
          oneOf:
            - type: integer
            - type: string
          description: The number of times to loop playing the file. Default is not set.
          examples:
            - 5
        wait_for_fillers:
          type: boolean
          description: Whether to wait for fillers to finish playing before continuing with the function. **Default:** `false`.
          default: false
          examples:
            - true
        function:
          type: string
          enum:
            - startup_hook
          description: A unique name for the function. This can be any user-defined string or can reference a reserved function. Reserved functions are SignalWire functions that will be executed at certain points in the conversation. For the start_hook function, the function name is 'start_hook'.
      required:
        - description
        - function
