components:
  schemas:
    Signalwire.ConnectParams:
      type: object
      properties:
        version:
          description: Protocol version the client speaks.
          allOf:
            - $ref: "#/components/schemas/Signalwire.Version"
        authentication:
          description: The authentication token block.
          allOf:
            - $ref: "#/components/schemas/Signalwire.Authentication"
        agent:
          type: string
          description: Descriptive information about the SDK and application (e.g. `somesdk-1.2.3`).
        protocol:
          type: string
          description: |-
            When provided, lets the client attempt to "hijack" a previously-established
            protocol (provided the project and signature allow it).
        authorization_state:
          type: string
          description: |-
            Encrypted authorization state from a previous `signalwire.authorization.state`
            event, used to reestablish permissions/state on a new node after reconnect.
            Format: `<encryptedAuthStateBase64>:<tagBase64>`.
        contexts:
          type: array
          items:
            type: string
          description: Contexts to begin receiving inbound events for on connect.
      required:
        - version
        - authentication
    Signalwire.Version:
      type: object
      properties:
        major:
          type: integer
          format: int32
          description: Major version. Currently `3`.
        minor:
          type: integer
          format: int32
          description: Minor version. Currently `0`.
        revision:
          type: integer
          format: int32
          description: Revision. Currently `0`.
      required:
        - major
        - minor
        - revision
      description: Relay protocol version. Clients currently send `3.0.0`.
    Signalwire.Authentication:
      type: object
      properties:
        jwt_token:
          type: string
          description: The project JWT used to authenticate the client.
      required:
        - jwt_token
      description: Authentication material for the connection.
    SignalwireConnectRequest:
      type: object
      required:
        - jsonrpc
        - id
        - method
        - params
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        method:
          type: string
          const: signalwire.connect
        params:
          $ref: "#/components/schemas/Signalwire.ConnectParams"
    Signalwire.ConnectResult:
      type: object
      properties:
        identity:
          type: string
          description: A unique identifier assigned to this client for the duration of the connection.
        authorization:
          type: object
          additionalProperties: {}
          description: |-
            The authorization block granted to this connection. Treat it as opaque:
            store it and present it unchanged when reconnecting.
        protocol:
          type: string
          description: The protocol the client should use for subsequent requests.
        ice_servers:
          type: array
          items:
            $ref: "#/components/schemas/Signalwire.IceServer"
          description: ICE servers for media. Present for WebRTC clients; omitted when the connection carries no media.
      required:
        - identity
        - authorization
        - protocol
    Signalwire.IceServer:
      type: object
      properties:
        urls:
          type: array
          items:
            type: string
          description: ICE server URLs.
        credential:
          type: string
          description: Credential for the ICE servers (HMAC-SHA1, base64).
        credentialType:
          type: string
          description: Credential type. Currently always `password`.
        username:
          type: string
          description: Username to use — the project id with an expiration-encoded prefix.
      required:
        - urls
        - credential
        - credentialType
        - username
      description: A STUN/TURN ICE server the client should use for media.
    SignalwireConnectResponse:
      type: object
      required:
        - jsonrpc
        - id
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        result:
          $ref: "#/components/schemas/Signalwire.ConnectResult"
    Signalwire.DisconnectParams:
      type: object
      properties:
        restart:
          type: boolean
          description: Indicates the client should restart with a fresh connection.
    SignalwireDisconnectRequest:
      type: object
      required:
        - jsonrpc
        - id
        - method
        - params
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        method:
          type: string
          const: signalwire.disconnect
        params:
          $ref: "#/components/schemas/Signalwire.DisconnectParams"
    Signalwire.DisconnectResult:
      type: object
      properties: {}
      description: Empty acknowledgement.
    SignalwireDisconnectResponse:
      type: object
      required:
        - jsonrpc
        - id
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        result:
          $ref: "#/components/schemas/Signalwire.DisconnectResult"
    Signalwire.ReceiveParams:
      type: object
      properties:
        context:
          type: string
          description: |-
            A single context to set up for receiving inbound events.
            Deprecated — use `contexts`.
          deprecated: true
        contexts:
          type: array
          items:
            type: string
          description: Multiple contexts to set up for receiving inbound events at once.
    SignalwireReceiveRequest:
      type: object
      required:
        - jsonrpc
        - id
        - method
        - params
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        method:
          type: string
          const: signalwire.receive
        params:
          $ref: "#/components/schemas/Signalwire.ReceiveParams"
    Signalwire.Acknowledgement:
      type: object
      properties:
        code:
          type: string
          description: Result code (string). `"200"` on success; e.g. `"402"` Payment required.
        message:
          type: string
          description: Human-readable result message.
      required:
        - code
        - message
      description: Standard `{code, message}` acknowledgement used by receive/unreceive.
    SignalwireReceiveResponse:
      type: object
      required:
        - jsonrpc
        - id
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        result:
          $ref: "#/components/schemas/Signalwire.Acknowledgement"
    Signalwire.UnreceiveParams:
      type: object
      properties:
        contexts:
          type: array
          items:
            type: string
          description: Contexts to stop receiving events for.
      required:
        - contexts
    SignalwireUnreceiveRequest:
      type: object
      required:
        - jsonrpc
        - id
        - method
        - params
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        method:
          type: string
          const: signalwire.unreceive
        params:
          $ref: "#/components/schemas/Signalwire.UnreceiveParams"
    SignalwireUnreceiveResponse:
      type: object
      required:
        - jsonrpc
        - id
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        result:
          $ref: "#/components/schemas/Signalwire.Acknowledgement"
    Signalwire.SetupParams:
      type: object
      properties:
        protocol:
          type: string
          description: A protocol to recover.
    SetupRequest:
      type: object
      required:
        - jsonrpc
        - id
        - method
        - params
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        method:
          type: string
          const: setup
        params:
          $ref: "#/components/schemas/Signalwire.SetupParams"
    Signalwire.SetupResult:
      type: object
      properties:
        protocol:
          type: string
          description: The protocol string the client should use for subsequent requests.
      required:
        - protocol
    SetupResponse:
      type: object
      required:
        - jsonrpc
        - id
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        result:
          $ref: "#/components/schemas/Signalwire.SetupResult"
    Signalwire.AuthorizationStateEvent:
      type: object
      properties:
        authorization_state:
          type: string
          description: |-
            Encrypted authorization state (and validation tag) the client can present on
            reconnect via `connect.authorization_state`.
            Format: `<encryptedAuthStateBase64>:<tagBase64>`.
      required:
        - authorization_state
      description: |-
        Provides updated authorization state to the client so it can reestablish that
        state if it reconnects to another node.
    AuthorizationStateEventFrame:
      type: object
      required:
        - jsonrpc
        - method
        - id
        - params
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        method:
          type: string
          const: signalwire.event
        id:
          type: string
          format: uuid
        params:
          type: object
          required:
            - event_type
            - params
          properties:
            event_type:
              type: string
              const: signalwire.authorization.state
            event_channel:
              type: string
            timestamp:
              type: number
            space_id:
              type: string
            project_id:
              type: string
            params:
              $ref: "#/components/schemas/Signalwire.AuthorizationStateEvent"
    Calling.BeginParams:
      type: object
      properties:
        tag:
          type: string
          description: Identifier added to all call events.
        region:
          type: string
          description: Region to originate from (account/device default if unset).
        device:
          description: |-
            The single device to call. Only the `phone` device is documented for this
            method, with just `from_number`, `to_number`, and `timeout` — the `sip`/
            `webrtc` variants and the extra phone params (`max_duration`, `confirm`,
            `call_state_url`, `call_state_events`) are not supported here.
          allOf:
            - $ref: "#/components/schemas/Calling.DialDevice"
      required:
        - device
    Calling.DialDevice:
      type: object
      properties:
        type:
          type: string
      required:
        - type
      description: A device to dial (`calling.dial` / `calling.begin`). Discriminated on `type`.
      discriminator: type
    Calling.DialPhoneDevice:
      allOf:
        - $ref: "#/components/schemas/Calling.DialDevice"
        - type: object
          properties:
            type:
              type: string
              const: phone
            params:
              $ref: "#/components/schemas/Calling.PhoneDeviceParams"
          required:
            - type
            - params
    Calling.PhoneDeviceParams:
      type: object
      properties:
        from_number:
          type: string
          description: Origination number, E.164.
        to_number:
          type: string
          description: Destination number, E.164.
        timeout:
          type: integer
          format: int32
          description: Seconds to ring before giving up.
          minimum: 0
          default: 30
        max_duration:
          type: integer
          format: int32
          description: Maximum call duration in seconds.
          minimum: 0
        call_state_url:
          type: string
          format: uri
          description: Webhook to receive call-state events for this leg.
        call_state_events:
