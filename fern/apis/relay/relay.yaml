asyncapi: 3.0.0
info:
  title: SignalWire Relay
  version: 1.0.0
  description: |-
    SignalWire Relay is a single WebSocket connection to `relay.signalwire.com`
    speaking JSON-RPC (BLADE). A connection is bootstrapped by `signalwire.connect`,
    then multiplexes every service — calling, messaging, tasking, provisioning, and
    webrtc — over the same socket, routing each request by its JSON-RPC `method`
    namespace. Each service is grouped as its own channel.
defaultContentType: application/json
servers:
  production:
    host: relay.signalwire.com
    protocol: wss
    description: SignalWire Relay WebSocket endpoint.
    security:
      - $ref: "#/components/securitySchemes/httpBearer"
    bindings:
      ws: {}
channels:
  signalwire:
    address: /
    title: Signalwire
    servers:
      - $ref: "#/servers/production"
    messages:
      signalwireConnectRequest:
        $ref: "#/components/messages/signalwireConnectRequest"
      signalwireConnectResponse:
        $ref: "#/components/messages/signalwireConnectResponse"
      signalwireDisconnectRequest:
        $ref: "#/components/messages/signalwireDisconnectRequest"
      signalwireDisconnectResponse:
        $ref: "#/components/messages/signalwireDisconnectResponse"
      signalwireReceiveRequest:
        $ref: "#/components/messages/signalwireReceiveRequest"
      signalwireReceiveResponse:
        $ref: "#/components/messages/signalwireReceiveResponse"
      signalwireUnreceiveRequest:
        $ref: "#/components/messages/signalwireUnreceiveRequest"
      signalwireUnreceiveResponse:
        $ref: "#/components/messages/signalwireUnreceiveResponse"
      setupRequest:
        $ref: "#/components/messages/setupRequest"
      setupResponse:
        $ref: "#/components/messages/setupResponse"
      authorizationStateEvent:
        $ref: "#/components/messages/authorizationStateEvent"
    description: |-
      The `signalwire` protocol bootstraps a Relay connection: it authenticates the
      client to the network, returns the authorization block and ICE servers, and
      controls context (event) subscriptions. Every other Relay service
      (`calling`, `messaging`, `tasking`, …) rides on top of a connection
      established here.
    bindings:
      ws: {}
  calling:
    address: /
    title: Calling
    servers:
      - $ref: "#/servers/production"
    messages:
      callStateEvent:
        $ref: "#/components/messages/callStateEvent"
      callReceiveEvent:
        $ref: "#/components/messages/callReceiveEvent"
      callConnectEvent:
        $ref: "#/components/messages/callConnectEvent"
      callDialEvent:
        $ref: "#/components/messages/callDialEvent"
      callReferEvent:
        $ref: "#/components/messages/callReferEvent"
      callPlayEvent:
        $ref: "#/components/messages/callPlayEvent"
      callQueueEvent:
        $ref: "#/components/messages/callQueueEvent"
      callCollectEvent:
        $ref: "#/components/messages/callCollectEvent"
      callRecordEvent:
        $ref: "#/components/messages/callRecordEvent"
      callDetectEvent:
        $ref: "#/components/messages/callDetectEvent"
      callDenoiseEvent:
        $ref: "#/components/messages/callDenoiseEvent"
      callFaxEvent:
        $ref: "#/components/messages/callFaxEvent"
      callTapEvent:
        $ref: "#/components/messages/callTapEvent"
      callStreamEvent:
