          description: Which call leg(s) to transcribe.
        webhook:
          type: string
          format: uri
          description: http or https URL the transcription is delivered to.
        ai_summary:
          type: boolean
          description: Enable AI summarization; the summary is delivered at the end of the call.
        ai_summary_prompt:
          type: string
          description: Prompt instructing how to summarize when `ai_summary` is enabled.
        live_events:
          type: boolean
          description: Emit live transcription events as they occur.
        speech_timeout:
          type: integer
          format: int32
          description: Speech-recognition timeout in milliseconds. Default `60000`.
          minimum: 0
          default: 60000
        vad_silence_ms:
          type: integer
          format: int32
          description: |-
            Voice-activity-detection silence time in milliseconds. The default is
            engine-dependent (Deepgram vs Google) and is not fixed by this method.
          minimum: 0
