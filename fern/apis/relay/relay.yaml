          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: The id of the request this responds to.
        result:
          description: The method result.
          allOf:
            - $ref: "#/components/schemas/Calling.PassResult"
      required:
        - jsonrpc
        - id
        - result
      description: A JSON-RPC response frame correlated to a request by `id`. `Result` is the method result.
    Calling.PassResult:
      type: object
      properties:
        code:
          type: string
          description: Result code as a string, e.g. `"200"` (success), `"400"`, `"404"`.
          examples:
            - "200"
        message:
          type: string
          description: Human-readable description of the result. On failure, it explains what went wrong. Always check `code`; `message` may be omitted when there is nothing extra to report.
          examples:
            - Passing call to another application
        data:
          type: array
          items: {}
          description: Present on partial failures. Contains the array of per-device `user_errors` explaining which devices failed and why.
        call_id:
          type: string
          description: The call this result is for, echoed from your request.
          examples:
            - c2a1e9f4-6b3d-4e7a-8f1c-2d3e4f5a6b7c
      required:
        - code
      description: Result of `calling.pass`.
    Calling.PayRequest:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Request id, echoed on the correlated response.
        method:
          type: string
          enum:
            - calling.pay
          description: The JSON-RPC method.
        params:
          description: Method parameters.
          allOf:
            - $ref: "#/components/schemas/Calling.PayParams"
      required:
        - jsonrpc
        - id
        - method
        - params
      description: A JSON-RPC request frame. `Method` is the method name; `Params` is the method's input.
    Calling.PayParams:
      type: object
      properties:
        node_id:
          type: string
          description: Opaque identifier that, paired with `call_id`, addresses this call. Echo back the value you received; treat it as opaque.
          examples:
            - a3f1c2d4-5e6f-7a8b-9c0d-1e2f3a4b5c6d
        call_id:
          type: string
          description: Unique identifier of the call.
          examples:
            - c2a1e9f4-6b3d-4e7a-8f1c-2d3e4f5a6b7c
        control_id:
          type: string
          description: Identifier used to control this active pay (e.g. `calling.pay.stop`).
          examples:
            - d4b2e1a0-7c9f-4a3b-8e2d-1f0a9b8c7d6e
        input:
          description: How payment details are collected. Default `dtmf`. (Only `dtmf` supported.)
          default: dtmf
          examples:
            - dtmf
          allOf:
            - $ref: "#/components/schemas/Calling.PayInput"
        status_url:
          type: string
          format: uri
          description: URL to request on each status change during the payment process.
          examples:
            - https://example.com/webhooks/relay
        payment_method:
          description: Payment method to use. Default `credit-card`. (Only `credit-card` supported.)
          default: credit-card
          examples:
            - credit-card
          allOf:
            - $ref: "#/components/schemas/Calling.PayMethod"
        bank_account_type:
          description: Bank account type, for bank-debit payment flows. Default `consumer-checking`.
          default: consumer-checking
          examples:
            - consumer-checking
          allOf:
            - $ref: "#/components/schemas/Calling.PayBankAccountType"
        timeout:
          type: string
          description: |-
            Seconds the Pay IVR waits for the next digit before validating the captured
            digits, passed as a string, e.g. `"6"`. Default `"5"`.
          pattern: ^[0-9]+$
          default: "5"
          examples:
            - "6"
        max_attempts:
          type: string
          description: |-
            Number of times the Pay IVR retries when collecting card details, passed as a
            string, e.g. `"3"`. Default `"1"`.
          pattern: ^[0-9]+$
          default: "1"
          examples:
            - "3"
        security_code:
          type: string
          description: |-
            Whether to prompt for the card security code, passed as a string boolean
            (`"true"` or `"false"`). Default `"true"`.
          default: "true"
          examples:
            - "false"
        postal_code:
          type: string
          description: |-
            Whether to prompt for the billing postal code, passed as a string
            (`"true"`, `"false"`, or a known postcode so the IVR skips the prompt).
            Default `"true"`.
          default: "true"
          examples:
            - "false"
        min_postal_code_length:
          type: string
          description: |-
            Minimum number of digits a caller must enter for the postal code, passed as a
            string, e.g. `"6"`. Default `"0"`.
          pattern: ^[0-9]+$
          default: "0"
          examples:
            - "6"
        payment_connector_url:
          type: string
          format: uri
          description: URL that collected payment details are POSTed to upon completion. Must be an `https://` URL.
          examples:
            - https://example.com/accept-payment
        token_type:
          description: Whether the payment token is one-off or reusable. Default `reusable`.
          default: reusable
          examples:
            - one-time
          allOf:
            - $ref: "#/components/schemas/Calling.PayTokenType"
        charge_amount:
          type: string
          description: |-
            Amount to charge against the payment method. Decimal value with no currency
            prefix, passed as a string (e.g. `"15.00"`). Default `"0.00"`.
          default: "0.00"
          examples:
            - "15.00"
        currency:
          type: string
          description: Currency of the charge amount. Default `usd`.
          default: usd
          examples:
            - usd
        language:
          type: string
          description: Language for prompts played to the caller. Default `en-US`.
          default: en-US
          examples:
            - en-US
        voice:
          type: string
          description: |-
            Text-to-speech voice for prompts (free-form; passed through to TTS, e.g.
            `woman`, `man`, `polly.Sally`). Default `woman`.
          default: woman
          examples:
            - polly.Sally
        say_voice:
          type: string
          description: Fallback text-to-speech voice for prompts, used when `voice` is not set.
          examples:
            - woman
        description:
          type: string
          description: Custom description of the payment.
          examples:
            - book
        valid_card_types:
          type: string
          description: |-
            Space-delimited list of card types allowed in this payment, not an array —
            subset of `visa mastercard amex maestro discover jcb diners-club`. Default
            `"visa mastercard amex"`.
          default: visa mastercard amex
          examples:
            - amex mastercard visa jcb
        parameters:
          type: array
          items:
            $ref: "#/components/schemas/Calling.PayParameter"
          description: Additional name/value pairs to POST to the payment connector.
        prompts:
          type: array
          items:
            $ref: "#/components/schemas/Calling.PayPrompt"
          description: Custom prompts that override the IVR defaults.
      required:
        - node_id
        - call_id
        - control_id
        - payment_connector_url
    Calling.PayInput:
      type: string
      enum:
        - dtmf
        - voice
    Calling.PayMethod:
      type: string
      enum:
        - credit-card
    Calling.PayBankAccountType:
      type: string
      enum:
        - consumer-checking
        - consumer-savings
        - commercial-checking
    Calling.PayTokenType:
      type: string
      enum:
        - one-time
        - reusable
    Calling.PayParameter:
      type: object
      properties:
        name:
          type: string
          description: Parameter name.
          examples:
            - order_id
        value:
          type: string
          description: Parameter value.
          examples:
            - A1B2C3
      required:
        - name
        - value
      description: A name/value pair POSTed to the payment connector alongside payment details.
    Calling.PayPrompt:
      type: object
      properties:
        for:
          description: The situation this prompt applies to.
          examples:
            - payment-card-number
          allOf:
            - $ref: "#/components/schemas/Calling.PayPromptFor"
        card_type:
          type: string
          description: |-
            Space-delimited card-type tokens this prompt applies to (subset of
            `visa mastercard amex maestro discover jcb diners-club`). Applies to all
            card types if unset.
          examples:
            - visa mastercard amex
        attempt:
          type: string
          description: |-
            Which collection attempt(s) this prompt applies to, as a space-delimited list
            of attempt numbers (e.g. `"1 2"`). Applies to all attempts if unset.
          examples:
            - 1 2
        require_matching_inputs:
          type: string
          description: |-
            Whether the caller must enter the same value twice for it to be accepted,
            as a string boolean (e.g. `"true"`). Applies to confirmation-style prompts.
          examples:
            - "true"
        error_type:
          type: string
          description: |-
            Space-delimited error-type tokens this prompt applies to. Accepted tokens:
            timeout, invalid-card-number, invalid-card-type, invalid-date,
            invalid-security-code, invalid-postal-code, session-in-progress,
            card-declined, invalid-bank-routing-number, invalid-bank-account-number,
            and input-matching-failed.
          examples:
            - timeout invalid-card-number invalid-card-type
        actions:
          type: array
          items:
            $ref: "#/components/schemas/Calling.PayPromptAction"
          description: Actions to execute for this prompt.
        play:
          type: array
          items:
            $ref: "#/components/schemas/Calling.PlayMedia"
          description: |-
            Media to play for this prompt as an ordered list of audio, TTS, silence, or
            ringtone elements (the same shape as `calling.play`). When set, it replaces
            `actions` for this prompt.
      required:
        - for
      description: |-
        A custom prompt that overrides the default the Pay flow uses for a given
        situation. The Pay flow is an interactive voice response (IVR) that prompts the
        caller for their card details.

        `card_type` and `error_type` are space-delimited strings, not arrays — e.g.
        `error_type: "timeout invalid-card-number invalid-card-type"`.
    Calling.PayPromptFor:
      type: string
      enum:
        - payment-card-number
        - expiration-date
        - security-code
        - postal-code
        - bank-routing-number
        - bank-account-number
        - payment-processing
        - payment-completed
        - payment-failed
        - payment-canceled
    Calling.PayPromptAction:
      type: object
      properties:
        type:
          description: "`Say` for text-to-speech, `Play` for playing an audio file."
          examples:
            - Say
          allOf:
            - $ref: "#/components/schemas/Calling.PayPromptActionType"
        phrase:
          type: string
          description: Sentence to speak (for `Say`) or audio URL to play (for `Play`).
          examples:
            - Please enter your card number.
      required:
        - type
        - phrase
      description: A single action (Say/Play) executed when a custom prompt is reached.
    Calling.PayPromptActionType:
      type: string
      enum:
        - Say
        - Play
    Calling.PayReply:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: The id of the request this responds to.
        result:
          description: The method result.
          allOf:
            - $ref: "#/components/schemas/Calling.PayResult"
      required:
        - jsonrpc
        - id
        - result
      description: A JSON-RPC response frame correlated to a request by `id`. `Result` is the method result.
    Calling.PayResult:
      type: object
      properties:
        code:
          type: string
          description: Result code as a string, e.g. `"200"` (success), `"400"`, `"404"`.
          examples:
            - "200"
        message:
          type: string
          description: Human-readable description of the result. On failure, it explains what went wrong. Always check `code`; `message` may be omitted when there is nothing extra to report.
          examples:
            - Processing payment
        data:
          type: array
          items: {}
          description: Present on partial failures. Contains the array of per-device `user_errors` explaining which devices failed and why.
        call_id:
          type: string
          description: The call this result is for, echoed from your request.
          examples:
            - c2a1e9f4-6b3d-4e7a-8f1c-2d3e4f5a6b7c
      required:
        - code
    Calling.CallPayEvent:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Event id.
        method:
          type: string
          enum:
            - signalwire.event
