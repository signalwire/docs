      type: object
      properties:
        conversation_log:
          type: array
          items:
            $ref: "#/components/schemas/Calling.ConversationLogEntry"
          description: The full conversation, one entry per turn.
        conversation_summary:
          type: string
          description: An AI-generated summary of the full conversation. Present only when the session was started with AI summary enabled.
          examples:
            - The caller checked their balance and updated their mailing address.
        metrics:
          description: Aggregate metrics for the session.
          allOf:
            - $ref: "#/components/schemas/Calling.TranscriptionMetrics"
      required:
        - conversation_log
        - metrics
      description: |-
        The full conversation log for a `calling.live_transcribe` session, delivered once when the
        session ends. Distinct from `calling.call.transcribe` (the event of the non-live
        `calling.transcribe` method) — this one carries the AI/live transcription conversation.
    Calling.TranscriptionMetrics:
      type: object
      properties:
        total_utterances:
          type: integer
          format: int32
          description: Total number of utterances recognized during the session.
          examples:
            - 42
        first_utterance_ts:
          type: number
          format: double
          description: Timestamp of the first utterance (same units as the event `timestamp`).
        last_utterance_ts:
          type: number
          format: double
          description: Timestamp of the last utterance.
        remote_caller_turns:
          type: integer
          format: int32
          description: Number of speaking turns from the far end.
          examples:
            - 20
        local_caller_turns:
          type: integer
          format: int32
          description: Number of speaking turns from your side.
          examples:
            - 22
        remote_caller_words:
          type: integer
          format: int32
          description: Total words spoken by the far end.
        local_caller_words:
          type: integer
          format: int32
          description: Total words spoken by your side.
        remote_caller_avg_confidence:
          type: number
          format: double
          description: Average recognition confidence across the far end's turns, roughly 0.0-1.0.
        local_caller_avg_confidence:
          type: number
          format: double
          description: Average recognition confidence across your side's turns, roughly 0.0-1.0.
