            params:
              description: The event-specific payload.
              allOf:
                - $ref: "#/components/schemas/Calling.CallConnectParams"
          required:
            - event_type
            - params
          description: The event envelope.
      required:
        - jsonrpc
        - id
        - method
        - params
      description: Fires as a connect request progresses, telling you whether your call has been bridged to the peer. Watch `connect_state` to know when the two calls are joined, torn down, or have failed to connect.
    Calling.CallConnectParams:
      type: object
      properties:
        node_id:
          type: string
          description: Opaque identifier that, paired with `call_id`, addresses this call. Echo back the value you received; treat it as opaque.
          examples:
            - a3f1c2d4-5e6f-7a8b-9c0d-1e2f3a4b5c6d
        call_id:
          type: string
          description: Unique identifier of the call.
          examples:
            - c2a1e9f4-6b3d-4e7a-8f1c-2d3e4f5a6b7c
        segment_id:
          type: string
          description: Identifier of the call segment this event belongs to, for correlating events within the same segment of a call.
          examples:
            - e5c3f2b1-8d0a-4b4c-9f3e-2a1b0c9d8e7f
        tag:
          type: string
          description: The `tag` you set when placing the call, echoed back so you can match the event to your request.
          examples:
            - my-tag-1
        peer:
          description: The other call yours is being connected to.
          allOf:
            - $ref: "#/components/schemas/Calling.ConnectPeer"
        connect_state:
          type: string
          enum:
            - disconnected
            - connecting
            - connected
            - failed
          description: "Where the connection stands: `connecting`, `connected`, `disconnected`, or `failed`."
