    Calling.JoinConferenceParams:
      type: object
      properties:
        node_id:
          type: string
          description: Node the call is on.
        call_id:
          type: string
          description: The call id.
        name:
          type: string
          description: Name of the conference to join.
        muted:
          type: boolean
          description: Join muted.
          default: false
        beep:
          description: Beep behaviour on enter/exit. Default `true`.
          allOf:
            - $ref: "#/components/schemas/Calling.ConferenceBeep"
        start_on_enter:
          type: boolean
          description: Start the conference when this participant enters.
          default: true
        end_on_exit:
          type: boolean
          description: End the conference when this participant exits.
          default: false
        wait_url:
          type: string
          format: uri
          description: "URL to CXML or an mp3/wav to play while waiting. Default: hold music."
        max_participants:
          type: integer
          format: int32
          description: Maximum number of participants (positive, `<= 250`). Default `250`.
          maximum: 250
          exclusiveMinimum: 0
        record:
          description: Whether/when to record the conference. Default `do-not-record`.
          allOf:
            - $ref: "#/components/schemas/Calling.ConferenceRecord"
        region:
          description: Region the conference media is anchored in. Default `global`.
          allOf:
            - $ref: "#/components/schemas/Calling.ConferenceRegion"
        trim:
          description: Trim silence from the recording. Default `trim-silence`.
          allOf:
            - $ref: "#/components/schemas/Calling.ConferenceTrim"
        coach:
          type: string
          description: "A SWML Call ID or CXML CallSid to coach. Default: not set."
        status_callback:
          type: string
          format: uri
          description: "URL to POST conference status callbacks to. Default: not set."
        status_callback_event:
          type: string
          description: |-
            Space-separated list of conference events to deliver to `status_callback`.
            Tokens: `start end join leave mute hold modify speaker announcement`.
            Default: not set.
        status_callback_event_type:
          description: Encoding of the status callback payload. Default `relay`.
          allOf:
            - $ref: "#/components/schemas/Calling.ConferenceCallbackEventType"
        status_callback_method:
          description: HTTP method for `status_callback`. Default `POST`. Ignored when `status_callback_event_type` is `relay`.
          allOf:
            - $ref: "#/components/schemas/Calling.ConferenceCallbackMethod"
        recording_status_callback:
          type: string
          format: uri
          description: "URL to POST recording status callbacks to. Default: not set."
        recording_status_callback_event:
          type: string
          description: |-
            Space-separated list of recording lifecycle events to deliver to
            `recording_status_callback`. Tokens: `in-progress completed absent`
            (e.g. `"in-progress completed"`). Default `completed`.
        recording_status_callback_event_type:
          description: Encoding of the recording status callback payload. Default `relay`.
          allOf:
            - $ref: "#/components/schemas/Calling.ConferenceCallbackEventType"
        recording_status_callback_method:
