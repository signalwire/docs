    Calling.CollectParams:
      type: object
      properties:
        node_id:
          type: string
          description: Node the call is on.
        call_id:
          type: string
          description: The call id.
        control_id:
          type: string
          description: Identifier added to the created collect events.
        initial_timeout:
          type: number
          format: double
          description: |-
            Seconds to wait for initial input. Used only when `start_input_timers: true`.
            Default `4.0`.
          exclusiveMinimum: 0
          default: 4
        digits:
          description: Digit-collection settings. Required if `speech` is not set.
          allOf:
            - $ref: "#/components/schemas/Calling.CollectDigits"
        speech:
          description: Speech-collection settings. Required if `digits` is not set.
          allOf:
            - $ref: "#/components/schemas/Calling.CollectSpeech"
        partial_results:
          type: boolean
          description: If true, partial-result events are fired. Default `false`.
          default: false
        continuous:
          type: boolean
          description: |-
            If true, utterances and digits are detected continuously until the collect is
            stopped. Default `false`.
          default: false
        send_start_of_input:
          type: boolean
          description: If true, the `start_of_input` event is fired when input is detected. Default `false`.
          default: false
        start_input_timers:
          type: boolean
          description: If true, the `initial_timeout` timer is started immediately. Default `false`.
          default: false
        status_url:
          type: string
          format: uri
          description: HTTP(s) URL to POST collect events to.
      required:
        - node_id
        - call_id
        - control_id
    Calling.CollectDigits:
      type: object
      properties:
        max:
          type: integer
          format: int32
