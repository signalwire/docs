                description: The origin used for this destination.
              to:
                type: string
                description: The destination attempted.
              errors:
                type: array
                items: {}
                description: Errors encountered connecting this destination.
          description: Per-destination results, present on partial failure — one entry per attempted destination, each with the destination and any `errors`.
