        action:
          oneOf:
            - $ref: "#/components/schemas/Calling.LiveTranscribeAction"
            - type: string
              enum:
                - stop
            - type: string
              enum:
                - summarize
          description: |-
            The action to perform. Pass the object form and set exactly one of `start`,
