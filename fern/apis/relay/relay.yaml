              - ringing
              - answered
              - ended
          description: |-
            An array of call state event names to be notified about for this destination.
            Overrides the top-level `call_state_events`.
            Allowed event names are: `created`, `ringing`, `answered`, `ended`.
          default:
            - ended
        call_state_url:
          type: string
          format: uri
          description: Webhook URL for call status change notifications for this destination. Overrides the top-level `call_state_url`.
          examples:
            - https://example.com/call-status
        confirm:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: "#/components/schemas/SWML.Calling.ValidConfirmMethods"
          description: |-
            Confirmation to execute on this destination when answered.
            Overrides the top-level `confirm`. Can be either:
            - A URL (string) that returns a SWML document
            - An array of SWML methods to execute inline
          examples:
            - https://example.com/confirm.swml
        confirm_timeout:
          type: integer
          description: Seconds to wait for the `confirm` script on this destination. Overrides the top-level `confirm_timeout`.
          examples:
            - 30
        encryption:
          type: string
          enum:
            - mandatory
            - optional
            - forbidden
          description: Encryption setting for this destination. Overrides the top-level `encryption`. **Possible values:** `mandatory`, `optional`, `forbidden`
          default: optional
          examples:
            - optional
        name:
          type: string
          description: Stream name identifier. Only applies to stream destinations.
          examples:
            - my-stream
        codec:
          type: string
          description: |-
            Audio codec for the stream. Supported values: `PCMU`, `PCMA`, `G722`, `L16`.
