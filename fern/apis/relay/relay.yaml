        call_id:
          type: string
          description: The `call_id` of the participant this event is about. Present on participant events.
        muted:
          type: boolean
          description: Whether the participant is muted. Present on participant events.
        hold:
          type: boolean
          description: Whether the participant is on hold. Present on participant events.
        coaching:
          type: boolean
          description: Whether the participant is coaching another participant. Present on participant events.
        call_id_to_coach:
          type: string
          description: The `call_id` of the participant being coached. Present on coaching participant events.
        end_on_leave:
          type: boolean
          description: Whether the conference ends when this participant leaves. Present on participant events.
        start_on_join:
          type: boolean
          description: Whether the conference starts when this participant joins. Present on participant events.
        call_id_ending_conf:
          type: string
          description: The `call_id` of the participant whose departure ended the conference. Present on `conference-end`.
        reason_ended:
          description: Why the conference ended. Present on `conference-end`.
          allOf:
            - $ref: "#/components/schemas/Calling.ConferenceReasonEnded"
        recording_url:
          type: string
          format: uri
          description: Link to the conference recording. Present on `conference-end`.
        recording_duration:
          type: integer
          format: int32
          description: Recording duration in seconds. Present on `conference-end`.
        recording_file_size:
          type: integer
          format: int32
          description: Recording file size in bytes. Present on `conference-end`.
        announce_url:
          type: string
          format: uri
          description: The URL of the announcement being played. Present on announcement events.
      required:
        - conference_id
        - status
      description: "Fires throughout a conference's life: when it starts and ends, and each time a participant joins, leaves, mutes, holds, speaks, or an announcement plays. Check `status` to see what happened."
    Calling.ConferenceStatus:
      type: string
