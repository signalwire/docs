components:
  schemas:
    Signalwire.ConnectRequest:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Request id, echoed on the correlated response.
        method:
          type: string
          enum:
            - signalwire.connect
          description: The JSON-RPC method.
        params:
          description: Method parameters.
          allOf:
            - $ref: "#/components/schemas/Signalwire.ConnectParams"
      required:
        - jsonrpc
        - id
        - method
        - params
      description: A JSON-RPC request frame. `Method` is the method name; `Params` is the method's input.
    Signalwire.ConnectParams:
      type: object
      properties:
        version:
          description: The Relay protocol version your client speaks.
          allOf:
            - $ref: "#/components/schemas/Signalwire.Version"
        authentication:
          oneOf:
            - $ref: "#/components/schemas/Signalwire.JwtAuthentication"
            - $ref: "#/components/schemas/Signalwire.ProjectTokenAuthentication"
          description: |-
            The credentials that authenticate this connection — this is how you log in to
            Relay. Send either a `jwt_token` (browser and client apps) or a `project` +
            `token` pair (backend apps).
        agent:
          type: string
          description: A label identifying your SDK and application, for example `somesdk-1.2.3`.
          examples:
            - somesdk-1.2.3
        protocol:
          type: string
          description: |-
            The protocol identifier to resume. Provide this to rejoin a protocol you
            established earlier, when your project and signature permit it.
          examples:
            - signalwire_c1d2e3f4a5b6
        authorization_state:
          type: string
          description: |-
            Authorization state from an earlier `signalwire.authorization.state` event.
            Pass it back when reconnecting to restore your permissions and state. Treat it
            as an opaque token — store the value you received and return it unchanged.
          examples:
            - eyJhbGciOiJkaXIiLCJlbmMiOiJBMjU2R0NNIn0..aBcDeF:Z9y8x7w6v5
        contexts:
          type: array
          items:
            type: string
          description: |-
            Contexts to start receiving inbound events for as soon as you connect. This is
            the current (4.0) subscription mechanism — subscribe here at connect time rather
            than with the legacy `signalwire.receive`/`signalwire.unreceive` methods.
          examples:
            - - office
              - support
        event_acks:
          type: boolean
          description: Whether the client acknowledges events; SDKs default to true.
          examples:
            - true
        dpop_token:
          type: string
          description: |-
            Optional proof-of-possession token that cryptographically binds this connection
            to your client. Only needed for advanced token-binding flows; leave it unset
            otherwise.
          examples:
            - eyJ0eXAiOiJkcG9wK2p3dCIsImFsZyI6IkVTMjU2In0.eyJodG0iOiJQT1NUIn0.sig
      required:
        - version
        - authentication
      description: |-
        The parameters you send with `signalwire.connect`: your protocol version,
        credentials, and any contexts to subscribe to at connect time.
    Signalwire.Version:
      type: object
      properties:
        major:
          type: integer
          format: int32
          description: Major version. Current Relay realtime SDKs send `4`; the platform accepts up to major `4`.
          examples:
            - 4
        minor:
          type: integer
          format: int32
          description: Minor version. Current Relay realtime SDKs send `0`.
          examples:
            - 0
        revision:
          type: integer
          format: int32
          description: Revision. Current Relay realtime SDKs send `0`.
          examples:
            - 0
      required:
        - major
        - minor
        - revision
      description: The Relay protocol version your client speaks. Current Relay realtime SDKs send `4.0.0`. The platform accepts any version up to major `4`; a connection reporting a major above `4` is rejected.
    Signalwire.JwtAuthentication:
      type: object
      properties:
        jwt_token:
          type: string
          description: The JWT that authenticates this client, created by your backend.
          examples:
            - eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.payload.sig
      required:
        - jwt_token
      description: |-
        JWT authentication, for browser and client apps. Generate the JWT on your
        backend and hand it to the client — never ship a project API token to the browser.
    Signalwire.ProjectTokenAuthentication:
      type: object
      properties:
        project:
          type: string
          description: Your SignalWire Project ID.
          examples:
            - b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e
        token:
          type: string
          description: Your SignalWire API token.
          examples:
            - PT1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d
      required:
        - project
        - token
      description: |-
        Project + API token authentication, for backend apps that hold your
        SignalWire credentials directly.
    Signalwire.ConnectReply:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: The id of the request this responds to.
        result:
          description: The method result.
          allOf:
            - $ref: "#/components/schemas/Signalwire.ConnectResult"
      required:
        - jsonrpc
        - id
        - result
      description: A JSON-RPC response frame correlated to a request by `id`. `Result` is the method result.
    Signalwire.ConnectResult:
      type: object
      properties:
        protocol:
          type: string
          description: The protocol identifier to use on your subsequent requests. The only field guaranteed on every successful connect result.
          examples:
            - signalwire_c1d2e3f4a5b6
        identity:
          type: string
          description: A unique identifier for this client, valid for the life of the connection. Omitted when the platform does not assign one.
          examples:
            - a3f1c2d4-5e6f-7a8b-9c0d-1e2f3a4b5c6d@node.example.signalwire.com
        authorization:
          type: object
          additionalProperties: {}
          description: |-
            The authorization granted to this connection. Treat it as opaque: store it
            and pass it back unchanged when you reconnect. Omitted when there is none.
        ice_servers:
          type: array
          items:
            $ref: "#/components/schemas/Signalwire.IceServer"
          description: ICE servers to use for media. Returned for WebRTC connections; omitted when the connection carries no media.
      required:
        - protocol
      description: |-
        The result of a successful `signalwire.connect`: the `protocol` to use on later
        requests, your `identity` and `authorization`, and any ICE servers for media.
    Signalwire.IceServer:
      type: object
      properties:
        urls:
          type: array
          items:
            type: string
          description: The ICE server URLs.
          examples:
            - - turn:turn1.signalwire.com:443
              - turn:turn2.signalwire.com:443
        credential:
          type: string
          description: The credential (password) for connecting to these ICE servers.
          examples:
            - kHt9Xq2vN8pLmR3wZ7yB1cF4=
        credentialType:
          type: string
          description: The credential type. Currently always `password`.
          examples:
            - password
        username:
          type: string
          description: The username to authenticate with against these ICE servers.
          examples:
            - 1712349999:b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e
        iceTransportPolicy:
          type: string
          description: The ICE transport policy for this server, when set (e.g. `relay`).
          examples:
            - relay
      required:
        - urls
        - credential
        - credentialType
        - username
      description: A STUN/TURN ICE server to use for media in WebRTC connections.
    Signalwire.AuthorizationStateEvent:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Event id.
        method:
          type: string
          enum:
            - signalwire.event
          description: Always `signalwire.event`.
        params:
          type: object
          properties:
            event_type:
              type: string
              enum:
                - signalwire.authorization.state
              description: The event type — identifies which event this is.
            event_channel:
              type: string
              description: The channel the event was delivered on.
              examples:
                - calling
            timestamp:
              type: number
              format: double
              description: When the event was emitted, as a Unix timestamp in seconds.
              examples:
                - 1712345678.842
            project_id:
              type: string
              description: Your project ID.
              examples:
                - b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e
            space_id:
              type: string
              description: Your space ID.
              examples:
                - c3d4e5f6-a7b8-9c0d-1e2f-3a4b5c6d7e8f
            params:
              description: The event-specific payload.
              allOf:
                - $ref: "#/components/schemas/Signalwire.AuthorizationStateParams"
          required:
            - event_type
            - params
          description: The event envelope.
      required:
        - jsonrpc
        - id
        - method
        - params
      description: |-
        Delivers your latest authorization state so you can restore it if you
        reconnect. Save the `authorization_state` value each time this event arrives.
    Signalwire.AuthorizationStateParams:
      type: object
      properties:
        authorization_state:
          type: string
          description: |-
            Your current authorization state — an opaque, colon-delimited string. Save it and
            pass it back unchanged as `connect.authorization_state` when you reconnect.
          examples:
            - eyJhbGciOiJkaXIiLCJlbmMiOiJBMjU2R0NNIn0..aBcDeF:Z9y8x7w6v5
      required:
        - authorization_state
      description: The payload of a `signalwire.authorization.state` event, carrying your latest authorization state.
    Signalwire.DisconnectEvent:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Request id, echoed on the correlated response.
        method:
          type: string
          enum:
            - signalwire.disconnect
          description: The JSON-RPC method.
        params:
          description: Method parameters.
          allOf:
            - $ref: "#/components/schemas/Signalwire.DisconnectParams"
      required:
        - jsonrpc
        - id
        - method
        - params
      description: |-
        A `signalwire.disconnect` request the service pushes to you when it is about to
        close your connection — for example during a deployment. The frame carries a
        single `restart` flag. Flush anything pending and reply with an empty result
        `{}` to acknowledge; that reply should be the last thing you send before the
        connection closes. If `restart` is `true`, reconnect afterward.

        You receive this message; you do not send it (that is why this channel has no
        send operation).
    Signalwire.DisconnectParams:
      type: object
      properties:
        restart:
          type: boolean
          description: When `true`, you should open a fresh connection after disconnecting.
          examples:
            - true
      description: The parameters you send with `signalwire.disconnect`.
    Signalwire.ReceiveRequest:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Request id, echoed on the correlated response.
        method:
          type: string
          enum:
            - signalwire.receive
          description: The JSON-RPC method.
        params:
          description: Method parameters.
          allOf:
            - $ref: "#/components/schemas/Signalwire.ReceiveParams"
      required:
        - jsonrpc
        - id
        - method
        - params
      description: A JSON-RPC request frame. `Method` is the method name; `Params` is the method's input.
    Signalwire.ReceiveParams:
      type: object
      properties:
        contexts:
          type: array
          items:
            type: string
          description: The contexts to start receiving inbound events for.
          examples:
            - - office
              - support
        context:
          type: string
          description: Deprecated — use `contexts` instead. A single context to subscribe to; merged into the contexts list.
          examples:
            - office
      description: The parameters you send with `signalwire.receive` to start receiving inbound events for one or more contexts.
    Signalwire.ReceiveReply:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: The id of the request this responds to.
        result:
          description: The method result.
          allOf:
            - $ref: "#/components/schemas/Signalwire.Acknowledgement"
      required:
        - jsonrpc
        - id
        - result
      description: A JSON-RPC response frame correlated to a request by `id`. `Result` is the method result.
    Signalwire.Acknowledgement:
      type: object
      properties:
        code:
          type: string
          description: The result code as a string. `"200"` means success; `"402"` means payment required.
          examples:
            - "200"
        message:
          type: string
          description: A human-readable message describing the result.
          examples:
            - Receiving all inbound related to the requested relay contexts and available scopes
      required:
        - code
        - message
      description: A `{code, message}` acknowledgement returned by receive and unreceive.
    Calling.CallReceiveEvent:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Event id.
        method:
          type: string
          enum:
            - signalwire.event
          description: Always `signalwire.event`.
        params:
          type: object
          properties:
            event_type:
              type: string
              enum:
                - calling.call.receive
              description: The event type — identifies which event this is.
            event_channel:
              type: string
              description: The channel the event was delivered on.
              examples:
                - calling
            timestamp:
              type: number
              format: double
              description: When the event was emitted, as a Unix timestamp in seconds.
              examples:
                - 1712345678.842
            project_id:
              type: string
              description: Your project ID.
              examples:
                - b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e
            space_id:
              type: string
              description: Your space ID.
              examples:
                - c3d4e5f6-a7b8-9c0d-1e2f-3a4b5c6d7e8f
            params:
              description: The event-specific payload.
              allOf:
                - $ref: "#/components/schemas/Calling.CallReceiveParams"
          required:
            - event_type
            - params
          description: The event envelope.
      required:
        - jsonrpc
        - id
        - method
        - params
      description: Fires when a new call comes in that your application can answer and control. The payload tells you who is calling and on which context.
    Calling.CallReceiveParams:
      type: object
      properties:
        node_id:
          type: string
          description: Opaque identifier that, paired with `call_id`, addresses this call. Echo back the value you received; treat it as opaque.
          examples:
            - a3f1c2d4-5e6f-7a8b-9c0d-1e2f3a4b5c6d
        call_id:
          type: string
          description: Unique identifier of the call.
          examples:
            - c2a1e9f4-6b3d-4e7a-8f1c-2d3e4f5a6b7c
        segment_id:
          type: string
          description: Identifier of the call segment this event belongs to, for correlating events within the same segment of a call.
          examples:
            - e5c3f2b1-8d0a-4b4c-9f3e-2a1b0c9d8e7f
        tag:
          type: string
          description: The `tag` you set when placing the call, echoed back so you can match the event to your request.
          examples:
            - my-tag-1
        call_state:
          description: The current state of the inbound call.
          examples:
            - created
          allOf:
            - $ref: "#/components/schemas/Calling.CallState"
        direction:
          description: Whether the call is inbound or outbound. Always present on the receive event.
          examples:
            - inbound
          allOf:
            - $ref: "#/components/schemas/Calling.CallDirection"
        context:
          type: string
          description: The context the call arrived on, such as `pbx`. Always present on the receive event. For this event the same value is also surfaced at the top level of the event envelope (alongside `event_type`), so you can read it from either place.
          examples:
            - pbx
        device:
          description: The device the call is coming in on, including the caller's number.
          allOf:
            - $ref: "#/components/schemas/Calling.CallDevice"
      required:
        - node_id
        - call_id
        - call_state
        - direction
        - context
        - device
      description: "Payload of the `calling.call.receive` event: who is calling and on which context."
    Calling.CallState:
      type: string
      enum:
        - created
        - ringing
        - answered
        - ending
        - ended
    Calling.CallDirection:
      type: string
      enum:
        - inbound
        - outbound
    Calling.CallDevice:
      type: object
      properties:
        type:
          type: string
          enum:
            - phone
            - sip
            - webrtc
      required:
        - type
      description: The negotiated call leg reported in call events. Discriminated on `type`.
      discriminator: type
    Calling.CallPhoneDevice:
      allOf:
        - $ref: "#/components/schemas/Calling.CallDevice"
        - type: object
          properties:
            type:
              type: string
              const: phone
            params:
              type: object
              properties:
                from_number:
                  type: string
                  description: Origination number, E.164.
                  examples:
                    - "+15551230001"
                to_number:
                  type: string
                  description: Destination number, E.164.
                  examples:
                    - "+15551230002"
                headers:
                  type: array
                  items:
                    $ref: "#/components/schemas/Calling.SipHeader"
                  description: Custom `X-` SIP headers carried on the leg, when present.
              required:
                - from_number
                - to_number
          required:
            - type
            - params
          description: A phone (PSTN) leg, as reported in call events.
    Calling.SipHeader:
      type: object
      properties:
        name:
          type: string
          description: Header name. Typically an `X-`-prefixed custom header; the reserved `X-SignalWire*` and `X-CID*` names are rejected.
          examples:
            - X-Custom-Key
        value:
          type: string
          description: Header value. Must not contain CR or LF characters.
          examples:
            - custom-value
      required:
        - name
        - value
      description: |-
        A custom SIP header. Custom `X-` headers are allowed, except the reserved
        `X-SignalWire*` and `X-CID*` prefixes. A few standard headers (`Privacy`,
        `P-Asserted-Identity`, `User-to-User`) are also permitted.
    Calling.CallSipDevice:
      allOf:
        - $ref: "#/components/schemas/Calling.CallDevice"
        - type: object
          properties:
            type:
              type: string
              const: sip
            params:
              type: object
              properties:
                from:
                  type: string
                  description: Origination SIP address.
                  examples:
                    - sip:alice@example.com
                to:
                  type: string
                  description: Destination SIP address.
                  examples:
                    - sip:bob@example.com
                headers:
                  type: array
                  items:
                    $ref: "#/components/schemas/Calling.SipHeader"
                  description: Custom `X-` SIP headers.
              required:
                - from
                - to
          required:
            - type
            - params
          description: A SIP leg, as reported in call events.
    Calling.CallWebrtcDevice:
      allOf:
        - $ref: "#/components/schemas/Calling.CallDevice"
        - type: object
          properties:
            type:
              type: string
              const: webrtc
            params:
              type: object
              properties:
                from:
                  type: string
                  description: Origination — the WebRTC endpoint the leg was placed from.
                  examples:
                    - agent-1
                to:
                  type: string
                  description: Destination — the WebRTC endpoint the leg was placed to.
                  examples:
                    - agent-2
              required:
                - from
                - to
          required:
            - type
            - params
          description: A WebRTC leg, as reported in call events.
    Calling.CallStateEvent:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Event id.
        method:
          type: string
          enum:
            - signalwire.event
          description: Always `signalwire.event`.
        params:
          type: object
          properties:
            event_type:
              type: string
              enum:
                - calling.call.state
              description: The event type — identifies which event this is.
            event_channel:
              type: string
              description: The channel the event was delivered on.
              examples:
                - calling
            timestamp:
              type: number
              format: double
              description: When the event was emitted, as a Unix timestamp in seconds.
              examples:
                - 1712345678.842
            project_id:
              type: string
              description: Your project ID.
              examples:
                - b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e
            space_id:
              type: string
              description: Your space ID.
              examples:
                - c3d4e5f6-a7b8-9c0d-1e2f-3a4b5c6d7e8f
            params:
              description: The event-specific payload.
              allOf:
                - $ref: "#/components/schemas/Calling.CallStateParams"
          required:
            - event_type
            - params
          description: The event envelope.
      required:
        - jsonrpc
        - id
        - method
        - params
      description: Fires every time one of your calls changes state. Use the `call_state` field to track the call through its lifecycle, and `tag` to match the event back to the call you placed.
    Calling.CallStateParams:
      type: object
      properties:
        node_id:
          type: string
          description: Opaque identifier that, paired with `call_id`, addresses this call. Echo back the value you received; treat it as opaque.
          examples:
            - a3f1c2d4-5e6f-7a8b-9c0d-1e2f3a4b5c6d
        call_id:
          type: string
          description: Unique identifier of the call.
          examples:
            - c2a1e9f4-6b3d-4e7a-8f1c-2d3e4f5a6b7c
        segment_id:
          type: string
          description: Identifier of the call segment this event belongs to, for correlating events within the same segment of a call.
          examples:
            - e5c3f2b1-8d0a-4b4c-9f3e-2a1b0c9d8e7f
        tag:
          type: string
          description: The `tag` you set when placing the call, echoed back so you can match the event to your request.
          examples:
            - my-tag-1
        device:
          description: The device handling this call, once it has been determined.
          allOf:
            - $ref: "#/components/schemas/Calling.CallDevice"
        parent:
          description: Present when this call was created by another call, describing that originating call.
          allOf:
            - $ref: "#/components/schemas/Calling.CallParentRef"
        peer:
          description: Present when this call is bridged to another, describing the other call.
          allOf:
            - $ref: "#/components/schemas/Calling.CallPeerRef"
        call_state:
          description: The state the call has just moved into.
          examples:
            - ended
          allOf:
            - $ref: "#/components/schemas/Calling.CallState"
        direction:
          description: Whether the call is inbound or outbound.
          examples:
            - outbound
          allOf:
            - $ref: "#/components/schemas/Calling.CallDirection"
        start_time:
          type: integer
          format: int64
          description: When the call started, in epoch milliseconds.
          examples:
            - 1712345678123
        answer_time:
          type: integer
          format: int64
          description: When the call was answered, in epoch milliseconds.
          examples:
            - 1712345680456
        end_time:
          type: integer
          format: int64
          description: When the call ended, in epoch milliseconds.
          examples:
            - 1712345695789
        end_reason:
          description: Why the call ended. Present once the call has ended.
          examples:
            - hangup
          allOf:
            - $ref: "#/components/schemas/Calling.CallStateEndReason"
        end_source:
          type: string
          description: Which side ended the call, e.g. `peer` (the other party). Present once the call has ended.
          examples:
            - peer
        dial_winner:
          type: string
          enum:
            - "true"
          description: Set to the string `"true"` on the call that won a `calling.dial` race. Absent otherwise. Note the value is the string `"true"`, not a JSON boolean.
          examples:
            - "true"
        sip_data:
          description: SIP addressing/header detail. Present only for SIP calls (`device.type == "sip"`).
          allOf:
            - $ref: "#/components/schemas/Calling.CallSipData"
        audio_in_mos:
          type: number
          format: double
          description: Inbound-audio Mean Opinion Score (voice quality, ~1.0-5.0). Present when RTP quality stats are available.
          examples:
            - 4.4
      required:
        - node_id
        - call_id
        - call_state
      description: "Payload of the `calling.call.state` event: the call's address, state, timing, and leg detail."
    Calling.CallParentRef:
      type: object
      properties:
        node_id:
          type: string
          description: Opaque identifier that, paired with `call_id`, addresses the parent call. Echo back the value you received; treat it as opaque.
          examples:
            - a3f1c2d4-5e6f-7a8b-9c0d-1e2f3a4b5c6d
        call_id:
          type: string
          description: The parent call's `call_id`.
          examples:
            - e5c3f2b1-8d0a-4b4c-9f3e-2a1b0c9d8e7f
        device_type:
          type: string
          description: The parent's device type, such as `sip`.
          examples:
            - sip
      description: The call that created this one, when it was spawned by another call.
    Calling.CallPeerRef:
      type: object
      properties:
        node_id:
          type: string
          description: Opaque identifier that, paired with `call_id`, addresses the peer call. Echo back the value you received; treat it as opaque.
          examples:
            - a3f1c2d4-5e6f-7a8b-9c0d-1e2f3a4b5c6d
        call_id:
          type: string
          description: The peer call's `call_id`.
          examples:
            - e5c3f2b1-8d0a-4b4c-9f3e-2a1b0c9d8e7f
      description: The other call this one is bridged to.
    Calling.CallStateEndReason:
      type: string
      enum:
        - hangup
        - cancel
        - busy
        - noAnswer
        - decline
        - error
        - abandoned
        - maxDuration
        - notFound
    Calling.CallSipData:
      type: object
      properties:
        sip_req_user:
          type: string
          description: Request-URI user part.
          examples:
            - bob
        sip_req_uri:
          type: string
          description: Request-URI user@host.
          examples:
            - bob@example.com
        sip_req_host:
          type: string
          description: Request-URI host.
          examples:
            - example.com
        sip_from_user:
          type: string
          description: From-header user part.
          examples:
            - alice
        sip_from_uri:
          type: string
          description: From-header user@host.
          examples:
            - alice@example.com
        sip_from_host:
          type: string
          description: From-header host.
          examples:
            - example.com
        sip_to_user:
          type: string
          description: To-header user part.
          examples:
            - bob
        sip_to_uri:
          type: string
          description: To-header user@host.
          examples:
            - bob@example.com
        sip_to_host:
          type: string
          description: To-header host.
          examples:
            - example.com
        sip_contact_user:
          type: string
          description: Contact-header user part.
          examples:
            - alice
        sip_contact_port:
          type: string
          description: Contact-header port.
          examples:
            - "5060"
        sip_contact_uri:
          type: string
          description: Contact-header user@host[:port].
          examples:
            - alice@203.0.113.10:5060
        sip_contact_host:
          type: string
          description: Contact-header host.
          examples:
            - 203.0.113.10
        sip_from_params:
          type: object
          additionalProperties:
            type: string
          description: Parsed From-URI parameters (`key=value` pairs).
        sip_to_params:
          type: object
          additionalProperties:
            type: string
          description: Parsed To-URI parameters (`key=value` pairs).
        sip_contact_params:
          type: object
          additionalProperties:
            type: string
          description: Parsed Contact-URI parameters (`key=value` pairs).
        sip_req_params:
          type: object
          additionalProperties:
            type: string
          description: Parsed Request-URI parameters (`key=value` pairs).
        sip_p_asserted_identity:
          type: string
          description: The `P-Asserted-Identity` header value, when present.
          examples:
            - '"Alice" <sip:alice@example.com>'
      description: Present only for SIP calls (`device.type == "sip"`). SIP addressing/header detail extracted from the inbound INVITE. Every sub-field is optional and appears only when the corresponding SIP header was present.
    Signalwire.UnreceiveRequest:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Request id, echoed on the correlated response.
        method:
          type: string
          enum:
            - signalwire.unreceive
          description: The JSON-RPC method.
        params:
          description: Method parameters.
          allOf:
            - $ref: "#/components/schemas/Signalwire.UnreceiveParams"
      required:
        - jsonrpc
        - id
        - method
        - params
      description: A JSON-RPC request frame. `Method` is the method name; `Params` is the method's input.
    Signalwire.UnreceiveParams:
      type: object
      properties:
        contexts:
          type: array
          items:
            type: string
          description: The contexts to stop receiving events for.
          minItems: 1
          examples:
            - - office
              - support
      required:
        - contexts
      description: The parameters you send with `signalwire.unreceive` to stop receiving inbound events for one or more contexts.
    Signalwire.UnreceiveReply:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: The id of the request this responds to.
        result:
          description: The method result.
          allOf:
            - $ref: "#/components/schemas/Signalwire.Acknowledgement"
      required:
        - jsonrpc
        - id
        - result
      description: A JSON-RPC response frame correlated to a request by `id`. `Result` is the method result.
    Calling.DialRequest:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Request id, echoed on the correlated response.
        method:
          type: string
          enum:
            - calling.dial
          description: The JSON-RPC method.
        params:
          description: Method parameters.
          allOf:
            - $ref: "#/components/schemas/Calling.DialParams"
      required:
        - jsonrpc
        - id
        - method
        - params
      description: A JSON-RPC request frame. `Method` is the method name; `Params` is the method's input.
    Calling.DialParams:
      type: object
      properties:
        tag:
          type: string
          description: Your label for this dial. Every resulting `calling.call.*` and `calling.call.dial` event carries this `tag`, so use it to match events back to this request.
          examples:
            - my-tag-1
        devices:
          type: array
          items:
            type: array
            items:
              $ref: "#/components/schemas/Calling.DialDevice"
          description: |-
            Devices to dial. The outer array is sequential ringing groups; the inner
            array is simultaneous (parallel) dials within a group. The first device to
            answer wins.
        max_duration:
          type: integer
          format: int32
          description: Maximum length of the call, in seconds. The call ends automatically once this is reached.
          minimum: 0
          examples:
            - 3600
        timeout:
          type: number
          format: double
          description: Default ring timeout, in seconds, used when a device doesn't set its own.
          exclusiveMinimum: 0
          examples:
            - 30
        max_price_per_minute:
          type: number
          format: double
          description: Highest price per minute you're willing to pay. Devices that would exceed this rate aren't dialed.
          examples:
            - 0.05
      required:
        - tag
        - devices
    Calling.DialDevice:
      type: object
      properties:
        type:
          type: string
          enum:
            - phone
            - sip
            - webrtc
      required:
        - type
      description: A device to dial (`calling.dial`). Discriminated on `type`.
      discriminator: type
    Calling.DialPhoneDevice:
      allOf:
        - $ref: "#/components/schemas/Calling.DialDevice"
        - type: object
          properties:
            type:
              type: string
              const: phone
            params:
              $ref: "#/components/schemas/Calling.PhoneDeviceParams"
          required:
            - type
            - params
          description: Dial a phone number over the PSTN.
    Calling.PhoneDeviceParams:
      type: object
      properties:
        from_number:
          type: string
          description: Origination number, E.164. When omitted, SignalWire fills in a caller ID.
          examples:
            - "+15551230001"
        to_number:
          type: string
          description: Destination number, E.164.
          examples:
            - "+15551230002"
        timeout:
          type: integer
          format: int32
          description: Seconds to ring before giving up.
          minimum: 0
          default: 30
          examples:
            - 30
        call_state_url:
          type: string
          format: uri
          description: Webhook to receive call-state events for this leg.
          examples:
            - https://example.com/webhooks/relay
        call_state_events:
          type: array
          items:
            $ref: "#/components/schemas/Calling.CallStateEventName"
          description: Which call states to deliver to `call_state_url`. Default `["ended"]`.
          examples:
            - - ended
        confirm:
          oneOf:
            - type: string
              format: uri
            - type: array
              items: {}
          description: |-
            A prompt that must be confirmed before this leg is bridged. Provide a URL to a
            SWML document or an inline SWML document. See the SWML reference for details.
        confirm_timeout:
          type: integer
          format: int32
          description: Seconds to wait for the confirmation prompt to complete before giving up.
          minimum: 0
          examples:
            - 30
      required:
        - to_number
      description: Parameters for dialing or connecting a phone (PSTN) leg.
    Calling.CallStateEventName:
      type: string
      enum:
        - created
        - ringing
        - answered
        - ended
    Calling.DialSipDevice:
      allOf:
        - $ref: "#/components/schemas/Calling.DialDevice"
        - type: object
          properties:
            type:
              type: string
              const: sip
            params:
              $ref: "#/components/schemas/Calling.SipDeviceParams"
          required:
            - type
            - params
          description: Dial a SIP endpoint.
    Calling.SipDeviceParams:
      type: object
      properties:
        from:
          type: string
          description: Origination SIP URI / address. When omitted, SignalWire fills in a caller ID.
          examples:
            - sip:alice@example.com
        from_name:
          type: string
          description: Caller name to present.
          examples:
            - Alice
        to:
          type: string
          description: Destination SIP URI / address.
          examples:
            - sip:bob@example.com
        timeout:
          type: integer
          format: int32
          description: Seconds to ring before giving up.
          minimum: 0
          default: 30
          examples:
            - 30
        headers:
          type: array
          items:
            $ref: "#/components/schemas/Calling.SipHeader"
          description: Custom `X-` SIP headers.
        codecs:
          type: array
          items:
            $ref: "#/components/schemas/Calling.SipCodec"
          description: Negotiable codecs (SignalWire-picked if unset).
          examples:
            - - PCMU
              - PCMA
        webrtc_media:
          type: boolean
          description: Use WebRTC media for this leg.
          examples:
            - false
        encryption:
          type: string
          enum:
            - forbidden
            - mandatory
            - optional
          description: Media encryption policy for the SIP leg.
          examples:
            - optional
        username:
          type: string
          description: Username used to authenticate the SIP leg.
          examples:
            - alice
        password:
          type: string
          description: Password used to authenticate the SIP leg.
          examples:
            - s3cret
        session_timeout:
          type: integer
          format: int32
          description: Seconds between SIP session-timer refreshes for this leg.
          minimum: 0
          examples:
            - 1800
        call_state_url:
          type: string
          format: uri
          description: Webhook to receive call-state events for this leg.
          examples:
            - https://example.com/webhooks/relay
        call_state_events:
          type: array
          items:
            $ref: "#/components/schemas/Calling.CallStateEventName"
          description: Which call states to deliver to `call_state_url`. Default `["ended"]`.
          examples:
            - - ended
        confirm:
          oneOf:
            - type: string
              format: uri
            - type: array
              items: {}
          description: A confirmation prompt (SWML URL or inline SWML).
        confirm_timeout:
          type: integer
          format: int32
          description: Seconds to wait for the confirmation prompt to complete before giving up.
          minimum: 0
          examples:
            - 30
      required:
        - to
      description: Parameters for dialing or connecting a SIP leg.
    Calling.SipCodec:
      type: string
      enum:
        - PCMU
        - PCMA
        - OPUS
        - G729
        - G722
        - AMR-WB
        - VP8
        - H264
    Calling.DialWebrtcDevice:
      allOf:
        - $ref: "#/components/schemas/Calling.DialDevice"
        - type: object
          properties:
            type:
              type: string
              const: webrtc
            params:
              $ref: "#/components/schemas/Calling.WebrtcDeviceParams"
          required:
            - type
            - params
          description: Dial a WebRTC endpoint.
    Calling.WebrtcDeviceParams:
      type: object
      properties:
        from:
          type: string
          description: Origination — E.164 or a registered endpoint URI. When omitted, SignalWire fills in a caller ID.
          examples:
            - "+15551230001"
        to:
          type: string
          description: Destination — a WebRTC endpoint URI / resource name.
          examples:
            - agent-1
        timeout:
          type: integer
          format: int32
          description: Seconds to ring before giving up.
          minimum: 0
          default: 30
          examples:
            - 30
        call_state_url:
          type: string
          format: uri
          description: Webhook to receive call-state events for this leg.
          examples:
            - https://example.com/webhooks/relay
        call_state_events:
          type: array
          items:
