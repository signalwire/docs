components:
  schemas:
    Signalwire.ConnectResult:
      type: object
      properties:
        identity:
          type: string
          description: A unique identifier for this client, valid for the life of the connection.
        authorization:
          type: object
          additionalProperties: {}
          description: |-
            The authorization granted to this connection. Treat it as opaque: store it
            and pass it back unchanged when you reconnect.
        protocol:
          type: string
          description: The protocol identifier to use on your subsequent requests.
        ice_servers:
          type: array
          items:
            $ref: "#/components/schemas/Signalwire.IceServer"
          description: ICE servers to use for media. Returned for WebRTC connections; omitted when the connection carries no media.
      required:
        - identity
        - authorization
        - protocol
    Signalwire.IceServer:
      type: object
      properties:
        urls:
          type: array
          items:
            type: string
          description: The ICE server URLs.
        credential:
          type: string
          description: The credential (password) for connecting to these ICE servers.
        credentialType:
          type: string
          description: The credential type. Currently always `password`.
        username:
          type: string
          description: The username to authenticate with against these ICE servers.
      required:
        - urls
        - credential
        - credentialType
        - username
      description: A STUN/TURN ICE server to use for media in WebRTC connections.
    Signalwire.ConnectParams:
      type: object
      properties:
        version:
          description: The Relay protocol version your client speaks.
          allOf:
            - $ref: "#/components/schemas/Signalwire.Version"
        authentication:
          oneOf:
            - $ref: "#/components/schemas/Signalwire.JwtAuthentication"
            - $ref: "#/components/schemas/Signalwire.ProjectTokenAuthentication"
          description: |-
            The credentials that authenticate this connection — this is how you log in to
            Relay. Send either a `jwt_token` (browser and client apps) or a `project` +
            `token` pair (backend apps).
        agent:
          type: string
          description: A label identifying your SDK and application, for example `somesdk-1.2.3`.
        protocol:
          type: string
          description: |-
            The protocol identifier to resume. Provide this to rejoin a protocol you
            established earlier, when your project and signature permit it.
        authorization_state:
          type: string
          description: |-
            Authorization state from an earlier `signalwire.authorization.state` event.
            Pass it back when reconnecting to restore your permissions and state.
            Format: `<encryptedAuthStateBase64>:<tagBase64>`.
        contexts:
          type: array
          items:
            type: string
          description: Contexts to start receiving inbound events for as soon as you connect.
      required:
        - version
        - authentication
    Signalwire.Version:
      type: object
      properties:
        major:
          type: integer
          format: int32
          description: Major version. Currently `3`.
        minor:
          type: integer
          format: int32
          description: Minor version. Currently `0`.
        revision:
          type: integer
          format: int32
          description: Revision. Currently `0`.
      required:
        - major
        - minor
        - revision
      description: The Relay protocol version your client speaks. Currently `3.0.0`.
    Signalwire.JwtAuthentication:
      type: object
      properties:
        jwt_token:
          type: string
          description: The JWT that authenticates this client, created by your backend.
      required:
        - jwt_token
      description: |-
        JWT authentication, for browser and client apps. Generate the JWT on your
        backend and hand it to the client — never ship a project API token to the browser.
    Signalwire.ProjectTokenAuthentication:
      type: object
      properties:
        project:
          type: string
          description: Your SignalWire Project ID.
        token:
          type: string
          description: Your SignalWire API token.
      required:
        - project
        - token
      description: |-
        Project + API token authentication, for backend apps that hold your
        SignalWire credentials directly.
    SignalwireConnectRequest:
      type: object
      required:
        - jsonrpc
        - id
        - method
        - params
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        method:
          type: string
          const: signalwire.connect
        params:
          $ref: "#/components/schemas/Signalwire.ConnectParams"
    SignalwireConnectResponse:
      type: object
      required:
        - jsonrpc
        - id
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        result:
          $ref: "#/components/schemas/Signalwire.ConnectResult"
    Signalwire.AuthorizationStateEvent:
      type: object
      properties:
        authorization_state:
          type: string
          description: |-
            Your current authorization state. Save it and pass it back as
            `connect.authorization_state` when you reconnect.
            Format: `<encryptedAuthStateBase64>:<tagBase64>`.
      required:
        - authorization_state
      description: |-
        Delivers your latest authorization state so you can restore it if you
        reconnect. Save the `authorization_state` value each time this event arrives.
    AuthorizationStateEventFrame:
      type: object
      required:
        - jsonrpc
        - method
        - id
        - params
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        method:
          type: string
          const: signalwire.event
        id:
          type: string
          format: uuid
        params:
          type: object
          required:
            - event_type
            - params
          properties:
            event_type:
              type: string
              const: signalwire.authorization.state
            event_channel:
              type: string
            timestamp:
              type: number
            space_id:
              type: string
            project_id:
              type: string
            params:
              $ref: "#/components/schemas/Signalwire.AuthorizationStateEvent"
    Signalwire.DisconnectResult:
      type: object
      properties: {}
      description: Empty acknowledgement.
    Signalwire.DisconnectParams:
      type: object
      properties:
        restart:
          type: boolean
          description: When `true`, you should open a fresh connection after disconnecting.
    SignalwireDisconnectRequest:
      type: object
      required:
        - jsonrpc
        - id
        - method
        - params
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        method:
          type: string
          const: signalwire.disconnect
        params:
          $ref: "#/components/schemas/Signalwire.DisconnectParams"
    SignalwireDisconnectResponse:
      type: object
      required:
        - jsonrpc
        - id
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        result:
          $ref: "#/components/schemas/Signalwire.DisconnectResult"
    Signalwire.Acknowledgement:
      type: object
      properties:
        code:
          type: string
          description: The result code as a string. `"200"` means success; `"402"` means payment required.
        message:
          type: string
          description: A human-readable message describing the result.
      required:
        - code
        - message
      description: A `{code, message}` acknowledgement returned by receive and unreceive.
    Signalwire.ReceiveParams:
      type: object
      properties:
