        - device
    Calling.TapConfig:
      type: object
      properties:
        type:
          type: string
      required:
        - type
      description: Media to intercept. Discriminated on `type` (documented value `audio`).
      discriminator: type
    Calling.TapAudio:
      allOf:
        - $ref: "#/components/schemas/Calling.TapConfig"
        - type: object
          properties:
            type:
              type: string
              const: audio
            params:
              $ref: "#/components/schemas/Calling.TapAudioParams"
          required:
            - type
            - params
    Calling.TapAudioParams:
      type: object
      properties:
        direction:
          description: Side of the call to tap. Default `speak`.
          default: speak
          allOf:
            - $ref: "#/components/schemas/Calling.TapDirection"
      description: "`audio` tap params."
    Calling.TapDirection:
      type: string
      enum:
        - listen
        - speak
        - both
    Calling.TapDevice:
      type: object
      properties:
        type:
          type: string
      required:
        - type
      description: |-
        Device to receive the tapped media. Discriminated on `type` (`rtp`|`ws`;
        future: `phone`|`webrtc`|`sip`). Echoed back fully-resolved as the result's
        `source_device`.
      discriminator: type
    Calling.TapRtpDevice:
      allOf:
        - $ref: "#/components/schemas/Calling.TapDevice"
        - type: object
          properties:
            type:
              type: string
              const: rtp
            params:
              $ref: "#/components/schemas/Calling.TapRtpDeviceParams"
          required:
            - type
            - params
    Calling.TapRtpDeviceParams:
      type: object
      properties:
        addr:
          type: string
          description: |-
            RTP IPv4 address. Must be an IP owned by the customer or expecting our
            traffic; specifying a private IP or a SignalWire-owned public IP is
            forbidden.
        port:
          type: integer
          format: int32
          description: RTP port.
        codec:
          type: string
          description: |-
            Codec for the tapped audio (known values: `OPUS`, `PCMA`, `PCMU`).
            Matches the tapped audio if not set.
        ptime:
          type: integer
          format: int32
          description: Packetization time in ms — matches the tapped audio if not set.
        rate:
          type: integer
          format: int32
          description: Sample rate in Hz (present in the resolved `source_device` echo).
      required:
        - addr
        - port
      description: "`rtp` device params (delivery target)."
