            - $ref: "#/components/schemas/Calling.LiveTranslateInject"
      description: |-
        The live-translate action to perform. Set exactly one of `start`, `stop`,
        `summarize`, or `inject`.
    Calling.LiveTranslateStart:
      type: object
      properties:
        from_lang:
          type: string
          description: The language being spoken, e.g. `en-US`.
          examples:
            - en-US
        to_lang:
          type: string
          description: The language to translate into, e.g. `es-ES`.
          examples:
            - es-ES
        direction:
          type: array
          items:
            $ref: "#/components/schemas/Calling.TranslateDirection"
          description: Which side(s) of the call to translate.
          examples:
            - - remote-caller
        webhook:
          type: string
          format: uri
          description: An `http` or `https` URL to receive the translation as it is produced.
          examples:
            - https://example.com/webhooks/relay
        from_voice:
          type: string
          description: The voice used to speak the source language.
          examples:
            - en-US-Neural2-A
        to_voice:
          type: string
          description: The voice used to speak the translated language.
          examples:
            - es-ES-Neural2-A
        filter_from:
          oneOf:
            - $ref: "#/components/schemas/Calling.TranslationFilterPreset"
            - type: string
          description: |-
            Adjusts the tone or style applied when translating the source speaker — a
            preset, or a `prompt:`-prefixed custom instruction.
          examples:
            - professional
        filter_to:
          oneOf:
            - $ref: "#/components/schemas/Calling.TranslationFilterPreset"
            - type: string
          description: |-
            Adjusts the tone or style applied when translating toward the target speaker
            — a preset, or a `prompt:`-prefixed custom instruction.
          examples:
            - polite
        live_events:
          type: boolean
          description: Deliver translation results live as the conversation happens, rather than only at the end.
          examples:
            - true
        ai_summary:
          type: boolean
          description: Generate an AI summary of the conversation. The summary is delivered when the call ends.
          examples:
            - true
        ai_summary_prompt:
          type: string
          description: Instructions telling the AI how to summarize, used when `ai_summary` is enabled.
          examples:
            - Summarize the key points and any action items discussed on this call.
        speech_timeout:
          type: integer
          format: int32
          description: Speech-recognition timeout in milliseconds. Default `60000`.
          minimum: 0
          default: 60000
          examples:
            - 60000
        vad_silence_ms:
          type: integer
          format: int32
          description: |-
            Voice-activity-detection silence time in milliseconds. The default is
            engine-dependent (Deepgram vs Google) and is not fixed by this method.
          minimum: 0
          examples:
            - 500
        vad_thresh:
          type: integer
          format: int32
          description: Voice-activity-detection threshold (0-1800). Default `400`.
          minimum: 0
          default: 400
          examples:
            - 400
        debug_level:
          type: integer
          format: int32
          description: Debug log level (0-2). Default `0`.
          minimum: 0
          default: 0
          examples:
            - 0
        speech_engine:
          description: Speech engine to use. Default `deepgram`.
          default: deepgram
          examples:
            - deepgram
          allOf:
            - $ref: "#/components/schemas/Calling.LiveSpeechEngine"
        mode:
          description: |-
            Translation mode. `classic` (default) translates in discrete turns;
            `realtime` translates continuously. In `realtime` mode several `classic`-only
            parameters are ignored.
          default: classic
          examples:
            - classic
          allOf:
            - $ref: "#/components/schemas/Calling.LiveTranslateMode"
      required:
        - from_lang
        - to_lang
        - direction
      description: Settings for starting live translation. `from_lang`, `to_lang` and `direction` are required.
    Calling.TranslateDirection:
      type: string
      enum:
        - local-caller
        - remote-caller
    Calling.TranslationFilterPreset:
      type: string
      enum:
        - polite
        - rude
        - professional
        - shakespeare
        - gen-z
    Calling.LiveTranslateMode:
      type: string
      enum:
        - classic
        - realtime
    Calling.LiveTranslateInject:
      type: object
      properties:
        message:
          type: string
          description: The text to translate and speak into the call.
          examples:
            - Please hold while I transfer your call.
        direction:
          description: Which side of the call to speak the message to.
          examples:
            - remote-caller
          allOf:
            - $ref: "#/components/schemas/Calling.TranslateDirection"
      required:
        - message
        - direction
      description: A message to insert into a live translation. It is translated and spoken into the call.
    Calling.LiveTranslateReply:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: The id of the request this responds to.
        result:
          description: The method result.
          allOf:
            - $ref: "#/components/schemas/Calling.LiveTranslateResult"
      required:
        - jsonrpc
        - id
        - result
      description: A JSON-RPC response frame correlated to a request by `id`. `Result` is the method result.
    Calling.LiveTranslateResult:
      type: object
      properties:
        code:
          type: string
          description: Result code as a string, e.g. `"200"` (success), `"400"`, `"404"`.
          examples:
            - "200"
        message:
          type: string
          description: Human-readable description of the result. On failure, it explains what went wrong. Always check `code`; `message` may be omitted when there is nothing extra to report.
          examples:
            - +OK
        data:
          type: array
          items: {}
          description: Present on partial failures. Contains the array of per-device `user_errors` explaining which devices failed and why.
        call_id:
          type: string
          description: The call this result is for, echoed from your request.
          examples:
            - c2a1e9f4-6b3d-4e7a-8f1c-2d3e4f5a6b7c
      required:
        - code
    Calling.TranslateTranscriptDeltaEvent:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Event id.
        method:
          type: string
          enum:
            - signalwire.event
          description: Always `signalwire.event`.
        params:
          type: object
          properties:
            event_type:
              type: string
              enum:
                - calling.ai.translate.transcript_delta
              description: The event type — identifies which event this is.
            event_channel:
              type: string
              description: The channel the event was delivered on.
              examples:
                - calling
            timestamp:
              type: number
              format: double
              description: When the event was emitted, as a Unix timestamp in seconds.
              examples:
                - 1712345678.842
            project_id:
              type: string
              description: Your project ID.
              examples:
                - b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e
            space_id:
              type: string
              description: Your space ID.
              examples:
                - c3d4e5f6-a7b8-9c0d-1e2f-3a4b5c6d7e8f
            params:
              description: The event-specific payload.
              allOf:
                - $ref: "#/components/schemas/Calling.TranslateTranscriptDeltaEventData"
          required:
            - event_type
            - params
          description: The event envelope.
      required:
        - jsonrpc
        - id
        - method
        - params
      description: |-
        A server-pushed `signalwire.event` frame. `EventType` identifies which event this is
        (e.g. `calling.call.play`); `Data` is the event-specific payload carried at `params.params`.
    Calling.TranslateTranscriptDeltaEventData:
      type: object
      properties:
        input_utterance:
          description: Present on source-language (input) fragments.
          allOf:
            - $ref: "#/components/schemas/Calling.TranslateUtterance"
        output_utterance:
          description: Present on translated (output) fragments.
          allOf:
            - $ref: "#/components/schemas/Calling.TranslateUtterance"
      description: |-
        A live-translation delta delivered while the call is in progress. Carries the
        incremental source text (`input_utterance`) and/or the translated text
        (`output_utterance`) as the call proceeds. Realtime delivery of these deltas is
        gated: you must start `calling.live_translate` with `live_events` enabled and a
        `webhook` URL configured — otherwise the incremental deltas are not emitted.
    Calling.TranslateUtterance:
      type: object
      properties:
        language:
          type: string
          description: The language of this fragment as a BCP-47 language code (e.g. `en`, `es-ES`).
          examples:
            - es
        delta:
          type: string
          description: The incremental text for this fragment.
          examples:
            - Hola, quisiera
      required:
        - language
        - delta
      description: An incremental translated (or source) text fragment.
