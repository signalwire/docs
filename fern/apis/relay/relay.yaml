        params:
          description: Method parameters.
          allOf:
            - $ref: "#/components/schemas/Calling.AnswerParams"
      required:
        - jsonrpc
        - id
        - method
        - params
      description: A JSON-RPC request frame. `Method` is the method name; `Params` is the method's input.
    Calling.AnswerParams:
      type: object
      properties:
        node_id:
          type: string
          description: Opaque identifier that, paired with `call_id`, addresses this call. Echo back the value you received; treat it as opaque.
          examples:
            - a3f1c2d4-5e6f-7a8b-9c0d-1e2f3a4b5c6d
        call_id:
          type: string
          description: Unique identifier of the call.
          examples:
            - c2a1e9f4-6b3d-4e7a-8f1c-2d3e4f5a6b7c
        codecs:
          type: array
          items:
            $ref: "#/components/schemas/Calling.AnswerCodec"
          description: |-
            Audio codecs to offer when answering, in preference order. If you omit this,
            SignalWire picks suitable codecs for you. Every codec you list must be
            supported by the call type — otherwise the request fails with `"400"`. Phone
            calls accept a narrower set than `sip` or `webrtc` calls, so check
            `call.device.type` in the `calling.call.state` events to know which call type
            you're answering.
          examples:
