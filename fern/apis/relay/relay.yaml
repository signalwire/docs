            type:
              type: string
              const: machine
            params:
              $ref: "#/components/schemas/Calling.DetectMachineParams"
          required:
            - type
    Calling.DetectMachineParams:
      type: object
      properties:
        initial_timeout:
          type: number
          format: double
          description: How many seconds to wait for initial voice before giving up. Must be greater than 0. Default `4.5`.
          exclusiveMinimum: 0
          examples:
            - 5
        end_silence_timeout:
          type: number
          format: double
          description: How many seconds to wait for voice to finish. Must be greater than 0. Default `1.0`.
          exclusiveMinimum: 0
          examples:
            - 1
        machine_ready_timeout:
          type: number
          format: double
          description: |-
            How many seconds to wait for voice to finish before firing the READY
            event. Must be greater than 0. Defaults to `end_silence_timeout`.
          exclusiveMinimum: 0
          examples:
            - 1
        machine_voice_threshold:
          type: number
          format: double
          description: How many seconds of continuous voice are required before the result is reported as MACHINE. Default `1.25`.
          exclusiveMinimum: 0
          examples:
            - 1.25
        machine_words_threshold:
          type: integer
          format: int32
          description: How many words must be counted before the result is reported as MACHINE. Default `6`.
          exclusiveMinimum: 0
          examples:
            - 6
        detect_interruptions:
          type: boolean
          description: |-
            If `true`, a NOT_READY event fires if voice activity is detected after READY.
            This lets your application restart message delivery to the answering machine.
            Default `false`.
          default: false
          examples:
            - false
        detect_message_end:
          type: boolean
          description: |-
            If false, stop detection on the machine event and don't wait on the beep /
            end of the voicemail greeting. Default `true`.
          default: true
          examples:
            - true
      description: Configuration for the answering-machine (voicemail) detector.
