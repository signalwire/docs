  messaging:
    address: /
    title: Messaging
    servers:
      - $ref: "#/servers/production"
    messages:
      messagingSendRequest:
        $ref: "#/components/messages/messagingSendRequest"
      messagingSendResponse:
        $ref: "#/components/messages/messagingSendResponse"
      receiveEvent:
        $ref: "#/components/messages/receiveEvent"
      stateEvent:
        $ref: "#/components/messages/stateEvent"
    description: |-
      The Relay **Messaging** service sends outbound SMS/MMS to PSTN numbers and
      delivers inbound-message and delivery-state events. It rides on a connection
      established by `signalwire.connect`; messages are routed by **context**.
    bindings:
      ws: {}
  tasking:
    address: /
    title: Tasking
    servers:
      - $ref: "#/servers/production"
    messages:
      taskingDeliverRequest:
        $ref: "#/components/messages/taskingDeliverRequest"
      taskingDeliverResponse:
        $ref: "#/components/messages/taskingDeliverResponse"
      tasksEvent:
        $ref: "#/components/messages/tasksEvent"
    description: |-
      The `tasking` service delivers arbitrary, caller-defined JSON messages to
      Relay consumers subscribed to a context. A client calls `tasking.deliver`
      with a `context` and an opaque `message`; SignalWire queues the task and
      pushes a `queuing.relay.tasks` event to every consumer listening on that
      context. The `message` payload is never inspected — it is echoed verbatim
      from the deliver request into the task event.
    bindings:
      ws: {}
  provisioning:
    address: /
    title: Provisioning
    servers:
      - $ref: "#/servers/production"
    messages:
      provisioningConfigureRequest:
        $ref: "#/components/messages/provisioningConfigureRequest"
      provisioningConfigureResponse:
        $ref: "#/components/messages/provisioningConfigureResponse"
    description: |-
      The `provisioning` protocol lets a Relay **connector** request its runtime
      configuration from SignalWire. The connector reports its identity and network
      endpoints, and SignalWire returns the rendered connector configuration (for a
      FreeSWITCH connector, a SIP profile as XML). This service is
      connector-internal: a single method, no server-pushed events, and currently
      only the `freeswitch` connector target is supported.
    bindings:
      ws: {}
  webrtc:
    address: /
    title: WebRTC
    servers:
      - $ref: "#/servers/production"
    messages:
      messageRequest:
        $ref: "#/components/messages/messageRequest"
      messageResponse:
        $ref: "#/components/messages/messageResponse"
      conferenceListRequest:
        $ref: "#/components/messages/conferenceListRequest"
      conferenceListResponse:
        $ref: "#/components/messages/conferenceListResponse"
      messageEvent:
        $ref: "#/components/messages/messageEvent"
    description: |-
      The Relay **WebRTC** service is a thin transport wrapper around the Verto
      signaling sub-protocol. Methods are dispatched as `blade.execute`; the
      `message` method tunnels an opaque inner Verto JSON-RPC frame to FreeSWITCH,
      and `conference.list` enumerates joinable conferences. It rides on a
      connection established by `signalwire.connect`.

      The inner Verto message protocol itself (`verto.invite`/`verto.answer`/
      `verto.bye`/`verto.modify`, `dialogParams`, conference control) is OUT OF
      SCOPE here and is modeled as a loose pass-through. Its full union is defined
      separately in `verto_messages.md`.
    bindings:
      ws: {}
