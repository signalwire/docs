        - state
      description: Fires as a pay session progresses, letting you track whether it is processing, has finished, or hit an error.
    Calling.PayState:
      type: string
      enum:
        - processing
        - finished
        - error
    CallPayEventFrame:
      type: object
      required:
        - jsonrpc
        - method
        - id
        - params
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        method:
          type: string
          const: signalwire.event
        id:
          type: string
          format: uuid
        params:
          type: object
          required:
            - event_type
            - params
          properties:
            event_type:
              type: string
              const: calling.call.pay
            event_channel:
              type: string
            timestamp:
              type: number
            space_id:
              type: string
            project_id:
              type: string
            params:
              $ref: "#/components/schemas/Calling.CallPayEvent"
    Calling.PayStopResult:
      type: object
      properties:
