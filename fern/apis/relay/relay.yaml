        primary_conversation_summary:
          type: string
          description: "The source-language side: raw transcript text in realtime mode, or an AI-generated summary in on-demand `summarize` mode."
        secondary_conversation_summary:
          type: string
          description: "The translated side: raw transcript text in realtime mode, or an AI-generated summary in on-demand `summarize` mode."
        primary_conversation_log:
          type: array
          items:
            $ref: "#/components/schemas/Calling.ConversationLogEntry"
          description: The source-language conversation, one entry per turn. Present only in on-demand `summarize` mode.
        secondary_conversation_log:
          type: array
          items:
            $ref: "#/components/schemas/Calling.ConversationLogEntry"
          description: The translated conversation, one entry per turn. Present only in on-demand `summarize` mode.
      description: |-
        A summary of a `calling.live_translate` session, covering both the source-language (`primary`)
        and translated (`secondary`) sides. This event carries two shapes depending on how it was
        produced: in realtime mode (delivered when the session closes) the two `*_conversation_summary`
        fields hold the raw transcript text and no logs are included; in on-demand `summarize` mode the
        `*_conversation_log` arrays are present and the summaries are AI-generated.
    Calling.TranslateConversationLogEvent:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Event id.
        method:
          type: string
          enum:
            - signalwire.event
          description: Always `signalwire.event`.
        params:
          type: object
          properties:
            event_type:
              type: string
              enum:
                - calling.ai.translate.conversation_log
              description: The event type — identifies which event this is.
            event_channel:
              type: string
              description: The channel the event was delivered on.
              examples:
                - calling
            timestamp:
              type: number
              format: double
              description: When the event was emitted, as a Unix timestamp in seconds.
              examples:
                - 1712345678.842
            project_id:
              type: string
              description: Your project ID.
              examples:
                - b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e
            space_id:
              type: string
              description: Your space ID.
              examples:
                - c3d4e5f6-a7b8-9c0d-1e2f-3a4b5c6d7e8f
            params:
              description: The event-specific payload.
              allOf:
                - $ref: "#/components/schemas/Calling.TranslateConversationLogEventData"
          required:
            - event_type
            - params
          description: The event envelope.
      required:
        - jsonrpc
        - id
        - method
        - params
      description: The complete translated conversation log for a `calling.live_translate` session, emitted once the session ends.
    Calling.TranslateConversationLogEventData:
      type: object
      properties:
        primary_conversation_log:
          type: array
          items:
            $ref: "#/components/schemas/Calling.ConversationLogEntry"
          description: The source-language conversation, one entry per turn.
        primary_conversation_summary:
          type: string
          description: An AI-generated summary of the source-language side. Present only when the session was started with AI summary enabled.
        secondary_conversation_log:
          type: array
