    Calling.RecordSpec:
      type: object
      properties:
        audio:
          description: Audio recording settings.
          allOf:
            - $ref: "#/components/schemas/Calling.RecordAudio"
      required:
        - audio
      description: What to record. Audio is currently the only supported type — put its settings under `audio`.
    Calling.RecordAudio:
      type: object
      properties:
        beep:
          type: boolean
          description: Play a beep before recording starts. Default `false`.
          default: false
          examples:
            - false
        format:
          type: string
          enum:
            - mp3
            - wav
            - mp4
          description: Output file format. Default `mp3`.
          default: mp3
          examples:
            - mp3
        stereo:
          type: boolean
          description: Record the two call directions on separate channels. Default `false`.
          default: false
          examples:
            - false
        direction:
          description: Which audio direction(s) to capture. Default `speak`.
          default: speak
          examples:
            - speak
          allOf:
            - $ref: "#/components/schemas/Calling.RecordAudioDirection"
        initial_timeout:
          type: number
          format: double
          description: |-
            Seconds to wait for speech before giving up. Defaults to `0` — continuous
            recording, which runs until the call ends or you send `calling.record.stop`.
            Set this together with `end_silence_timeout` for voicemail-style recording
            that stops on its own.
          minimum: 0
          default: 0
          examples:
            - 0
        end_silence_timeout:
          type: number
          format: double
          description: |-
            Seconds of trailing silence before the recording auto-stops. Defaults to `0` —
            continuous recording. Set this together with `initial_timeout` for
            voicemail-style recording.
          minimum: 0
          default: 0
          examples:
            - 0
        terminators:
          type: string
          description: DTMF (touch-tone) digits that stop the recording. Default `#`.
          default: "#"
          examples:
            - "#"
        input_sensitivity:
          type: number
          format: double
          description: |-
            Input sensitivity: `0` = hear nothing, `100` = hear everything. Default
            `44`.
          minimum: 0
          maximum: 100
          default: 44
          examples:
            - 44
        max_length:
          type: number
          format: double
          description: Maximum recording length, in seconds. Use `0` for no limit. Default `0`.
          minimum: 0
          default: 0
          examples:
            - 0
      description: Audio recording settings, passed under `record.audio`.
