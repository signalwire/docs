    Calling.CallConnectEvent:
      type: object
      properties:
        node_id:
          type: string
          description: Identifier of the node handling the call. Pair it with `call_id` to address the call.
        call_id:
          type: string
          description: Unique identifier of the call.
        tag:
          type: string
          description: The `tag` you set on the connect request, so you can match this event to it.
        peer:
          description: The other call yours is being connected to.
          allOf:
            - $ref: "#/components/schemas/Calling.ConnectPeer"
        connect_state:
          type: string
          enum:
            - disconnected
            - connecting
            - connected
            - failed
          description: "Where the connection stands: `connecting`, `connected`, `disconnected`, or `failed`."
        failed_reason:
          type: string
          description: Why the connect failed. Present when `connect_state` is `failed`.
      required:
        - node_id
        - call_id
        - connect_state
      description: Fires as a connect request progresses, telling you whether your call has been bridged to the peer. Watch `connect_state` to know when the two calls are joined, torn down, or have failed to connect.
    Calling.ConnectPeer:
      type: object
      properties:
        node_id:
          type: string
          description: Identifier of the node hosting the peer call.
        call_id:
          type: string
          description: The peer call's `call_id`.
        tag:
          type: string
          description: The `tag` set on the peer call.
        queue_id:
          type: string
          description: When the peer was reached through a queue, the queue's id.
        queue_name:
          type: string
          description: The queue's friendly name.
        device:
          description: The device handling the peer call.
          allOf:
            - $ref: "#/components/schemas/Calling.CallDevice"
      description: The other call being connected to yours.
