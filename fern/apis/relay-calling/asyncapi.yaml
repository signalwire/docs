      name: calling.conference
      title: Conference Event
      summary: Conference status change
      contentType: application/json
      payload:
        $ref: '#/components/schemas/CallingConferenceEvent'

  schemas:
    # ===== Base Request Schemas =====
    JsonRpcRequest:
      type: object
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          description: Unique request identifier
        method:
          type: string
          description: RPC method name
        params:
          type: object
      required:
        - jsonrpc
        - id
        - method

    JsonRpcResponse:
      type: object
      description: JSON-RPC 2.0 response
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          description: Request identifier (matches the request)
        result:
          type: object
          description: Result object on success
        error:
          type: object
          description: Error object on failure
          properties:
            code:
              type: integer
              description: Error code
            message:
              type: string
              description: Error message
      required:
        - jsonrpc
        - id

    CallingMethodResult:
      description: Common result for calling methods
      allOf:
        - $ref: '#/components/schemas/JsonRpcResponse'
        - type: object
          properties:
            result:
              type: object
              properties:
                code:
                  type: string
                  description: Response code (e.g., "200")
                  example: "200"
                message:
                  type: string
                  description: Response message
                  example: "OK"

    CallingDialResultPayload:
      description: Result for calling.dial method
      allOf:
        - $ref: '#/components/schemas/JsonRpcResponse'
        - type: object
          properties:
            result:
              type: object
              properties:
                code:
                  type: string
                  example: "200"
                message:
                  type: string
                  example: "OK"
                node_id:
                  type: string
                  format: uuid
                  description: Node ID managing the call

    CallingTapResultPayload:
      description: Result for calling.tap method
      allOf:
        - $ref: '#/components/schemas/JsonRpcResponse'
        - type: object
          properties:
            result:
              type: object
              properties:
                code:
                  type: string
                  example: "200"
                message:
                  type: string
                  example: "OK"
                source_device:
                  $ref: '#/components/schemas/TapDevice'
                  description: The resolved tap source device info

    CallingJoinConferenceResultPayload:
      description: Result for calling.join_conference method
      allOf:
        - $ref: '#/components/schemas/JsonRpcResponse'
        - type: object
          properties:
            result:
              type: object
              properties:
                code:
                  type: string
                  example: "200"
                message:
                  type: string
                  example: "OK"
                conference_id:
                  type: string
                  format: uuid
                  description: Unique identifier for the conference

    CallControlRequest:
      description: Base request for call control methods
      allOf:
        - $ref: '#/components/schemas/JsonRpcRequest'
        - type: object
          properties:
            params:
              type: object
              properties:
                node_id:
                  type: string
                  format: uuid
                  description: Node ID managing the call
                call_id:
                  type: string
                  format: uuid
                  description: Call identifier
              required:
                - node_id
                - call_id

    ControlIdRequest:
      description: Request with control_id for managing operations
      allOf:
        - $ref: '#/components/schemas/CallControlRequest'
        - type: object
          properties:
            params:
              type: object
              properties:
                control_id:
                  type: string
                  description: Control identifier for the operation
              required:
                - control_id

    VolumeRequest:
      description: Request to adjust volume
      allOf:
        - $ref: '#/components/schemas/ControlIdRequest'
        - type: object
          properties:
            params:
              type: object
              properties:
                volume:
                  type: number
                  minimum: -40
                  maximum: 40
                  description: Volume in dB (-40 muted, 0 original, +40 max)
              required:
                - volume

    # ===== Method Schemas =====
    CallingDialRequest:
      allOf:
        - $ref: '#/components/schemas/JsonRpcRequest'
        - type: object
          properties:
            method:
              const: "calling.dial"
            params:
              $ref: '#/components/schemas/CallingDialParams'

    CallingDialParams:
      type: object
      properties:
        tag:
          type: string
          description: Identifier added to all call and dial events
        region:
          type: string
          description: Region to originate call from
          example: "us"
        devices:
          type: array
          description: |
            Nested array of devices to call.
            Inner arrays: devices called in parallel (first to answer wins).
            Outer array: device groups called in sequence.
          items:
            type: array
            items:
              $ref: '#/components/schemas/Device'
        max_price_per_minute:
          type: number
          description: Maximum price per minute for the call
      required:
        - tag
        - devices

    CallingAnswerRequest:
      allOf:
        - $ref: '#/components/schemas/CallControlRequest'
        - type: object
          properties:
            method:
              const: "calling.answer"
            params:
              type: object
              properties:
                codecs:
                  type: array
                  items:
                    $ref: '#/components/schemas/Codec'
                  description: Preferred codecs in order of preference

    CallingEndRequest:
      allOf:
        - $ref: '#/components/schemas/CallControlRequest'
        - type: object
          properties:
            method:
              const: "calling.end"
            params:
              type: object
              properties:
                reason:
                  $ref: '#/components/schemas/DisconnectReason'

    CallingConnectRequest:
      allOf:
        - $ref: '#/components/schemas/CallControlRequest'
        - type: object
          properties:
            method:
              const: "calling.connect"
            params:
              type: object
              properties:
                tag:
                  type: string
                  description: Identifier for created calls' events
                ringback:
                  type: array
                  items:
                    $ref: '#/components/schemas/PlayElement'
                  description: Audio to play while connecting
                devices:
                  type: array
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Device'
                max_duration:
                  type: number
                  description: Maximum call duration in minutes
                max_price_per_minute:
                  type: number
                status_url:
                  type: string
                  format: uri
                  description: URL to POST connect events
              required:
                - devices

    CallingDisconnectRequest:
      allOf:
        - $ref: '#/components/schemas/CallControlRequest'
        - type: object
          properties:
            method:
              const: "calling.disconnect"

    CallingTransferRequest:
      allOf:
        - $ref: '#/components/schemas/CallControlRequest'
        - type: object
          properties:
            method:
              const: "calling.transfer"
            params:
              type: object
              properties:
                dest:
                  type: string
                  description: |
                    Transfer destination:
                    - HTTPS URL returning SWML
                    - Inline SWML script
                    - Relay app prefixed with `context:`
              required:
                - dest

    CallingPlayRequest:
      allOf:
        - $ref: '#/components/schemas/ControlIdRequest'
        - type: object
          properties:
            method:
              const: "calling.play"
            params:
              type: object
              properties:
                volume:
                  type: number
                  minimum: -40
                  maximum: 40
                  description: Volume in dB
                direction:
                  type: string
                  enum: ["listen", "speak", "both"]
                  default: "listen"
                  description: Audio direction
                play:
                  type: array
                  items:
                    $ref: '#/components/schemas/PlayElement'
                  description: Array of play elements
                loop:
                  type: integer
                  minimum: 0
                  default: 1
                  description: Number of times to play (0 = infinite)
                status_url:
                  type: string
                  format: uri
              required:
                - play

    CallingCollectRequest:
      allOf:
        - $ref: '#/components/schemas/ControlIdRequest'
        - type: object
          properties:
            method:
              const: "calling.collect"
            params:
              type: object
              properties:
                initial_timeout:
                  type: number
                  default: 4.0
                  description: Seconds to wait for initial input
                digits:
                  $ref: '#/components/schemas/CollectDigitsParams'
                speech:
                  $ref: '#/components/schemas/CollectSpeechParams'
                partial_results:
                  type: boolean
                  default: false
                continuous:
                  type: boolean
                  default: false
                  description: Continue detecting until stopped
                send_start_of_input:
                  type: boolean
                  default: false
                start_input_timers:
                  type: boolean
                  default: false
                status_url:
                  type: string
                  format: uri

    CallingPlayAndCollectRequest:
      allOf:
        - $ref: '#/components/schemas/ControlIdRequest'
        - type: object
          properties:
            method:
              const: "calling.play_and_collect"
            params:
              type: object
              properties:
                volume:
                  type: number
                  minimum: -40
                  maximum: 40
                play:
                  type: array
                  items:
                    $ref: '#/components/schemas/PlayElement'
                collect:
                  type: object
                  properties:
                    initial_timeout:
                      type: number
                      default: 4.0
                    digits:
                      $ref: '#/components/schemas/CollectDigitsParams'
                    speech:
                      $ref: '#/components/schemas/CollectSpeechParams'
                status_url:
                  type: string
                  format: uri
              required:
                - play
                - collect

    CallingPayRequest:
      allOf:
        - $ref: '#/components/schemas/ControlIdRequest'
        - type: object
          properties:
            method:
              const: "calling.pay"
            params:
              type: object
              properties:
                input:
                  type: string
                  enum: ["dtmf", "voice"]
                  default: "dtmf"
                  description: Method to collect payment details
                status_url:
                  type: string
                  format: uri
                  description: URL to POST status updates
                payment_method:
                  type: string
                  enum: ["credit-card"]
                  default: "credit-card"
                timeout:
                  type: number
                  default: 5
                  description: Seconds to wait for input
                max_attempts:
                  type: integer
                  default: 1
                  description: Number of retry attempts
                security_code:
                  type: boolean
                  default: true
                  description: Prompt for CVV
                postal_code:
                  oneOf:
                    - type: boolean
                    - type: string
                  default: false
                  description: Prompt for postal code or provide known value
                min_postal_code_length:
                  type: integer
                  default: 0
                payment_connector_url:
                  type: string
                  format: uri
                  description: URL to POST payment details
                token_type:
                  type: string
                  enum: ["one-time", "reusable"]
                  default: "reusable"
                charge_amount:
                  type: string
                  description: Amount to charge (decimal string)
                  example: "15.00"
                currency:
                  type: string
                  default: "usd"
                language:
                  type: string
                  default: "en-US"
                voice:
                  type: string
                  default: "woman"
                description:
                  type: string
                  description: Payment description
                valid_card_types:
                  type: string
                  description: Space-separated card types
                  default: "visa mastercard amex"
                parameters:
                  type: array
                  description: Additional name-value pairs for connector
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      value:
                        type: string
                prompts:
                  type: array
                  description: Custom prompts for IVR flow
                  items:
                    $ref: '#/components/schemas/PayPrompt'
              required:
                - payment_connector_url

    PayPrompt:
      type: object
      description: Custom prompt for payment IVR
      properties:
        for:
          type: string
          enum:
            - "payment-card-number"
            - "expiration-date"
            - "security-code"
            - "postal-code"
            - "payment-processing"
            - "payment-completed"
            - "payment-failed"
            - "payment-canceled"
        card_type:
          type: string
          description: Space-separated card types
        error_type:
          type: string
          description: Space-separated error types
        actions:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: ["Say", "Play"]
              phrase:
                type: string
                description: Text to say or URL to play
            required:
              - type
              - phrase
      required:
        - for
        - actions

    CallingRecordRequest:
      allOf:
        - $ref: '#/components/schemas/ControlIdRequest'
        - type: object
          properties:
            method:
              const: "calling.record"
            params:
              type: object
              properties:
                record:
                  $ref: '#/components/schemas/RecordParams'
                status_url:
                  type: string
                  format: uri
              required:
                - record

    RecordPauseRequest:
      allOf:
        - $ref: '#/components/schemas/ControlIdRequest'
        - type: object
          properties:
            method:
              const: "calling.record.pause"
            params:
              type: object
              properties:
                behavior:
                  type: string
                  enum: ["skip", "silence"]
                  default: "skip"
                  description: Include silence in recording or skip

    CallingDetectRequest:
      allOf:
        - $ref: '#/components/schemas/ControlIdRequest'
        - type: object
          properties:
            method:
              const: "calling.detect"
            params:
              type: object
              properties:
                detect:
                  $ref: '#/components/schemas/DetectParams'
                timeout:
                  type: number
                  default: 30.0
                  description: Max detection time in seconds
                status_url:
                  type: string
                  format: uri
              required:
                - detect

    CallingSendDigitsRequest:
      allOf:
        - $ref: '#/components/schemas/ControlIdRequest'
        - type: object
          properties:
            method:
              const: "calling.send_digits"
            params:
              type: object
              properties:
                digits:
                  type: string
                  pattern: "^[0-9*#ABCDwW]+$"
                  description: |
                    Digits to send. Allowed: 0-9, *, #, A-D,
                    w (0.5s wait), W (1s wait)
              required:
                - digits

    CallingSendFaxRequest:
      allOf:
        - $ref: '#/components/schemas/ControlIdRequest'
        - type: object
          properties:
            method:
              const: "calling.send_fax"
            params:
              type: object
              properties:
                document:
                  type: string
                  format: uri
                  description: URL to PDF document
                identity:
                  type: string
                  description: Caller ID shown on receiving fax
                header_info:
                  type: string
                  default: "SignalWire"
                  description: Custom fax header info
                status_url:
                  type: string
                  format: uri
              required:
                - document

    CallingReceiveFaxRequest:
      allOf:
        - $ref: '#/components/schemas/ControlIdRequest'
        - type: object
          properties:
            method:
              const: "calling.receive_fax"
            params:
              type: object
              properties:
                status_url:
                  type: string
                  format: uri

    CallingTapRequest:
      allOf:
        - $ref: '#/components/schemas/ControlIdRequest'
        - type: object
          properties:
            method:
              const: "calling.tap"
            params:
              type: object
              properties:
                tap:
                  $ref: '#/components/schemas/TapParams'
                device:
                  $ref: '#/components/schemas/TapDevice'
                status_url:
                  type: string
                  format: uri
              required:
                - tap
                - device

    CallingJoinConferenceRequest:
      allOf:
        - $ref: '#/components/schemas/CallControlRequest'
        - type: object
          properties:
            method:
              const: "calling.join_conference"
            params:
              type: object
              properties:
                name:
                  type: string
                  description: Conference name
                muted:
                  type: boolean
                  default: false
                beep:
                  type: string
                  enum: ["true", "false", "onEnter", "onExit"]
                  default: "true"
                start_on_enter:
                  type: boolean
                  default: true
                end_on_exit:
                  type: boolean
                  default: false
                wait_url:
                  type: string
                  format: uri
                  description: Hold music URL
                max_participants:
                  type: integer
                  maximum: 250
                  default: 250
                record:
                  type: string
                  enum: ["do-not-record", "record-from-start"]
                  default: "do-not-record"
                region:
                  type: string
                  enum: ["global", "us", "eu"]
                  default: "global"
                coach:
                  type: string
                  description: Call ID to coach
                status_callback:
                  type: string
                  format: uri
                status_callback_event:
                  type: string
                  description: Space-separated events
              required:
                - name

    CallingLeaveConferenceRequest:
      allOf:
        - $ref: '#/components/schemas/CallControlRequest'
        - type: object
          properties:
            method:
              const: "calling.leave_conference"
            params:
              type: object
              properties:
                conference_id:
                  type: string
                  format: uuid
              required:
                - conference_id

    CallingQueueEnterRequest:
      allOf:
        - $ref: '#/components/schemas/ControlIdRequest'
        - type: object
          properties:
            method:
              const: "calling.queue.enter"
            params:
              type: object
              properties:
                queue_name:
                  type: string
                  description: Queue name (created if doesn't exist)
                status_url:
                  type: string
                  format: uri
              required:
                - queue_name

    CallingQueueLeaveRequest:
      allOf:
        - $ref: '#/components/schemas/ControlIdRequest'
        - type: object
          properties:
            method:
              const: "calling.queue.leave"
            params:
              type: object
              properties:
                queue_name:
                  type: string
                queue_id:
                  type: string
              required:
                - queue_name

    CallingReferRequest:
      allOf:
        - $ref: '#/components/schemas/CallControlRequest'
        - type: object
          properties:
            method:
              const: "calling.refer"
            params:
              type: object
              properties:
                device:
                  type: object
                  properties:
                    type:
                      type: string
                      const: "sip"
                    params:
                      type: object
                      properties:
                        to:
                          type: string
                          description: SIP URI to transfer to
                        username:
                          type: string
                          description: REFER auth username
                        password:
                          type: string
                          description: REFER auth password
                      required:
                        - to
                status_url:
                  type: string
                  format: uri
              required:
                - device

    # ===== Device Schemas =====
    # Base device schema for polymorphism
    DeviceBase:
      type: object
      discriminator: type
      properties:
        type:
          type: string
          description: Device type
        params:
          type: object
          description: Device-specific parameters
      required:
        - type
        - params

    # Device union - one of the specific device types
    Device:
      description: |
        Device to dial or connect. Structure is `{type, params}` where params
        varies by device type.
      oneOf:
        - $ref: '#/components/schemas/PhoneDevice'
        - $ref: '#/components/schemas/SipDevice'
        - $ref: '#/components/schemas/WebRTCDevice'

    # Complete device type schemas
    PhoneDevice:
      description: Phone device for PSTN calls
      allOf:
        - $ref: '#/components/schemas/DeviceBase'
        - type: object
          properties:
            type:
              const: phone
            params:
              $ref: '#/components/schemas/PhoneDeviceParams'

    SipDevice:
      description: SIP device for VoIP calls
      allOf:
        - $ref: '#/components/schemas/DeviceBase'
        - type: object
          properties:
            type:
              const: sip
            params:
              $ref: '#/components/schemas/SipDeviceParams'

    WebRTCDevice:
      description: WebRTC device for browser-based calls
      allOf:
        - $ref: '#/components/schemas/DeviceBase'
        - type: object
          properties:
            type:
              const: webrtc
            params:
              $ref: '#/components/schemas/WebRTCDeviceParams'

    PhoneDeviceParams:
      type: object
      properties:
        from_number:
          type: string
          description: E.164 phone number from SignalWire project
          example: "+15551234567"
        to_number:
          type: string
          description: E.164 destination phone number
          example: "+15559876543"
        timeout:
          type: number
          default: 30
          description: Seconds to wait for answer
        max_duration:
          type: number
          description: Maximum call duration in seconds
        call_state_url:
          type: string
          format: uri
        call_state_events:
          type: array
          items:
            type: string
            enum: ["created", "ringing", "answered", "ended"]
          default: ["ended"]
        confirm:
          type: string
          description: SWML URL or inline script for confirmation
      required:
        - from_number
        - to_number

    SipDeviceParams:
      type: object
      properties:
        from:
          type: string
          description: SIP endpoint URI
          example: "sip:user@domain.com"
        from_name:
          type: string
          description: Display name of caller
        to:
          type: string
          description: Destination SIP URI
        timeout:
          type: number
          default: 30
        headers:
          type: array
          description: Custom X- headers
          items:
            type: object
            properties:
              name:
                type: string
              value:
                type: string
        codecs:
          type: array
          items:
            $ref: '#/components/schemas/Codec'
        webrtc_media:
          type: boolean
          default: false
      required:
        - from
        - to

    WebRTCDeviceParams:
      type: object
      properties:
        from:
          type: string
          description: E.164 number or registered endpoint URI
        to:
          type: string
          description: WebRTC endpoint URI
        timeout:
          type: number
          default: 30
        codecs:
          type: array
          items:
            $ref: '#/components/schemas/Codec'
      required:
        - from
        - to

    # ===== Play Element Schemas =====
    PlayElement:
      type: object
      properties:
        type:
          type: string
          enum: ["audio", "tts", "silence", "ringtone"]
        params:
          type: object
      required:
        - type
        - params

    # ===== Collect Schemas =====
    CollectDigitsParams:
      type: object
      properties:
        max:
          type: integer
          minimum: 1
          description: Maximum digits to collect
        terminators:
          type: string
          description: DTMF digits that end collection
          example: "#*"
        digit_timeout:
          type: number
          default: 5.0
          description: Max time between digits
      required:
        - max

    CollectSpeechParams:
      type: object
      properties:
        end_silence_timeout:
          type: number
          default: 1.0
          description: Silence duration to end speech
        speech_timeout:
          type: number
          default: 60.0
          description: Max speech collection time
        language:
          type: string
          default: "en-US"
        hints:
          type: array
          items:
            type: string
          description: Expected phrases to detect
        engine:
          type: string
          enum: ["Deepgram", "Google"]
          description: Speech recognition engine

    # ===== Record Schemas =====
    RecordParams:
      type: object
      properties:
        audio:
          type: object
          properties:
            beep:
              type: boolean
              default: false
            format:
              type: string
              enum: ["mp3", "wav"]
              default: "mp3"
            stereo:
              type: boolean
              default: false
            direction:
              type: string
              enum: ["listen", "speak", "both"]
              default: "speak"
            initial_timeout:
              type: number
              default: 5.0
            end_silence_timeout:
              type: number
              default: 1.0
            terminators:
              type: string
              default: "#*"
            input_sensitivity:
              type: number
              minimum: 0
              maximum: 100
              default: 44

    # ===== Detect Schemas =====
    DetectParams:
      type: object
      properties:
        type:
          type: string
          enum: ["machine", "fax", "digit"]
        params:
          type: object
      required:
        - type

    # ===== Tap Schemas =====
    TapParams:
      type: object
      properties:
        type:
          type: string
          const: "audio"
        params:
          type: object
          properties:
            direction:
              type: string
              enum: ["listen", "speak", "both"]
              default: "speak"

    TapDevice:
      type: object
      properties:
        type:
          type: string
          enum: ["rtp", "ws"]
        params:
          type: object
      required:
        - type
        - params

    # ===== Common Enums =====
    Codec:
      type: string
      enum: ["PCMU", "PCMA", "OPUS", "G729", "G722", "AMR-WB", "VP8", "H264"]

    DisconnectReason:
      type: string
      enum: ["hangup", "cancel", "busy", "noAnswer", "decline", "error"]
      default: "hangup"

    # ===== Event Schemas =====
    BaseEvent:
      type: object
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        method:
          type: string
          const: "signalwire.event"
        params:
          type: object
          properties:
            event_type:
              type: string
            event_channel:
              type: string
            timestamp:
              type: number
              description: Seconds since epoch with microsecond precision
            space_id:
              type: string
            project_id:
              type: string
              format: uuid
            params:
              type: object

    CallingCallStateEvent:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            params:
              type: object
              properties:
                event_type:
                  const: "calling.call.state"
                params:
                  type: object
                  properties:
                    node_id:
                      type: string
                      format: uuid
                    call_id:
                      type: string
                      format: uuid
                    tag:
                      type: string
                    call_state:
                      type: string
                      enum: ["created", "ringing", "answered", "ending", "ended"]
                    device:
                      $ref: '#/components/schemas/Device'
                    parent:
                      type: object
                      properties:
                        node_id:
                          type: string
                        call_id:
                          type: string
                        device_type:
                          type: string
                    peer:
                      type: object
                      properties:
                        node_id:
                          type: string
                        call_id:
                          type: string
                    start_time:
                      type: number
                    answer_time:
                      type: number
                    end_time:
                      type: number
                    created_by:
                      type: string
                      enum: ["dial", "connect", "receive"]

    CallingCallReceiveEvent:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            params:
              type: object
              properties:
                event_type:
                  const: "calling.call.receive"
                params:
                  type: object
                  properties:
                    node_id:
                      type: string
                      format: uuid
                    call_id:
                      type: string
                      format: uuid
                    call_state:
                      type: string
                    context:
                      type: string
                      description: SignalWire context
                    device:
                      $ref: '#/components/schemas/Device'

    CallingCallDialEvent:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            params:
              type: object
              properties:
                event_type:
                  const: "calling.call.dial"
                params:
                  type: object
                  properties:
                    node_id:
                      type: string
                    tag:
                      type: string
                    dial_state:
                      type: string
                      enum: ["dialing", "answered", "failed"]
                    call:
                      type: object
                      description: First answered call

    CallingCallConnectEvent:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            params:
              type: object
              properties:
                event_type:
                  const: "calling.call.connect"
                params:
                  type: object
                  properties:
                    node_id:
                      type: string
                    call_id:
                      type: string
                    tag:
                      type: string
                    connect_state:
                      type: string
                      enum: ["disconnected", "connecting", "connected", "failed"]
                    peer:
                      type: object

    CallingCallPlayEvent:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            params:
              type: object
              properties:
                event_type:
                  const: "calling.call.play"
                params:
                  type: object
                  properties:
                    node_id:
                      type: string
                    call_id:
                      type: string
                    control_id:
                      type: string
                    state:
                      type: string
                      enum: ["playing", "paused", "error", "finished"]

    CallingCallCollectEvent:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            params:
              type: object
              properties:
                event_type:
                  const: "calling.call.collect"
                params:
                  type: object
                  properties:
                    node_id:
                      type: string
                    call_id:
                      type: string
                    control_id:
                      type: string
                    state:
                      type: string
                      enum: ["collecting", "error", "finished"]
                    result:
                      type: object
                      properties:
                        type:
                          type: string
                          enum: ["digit", "speech", "error", "no_input", "no_match", "start_of_input"]
                        params:
                          type: object
                    final:
                      type: boolean

    CallingCallRecordEvent:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            params:
              type: object
              properties:
                event_type:
                  const: "calling.call.record"
                params:
                  type: object
                  properties:
                    node_id:
                      type: string
                    call_id:
                      type: string
                    control_id:
                      type: string
                    state:
                      type: string
                      enum: ["recording", "paused", "finished", "no_input"]
                    url:
                      type: string
                      format: uri
                    duration:
                      type: number
                    size:
                      type: integer

    CallingCallDetectEvent:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            params:
              type: object
              properties:
                event_type:
                  const: "calling.call.detect"
                params:
                  type: object
                  properties:
                    node_id:
                      type: string
                    call_id:
                      type: string
                    control_id:
                      type: string
                    detect:
                      type: object
                      properties:
                        type:
                          type: string
                          enum: ["machine", "fax", "digit"]
                        params:
                          type: object
                          properties:
                            event:
                              type: string
                            beep:
                              type: boolean

    CallingCallFaxEvent:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            params:
              type: object
              properties:
                event_type:
                  const: "calling.call.fax"
                params:
                  type: object
                  properties:
                    node_id:
                      type: string
                    call_id:
                      type: string
                    control_id:
                      type: string
                    fax:
                      type: object
                      properties:
                        type:
                          type: string
                          enum: ["page", "finished", "error"]
                        params:
                          type: object

    CallingCallTapEvent:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            params:
              type: object
              properties:
                event_type:
                  const: "calling.call.tap"
                params:
                  type: object
                  properties:
                    node_id:
                      type: string
                    call_id:
                      type: string
                    control_id:
                      type: string
                    state:
                      type: string
                      enum: ["tapping", "finished"]
                    tap:
                      $ref: '#/components/schemas/TapParams'
                    device:
                      $ref: '#/components/schemas/TapDevice'

    CallingCallReferEvent:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            params:
              type: object
              properties:
                event_type:
                  const: "calling.call.refer"
                params:
                  type: object
                  properties:
                    node_id:
                      type: string
                    call_id:
                      type: string
                    state:
                      type: string
                      enum: ["inProgress", "success", "cancel", "busy", "noAnswer", "error"]
                    sip_refer_to:
                      type: string
                    sip_refer_response_code:
                      type: string
                    sip_notify_response_code:
                      type: string

    CallingCallQueueEvent:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            params:
              type: object
              properties:
                event_type:
                  const: "calling.call.queue"
                params:
                  type: object
                  properties:
                    node_id:
                      type: string
                    call_id:
                      type: string
                    control_id:
                      type: string
                    status:
                      type: string
                      enum: ["enqueue", "dequeue", "leave"]
                    id:
                      type: string
                    name:
                      type: string
                    position:
                      type: integer
                    size:
                      type: integer

    CallingCallDenoiseEvent:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            params:
              type: object
              properties:
                event_type:
                  const: "calling.call.denoise"
                params:
                  type: object
                  properties:
                    node_id:
                      type: string
                    call_id:
                      type: string
                    denoised:
                      type: boolean

    CallingCallHoldEvent:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            params:
              type: object
              properties:
                event_type:
                  const: "calling.call.hold"
                params:
                  type: object
                  properties:
                    node_id:
                      type: string
                    call_id:
                      type: string
                    state:
                      type: string
                      enum: ["hold", "unhold"]
                      description: Current hold state

    CallingCallPayEvent:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            params:
              type: object
              properties:
                event_type:
                  const: "calling.call.pay"
                params:
                  type: object
                  properties:
                    node_id:
                      type: string
                    call_id:
                      type: string
                    control_id:
                      type: string
                    state:
                      type: string
                      enum:
                        - "processing"
                        - "completed"
                        - "failed"
                        - "canceled"
                      description: Payment state
                    result:
                      type: object
                      description: Payment result details

    CallingCallSendDigitsEvent:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            params:
              type: object
              properties:
                event_type:
                  const: "calling.call.send_digits"
                params:
                  type: object
                  properties:
                    node_id:
                      type: string
                    call_id:
                      type: string
                    control_id:
                      type: string
                    state:
                      type: string
                      const: "finished"

    CallingConferenceEvent:
      allOf:
        - $ref: '#/components/schemas/BaseEvent'
        - type: object
          properties:
            params:
              type: object
              properties:
                event_type:
                  const: "calling.conference"
                params:
                  type: object
                  properties:
                    node_id:
                      type: string
                    conference_id:
                      type: string
                    name:
                      type: string
                    status:
                      type: string
                      enum:
                        - "conference-start"
                        - "conference-end"
                        - "participant-join"
                        - "participant-leave"
                        - "participant-mute"
                        - "participant-unmute"
                        - "participant-hold"
                        - "participant-unhold"
                    call_id:
                      type: string
                    muted:
                      type: boolean
                    hold:
                      type: boolean
                    coaching:
                      type: boolean
