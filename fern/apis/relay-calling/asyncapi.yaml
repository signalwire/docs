operations:
  # ===== Core Call Control =====
  dial:
    action: send
    channel:
      $ref: '#/channels/relay'
    summary: Dial outbound calls
    description: |
      Initiates outbound call(s) to one or more devices. When multiple devices
      are specified in parallel, the first to answer wins.

      Devices are organized in a nested array:
      - Inner arrays: Devices called in parallel
      - Outer array: Device groups called in sequence

      Supported device types: phone, sip, webrtc, agora
    messages:
      - $ref: '#/channels/relay/messages/callingDial'
    reply:
      channel:
        $ref: '#/channels/relay'
      messages:
        - $ref: '#/channels/relay/messages/callingDialResult'

  answer:
    action: send
    channel:
      $ref: '#/channels/relay'
    summary: Answer incoming call
    description: |
      Answers an incoming call. Use this after receiving a `calling.call.receive` event.
      You can optionally specify preferred audio/video codecs.
    messages:
      - $ref: '#/channels/relay/messages/callingAnswer'
    reply:
      channel:
        $ref: '#/channels/relay'
      messages:
        - $ref: '#/channels/relay/messages/callingAnswerResult'

  end:
    action: send
    channel:
      $ref: '#/channels/relay'
    summary: End a call
    description: |
      Ends an active or ringing call. This method is async-safe.

      Disconnect reasons: hangup, cancel, busy, noAnswer, decline, error
    messages:
      - $ref: '#/channels/relay/messages/callingEnd'
    reply:
      channel:
        $ref: '#/channels/relay'
      messages:
        - $ref: '#/channels/relay/messages/callingEndResult'

  connect:
    action: send
    channel:
      $ref: '#/channels/relay'
    summary: Connect another party to call
    description: |
      Dials a device and connects it to an existing active call. Only one
      connect operation can run at a time per call.

      You can specify ringback audio to play while connecting.
    messages:
      - $ref: '#/channels/relay/messages/callingConnect'
    reply:
      channel:
        $ref: '#/channels/relay'
      messages:
        - $ref: '#/channels/relay/messages/callingConnectResult'

  disconnect:
    action: send
    channel:
      $ref: '#/channels/relay'
    summary: Disconnect connected calls
    description: |
      Disconnects all calls from this call without hanging them up.
      This method is async-safe.
    messages:
      - $ref: '#/channels/relay/messages/callingDisconnect'
    reply:
      channel:
        $ref: '#/channels/relay'
      messages:
        - $ref: '#/channels/relay/messages/callingDisconnectResult'

  pass:
    action: send
    channel:
      $ref: '#/channels/relay'
    summary: Pass call to another consumer
    description: |
      Passes on a `calling.call.receive` offer. SignalWire will offer
      the call to another Relay consumer.
    messages:
      - $ref: '#/channels/relay/messages/callingPass'
    reply:
      channel:
        $ref: '#/channels/relay'
      messages:
        - $ref: '#/channels/relay/messages/callingPassResult'

  transfer:
    action: send
    channel:
      $ref: '#/channels/relay'
    summary: Transfer call control
    description: |
      Transfers call control to another Relay application or SWML script.
      The destination can be:
      - An HTTPS URL returning SWML
      - Inline SWML script
      - Relay application prefixed with `context:`
    messages:
      - $ref: '#/channels/relay/messages/callingTransfer'
    reply:
      channel:
        $ref: '#/channels/relay'
      messages:
        - $ref: '#/channels/relay/messages/callingTransferResult'

  # ===== Media Playback =====
  play:
    action: send
    channel:
      $ref: '#/channels/relay'
    summary: Play media to call
    description: |
      Plays audio, TTS, silence, or ringtones to a call. This method is async-safe.
      Multiple play elements can be queued in a single request.
    messages:
      - $ref: '#/channels/relay/messages/callingPlay'
    reply:
      channel:
        $ref: '#/channels/relay'
      messages:
        - $ref: '#/channels/relay/messages/callingPlayResult'

  playPause:
    action: send
    channel:
      $ref: '#/channels/relay'
    summary: Pause active playback
    description: Pauses an active play operation. This method is async-safe.
    messages:
      - $ref: '#/channels/relay/messages/callingPlayPause'
    reply:
      channel:
        $ref: '#/channels/relay'
      messages:
        - $ref: '#/channels/relay/messages/callingPlayPauseResult'

  playResume:
    action: send
    channel:
      $ref: '#/channels/relay'
    summary: Resume paused playback
    description: Resumes a paused play operation. This method is async-safe.
    messages:
      - $ref: '#/channels/relay/messages/callingPlayResume'
    reply:
      channel:
        $ref: '#/channels/relay'
      messages:
        - $ref: '#/channels/relay/messages/callingPlayResumeResult'

  playStop:
    action: send
    channel:
      $ref: '#/channels/relay'
    summary: Stop active playback
    description: Stops an active play operation. This method is async-safe.
    messages:
      - $ref: '#/channels/relay/messages/callingPlayStop'
    reply:
      channel:
        $ref: '#/channels/relay'
      messages:
        - $ref: '#/channels/relay/messages/callingPlayStopResult'

  playVolume:
    action: send
    channel:
      $ref: '#/channels/relay'
    summary: Adjust playback volume
    description: |
      Adjusts the volume of an active play operation. This method is async-safe.
      Volume range: -40dB (muted) to +40dB
    messages:
      - $ref: '#/channels/relay/messages/callingPlayVolume'
    reply:
      channel:
        $ref: '#/channels/relay'
      messages:
        - $ref: '#/channels/relay/messages/callingPlayVolumeResult'

  # ===== Input Collection =====
  collect:
    action: send
    channel:
      $ref: '#/channels/relay'
    summary: Collect DTMF or speech input
    description: |
      Starts collecting input from the call. Can collect DTMF digits,
      speech, or both. This method is async-safe.
    messages:
      - $ref: '#/channels/relay/messages/callingCollect'
    reply:
      channel:
        $ref: '#/channels/relay'
      messages:
        - $ref: '#/channels/relay/messages/callingCollectResult'

  collectStop:
    action: send
    channel:
      $ref: '#/channels/relay'
    summary: Stop input collection
    description: Stops an active collect operation. This method is async-safe.
    messages:
      - $ref: '#/channels/relay/messages/callingCollectStop'
    reply:
      channel:
        $ref: '#/channels/relay'
      messages:
        - $ref: '#/channels/relay/messages/callingCollectStopResult'

  collectStartInputTimers:
    action: send
    channel:
      $ref: '#/channels/relay'
    summary: Start the initial_timeout timer
    description: Starts the initial_timeout timer for an active collect operation.
    messages:
      - $ref: '#/channels/relay/messages/callingCollectStartInputTimers'
    reply:
      channel:
        $ref: '#/channels/relay'
      messages:
        - $ref: '#/channels/relay/messages/callingCollectStartInputTimersResult'

  playAndCollect:
    action: send
    channel:
      $ref: '#/channels/relay'
    summary: Play media and collect input
    description: |
      Plays media to the call while collecting DTMF or speech input.
      Only one execution at a time per call.
    messages:
      - $ref: '#/channels/relay/messages/callingPlayAndCollect'
    reply:
      channel:
        $ref: '#/channels/relay'
      messages:
        - $ref: '#/channels/relay/messages/callingPlayAndCollectResult'

  playAndCollectStop:
    action: send
    channel:
      $ref: '#/channels/relay'
    summary: Stop play and collect operation
    description: Stops an active play and collect operation.
    messages:
      - $ref: '#/channels/relay/messages/callingPlayAndCollectStop'
    reply:
      channel:
        $ref: '#/channels/relay'
      messages:
        - $ref: '#/channels/relay/messages/callingPlayAndCollectStopResult'

  playAndCollectVolume:
    action: send
    channel:
      $ref: '#/channels/relay'
    summary: Adjust play and collect volume
    description: |
      Adjusts the volume of an active play and collect operation.
    messages:
      - $ref: '#/channels/relay/messages/callingPlayAndCollectVolume'
    reply:
      channel:
        $ref: '#/channels/relay'
      messages:
        - $ref: '#/channels/relay/messages/callingPlayAndCollectVolumeResult'

  # ===== Payment =====
  pay:
    action: send
    channel:
      $ref: '#/channels/relay'
    summary: Start payment collection
    description: |
      Initiates a payment collection IVR flow on the call. Collects credit card
      information via DTMF and sends it to a payment connector for processing.
    messages:
      - $ref: '#/channels/relay/messages/callingPay'
    reply:
      channel:
        $ref: '#/channels/relay'
      messages:
        - $ref: '#/channels/relay/messages/callingPayResult'

  payStop:
    action: send
    channel:
      $ref: '#/channels/relay'
    summary: Stop payment collection
    description: Stops an active payment collection operation.
    messages:
      - $ref: '#/channels/relay/messages/callingPayStop'
    reply:
      channel:
        $ref: '#/channels/relay'
      messages:
        - $ref: '#/channels/relay/messages/callingPayStopResult'

  # ===== Recording =====
  record:
    action: send
    channel:
      $ref: '#/channels/relay'
    summary: Record a call
    description: |
      Starts recording the call audio. Multiple recordings can run in parallel.
      This method is async-safe.
    messages:
      - $ref: '#/channels/relay/messages/callingRecord'
    reply:
      channel:
        $ref: '#/channels/relay'
      messages:
        - $ref: '#/channels/relay/messages/callingRecordResult'

  recordPause:
    action: send
    channel:
      $ref: '#/channels/relay'
    summary: Pause recording
    description: Pauses an active recording. This method is async-safe.
    messages:
      - $ref: '#/channels/relay/messages/callingRecordPause'
    reply:
      channel:
        $ref: '#/channels/relay'
      messages:
        - $ref: '#/channels/relay/messages/callingRecordPauseResult'

  recordResume:
    action: send
    channel:
      $ref: '#/channels/relay'
    summary: Resume recording
    description: Resumes a paused recording. This method is async-safe.
    messages:
      - $ref: '#/channels/relay/messages/callingRecordResume'
    reply:
      channel:
        $ref: '#/channels/relay'
      messages:
        - $ref: '#/channels/relay/messages/callingRecordResumeResult'

  recordStop:
    action: send
    channel:
      $ref: '#/channels/relay'
    summary: Stop recording
    description: Stops an active recording. This method is async-safe.
    messages:
      - $ref: '#/channels/relay/messages/callingRecordStop'
    reply:
      channel:
        $ref: '#/channels/relay'
      messages:
        - $ref: '#/channels/relay/messages/callingRecordStopResult'

  # ===== Detection =====
  detect:
    action: send
    channel:
      $ref: '#/channels/relay'
    summary: Start detector
    description: |
      Starts a detector on the call. Multiple detectors can run in parallel.
      Detector types: machine (AMD), fax, digit.
      This method is async-safe.
    messages:
      - $ref: '#/channels/relay/messages/callingDetect'
    reply:
      channel:
        $ref: '#/channels/relay'
      messages:
        - $ref: '#/channels/relay/messages/callingDetectResult'

  detectStop:
    action: send
    channel:
      $ref: '#/channels/relay'
    summary: Stop detector
    description: Stops an active detector. This method is async-safe.
    messages:
      - $ref: '#/channels/relay/messages/callingDetectStop'
    reply:
      channel:
        $ref: '#/channels/relay'
      messages:
        - $ref: '#/channels/relay/messages/callingDetectStopResult'

  # ===== DTMF =====
  sendDigits:
    action: send
    channel:
      $ref: '#/channels/relay'
    summary: Send DTMF tones
    description: |
      Sends DTMF digit tones to the call.
      Supported: 0-9, *, #, A-D, w (0.5s wait), W (1s wait)
    messages:
      - $ref: '#/channels/relay/messages/callingSendDigits'
    reply:
      channel:
        $ref: '#/channels/relay'
      messages:
        - $ref: '#/channels/relay/messages/callingSendDigitsResult'

  # ===== Fax =====
  sendFax:
    action: send
    channel:
      $ref: '#/channels/relay'
    summary: Send a fax
    description: |
      Sends a fax document. Can only execute on a one-legged call
      that is not executing anything else. PDF format only.
    messages:
      - $ref: '#/channels/relay/messages/callingSendFax'
    reply:
      channel:
        $ref: '#/channels/relay'
      messages:
        - $ref: '#/channels/relay/messages/callingSendFaxResult'

  sendFaxStop:
    action: send
    channel:
      $ref: '#/channels/relay'
    summary: Stop sending fax
    description: Stops an active send fax operation.
    messages:
      - $ref: '#/channels/relay/messages/callingSendFaxStop'
    reply:
      channel:
        $ref: '#/channels/relay'
      messages:
        - $ref: '#/channels/relay/messages/callingSendFaxStopResult'

  receiveFax:
    action: send
    channel:
      $ref: '#/channels/relay'
    summary: Receive a fax
    description: |
      Starts receiving a fax. Can only execute on a one-legged call
      that is not executing anything else.
    messages:
