asyncapi: 3.0.0
info:
  title: SignalWire Relay - Calling API
  version: 3.0.0
  description: |
    The SignalWire Relay Calling API provides programmatic control over voice calls
    through JSON-RPC 2.0 over WebSocket. This API enables you to create, manage,
    and control calls with features like playing audio, recording, collecting input,
    and more.

    ## Overview

    The Calling API uses bidirectional JSON-RPC communication:
    - **Client → Server**: Methods to control calls (dial, answer, play, record, etc.)
    - **Server → Client**: Events for call state changes and operation results

    ## Prerequisites

    Before using the Calling API, you must:
    1. Establish a connection using `signalwire.connect`
    2. Subscribe to contexts using `signalwire.receive`

    ## Method Conventions

    All methods follow this JSON-RPC structure:
    ```json
    {
      "jsonrpc": "2.0",
      "id": "unique-request-id",
      "method": "calling.methodName",
      "params": {
        "node_id": "UUID of provider managing the call",
        "call_id": "UUID of the call"
      }
    }
    ```

    ## Response Codes

    | Code | Description |
    |------|-------------|
    | 200  | Success |
    | 400  | Bad request |
    | 402  | Payment required |
    | 403  | Forbidden |
    | 404  | Call not found |
    | 409  | Conflict (call already connected or controlled by another client) |
    | 410  | Call gone |
    | 500  | Server error |

    ## Async-Safe Methods

    Methods marked as "async-safe" can be executed by clients that don't own the call
    via HTTP POST to `https://relay.signalwire.com/api/calling/calls`.

