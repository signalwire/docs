      - local-caller
      title: TranscribeDirection enum
    SpeechEngine:
      type: string
      enum:
      - deepgram
      - google
      description: Speech recognition engine options.
    TranscribeSummarizeAction:
      type: object
      properties:
        summarize:
          type: object
          properties:
            webhook:
              type: string
              examples:
              - https://example.com/summary-webhook
              description: The webhook URL to be called.
            prompt:
              type: string
              examples:
              - Provide a brief summary of the conversation including main topics discussed.
              description: The prompt for summarization.
          description: Summarizes the conversation as an object, allowing you to specify the webhook url and prompt for the summary.
      required:
      - summarize
      title: TranscribeSummarizeAction object
    TranslationFilterPreset:
      type: string
      enum:
      - polite
      - rude
      - professional
      - shakespeare
      - gen-z
      description: 'Preset translation filter values that adjust the tone or style of translated speech.


        - `polite` - Translates to a polite version, removing anything insulting while maintaining sentiment

        - `rude` - Translates to a rude and insulting version while maintaining sentiment

        - `professional` - Translates to sound professional, removing slang or lingo

        - `shakespeare` - Translates to sound like Shakespeare, speaking in iambic pentameter

        - `gen-z` - Translates to use Gen-Z slang and expressions'
      title: Filter Presets
    CustomTranslationFilter:
      type: string
      pattern: ^prompt:.+$
      description: Custom translation filter with a prompt prefix. Use `prompt:` followed by your custom instructions (e.g., `prompt:Use formal business language`).
      title: Custom Filter
    TranslateDirection:
      type: string
      enum:
      - remote-caller
      - local-caller
      title: TranslateDirection enum
    SummarizeAction:
      type: object
