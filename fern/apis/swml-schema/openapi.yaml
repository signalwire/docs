      description: Regular section that requires either body or bullets.
    Contexts:
      type: object
      properties:
        default:
          $ref: '#/components/schemas/ContextsObject'
          description: The default context to use at the beginning of the conversation. Additional context steps can be defined as any other key in the object.
      required:
      - default
      additionalProperties:
        $ref: '#/components/schemas/ContextsObject'
      title: contexts
    UserSWAIGFunction:
      type: object
      properties:
        description:
          type: string
          examples:
          - Get the weather information
          description: A description of the context and purpose of the function, to explain to the agent when to use it.
        purpose:
          type: string
          examples:
          - Get the weather information
          description: 'The purpose field has been deprecated and is replaced by the `description` field.

            A description of the context and purpose of the function, to explain to the agent when to use it.'
          deprecated: true
        parameters:
          $ref: '#/components/schemas/FunctionParameters'
          description: A JSON object that defines the expected user input parameters and their validation rules for the function.
        fillers:
          $ref: '#/components/schemas/FunctionFillers'
          description: A JSON object defining the fillers that should be played when calling a `swaig function`. This helps the AI break silence between responses. The filler is played asynchronously during
            the function call.
        argument:
          $ref: '#/components/schemas/FunctionParameters'
          description: "The argument field has been deprecated and is replaced by the `parameters` field. \nA JSON object defining the input that should be passed to the function. \nThe fields of this object\
            \ are the following two parameters."
          deprecated: true
        active:
          anyOf:
          - type: boolean
          - $ref: '#/components/schemas/SWMLVar'
          default: true
          examples:
          - true
          description: Whether the function is active. **Default:** `true`.
        meta_data:
          type: object
          properties: {}
          additionalProperties: {}
          examples:
          - api_key: key_123
            endpoint: https://api.example.com
          description: 'A powerful and flexible environmental variable which can accept arbitrary data that is set initially in the SWML script or from the SWML set_meta_data action.

            This data can be referenced locally to the function.

            All contained information can be accessed and expanded within the prompt - for example, by using a template string.

            Default is not set.'
        meta_data_token:
          type: string
          examples:
          - my-function-scope
          description: Scoping token for meta_data. If not supplied, metadata will be scoped to function's `web_hook_url`. Default is set by SignalWire.
        data_map:
          $ref: '#/components/schemas/DataMap'
          minProperties: 1
          description: 'An object that processes function inputs and executes operations through expressions, webhooks, or direct output.

            Properties are evaluated in strict priority order:

            1. expressions

            2. webhooks

            3. output


            Evaluation stops at the first property that returns a valid output result, similar to a return statement in a function.

            Any subsequent properties are ignored when a valid output is returned.

            If a valid output is not returned from any of the properties, a generic error message is returned.'
        skip_fillers:
          anyOf:
          - type: boolean
          - $ref: '#/components/schemas/SWMLVar'
          default: false
          examples:
          - true
          description: 'Skips the top-level fillers specified in `ai.languages` (which includes `speech_fillers` and `function_fillers`).

            When set to `true`, only function-specific fillers defined directly on `SWAIG.functions.fillers` will play.

            **Default:** `false`.'
        web_hook_url:
          type: string
          examples:
          - username:password:https://statuscallback.com
          description: Function-specific URL to send status callbacks and reports to. Takes precedence over a default setting. Authentication can also be set in the url in the format of `username:password@url.`
        wait_file:
          type: string
          format: uri
          examples:
          - https://cdn.signalwire.com/default-music/welcome.mp3
          description: A file to play while the function is running. `wait_file_loops` can specify the amount of times that files should continously play. Default is not set.
        wait_file_loops:
          $ref: '#/components/schemas/WaitFileLoopsValue'
          description: The number of times to loop playing the file. Default is not set.
          examples:
          - 5
        wait_for_fillers:
          anyOf:
          - type: boolean
          - $ref: '#/components/schemas/SWMLVar'
          default: false
          examples:
          - true
          description: Whether to wait for fillers to finish playing before continuing with the function. **Default:** `false`.
        function:
          type: string
          examples:
          - get_weather
          description: A unique name for the function. This can be any user-defined string or can reference a reserved function. Reserved functions are SignalWire functions that will be executed at certain
            points in the conversation.
      required:
      - description
      - function
      title: SWAIG Function
