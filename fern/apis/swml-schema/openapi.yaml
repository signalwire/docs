              default: 20
              examples:
              - 20
              description: 'If `uri` is a `rtp://` this will set the packetization time of the media in milliseconds.

                Default is `20` milliseconds.'
            status_url:
              type: string
              format: uri
              examples:
              - https://example.com/tap-status
              description: http or https URL to deliver tap status events
          required:
          - uri
          description: Start background call tap. Media is streamed over Websocket or RTP to customer controlled URI.
          title: tap
      required:
      - tap
      title: tap Method
    Transfer:
      type: object
