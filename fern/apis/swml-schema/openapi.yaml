        similarity:
          anyOf:
          - type: number
          - $ref: '#/components/schemas/SWMLVar'
          default: 0.75
          minimum: 0
          maximum: 1
          description: 'The similarity slider dictates how closely the AI should adhere to the original voice when attempting to replicate it. The higher the similarity, the closer the AI will sound to
            the original voice. IMPORTANT: Only works with ElevenLabs TTS engine.'
      title: LanguageParams
