        step_criteria:
          type: string
          examples:
          - Customer wants to order Pizza
          description: 'The criteria that must be met for the AI to proceed to the next step.

            The criteria is an instruction given to the AI.

            It''s **highly** recommended you create a custom criteria for the step to get the intended behavior.'
        functions:
          type: array
          items:
            type: string
          examples:
          - - Take Order
            - Confirm Order
            - Confirm Address
          description: An array of strings, where each string is the name of a SWAIG.function that can be executed from this step.
        valid_contexts:
          type: array
          items:
            type: string
          examples:
          - - Place Order
            - Confirm Order
          description: An array of context names that the AI can transition to from this step. This must be a valid `contexts.name` that is present in your `contexts` object.
        skip_user_turn:
          anyOf:
          - type: boolean
          - $ref: '#/components/schemas/SWMLVar'
          default: false
          examples:
          - true
          description: A boolean value, if set to `true`, will skip the user's turn to respond in the conversation and proceed to the next step. **Default:** `false`.
        end:
          type: boolean
          default: false
          examples:
          - true
          description: A boolean value that determines if the step is the last in the context. If `true`, the context ends after this step. Cannot be used along with the `valid_steps` parameter. **Default:**
            `false`.
        valid_steps:
          type: array
          items:
