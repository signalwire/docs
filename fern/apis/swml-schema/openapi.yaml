                priority: high
              description: 'Named parameters to send to transfer destination.

                Accepts an object mapping variable names to values.

                Default is not set.'
            meta:
              type: object
              properties: {}
              additionalProperties: {}
              examples:
              - transfer_reason: escalation
                original_agent: agent_001
              description: 'User data, ignored by SignalWire.

                Accepts an object mapping variable names to values.

                Default is not set.'
