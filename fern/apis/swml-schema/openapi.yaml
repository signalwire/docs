          anyOf:
          - type: number
          - $ref: '#/components/schemas/SWMLVar'
          default: 0.5
          minimum: 0
          maximum: 1
          description: 'The stability slider determines how stable the voice is and the randomness between each generation. Lowering this slider introduces a broader emotional range for the voice. IMPORTANT:
