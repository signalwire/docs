openapi: 3.0.0
info:
  title: SWML Schema
  version: 1.0.0
  description: Schema definitions for SignalWire Markup Language (SWML). This spec exposes SWML type definitions for use with the Fern <Schema> documentation component.
paths:
  /swml:
    post:
      operationId: validateSwml
      summary: SWML Object
      description: Reference endpoint exposing the SWML object schema for documentation.
      tags:
      - SWML
      x-fern-ignore: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SWMLObject'
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SWMLObject'
components:
  schemas:
    Section:
      type: object
      properties:
        main:
          type: array
          items:
            $ref: '#/components/schemas/SWMLMethod'
      required:
      - main
      additionalProperties:
        type: array
        items:
          $ref: '#/components/schemas/SWMLMethod'
      title: SWML sections
    SWMLMethod:
      anyOf:
      - $ref: '#/components/schemas/Answer'
      - $ref: '#/components/schemas/AI'
      - $ref: '#/components/schemas/AmazonBedrock'
      - $ref: '#/components/schemas/Cond'
      - $ref: '#/components/schemas/Connect'
      - $ref: '#/components/schemas/Denoise'
      - $ref: '#/components/schemas/EnterQueue'
      - $ref: '#/components/schemas/Execute'
      - $ref: '#/components/schemas/Goto'
      - $ref: '#/components/schemas/Label'
      - $ref: '#/components/schemas/LiveTranscribe'
      - $ref: '#/components/schemas/LiveTranslate'
      - $ref: '#/components/schemas/Hangup'
      - $ref: '#/components/schemas/JoinRoom'
      - $ref: '#/components/schemas/JoinConference'
      - $ref: '#/components/schemas/Play'
      - $ref: '#/components/schemas/Prompt'
      - $ref: '#/components/schemas/ReceiveFax'
      - $ref: '#/components/schemas/Record'
      - $ref: '#/components/schemas/RecordCall'
      - $ref: '#/components/schemas/Request'
      - $ref: '#/components/schemas/Return'
      - $ref: '#/components/schemas/SendDigits'
      - $ref: '#/components/schemas/SendFax'
      - $ref: '#/components/schemas/SendSMS'
      - $ref: '#/components/schemas/Set'
      - $ref: '#/components/schemas/Sleep'
      - $ref: '#/components/schemas/SIPRefer'
      - $ref: '#/components/schemas/StopDenoise'
      - $ref: '#/components/schemas/StopRecordCall'
      - $ref: '#/components/schemas/StopTap'
      - $ref: '#/components/schemas/Switch'
      - $ref: '#/components/schemas/Tap'
      - $ref: '#/components/schemas/Transfer'
      - $ref: '#/components/schemas/Unset'
      - $ref: '#/components/schemas/Pay'
      - $ref: '#/components/schemas/DetectMachine'
      - $ref: '#/components/schemas/UserEvent'
      title: SWML methods
    Answer:
      type: object
      properties:
        answer:
          type: object
          properties:
            max_duration:
              anyOf:
              - type: integer
              - $ref: '#/components/schemas/SWMLVar'
              default: 14400
              examples:
              - 3600
              description: Maximum duration in seconds for the call. Defaults to `14400` seconds (4 hours).
            codecs:
              type: string
              examples:
              - PCMU,PCMA,OPUS
              description: 'Comma-separated string of codecs to offer. Valid codecs are: PCMU, PCMA, G722, G729, AMR-WB, OPUS, VP8, H264.'
            username:
              type: string
              examples:
              - user123
              description: Username to use for SIP authentication.
            password:
              type: string
              examples:
              - securepassword
              description: Password to use for SIP authentication.
          description: Answer incoming call and set an optional maximum duration.
          title: answer
      required:
      - answer
      title: answer Method
    AI:
      type: object
      properties:
        ai:
          $ref: '#/components/schemas/AIObject'
          description: 'Creates an AI agent that conducts voice conversations using automatic speech recognition (ASR),

            large language models (LLMs), and text-to-speech (TTS) synthesis.

            The agent processes caller speech in real-time, generates contextually appropriate responses,

            and can execute custom functions to interact with external systems through SignalWire AI Gateway (SWAIG).'
          title: ai
      required:
      - ai
      title: ai Method
    AmazonBedrock:
      type: object
      properties:
        amazon_bedrock:
          $ref: '#/components/schemas/AmazonBedrockObject'
          description: Creates a new Bedrock AI Agent
      required:
      - amazon_bedrock
      title: amazon_bedrock Method
    Cond:
      type: object
      properties:
        cond:
          type: array
          items:
            $ref: '#/components/schemas/CondParams'
          description: Execute a sequence of instructions depending on the value of a JavaScript condition.
          title: cond
      required:
      - cond
      title: cond Method
    Connect:
      type: object
      properties:
        connect:
          oneOf:
          - $ref: '#/components/schemas/ConnectDeviceSingle'
          - $ref: '#/components/schemas/ConnectDeviceSerial'
          - $ref: '#/components/schemas/ConnectDeviceParallel'
          - $ref: '#/components/schemas/ConnectDeviceSerialParallel'
          description: Dial a SIP URI or phone number.
      required:
      - connect
      title: connect Method
    Denoise:
      type: object
      properties:
        denoise:
          type: object
          properties: {}
          examples:
          - {}
          description: Start noise reduction. You can stop it at any time using `stop_denoise`.
      required:
      - denoise
      title: denoise Method
    EnterQueue:
      type: object
      properties:
        enter_queue:
          $ref: '#/components/schemas/EnterQueueObject'
          description: 'Place the current call in a named queue where it will wait to be connected to an available agent or resource.

            While waiting, callers will hear music or custom audio.

            When an agent connects to the queue (using the connect method), the caller and agent are bridged together.

            After the bridge completes, execution continues with the SWML script specified in transfer_after_bridge.'
          title: enter_queue
      required:
      - enter_queue
      title: enter_queue Method
    Execute:
      type: object
      properties:
        execute:
          type: object
          properties:
            dest:
              type: string
              examples:
              - https://example.com/swml-handler
              description: 'Specifies what to execute. The value can be one of:

                - `<section_name>` - section in the current document to execute

                - A URL (http or https) that returns a SWML document - Sends HTTP POST

                - An inline SWML document (as a JSON string)'
            params:
              type: object
              properties: {}
              additionalProperties: {}
              examples:
              - caller_id: 15551234567
                language: en-US
              description: Named parameters to send to section or URL
            meta:
              type: object
              properties: {}
              additionalProperties: {}
              examples:
              - request_id: req_abc123
                source: ivr
              description: User-defined metadata, ignored by SignalWire
            on_return:
              type: array
              items:
                $ref: '#/components/schemas/SWMLMethod'
              description: The list of SWML instructions to be executed when the executed section or URL returns
            result:
              $ref: '#/components/schemas/ExecuteResult'
              description: 'Action to take based on the result of the call. This will run once the peer leg of the call has ended.

                Will use the switch method when the return_value is an object, and will use the cond method when the return_value is an array.'
          required:
          - dest
          description: 'Execute a specified section or URL as a subroutine, and upon completion, return to the current document.

            Use the return statement to pass any return values or objects back to the current document.'
      required:
      - execute
      title: execute Method
    Goto:
      type: object
      properties:
        goto:
          type: object
          properties:
            label:
              type: string
              examples:
              - greeting
              description: Mark any point of the SWML section with a label so that goto can jump to it.
            when:
              type: string
              examples:
              - vars.retry_count < 3
              description: A JavaScript condition that determines whether to perform the jump. If the condition evaluates to true, the jump is executed. If omitted, the jump is unconditional.
            max:
              anyOf:
              - type: integer
              - $ref: '#/components/schemas/SWMLVar'
              default: 100
              examples:
              - 3
              minimum: 1
              maximum: 100
              description: The maximum number of times to perform the jump. Must be a number between 1 and 100. Default `100`.
          required:
          - label
          description: 'Jump to a label within the current section, optionally based on a condition.

            The goto method will only navigate to a label within the same section.'
      required:
      - goto
      title: goto Method
    Label:
      type: object
      properties:
        label:
          type: string
          examples:
          - greeting
          description: Mark any point of the SWML section with a label so that goto can jump to it.
      required:
      - label
      title: label Method
    LiveTranscribe:
      type: object
      properties:
        live_transcribe:
          type: object
          properties:
            action:
              $ref: '#/components/schemas/TranscribeAction'
              description: The action to perform during live transcription.
          required:
          - action
          description: Start live transcription of the call. The transcription will be sent to the specified webhook URL.
          title: live_transcribe
      required:
      - live_transcribe
      title: live_transcribe Method
    LiveTranslate:
      type: object
      properties:
        live_translate:
          type: object
          properties:
            action:
              $ref: '#/components/schemas/TranslateAction'
              description: The action to perform during live translation.
          required:
          - action
          description: Start live translation of the call. The translation will be sent to the specified webhook URL.
          title: live_translate
      required:
      - live_translate
      title: live_translate Method
    Hangup:
      type: object
      properties:
        hangup:
          type: object
          properties:
            reason:
              anyOf:
              - type: string
                enum:
                - hangup
              - type: string
                enum:
                - busy
              - type: string
                enum:
                - decline
              examples:
              - busy
              description: The reason for hanging up the call.
          description: End the call with an optional reason.
          title: hangup
      required:
      - hangup
      title: hangup Method
    JoinRoom:
      type: object
      properties:
        join_room:
          type: object
          properties:
            name:
              type: string
              examples:
              - my-video-room
              description: 'Name of the room to join. Allowed characters: A-Z, a-z, 0-9, underscore, and hyphen.'
          required:
          - name
          description: Join a RELAY room. If the room doesn't exist, it creates a new room.
          title: join_room
      required:
      - join_room
      title: join_room Method
    JoinConference:
      type: object
      properties:
        join_conference:
          $ref: '#/components/schemas/JoinConferenceObject'
          description: 'Join an ad-hoc audio conference started on either the SignalWire or Compatibility API.

            This method allows you to connect the current call to a named conference where multiple participants can communicate simultaneously.'
          title: join_conference
      required:
      - join_conference
      title: join_conference Method
    Play:
      type: object
      properties:
        play:
          oneOf:
          - $ref: '#/components/schemas/PlayWithURL'
          - $ref: '#/components/schemas/PlayWithURLS'
          description: Play file(s), ringtones, speech or silence.
          title: play
      required:
      - play
      title: play Method
    Prompt:
      type: object
      properties:
        prompt:
          type: object
          properties:
            play:
              $ref: '#/components/schemas/PromptPlayValue'
              description: "URL or array of URLs to play.\nAllowed URLs are:\n    http:// or https:// - audio file to GET\n    ring:[duration:]<country code> - ring tone to play. For example: ring:us to\
                \ play single ring or ring:20.0:us to play ring for 20 seconds.\n    say:<text to speak> - Sentence to say\n    silence: <duration> - seconds of silence to play"
              examples:
              - say:Please press 1 for sales or 2 for support
            volume:
              type: number
              default: 0
              examples:
              - 0
              minimum: -40
              maximum: 40
              description: 'Volume level for the audio file.

                Default is `0`.

                Valid range is -40 to 40.'
            say_voice:
              type: string
              default: Polly.Salli
              examples:
              - Polly.Joanna
              description: The voice to use for the text to speech.
            say_language:
              type: string
              default: en-US
              examples:
              - en-US
              description: The language to use for the text to speech.
            say_gender:
              type: string
              default: female
              examples:
              - female
              description: The gender to use for the text to speech.
            max_digits:
              anyOf:
              - type: integer
              - $ref: '#/components/schemas/SWMLVar'
              default: 1
              examples:
              - 4
              description: 'Number of digits to collect.

                Default is `1`.'
            terminators:
              type: string
              examples:
              - '#'
              description: 'Digits that terminate digit collection.

                Default is not set.'
            digit_timeout:
              anyOf:
              - type: number
              - $ref: '#/components/schemas/SWMLVar'
              default: 5
              examples:
              - 5
              description: 'Time in seconds to wait for next digit.

                Default is `5.0` seconds.'
            initial_timeout:
              anyOf:
              - type: number
              - $ref: '#/components/schemas/SWMLVar'
              default: 5
              examples:
              - 10
              description: 'Time in seconds to wait for start of input.

                Default is `5.0` seconds.'
            speech_timeout:
              anyOf:
              - type: number
              - $ref: '#/components/schemas/SWMLVar'
              examples:
              - 15
              description: Max time in seconds to wait for speech result.
            speech_end_timeout:
              anyOf:
              - type: number
              - $ref: '#/components/schemas/SWMLVar'
              examples:
              - 2
              description: Time in seconds to wait for end of speech utterance.
            speech_language:
              type: string
              examples:
              - en-US
              description: Language to detect speech in.
            speech_hints:
              anyOf:
              - type: array
                items:
                  type: string
              - type: array
                items:
                  $ref: '#/components/schemas/SWMLVar'
              examples:
              - - sales
                - support
                - billing
              description: Expected words or phrases to help the speech recognition.
            speech_engine:
              type: string
              examples:
              - Deepgram
              description: 'The engine that is selected for speech recognition. The engine must support the specified language.

                [Deepgram|Google| etc...] Default is not set (SignalWire picks the engine).'
            status_url:
              type: string
              format: uri
              examples:
              - https://example.com/prompt-status
              description: http or https URL to deliver prompt status events
          required:
          - play
          description: 'Play a prompt and wait for input. The input can be received either as digits from the keypad,

            or from speech, or both depending on what parameters are set.

            By default, only digit input is enabled. To enable speech input, set at least one speech parameter.

            To enable both digit and speech input, set at least one parameter for each.'
          title: prompt
      required:
      - prompt
      title: prompt Method
    ReceiveFax:
      type: object
      properties:
        receive_fax:
          type: object
          properties:
            status_url:
              type: string
              format: uri
              examples:
              - https://example.com/fax-received
              description: http or https URL to deliver receive_fax status events
          description: Receive a fax being delivered to this call.
          title: receive_fax
      required:
      - receive_fax
      title: receive_fax Method
    Record:
      type: object
      properties:
        record:
          type: object
          properties:
            stereo:
              anyOf:
              - type: boolean
              - $ref: '#/components/schemas/SWMLVar'
              default: false
              examples:
              - true
              description: 'If true, record in stereo.

                Default is `false`.'
            format:
              anyOf:
              - type: string
                enum:
                - wav
              - type: string
                enum:
                - mp3
              - type: string
                enum:
                - mp4
              default: wav
              examples:
              - mp3
              description: 'The format to record in. Can be `wav`, `mp3`, or `mp4`.

                Default is `"wav"`.'
            direction:
              anyOf:
              - type: string
                enum:
                - speak
              - type: string
                enum:
                - listen
              default: speak
              examples:
              - speak
              description: 'Direction of the audio to record: "speak" for what party says, "listen" for what party hears.

                Default is `"speak"`.'
            terminators:
              type: string
              default: '#'
              examples:
              - '#'
              description: String of digits that will stop the recording when pressed. Default is `"#"`.
            beep:
              anyOf:
              - type: boolean
              - $ref: '#/components/schemas/SWMLVar'
              default: false
              examples:
              - true
              description: 'Play a beep before recording.

                Default is `false`.'
            input_sensitivity:
              anyOf:
              - type: number
              - $ref: '#/components/schemas/SWMLVar'
              default: 44
              examples:
              - 44
              description: 'How sensitive the recording voice activity detector is to background noise.

                A larger value is more sensitive. Allowed values from 0.0 to 100.0.

                Default is `44.0`.'
            initial_timeout:
              anyOf:
              - type: number
              - $ref: '#/components/schemas/SWMLVar'
              default: 4
              examples:
              - 4
              description: 'Time in seconds to wait for the start of speech.

                Default is `4.0` seconds.'
            end_silence_timeout:
              anyOf:
              - type: number
              - $ref: '#/components/schemas/SWMLVar'
              default: 5
              examples:
              - 5
              description: 'Time in seconds to wait in silence before ending the recording.

                Default is `5.0` seconds.'
            max_length:
              anyOf:
              - type: number
              - $ref: '#/components/schemas/SWMLVar'
              examples:
              - 60
              description: Maximum length of the recording in seconds.
            status_url:
              type: string
              examples:
              - https://example.com/recording-status
              description: URL to send recording status events to.
          description: 'Record the call audio in the foreground, pausing further SWML execution until recording ends.

            Use this, for example, to record voicemails.

            To record calls in the background in a non-blocking fashion, use the record_call method.'
          title: record
      required:
      - record
      title: record Method
    RecordCall:
      type: object
      properties:
        record_call:
          type: object
          properties:
            control_id:
              type: string
              examples:
              - recording_001
              description: Identifier for this recording, to use with `stop_call_record`.
            stereo:
              anyOf:
              - type: boolean
              - $ref: '#/components/schemas/SWMLVar'
              default: false
              examples:
              - true
              description: 'If `true`, record in stereo.

                Default is `false`.'
            format:
              anyOf:
              - type: string
                enum:
                - wav
              - type: string
                enum:
                - mp3
              - type: string
                enum:
                - mp4
              default: wav
              examples:
              - mp3
              description: 'The format to record in. It can be `wav`, `mp3`, or `mp4`.

                Default is `"wav"`.'
            direction:
              anyOf:
              - type: string
                enum:
                - speak
              - type: string
                enum:
                - listen
              - type: string
                enum:
                - both
              default: both
              examples:
              - both
              description: 'Direction of the audio to record: "speak" for what party says, "listen" for what party hears, "both" for what the party hears and says.

                Default is `"both"`.'
            terminators:
              type: string
              default: ''
              examples:
              - '#*'
              description: String of digits that will stop the recording when pressed. Default is `""` (empty).
            beep:
              anyOf:
              - type: boolean
              - $ref: '#/components/schemas/SWMLVar'
              default: false
              examples:
              - true
              description: 'Play a beep before recording.

                Default is `false`.'
            input_sensitivity:
              anyOf:
              - type: number
              - $ref: '#/components/schemas/SWMLVar'
              default: 44
              examples:
              - 44
              description: 'How sensitive the recording voice activity detector is to background noise.

                A larger value is more sensitive. Allowed values from 0.0 to 100.0.

                Default is `44.0`.'
            initial_timeout:
              anyOf:
              - type: number
              - $ref: '#/components/schemas/SWMLVar'
              default: 0
              examples:
              - 0
              description: 'Time in seconds to wait for the start of speech.

                Default is `0.0` seconds.'
            end_silence_timeout:
              anyOf:
              - type: number
              - $ref: '#/components/schemas/SWMLVar'
              default: 0
              examples:
              - 0
              description: 'Time in seconds to wait in silence before ending the recording.

                Default is `0.0` seconds.'
            max_length:
              anyOf:
              - type: number
              - $ref: '#/components/schemas/SWMLVar'
              examples:
              - 300
              description: Maximum length of the recording in seconds.
            status_url:
              type: string
              format: uri
              examples:
              - https://example.com/record-call-status
              description: http or https URL to deliver record_call status events
          description: 'Record call in the background.

            Unlike the record method, the record_call method will start the recording and continue executing

            the SWML script while allowing the recording to happen in the background.

            To stop call recordings started with record_call, use the stop_record_call method.'
          title: record_call
      required:
      - record_call
      title: record_call Method
    Request:
      type: object
      properties:
        request:
          type: object
          properties:
            url:
              type: string
              examples:
              - https://api.example.com/webhook
              description: URL to send the HTTPS request to. Authentication can also be set in the URL in the format of username:password@url.
            method:
              anyOf:
              - type: string
                enum:
                - GET
              - type: string
                enum:
                - POST
              - type: string
                enum:
                - PUT
              - type: string
                enum:
                - DELETE
              examples:
              - POST
              description: The HTTP method to be used for the request. Can be `GET`, `POST`, `PUT`, or `DELETE`.
            headers:
              type: object
              properties: {}
              additionalProperties: {}
              examples:
              - Content-Type: application/json
                Authorization: Bearer token123
              description: Object containing HTTP headers to set. Valid header values are Accept, Authorization, Content-Type, Range, and custom X- headers.
            body:
              $ref: '#/components/schemas/RequestBody'
              description: 'Request body. Content-Type header should be explicitly set, but if not set, the most likely type

                will be set based on the first non-whitespace character.'
              examples:
              - action: notify
                message: Call completed
            timeout:
              anyOf:
              - type: number
              - $ref: '#/components/schemas/SWMLVar'
              default: 0
              examples:
              - 10
              description: 'Maximum time in seconds to wait for a response.

                Default is `0` (no timeout).'
            connect_timeout:
              anyOf:
              - type: number
              - $ref: '#/components/schemas/SWMLVar'
              default: 0
              examples:
              - 5
              description: 'Maximum time in seconds to wait for a connection.

                Default is `0` (no timeout).'
            save_variables:
              anyOf:
              - type: boolean
              - $ref: '#/components/schemas/SWMLVar'
              default: false
              examples:
              - true
              description: 'Store parsed JSON response as variables.

                Default is `false`.'
          required:
          - url
          - method
          description: Send a GET, POST, PUT, or DELETE request to a remote URL.
          title: request
      required:
      - request
      title: request Method
    Return:
      type: object
      properties:
        return:
          examples:
          - status: success
            result: completed
          description: Return a value from an execute call or exit the script. The value can be any type.
          title: return
      required:
      - return
      title: return Method
    SendDigits:
      type: object
      properties:
        send_digits:
          type: object
          properties:
            digits:
              type: string
              examples:
              - 1234#
              description: The digits to send. Valid values are 0123456789*#ABCDWw. Character W is a 1 second delay, and w is a 500ms delay.
          required:
          - digits
          description: Send digit presses as DTMF tones.
          title: send_digits
      required:
      - send_digits
      title: send_digits Method
    SendFax:
      type: object
      properties:
        send_fax:
          type: object
          properties:
            document:
              type: string
              format: uri
              examples:
              - https://example.com/document.pdf
              description: URL to the PDF document to fax.
            header_info:
              type: string
              examples:
              - 'Invoice #12345'
              description: Header text to include on the fax.
            identity:
              type: string
              examples:
              - 15551234567
              description: 'Station identity to report.

                Default is the calling party''s caller ID number.'
            status_url:
              type: string
              format: uri
              examples:
              - https://example.com/fax-status
              description: http or https URL to deliver send_fax status events
          required:
          - document
          description: Send a fax.
          title: send_fax
      required:
      - send_fax
      title: send_fax Method
    SendSMS:
      type: object
      properties:
        send_sms:
          anyOf:
          - $ref: '#/components/schemas/SMSWithBody'
          - $ref: '#/components/schemas/SMSWithMedia'
          description: Send an outbound SMS or MMS message to a PSTN phone number.
          title: send_sms
      required:
