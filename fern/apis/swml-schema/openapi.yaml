            $ref: '#/components/schemas/POM'
          minItems: 1
          description: Optional array of nested subsections
        numbered:
          anyOf:
          - type: boolean
          - $ref: '#/components/schemas/SWMLVar'
          examples:
          - true
          description: Whether to number the section
        numberedBullets:
          anyOf:
          - type: boolean
          - $ref: '#/components/schemas/SWMLVar'
          examples:
          - false
          description: Whether to number the bullets
        body:
          type: string
          examples:
          - Follow these steps when handling customer complaints: null
          description: Body text for the section (optional)
        bullets:
          type: array
          items:
            type: string
          examples:
          - - Acknowledge the issue
            - Apologize for any inconvenience
            - Offer a resolution
          minItems: 1
          description: Array of bullet points
      required:
      - bullets
      description: Content model with bullets and optional body
      title: Section with Bullets
    ContextsObject:
      anyOf:
      - $ref: '#/components/schemas/ContextsPOMObject'
      - $ref: '#/components/schemas/ContextsTextObject'
    FunctionParameters:
      type: object
      properties:
        type:
          type: string
          enum:
          - object
          description: The type of argument the AI is passing to the function. Possible values are 'string' and 'object'.
        properties:
          type: object
          properties: {}
          additionalProperties:
            $ref: '#/components/schemas/SchemaType'
          description: 'An object containing the property definitions that are passed to the function.


            A property definition is a valid JSON schema type with dynamic property names, where:

            - Keys: User-defined strings, that set the property names.

            - Values: A valid property type, which can be one of the following: `string`, `integer`, `number`, `boolean`, `array`, `object`, or `null`.'
        required:
          type: array
          items:
            type: string
          examples:
          - - name1
            - name2
          description: An array of required property names from the `properties` object.
      required:
      - type
      - properties
    DataMap:
      type: object
      properties:
        output:
          $ref: '#/components/schemas/Output'
          description: 'An object that contains a response and a list of actions to be performed upon a SWAIG function call.

            This functions like a return statement in a function.'
        expressions:
          type: array
          items:
            $ref: '#/components/schemas/Expression'
          description: An array of objects that have pattern matching logic to process the user's input data. A user can define multiple expressions to match against the user's input data.
        webhooks:
          type: array
          items:
            $ref: '#/components/schemas/Webhook'
          description: An array of objects that define external API calls.
      title: DataMap object
    ContextsPOMObject:
      type: object
      properties:
        steps:
          type: array
          items:
            $ref: '#/components/schemas/ContextSteps'
          description: An array of step objects that define the conversation flow for this context. Steps execute sequentially unless otherwise specified.
          title: steps
        isolated:
          type: boolean
          default: false
          examples:
          - true
          description: When `true`, resets conversation history to only the system prompt when entering this context. Useful for focused tasks that shouldn't be influenced by previous conversation. **Default:**
            `false`.
        enter_fillers:
          type: array
          items:
            $ref: '#/components/schemas/FunctionFillers'
          description: Language-specific filler phrases played when transitioning into this context. Helps provide smooth context switches.
        exit_fillers:
          type: array
          items:
            $ref: '#/components/schemas/FunctionFillers'
          description: Language-specific filler phrases played when leaving this context. Ensures natural transitions out of specialized modes.
        pom:
          type: array
          items:
            $ref: '#/components/schemas/POM'
          minItems: 1
          description: An array of objects that define the POM for the context. POM is the Post-Prompt Object Model, which is used to define the flow of the conversation.
      required:
      - steps
      title: ContextsPOMObject
    ContextsTextObject:
      type: object
      properties:
        steps:
          type: array
          items:
            $ref: '#/components/schemas/ContextSteps'
          description: An array of step objects that define the conversation flow for this context. Steps execute sequentially unless otherwise specified.
          title: steps
        isolated:
          type: boolean
          default: false
          examples:
          - true
          description: When `true`, resets conversation history to only the system prompt when entering this context. Useful for focused tasks that shouldn't be influenced by previous conversation. **Default:**
            `false`.
        enter_fillers:
          type: array
          items:
            $ref: '#/components/schemas/FunctionFillers'
          description: Language-specific filler phrases played when transitioning into this context. Helps provide smooth context switches.
        exit_fillers:
          type: array
          items:
            $ref: '#/components/schemas/FunctionFillers'
          description: Language-specific filler phrases played when leaving this context. Ensures natural transitions out of specialized modes.
        text:
          type: string
          examples:
          - You are now helping the customer with their order.
          description: The text to send to the agent.
      required:
      - steps
    SchemaType:
      oneOf:
      - $ref: '#/components/schemas/StringProperty'
      - $ref: '#/components/schemas/IntegerProperty'
      - $ref: '#/components/schemas/NumberProperty'
      - $ref: '#/components/schemas/BooleanProperty'
      - $ref: '#/components/schemas/ArrayProperty'
      - $ref: '#/components/schemas/ObjectProperty'
      - $ref: '#/components/schemas/NullProperty'
      - $ref: '#/components/schemas/OneOfProperty'
      - $ref: '#/components/schemas/AllOfProperty'
      - $ref: '#/components/schemas/AnyOfProperty'
      - $ref: '#/components/schemas/ConstProperty'
      title: Function Parameters Type Union
    Output:
      type: object
      properties:
        response:
          type: string
          examples:
          - Order placed
          description: A static response text or message returned to the AI agent's context.
        action:
          type: array
          items:
            $ref: '#/components/schemas/Action'
          description: A list of actions to be performed upon matching.
      required:
      - response
      title: Output object
    Expression:
      type: object
      properties:
        string:
          type: string
          examples:
          - I want a refund
          description: The actual input or value from the user or system.
        pattern:
          type: string
          examples:
          - refund|return|money back
          description: A regular expression pattern to validate or match the string.
        output:
          $ref: '#/components/schemas/Output'
          description: An object that contains a response and a list of actions to be performed upon a expression match.
      required:
      - string
      - pattern
      - output
      title: Expression object
    Webhook:
      type: object
      properties:
        expressions:
          type: array
          items:
            $ref: '#/components/schemas/Expression'
          description: 'A list of expressions to be evaluated upon matching.

            If the following properties are set (foreach, expressions, output), they will be processed in the following order:

            1. foreach

            2. expressions

            3. output'
        error_keys:
          $ref: '#/components/schemas/StringOrArray'
          description: A string or array of strings that represent the keys to be used for error handling. This will match the key(s) in the response from the API call.
          examples:
          - failed
        url:
          type: string
          examples:
          - https://example.com
          description: The endpoint for the external service or API.
        foreach:
          type: object
          properties:
            input_key:
              type: string
              examples:
              - success
              description: The key to be used to access the current element in the array.
            output_key:
              type: string
              examples:
              - deliverer
              description: The key that can be referenced in the output of the `foreach` iteration. The values that are stored from `append` will be stored in this key.
            max:
              anyOf:
              - type: integer
              - $ref: '#/components/schemas/SWMLVar'
              examples:
              - 5
              description: The max amount of elements that are iterated over in the array. This will start at the beginning of the array.
            append:
              type: string
              examples:
              - 'title: ${this.title}, contact: ${this.phone}'
              description: 'The values to append to the output_key.

                Properties from the object can be referenced and added to the output_key by using the following syntax:

                ${this.property_name}.

                The `this` keyword is used to reference the current object in the array.'
          required:
          - input_key
          - output_key
          - append
          description: 'Iterates over an array of objects and processes a output based on each element in the array. Works similarly to JavaScript''s forEach method.

            If the following properties are set (foreach, expressions, output), they will be processed in the following order:

            1. foreach

            2. expressions

            3. output'
        headers:
          type: object
          properties: {}
          additionalProperties: {}
          examples:
          - Content-Type: application/json
            X-API-Key: your-api-key
          description: Any necessary headers for the API call.
        method:
          anyOf:
          - type: string
            enum:
            - GET
          - type: string
            enum:
            - POST
          - type: string
            enum:
            - PUT
          - type: string
            enum:
            - DELETE
          examples:
          - POST
          description: The HTTP method (GET, POST, etc.) for the API call.
        input_args_as_params:
          anyOf:
          - type: boolean
          - $ref: '#/components/schemas/SWMLVar'
          examples:
          - true
          description: A boolean to determine if the input arguments should be passed as parameters.
        params:
          type: object
          properties: {}
          additionalProperties: {}
          examples:
          - account_id: acc_123
            include_details: true
          description: An object of any necessary parameters for the API call. The key is the parameter name and the value is the parameter value.
        require_args:
          $ref: '#/components/schemas/StringOrArray'
          description: A string or array of strings that represent the `arguments` that are required to make the webhook request.
          examples:
          - - order_id
            - customer_email
        output:
          $ref: '#/components/schemas/Output'
          description: 'An object that contains a response and a list of actions to be performed upon completion of the webhook request.

            If the following properties are set (foreach, expressions, output), they will be processed in the following order:

            1. foreach

            2. expressions

            3. output'
      required:
      - url
      title: Webhook object
    ContextSteps:
      anyOf:
      - $ref: '#/components/schemas/ContextPOMSteps'
      - $ref: '#/components/schemas/ContextTextSteps'
      title: Context step - supports either POM or text-based steps
    StringProperty:
