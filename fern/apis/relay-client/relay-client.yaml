    Fabric.Member:
      type: object
      properties:
        id:
          type: string
          description: The member ID. Equals the call ID for a member that is not in a conference.
          examples:
            - c2a1e9f4-6b3d-4e7a-8f1c-2d3e4f5a6b7c
        room_id:
          type: string
          description: The room this member belongs to. In a 1:1 call this is the call ID; in a conference it is the room ID.
        room_session_id:
          type: string
          description: The room session this member belongs to.
        name:
          type: string
          description: Friendly display name — the caller ID for a 1:1 call.
          examples:
            - Alice
        type:
          type: string
          description: The member type, such as `member` or `screen`.
          examples:
            - member
        call_id:
          type: string
          description: The member's call ID. Present on join events and where the member is addressed directly.
        parent_id:
          type: string
          description: Associated parent member, for a screenshare or an additional-device member.
        audio_muted:
          type: boolean
          description: Whether the member's audio is muted.
        video_muted:
          type: boolean
          description: Whether the member's video is muted.
        handraised:
          type: boolean
          description: Whether the member has their hand raised.
        visible:
          type: boolean
          description: Whether the member is visible in the layout. Always `true` for a 1:1 call.
        deaf:
          type: boolean
          description: Whether the member is deafened (not hearing the conference audio).
        input_volume:
          type: integer
          format: int32
          description: Input (microphone) volume, from -5 to 5.
          examples:
            - 0
        output_volume:
          type: integer
          format: int32
          description: Output (speaker) volume, from -5 to 5.
          examples:
            - 0
        input_sensitivity:
          type: number
          format: double
          description: Input (microphone) sensitivity, from 0.0 to 100.0.
          examples:
            - 50
        requested_position:
          type: string
          description: The member's last-requested layout position.
        meta:
          type: object
          additionalProperties: {}
          description: Customer-provided metadata for the member.
        updated:
          type: array
          items:
            type: string
          description: The fields that changed — present on the `member.updated` event.
      required:
        - id
        - room_id
        - room_session_id
        - name
        - type
        - audio_muted
        - video_muted
        - handraised
        - visible
        - deaf
        - input_volume
        - output_volume
        - input_sensitivity
        - requested_position
        - meta
      description: |-
        A member of a Call Fabric conference — one participant's state. Carried on the
        `member.updated`, `member.joined`, and `member.left` events and returned by
        `call.member.list`. Fields are sourced from the conference backend (matching the
        Video API's `Member`).

        Note: on a 1:1 (non-conference) call, `member.joined`/`member.left` carry a leaner
        variant of this object built by the call engine — it keys the member by `member_id`
        instead of `id` and reports `echo_cancellation`/`auto_gain`/`noise_suppression`/
        `denoise`/`lowbitrate` (all defaulting to `false`) instead of the volume/sensitivity
        fields. If you consume member events on direct 1:1 calls, treat those fields as the
        variant set.
