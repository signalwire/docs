      properties:
        fabric_subscriber_id:
          type: string
          description: The Fabric subscriber that joined the conversation.
          examples:
            - b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e
        from_fabric_address_id:
          type: string
          description: The Fabric address the subscriber joined from.
          examples:
            - c3d4e5f6-a7b8-9c0d-1e2f-3a4b5c6d7e8f
        group_id:
          type: string
          description: Identifier of the conversation group that was joined.
          examples:
            - d4e5f6a7-b8c9-0d1e-2f3a-4b5c6d7e8f90
        conversation_name:
          type: string
          description: Human-readable name of the conversation.
          examples:
            - Sales thread
      required:
        - fabric_subscriber_id
        - from_fabric_address_id
        - group_id
        - conversation_name
      description: "Payload of the `conversation.joined` event: the subscriber and conversation joined."
    Fabric.ConversationBroadcastEvent:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Event id.
        method:
          type: string
          enum:
            - signalwire.event
          description: Always `signalwire.event`.
        params:
          type: object
          properties:
            event_type:
              type: string
              enum:
                - conversation.broadcast
              description: The event type — identifies which event this is.
            event_channel:
              type: string
              description: The subscriber's Conversation stream this event was delivered on.
            timestamp:
              type: string
              description: When the event was emitted, as a string-encoded epoch timestamp.
              examples:
                - "1712345678842"
            params:
              type: object
              properties: {}
              description: The event-specific payload.
          required:
            - event_type
            - event_channel
            - timestamp
            - params
          description: The event envelope.
      required:
        - jsonrpc
        - id
        - method
        - params
      description: |-
        Fires when a message is broadcast to every subscriber who shares a conversation with the
        sending address. `params` carries the merged broadcast payload and stream metadata.
