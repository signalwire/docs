components:
  schemas:
    Signalwire.ConnectRequest:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Request id, echoed on the correlated response.
        method:
          type: string
          enum:
            - signalwire.connect
          description: The name of the JSON-RPC method being invoked.
        params:
          description: The method's input parameters.
          allOf:
            - $ref: "#/components/schemas/Signalwire.ConnectParams"
      required:
        - jsonrpc
        - id
        - method
        - params
      description: A JSON-RPC request frame. `Method` is the method name; `Params` is the method's input.
    Signalwire.ConnectParams:
      type: object
      properties:
        version:
          description: The Relay protocol version your client speaks.
          allOf:
            - $ref: "#/components/schemas/Signalwire.Version"
        authentication:
          oneOf:
            - $ref: "#/components/schemas/Signalwire.JwtAuthentication"
            - $ref: "#/components/schemas/Signalwire.ProjectTokenAuthentication"
          description: |-
            The credentials that authenticate this connection — this is how you log in to
            Relay. Send either a `jwt_token` (browser and client apps) or a `project` +
            `token` pair (backend apps).
        agent:
          type: string
          description: A label identifying your SDK and application, for example `somesdk-1.2.3`.
          examples:
            - somesdk-1.2.3
        protocol:
          type: string
          description: |-
            The protocol identifier to resume. Provide this to rejoin a protocol you
            established earlier, when your project's permissions allow it.
          examples:
            - signalwire_c1d2e3f4a5b6
        authorization_state:
          type: string
          description: |-
            Authorization state from an earlier `signalwire.authorization.state` event.
            Pass it back when reconnecting to restore your permissions and state. Treat it
            as an opaque token — store the value you received and return it unchanged.
          examples:
            - eyJhbGciOiJkaXIiLCJlbmMiOiJBMjU2R0NNIn0..aBcDeF:Z9y8x7w6v5
        contexts:
          type: array
          items:
            type: string
          description: |-
            Contexts to start receiving inbound events for as soon as you connect. This is
            the current (4.0) subscription mechanism — subscribe here at connect time rather
            than with the legacy `signalwire.receive`/`signalwire.unreceive` methods.
          examples:
            - - office
              - support
        event_acks:
          type: boolean
          description: Whether the client acknowledges events; SDKs default to true.
          examples:
            - true
        dpop_token:
          type: string
          description: |-
            Optional proof-of-possession token that cryptographically binds this connection
            to your client. Only needed for advanced token-binding flows; leave it unset
            otherwise.
          examples:
            - eyJ0eXAiOiJkcG9wK2p3dCIsImFsZyI6IkVTMjU2In0.eyJodG0iOiJQT1NUIn0.sig
      required:
        - version
        - authentication
      description: |-
        The parameters you send with `signalwire.connect`: your protocol version,
        credentials, and any contexts to subscribe to at connect time.
    Signalwire.Version:
      type: object
      properties:
        major:
          type: integer
          format: int32
          description: Major version. Current Relay realtime SDKs send `4`; the platform accepts up to major `4`.
          examples:
            - 4
        minor:
          type: integer
          format: int32
          description: Minor version. Current Relay realtime SDKs send `0`.
          examples:
            - 0
        revision:
          type: integer
          format: int32
          description: Revision. Current Relay realtime SDKs send `0`.
          examples:
            - 0
      required:
        - major
        - minor
        - revision
      description: The Relay protocol version your client speaks. Current Relay realtime SDKs send `4.0.0`. The platform accepts any version up to major `4`; a connection reporting a major above `4` is rejected.
    Signalwire.JwtAuthentication:
      type: object
      properties:
        jwt_token:
          type: string
          description: The JWT that authenticates this client, created by your backend.
          examples:
            - eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.payload.sig
      required:
        - jwt_token
      description: |-
        JWT authentication, for browser and client apps. Generate the JWT on your
        backend and hand it to the client — never ship a project API token to the browser.
    Signalwire.ProjectTokenAuthentication:
      type: object
      properties:
        project:
          type: string
          description: Your SignalWire Project ID.
          examples:
            - b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e
        token:
          type: string
          description: Your SignalWire API token.
          examples:
            - PT1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d
      required:
        - project
        - token
      description: |-
        Project + API token authentication, for backend apps that hold your
        SignalWire credentials directly.
    Signalwire.ConnectReply:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: The id of the request this responds to.
        result:
          description: The method result.
          allOf:
            - $ref: "#/components/schemas/Signalwire.ConnectResult"
      required:
        - jsonrpc
        - id
        - result
      description: A JSON-RPC response frame correlated to a request by `id`. `Result` is the method result.
    Signalwire.ConnectResult:
      type: object
      properties:
        protocol:
          type: string
          description: The protocol identifier to use on your subsequent requests. The only field guaranteed on every successful connect result.
          examples:
            - signalwire_c1d2e3f4a5b6
        identity:
          type: string
          description: A unique identifier for this client, valid for the life of the connection. Omitted when the platform does not assign one.
          examples:
            - a3f1c2d4-5e6f-7a8b-9c0d-1e2f3a4b5c6d@node.example.signalwire.com
        authorization:
          type: object
          additionalProperties: {}
          description: |-
            The authorization granted to this connection — the permissions and scopes in
            effect. Treat it as opaque. To restore your session on reconnect, use the
            `authorization_state` from the `signalwire.authorization.state` event, not
            this object. Omitted when there is none.
        ice_servers:
          type: array
          items:
            $ref: "#/components/schemas/Signalwire.IceServer"
          description: ICE servers to use for media. Returned for WebRTC connections; omitted when the connection carries no media.
      required:
        - protocol
      description: |-
        The result of a successful `signalwire.connect`: the `protocol` to use on later
        requests, your `identity` and `authorization`, and any ICE servers for media.
    Signalwire.IceServer:
      type: object
      properties:
        urls:
          type: array
          items:
            type: string
          description: The ICE server URLs.
          examples:
            - - turn:turn1.signalwire.com:443
              - turn:turn2.signalwire.com:443
        credential:
          type: string
          description: The credential (password) for connecting to these ICE servers.
          examples:
            - kHt9Xq2vN8pLmR3wZ7yB1cF4=
        credentialType:
          type: string
          description: The credential type. Currently always `password`.
          examples:
            - password
        username:
          type: string
          description: The username to authenticate against these ICE servers.
          examples:
            - 1712349999:b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e
        iceTransportPolicy:
          type: string
          description: The ICE transport policy for this server, when set (e.g. `relay`).
          examples:
            - relay
      required:
        - urls
        - credential
        - credentialType
        - username
      description: A STUN/TURN ICE server to use for media in WebRTC connections.
    Signalwire.AuthorizationStateEvent:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Event id.
        method:
          type: string
          enum:
            - signalwire.event
          description: Always `signalwire.event`.
        params:
          type: object
          properties:
            event_type:
              type: string
              enum:
                - signalwire.authorization.state
              description: The event type — identifies which event this is.
            event_channel:
              type: string
              description: The channel the event was delivered on.
              examples:
                - calling
            timestamp:
              type: number
              format: double
              description: When the event was emitted, as a Unix timestamp in seconds.
              examples:
                - 1712345678.842
            project_id:
              type: string
              description: Your project ID.
              examples:
                - b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e
            space_id:
              type: string
              description: Your space ID.
              examples:
                - c3d4e5f6-a7b8-9c0d-1e2f-3a4b5c6d7e8f
            params:
              description: The event-specific payload.
              allOf:
                - $ref: "#/components/schemas/Signalwire.AuthorizationStateParams"
          required:
            - event_type
            - params
          description: The event envelope.
      required:
        - jsonrpc
        - id
        - method
        - params
      description: |-
        Delivers your latest authorization state so you can restore it if you
        reconnect. Save the `authorization_state` value each time this event arrives.
    Signalwire.AuthorizationStateParams:
      type: object
      properties:
        authorization_state:
          type: string
          description: |-
            Your current authorization state — an opaque string. Save it and pass it back
            unchanged as `connect.authorization_state` when you reconnect.
          examples:
            - eyJhbGciOiJkaXIiLCJlbmMiOiJBMjU2R0NNIn0..aBcDeF:Z9y8x7w6v5
      required:
        - authorization_state
      description: The payload of a `signalwire.authorization.state` event, carrying your latest authorization state.
    Signalwire.DisconnectEvent:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Request id, echoed on the correlated response.
        method:
          type: string
          enum:
            - signalwire.disconnect
          description: The name of the JSON-RPC method being invoked.
        params:
          description: The method's input parameters.
          allOf:
            - $ref: "#/components/schemas/Signalwire.DisconnectParams"
      required:
        - jsonrpc
        - id
        - method
        - params
      description: |-
        A `signalwire.disconnect` request the service pushes to you when it is about to
        close your connection — for example during a deployment. The frame carries a
        single `restart` flag. Flush anything pending and reply with an empty result
        `{}` to acknowledge; that reply should be the last thing you send before the
        connection closes. If `restart` is `true`, reconnect afterward.

        You receive this message; you do not send it (that is why this channel has no
        send operation).
    Signalwire.DisconnectParams:
      type: object
      properties:
        restart:
          type: boolean
          description: Whether you should open a fresh connection after disconnecting. Always present.
          examples:
            - true
      required:
        - restart
      description: The parameters delivered with the `signalwire.disconnect` request the service sends you.
    Signalwire.PingRequest:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Request id, echoed on the correlated response.
        method:
          type: string
          enum:
            - signalwire.ping
          description: The name of the JSON-RPC method being invoked.
        params:
          description: The method's input parameters.
          allOf:
            - $ref: "#/components/schemas/Signalwire.PingParams"
      required:
        - jsonrpc
        - id
        - method
        - params
      description: A JSON-RPC request frame. `Method` is the method name; `Params` is the method's input.
    Signalwire.PingParams:
      type: object
      properties:
        timestamp:
          type: number
          format: double
          description: When the ping was sent, as a Unix timestamp in seconds. Echoed back unchanged in the reply.
          examples:
            - 1712345678.842
        payload:
          type: string
          description: An opaque value echoed back unchanged in the reply. Use it to correlate a ping with its response.
          examples:
            - b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e
      description: |-
        The parameters carried by a `signalwire.ping`, in either direction. Both fields
        are optional and are echoed back unchanged in the reply, so you can use them to
        measure round-trip latency or correlate a ping with its response.
    Signalwire.PingReply:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: The id of the request this responds to.
        result:
          description: The method result.
          allOf:
            - $ref: "#/components/schemas/Signalwire.PingResult"
      required:
        - jsonrpc
        - id
        - result
      description: A JSON-RPC response frame correlated to a request by `id`. `Result` is the method result.
    Signalwire.PingResult:
      type: object
      properties:
        timestamp:
          type: number
          format: double
          description: The `timestamp` from the ping, echoed back unchanged.
          examples:
            - 1712345678.842
        payload:
          type: string
          description: The `payload` from the ping, echoed back unchanged.
          examples:
            - b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e
      description: "The result of a `signalwire.ping`: the `timestamp` and `payload` from the ping, echoed back unchanged."
    Signalwire.ServerPingRequest:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Request id, echoed on the correlated response.
        method:
          type: string
          enum:
            - signalwire.ping
          description: The name of the JSON-RPC method being invoked.
        params:
          description: The method's input parameters.
          allOf:
            - $ref: "#/components/schemas/Signalwire.PingParams"
      required:
        - jsonrpc
        - id
        - method
        - params
      description: |-
        A keepalive `signalwire.ping` the service pushes to you. Reply with a
        `signalwire.ping` result, echoing back the `timestamp` and `payload` you
        received. If you do not answer, the service closes your connection. SDKs answer
        this for you; a direct Relay client must handle it itself.
    Signalwire.ReauthenticateRequest:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Request id, echoed on the correlated response.
        method:
          type: string
          enum:
            - signalwire.reauthenticate
          description: The name of the JSON-RPC method being invoked.
        params:
          description: The method's input parameters.
          allOf:
            - $ref: "#/components/schemas/Signalwire.ReauthenticateParams"
      required:
        - jsonrpc
        - id
        - method
        - params
      description: A JSON-RPC request frame. `Method` is the method name; `Params` is the method's input.
    Signalwire.ReauthenticateParams:
      type: object
      properties:
        authentication:
          description: |-
            The new credentials to apply to this connection. Rotating auth this way keeps the
            connection — and any in-progress media — open, unlike reconnecting.
          allOf:
            - $ref: "#/components/schemas/Signalwire.ReauthenticateAuthentication"
        dpop_token:
          type: string
          description: |-
            Proof-of-possession token, required when this connection was established with a
            client-bound token. Leave it unset otherwise.
          examples:
            - eyJ0eXAiOiJkcG9wK2p3dCIsImFsZyI6IkVTMjU2In0.eyJodG0iOiJQT1NUIn0.sig
      required:
        - authentication
      description: |-
        The parameters you send with `signalwire.reauthenticate`: fresh credentials to
        apply to the current connection, and — for token-bound connections — a matching
        proof-of-possession token.
    Signalwire.ReauthenticateAuthentication:
      type: object
      properties:
        project:
          type: string
          description: Your SignalWire Project ID. Must match the project this connection is already authenticated with.
          examples:
            - b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e
        jwt_token:
          type: string
          description: A new JWT to authenticate this connection with, created by your backend.
          examples:
            - eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.payload.sig
      required:
        - project
        - jwt_token
      description: |-
        Fresh credentials for `signalwire.reauthenticate`. Provide your `project` together
        with a new `jwt_token`. The project must match the one this connection already
        authenticated with — reauthenticating into a different project is rejected.
    Signalwire.ReauthenticateReply:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: The id of the request this responds to.
        result:
          description: The method result.
          allOf:
            - $ref: "#/components/schemas/Signalwire.ReauthenticateResult"
      required:
        - jsonrpc
        - id
        - result
      description: A JSON-RPC response frame correlated to a request by `id`. `Result` is the method result.
    Signalwire.ReauthenticateResult:
      type: object
      properties:
        authorization:
          type: object
          additionalProperties: {}
          description: The refreshed authorization granted to this connection. Treat it as opaque. Omitted when there is none.
        ice_servers:
          type: array
          items:
            $ref: "#/components/schemas/Signalwire.IceServer"
          description: Updated ICE servers to use for media. Returned for WebRTC connections; omitted when the connection carries no media.
      description: |-
        The result of a successful `signalwire.reauthenticate`: your refreshed
        `authorization` and, for media connections, updated `ice_servers`. A
        `signalwire.authorization.state` event is delivered alongside it — save its
        `authorization_state` as usual.
    WebRTC.VertoRequest:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Request id, echoed on the correlated response.
        method:
          type: string
          enum:
            - webrtc.verto
          description: The name of the JSON-RPC method being invoked.
        params:
          description: The method's input parameters.
          allOf:
            - $ref: "#/components/schemas/WebRTC.MessageParams"
      required:
        - jsonrpc
        - id
        - method
        - params
      description: A JSON-RPC request frame. `Method` is the method name; `Params` is the method's input.
    WebRTC.MessageParams:
      type: object
      properties:
        node_id:
          type: string
          description: |-
            The node currently hosting your call. Once a call exists, set this to the
            `node_id` you received in an earlier event or response so the frame reaches
            the right node. Leave it absent on your first message, before a call has been
            established — SignalWire assigns one for you.
          examples:
            - a3f1c2d4-5e6f-7a8b-9c0d-1e2f3a4b5c6d
        message:
          type: object
          additionalProperties: {}
          description: |-
            The Verto frame (the WebRTC signaling message format used for peer calls) to
            send — for example a `verto.invite` carrying
            `dialogParams`/`sdp`/`layout`/`positions`. The frame is passed through
            as-is; see SignalWire's Verto message reference for the full list of Verto
            methods and their `params`. The Verto call ID belongs inside this frame, at
            `dialogParams.callID` — generate one when you create a call and reuse it on
            every frame for that call. There is no top-level `callID`.
        subscribe:
          type: array
          items:
            type: string
          description: |-
            Event channels to subscribe to alongside this request — useful when you
            join a conference and want its event feed. Values are conference/room event
            channels such as `member.joined`, `member.left`, `room.ended`,
            `room.updated`, `layout.changed`, and `member.updated` (illustrative, not
            exhaustive).
          examples:
            - - member.joined
              - member.left
              - room.ended
      required:
        - message
      description: "The parameters for a `webrtc.verto` request: the Verto frame to send, the `node_id` that scopes it to your call, and any event channels to subscribe to."
    WebRTC.VertoReply:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: The id of the request this responds to.
        result:
          description: The method result.
          allOf:
            - $ref: "#/components/schemas/WebRTC.MessageResult"
      required:
        - jsonrpc
        - id
        - result
      description: A JSON-RPC response frame correlated to a request by `id`. `Result` is the method result.
    WebRTC.MessageResult:
      type: object
      properties:
        code:
          type: string
          description: |-
            Result code as a string. `"200"` means success. On failure this is a lowercase
            error identifier such as `not_allowed`, `invalid_params`, `internal_error`, or
            `response_timeout`. Always check `code` to tell success from failure.
          examples:
            - "200"
        result:
          type: object
          additionalProperties: {}
          description: The Verto reply payload — for example the answer to a `verto.invite`. The shape depends on the Verto method.
        message:
          type: string
          description: A human-readable status message. Present on errors and on some informational replies.
          examples:
            - Received
        node_id:
          type: string
          description: The node now hosting the call. Capture it and send it on later frames for this call.
          examples:
            - a3f1c2d4-5e6f-7a8b-9c0d-1e2f3a4b5c6d
      required:
        - code
      description: "The reply to your Verto frame: the Verto outcome plus the node now hosting the call."
    WebRTC.MessageEvent:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Event id.
        method:
          type: string
          enum:
            - signalwire.event
          description: Always `signalwire.event`.
        params:
          type: object
          properties:
            event_type:
              type: string
              enum:
                - webrtc.message
              description: The event type — identifies which event this is.
            node_id:
              type: string
              description: |-
                The node that sent this event. Capture it once your call starts and reuse
                it as the `node_id` on your subsequent `message` requests so they reach the
                same node.
              examples:
                - a3f1c2d4-5e6f-7a8b-9c0d-1e2f3a4b5c6d
            event_channel:
              type: string
              description: The channel the event was delivered on.
              examples:
                - webrtc
            timestamp:
              type: number
              format: double
              description: When the event was emitted, as a Unix timestamp in seconds.
              examples:
                - 1712345678.842
            project_id:
              type: string
              description: Your project ID.
              examples:
                - b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e
            space_id:
              type: string
              description: Your space ID.
              examples:
                - c3d4e5f6-a7b8-9c0d-1e2f-3a4b5c6d7e8f
            params:
              type: object
              additionalProperties: {}
              description: |-
                The event-specific payload for this WebRTC signaling event — either a signaling
                response or a conference/room event.
          required:
            - event_type
            - params
          description: The event envelope.
      required:
        - jsonrpc
        - id
        - method
        - params
      description: |-
        Delivers a Verto frame from SignalWire to your client. This fires when SignalWire
        has a Verto response to one of your `webrtc.verto` frames, but also when
        SignalWire initiates signaling on its own — an incoming `verto.invite`, a
        `verto.bye` when the far end hangs up, `verto.media`/`verto.display` updates, or a
        conference/room event on a channel you subscribed to — so it can arrive without
        you sending anything.

        The frame in `params` is passed through as-is; see SignalWire's Verto message
        reference for the full set of Verto methods and their `params`.
    Fabric.MuteRequest:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Request id, echoed on the correlated response.
        method:
          type: string
          enum:
            - call.mute
          description: The name of the JSON-RPC method being invoked.
        params:
          description: The method's input parameters.
          allOf:
            - $ref: "#/components/schemas/Fabric.MuteParams"
      required:
        - jsonrpc
        - id
        - method
        - params
      description: A JSON-RPC request frame. `Method` is the method name; `Params` is the method's input.
    Fabric.MuteParams:
      type: object
      properties:
        self:
          description: The call leg making the request — your own first leg on your call stack.
          allOf:
            - $ref: "#/components/schemas/Fabric.Target"
        target:
          description: The member to mute. Omit to mute yourself (`self`); set it to mute another member.
          allOf:
            - $ref: "#/components/schemas/Fabric.Target"
        channels:
          type: array
          items:
            type: string
          description: "Which media channels to mute: `audio`, `video`, or both."
          examples:
            - - audio
      required:
        - self
        - channels
      description: Parameters for `call.mute`.
    Fabric.Target:
      type: object
      properties:
        node_id:
          type: string
          description: The node the target's call leg lives on.
          examples:
            - a3f1c2d4-5e6f-7a8b-9c0d-1e2f3a4b5c6d
        call_id:
          type: string
          description: The call ID the target was created through.
          examples:
            - c2a1e9f4-6b3d-4e7a-8f1c-2d3e4f5a6b7c
        member_id:
          type: string
          description: The member ID of the target. Equals `call_id` for a call leg that is not in a conference.
          examples:
            - c2a1e9f4-6b3d-4e7a-8f1c-2d3e4f5a6b7c
      required:
        - node_id
        - call_id
        - member_id
      description: |-
        Addresses a call leg in a Call Fabric session. Call Fabric identifies legs explicitly
        with `{node_id, call_id, member_id}` — the v4 replacement for the server-resolved
        `node_id` used elsewhere in Relay. Capture these from your `call.state` and member
        events and echo them back on later requests.
    Fabric.MuteReply:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: The id of the request this responds to.
        result:
          description: The method result.
          allOf:
            - $ref: "#/components/schemas/Fabric.MuteResult"
      required:
        - jsonrpc
        - id
        - result
      description: A JSON-RPC response frame correlated to a request by `id`. `Result` is the method result.
    Fabric.MuteResult:
      type: object
      properties:
        code:
          type: string
          description: Result code as a string, e.g. `"200"` (success), `"400"`, `"404"`.
          examples:
            - "200"
        message:
          type: string
          description: Human-readable description of the result. Always check `code`; `message` may be omitted when there is nothing extra to report.
          examples:
            - Muted
        data:
          type: array
          items: {}
          description: Present on partial failures — the per-member `user_errors` describing which members the operation could not be applied to and why.
      required:
        - code
    Fabric.UnmuteRequest:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Request id, echoed on the correlated response.
        method:
          type: string
          enum:
            - call.unmute
          description: The name of the JSON-RPC method being invoked.
        params:
          description: The method's input parameters.
          allOf:
            - $ref: "#/components/schemas/Fabric.UnmuteParams"
      required:
        - jsonrpc
        - id
        - method
        - params
      description: A JSON-RPC request frame. `Method` is the method name; `Params` is the method's input.
    Fabric.UnmuteParams:
      type: object
      properties:
        self:
          description: The call leg making the request — your own first leg on your call stack.
          allOf:
            - $ref: "#/components/schemas/Fabric.Target"
        target:
          description: The member to unmute. Omit to unmute yourself (`self`); set it to unmute another member.
          allOf:
            - $ref: "#/components/schemas/Fabric.Target"
        channels:
          type: array
          items:
            type: string
          description: "Which media channels to unmute: `audio`, `video`, or both."
          examples:
            - - audio
      required:
        - self
        - channels
      description: Parameters for `call.unmute`.
    Fabric.UnmuteReply:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: The id of the request this responds to.
        result:
          description: The method result.
          allOf:
            - $ref: "#/components/schemas/Fabric.UnmuteResult"
      required:
        - jsonrpc
        - id
        - result
      description: A JSON-RPC response frame correlated to a request by `id`. `Result` is the method result.
    Fabric.UnmuteResult:
      type: object
      properties:
        code:
          type: string
          description: Result code as a string, e.g. `"200"` (success), `"400"`, `"404"`.
          examples:
            - "200"
        message:
          type: string
          description: Human-readable description of the result. Always check `code`; `message` may be omitted when there is nothing extra to report.
          examples:
            - Unmuted
        data:
          type: array
          items: {}
          description: Present on partial failures — the per-member `user_errors` describing which members the operation could not be applied to and why.
      required:
        - code
    Fabric.DeafRequest:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Request id, echoed on the correlated response.
