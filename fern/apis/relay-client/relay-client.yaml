    Fabric.CallStateEvent:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Event id.
        method:
          type: string
          enum:
            - signalwire.event
          description: Always `signalwire.event`.
        params:
          type: object
          properties:
            event_type:
              type: string
              enum:
                - call.state
              description: The event type — identifies which event this is.
            event_channel:
              type: string
              description: The channel the event was delivered on.
              examples:
                - calling
            timestamp:
              type: number
              format: double
              description: When the event was emitted, as a Unix timestamp in seconds.
              examples:
                - 1712345678.842
            project_id:
              type: string
              description: Your project ID.
              examples:
                - b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e
            space_id:
              type: string
              description: Your space ID.
              examples:
                - c3d4e5f6-a7b8-9c0d-1e2f-3a4b5c6d7e8f
            params:
              description: The event-specific payload.
              allOf:
                - $ref: "#/components/schemas/Fabric.CallStateParams"
          required:
            - event_type
            - params
          description: The event envelope.
      required:
        - jsonrpc
        - id
        - method
        - params
      description: |-
        Fires every time a Call Fabric call leg changes state — created, ringing, answered,
        ending, ended. Track the call through its lifecycle with `call_state`, and match `tag`
        to the call you created.
    Fabric.CallStateParams:
      type: object
      properties:
        call_id:
          type: string
          description: The call this event is about. Present on essentially every event.
          examples:
            - c2a1e9f4-6b3d-4e7a-8f1c-2d3e4f5a6b7c
        node_id:
          type: string
          description: The node the call leg lives on.
          examples:
            - a3f1c2d4-5e6f-7a8b-9c0d-1e2f3a4b5c6d
        room_session_id:
          type: string
          description: The room session this call leg belongs to. In a 1:1 call this is the call ID.
        segment_id:
          type: string
          description: Identifier of the call segment this event belongs to, for correlating events within the same segment.
          examples:
            - e5c3f2b1-8d0a-4b4c-9f3e-2a1b0c9d8e7f
        tag:
          type: string
          description: The `tag` you set when creating the call, echoed back so you can match the event to your request.
          examples:
            - my-tag-1
        call_state:
          description: The state the call has just moved into.
          examples:
            - answered
          allOf:
            - $ref: "#/components/schemas/Fabric.FabricCallState"
        direction:
          type: string
          description: Whether the call is inbound or outbound.
          examples:
            - outbound
        start_time:
          type: integer
          format: int64
          description: When the call started, in epoch milliseconds.
          examples:
            - 1712345678123
        answer_time:
          type: integer
          format: int64
          description: When the call was answered, in epoch milliseconds. Present once the call has been answered.
          examples:
            - 1712345680456
        end_time:
          type: integer
          format: int64
          description: When the call ended, in epoch milliseconds. Present once the call has ended.
          examples:
            - 1712345695789
        end_reason:
          type: string
          description: "Why the call ended: one of `hangup`, `cancel`, `busy`, `decline`, `noAnswer`, `error`. Present once the call has ended."
          examples:
            - hangup
        end_source:
          type: string
          description: Which side ended the call — `inbound` or `outbound`. Present once the call has ended.
          examples:
            - outbound
        dial_winner:
          type: string
          enum:
            - "true"
          description: Set to the string `"true"` on the call leg that won a dial race. Absent otherwise. Note the value is the string `"true"`, not a JSON boolean.
          examples:
            - "true"
        audio_in_mos:
          type: integer
          format: int32
          description: Inbound-audio Mean Opinion Score (voice quality). Present when RTP quality stats are available.
          examples:
            - 4
        device:
          description: The device handling this call leg.
          allOf:
            - $ref: "#/components/schemas/Fabric.FabricCallDevice"
        peer:
          description: Present when this leg is directly connected to another call.
          allOf:
            - $ref: "#/components/schemas/Fabric.FabricPeerRef"
        parent:
          description: Present when this call was created by another call.
          allOf:
            - $ref: "#/components/schemas/Fabric.FabricParentRef"
      required:
        - node_id
        - call_state
        - direction
      description: "Payload of the Call Fabric `call.state` event: a call leg's address, state, timing, and connection detail."
    Fabric.FabricCallState:
      type: string
      enum:
        - created
        - ringing
        - answered
        - ending
        - ended
    Fabric.FabricCallDevice:
