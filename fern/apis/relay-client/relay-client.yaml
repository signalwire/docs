    Fabric.LayoutChangedEvent:
      type: object
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC version. Always `2.0`.
        id:
          type: string
          description: Event id.
        method:
          type: string
          enum:
            - signalwire.event
          description: Always `signalwire.event`.
        params:
          type: object
          properties:
            event_type:
              type: string
              enum:
                - layout.changed
              description: The event type — identifies which event this is.
            event_channel:
              type: string
              description: The channel the event was delivered on.
              examples:
                - calling
            timestamp:
              type: number
              format: double
              description: When the event was emitted, as a Unix timestamp in seconds.
              examples:
                - 1712345678.842
            project_id:
              type: string
              description: Your project ID.
              examples:
                - b1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e
            space_id:
              type: string
              description: Your space ID.
              examples:
                - c3d4e5f6-a7b8-9c0d-1e2f-3a4b5c6d7e8f
            params:
              description: The event-specific payload.
              allOf:
                - $ref: "#/components/schemas/Fabric.LayoutChangedParams"
          required:
            - event_type
            - params
          description: The event envelope.
      required:
        - jsonrpc
        - id
        - method
        - params
      description: Fires when the video layout changes, for example after `call.layout.set`. Delivers the new layout. Note the wire event type is `layout.changed`, not `call.layout.changed`.
    Fabric.LayoutChangedParams:
      type: object
      properties:
        room_id:
          type: string
          description: The room ID.
        room_session_id:
          type: string
          description: The room session ID.
        layout:
          description: The layout now in effect.
          allOf:
            - $ref: "#/components/schemas/Fabric.LayoutInfo"
      required:
        - room_id
        - room_session_id
        - layout
      description: "Payload of the `layout.changed` event: the new video layout in effect."
    Fabric.LayoutInfo:
      type: object
      properties:
        room_id:
          type: string
          description: The room ID.
        room_session_id:
          type: string
          description: The room session ID.
        name:
          type: string
          description: The layout's name, such as `grid-responsive`.
          examples:
            - grid-responsive
        layers:
          type: array
          items:
            $ref: "#/components/schemas/Fabric.LayoutLayer"
          description: The layout's layers.
      required:
        - room_id
        - room_session_id
        - name
        - layers
      description: A Call Fabric video layout, as delivered on the `layout.changed` event.
    Fabric.LayoutLayer:
      type: object
      properties:
        layer_index:
          type: integer
          format: int32
          description: The layer's index in the layout.
        z_index:
          type: integer
          format: int32
          description: The layer's z-index (stacking order).
        member_id:
          type: string
          description: The member shown in this layer, when one is assigned.
        playing_file:
          type: boolean
          description: Whether this layer is playing a file rather than showing a member.
        position:
          type: string
          description: The named position this layer occupies, such as `standard-1`.
        reservation:
          type: string
          description: The reservation name for this layer, when reserved.
        visible:
          type: boolean
          description: Whether this layer is currently visible.
        x:
          type: integer
          format: int32
          description: The layer's horizontal offset, as a percentage of the frame.
        y:
          type: integer
          format: int32
          description: The layer's vertical offset, as a percentage of the frame.
        width:
          type: integer
          format: int32
          description: The layer's width, as a percentage of the frame.
        height:
          type: integer
          format: int32
          description: The layer's height, as a percentage of the frame.
      required:
        - layer_index
        - z_index
        - playing_file
        - position
        - visible
        - x
        - y
        - width
        - height
      description: One layer of a Call Fabric video layout — a positioned region that can show a member's video or a played file.
