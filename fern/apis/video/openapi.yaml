        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConferenceRequest'
    get:
      operationId: list_video_conferences
      summary: List Video Conferences
      description: |-
        List Video Conferences.

        #### Permissions
        The API token must include the following scopes: _Video_.
      parameters:
        - name: include_active_session
          in: query
          required: false
          description: Specifies whether or not to include information about the conference's active session (if any)
