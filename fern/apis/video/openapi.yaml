          type: string
          format: date-time
          nullable: true
          description: Room Session stops accepting new Members at this time.
          example: '2022-12-31T23:59:59Z'
        remove_at:
          type: string
          format: date-time
          nullable: true
          description: Remove Members from the Room Session at this time.
