          in: query
          required: false
          description: Return Sessions started from this Room.
          schema:
            type: string
          explode: false
        - name: room_name
          in: query
          required: false
          description: Return Sessions with a matching room name.
          schema:
            type: string
          explode: false
        - name: status
          in: query
          required: false
          description: 'Return Sessions currently in this state. Possible values are: completed and in-progress.'
