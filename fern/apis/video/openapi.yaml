          format: int32
          nullable: true
          description: How long, in seconds, the Room Session lasted.
          example: 120
        status:
          allOf:
            - $ref: '#/components/schemas/RoomSessionStatus'
          nullable: true
          description: Status of the session.
          example: completed
        created_at:
          type: string
          format: date-time
          description: Timestamp when the room session was created.
          example: '2022-01-01T10:00:00Z'
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the room session was last updated.
          example: '2022-01-01T11:00:00Z'
