          description: Remove Members after they are in the Room Session for N seconds.
          example: 120
        layout:
          type: string
          nullable: true
          description: The room session's initial layout.
          example: grid-responsive
        record_on_start:
          type: boolean
          description: Whether a recording was automatically started when this Room Session began.
          example: false
        tone_on_entry_and_exit:
          type: boolean
          description: Whether a tone is played when a member enters or exits the room session.
          example: true
        room_join_video_off:
          type: boolean
          description: Whether participants join with video off by room setting.
          example: false
        user_join_video_off:
          type: boolean
          description: Whether participants join with video off by user setting.
          example: false
        locked:
          type: boolean
          description: Whether the room session is locked.
          example: false
        start_time:
          type: string
          format: date-time
          nullable: true
          description: Start time of the session.
          example: '2022-01-01T10:00:00Z'
        end_time:
          type: string
          format: date-time
          nullable: true
          description: End time of the session.
          example: '2022-01-01T11:00:00Z'
        duration:
          type: integer
          format: int32
          nullable: true
          description: How long, in seconds, the Room Session lasted.
          example: 120
        status:
          allOf:
            - $ref: '#/components/schemas/RoomSessionStatus'
          nullable: true
          description: Status of the session.
          example: completed
        created_at:
          type: string
          format: date-time
          description: Timestamp when the room session was created.
          example: '2022-01-01T10:00:00Z'
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the room session was last updated.
          example: '2022-01-01T11:00:00Z'
        preview_url:
          type: string
          nullable: true
          description: If room previews are enabled and the room session is in progress, this is the URL of the preview video.
          example: https://example.signalwire.com/preview/abc123
        prioritize_handraise:
          type: boolean
          nullable: true
          description: Whether raised hands are prioritized in the layout.
          example: false
        sync_audio_video:
          type: boolean
          nullable: true
          description: Enable/disable jitter buffer audio-video sync.
          example: true
      description: Room session summary, returned by the show endpoint. Omits list-only fields.
    RoomTokenResponse:
      type: object
      properties:
        token:
          type: string
          description: A Room Token to be used by clients to connect to the Room.
          example: eyJ0eXAiOiJWUlQiLCJhbGciOiJIUzUxMiJ9..5mu_H2PjQLtNBbMsBlS0c91EgsDjJzvZUFgj5-tP4VA0VoHZPIGgV_DLRGKt-BqG-DqC5LhpsdMWEFjhVkTBpQ
      description: Room token response object.
    RoomTokenValidationError:
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/RoomTokenValidationErrorItem'
          description: A list of errors
      description: Room token validation error response.
    RoomTokenValidationErrorItem:
      type: object
      properties:
        type:
          type: string
          description: Error type.
          example: validation_error
        code:
          type: string
          description: Error code.
          example: invalid_parameter
        message:
          type: string
          description: Error message.
          example: room_name must be present
        attribute:
          type: string
          description: Attribute associated with the error.
          example: room_name
        url:
          type: string
          description: URL for more information.
          example: https://developer.signalwire.com/rest/signalwire-rest/overview/error-codes#field-invalid-parameter
      description: Room token validation error item.
    Stream:
      type: object
      required:
        - id
        - url
        - stream_type
        - width
        - height
        - fps
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the stream.
          example: c22d24f6-5a47-4597-9a23-c7d01e696b92
        url:
          type: string
          nullable: true
          description: RTMP or RTMPS URL. This must be the address of a server accepting incoming RTMP/RTMPS streams.
          example: rtmp://broadcaster
        stream_type:
          type: string
          nullable: true
          description: The type of stream.
          example: rtmp
        width:
          type: integer
          format: int32
          nullable: true
          description: The stream's width in pixels.
          example: 1920
        height:
          type: integer
          format: int32
          nullable: true
          description: The stream's height in pixels.
          example: 1080
        fps:
          type: integer
          format: int32
          nullable: true
          description: The stream's frames per second.
          example: 20
        created_at:
          type: string
          format: date-time
          description: Timestamp when the stream was created.
          example: '2022-01-01T10:00:00Z'
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the stream was last updated.
          example: '2022-01-01T11:00:00Z'
      description: A video stream object.
    Types.StatusCodes.RestApiErrorItem:
      type: object
      required:
        - type
        - code
        - message
        - url
      properties:
        type:
          type: string
          description: The category of error.
          example: validation_error
        code:
          type: string
          description: A specific error code.
          example: invalid_parameter
        message:
          type: string
          description: A description of what caused the error.
          example: Name must be present
        attribute:
          type: string
          nullable: true
          description: The request parameter that caused the error, if applicable.
          example: name
        url:
          type: string
          description: A link to documentation about this error.
          example: https://developer.signalwire.com/rest/signalwire-rest/overview/error-codes#invalid_parameter
      description: Details about a specific error.
    Types.StatusCodes.StatusCode400:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          enum:
            - Bad Request
      description: The request is invalid.
    Types.StatusCodes.StatusCode401:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          enum:
            - Unauthorized
      description: Access is unauthorized.
    Types.StatusCodes.StatusCode404:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          enum:
            - Not Found
      description: The server cannot find the requested resource.
    Types.StatusCodes.StatusCode500:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          enum:
            - Internal Server Error
      description: An internal server error occurred.
    UpdateConferenceRequest:
      type: object
      properties:
        name:
          type: string
          description: 'A named unique identifier for the room. Allowed characters: `A-Za-z0-9_-`. Maximum of 100 characters.'
          example: my_room
        display_name:
          type: string
          description: Display name of the video conference. Maximum of 200 characters. Defaults to the value of name.
          example: My Conference's Name
        description:
          type: string
          description: Description of the room. Maximum of 3000 characters.
          example: This room will be used for full company all hands meetings
        join_from:
          type: string
          format: date-time
          description: 'Conference does not accept new participants before this time. Expects RFC 3339 datetime: `2022-01-01T23:59:60Z`. Date only: `2022-01-01` will be converted to `2022-01-01T00:00:00Z`'
          example: '2022-01-01T00:00:00Z'
        join_until:
          type: string
          format: date-time
          description: 'Conference stops accepting new participants at this time, but keeps running until all participants leave. Expects RFC 3339 datetime: `2022-01-01T23:59:60Z`. Date only: `2022-01-01` will be converted to `2022-01-01T00:00:00Z`'
          example: '2022-12-31T23:59:59Z'
        quality:
          type: string
          description: The conference's resolution. Allowed values are `720p` or `1080p`.
          example: 720p
          default: 720p
        layout:
          type: string
          description: The conference's initial layout. See documentation for a full list of supported layouts.
          example: grid-responsive
          default: grid-responsive
        size:
          type: string
          description: The size of the video conference. Allowed values are `small`, `medium` and `large`. See documentation for a list of size limitations.
          example: medium
          default: medium
        record_on_start:
          type: boolean
          description: Specifies whether to start recording a Conference Session when one is started for this Conference
          example: true
        enable_room_previews:
          type: boolean
          description: Whether a video with a preview of the content of the conference is to be generated.
          example: true
        enable_chat:
          type: boolean
          description: Enables group chat for all participants of the room.
          example: true
          default: true
        dark_primary:
          type: string
          description: Used for CTA buttons and selected items.
          example: '#044EF4'
          default: '#044EF4'
        dark_background:
          type: string
          description: Main background color.
          example: '#FFFFFF'
          default: '#FFFFFF'
        dark_foreground:
          type: string
          description: Main foreground color.
          example: '#1D2127'
          default: '#1D2127'
        dark_success:
          type: string
          description: Used for success indications.
          example: '#17BB58'
          default: '#17BB58'
        dark_negative:
          type: string
          description: Used for error indications.
          example: '#F42C50'
          default: '#F42C50'
        light_primary:
          type: string
          description: Used for CTA buttons and selected items.
          example: '#044EF4'
          default: '#044EF4'
        light_background:
          type: string
          description: Main background color.
          example: '#FFFFFF'
          default: '#FFFFFF'
        light_foreground:
          type: string
          description: Main foreground color.
          example: '#1D2127'
          default: '#1D2127'
        light_success:
          type: string
          description: Used for success indications.
          example: '#17BB58'
          default: '#17BB58'
        light_negative:
          type: string
          description: Used for error indications.
          example: '#F42C50'
          default: '#F42C50'
      description: Request body for updating a conference.
    UpdateRoomRequest:
      type: object
      properties:
        display_name:
          type: string
          maxLength: 200
          description: Display name of the room. Maximum of 200 characters. Defaults to the value of name.
          example: My Room's Name
        description:
          type: string
          maxLength: 3000
          description: Description of the room. Maximum of 3000 characters.
          example: This room will be used for full company all hands meetings
        max_members:
          type: integer
          format: int32
          minimum: 1
          maximum: 300
          description: The maximum number of members in the room at a time. Must be at least 1 to a maximum of 300.
          example: 20
          default: 20
        quality:
          allOf:
            - $ref: '#/components/schemas/VideoQuality'
          description: The room's resolution.
          example: 720p
          default: 720p
        join_from:
          type: string
          format: date-time
          description: 'Room does not accept new participants before this time. Expects RFC 3339 datetime: `2022-01-01T23:59:60Z`. Date only: `2022-01-01` will be converted to `2022-01-01T00:00:00Z`.'
          example: '2022-01-01T00:00:00Z'
        join_until:
          type: string
          format: date-time
          description: 'Room stops accepting new participants at this time, but keeps running until all participants leave. Expects RFC 3339 datetime: `2022-01-01T23:59:60Z`. Date only: `2022-01-01` will be converted to `2022-01-01T00:00:00Z`.'
          example: '2022-12-31T23:59:59Z'
        remove_at:
          type: string
          format: date-time
          description: 'Remove users from the room at this time. Expects RFC 3339 datetime: `2022-01-01T23:59:60Z`. Date only: `2022-01-01` will be converted to `2022-01-01T00:00:00Z`.'
          example: '2022-12-31T23:59:59Z'
        remove_after_seconds_elapsed:
          type: integer
          format: int32
          minimum: 1
          maximum: 200000
          description: Remove users after they are in the room for N seconds.
          example: 120
        layout:
          allOf:
            - $ref: '#/components/schemas/RoomLayout'
          description: The room's initial layout.
          example: grid-responsive
          default: grid-responsive
        record_on_start:
          type: boolean
          description: Specifies whether to start recording a Room Session when one is started for this Room.
          example: false
          default: false
        enable_room_previews:
          type: boolean
          description: Whether a video with a preview of the content of the room is to be generated.
          example: false
          default: false
        meta:
          type: object
          additionalProperties: {}
          description: User-defined metadata for the room. Must be a valid JSON object. Maximum of 2000 characters when serialized.
          example: {}
        sync_audio_video:
          type: boolean
          description: Enable/disable jitter buffer audio-video sync.
          example: true
      description: Request body for updating a room.
    UpdateStreamRequest:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          description: RTMP or RTMPS URL. This must be the address of a server accepting incoming RTMP/RTMPS streams.
          example: rtmp://broadcaster
      description: Request body for updating a stream.
    VideoFps:
      type: number
      enum:
        - 20
        - 30
      description: Video frames per second.
    VideoQuality:
      type: string
      enum:
        - 720p
        - 1080p
      description: Video quality resolution.
    VideoStatusCode422:
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/Types.StatusCodes.RestApiErrorItem'
          description: List of validation errors.
      description: The request contains invalid parameters. See errors for details.
      example:
        statusCode: 422
        errors:
          - type: validation_error
            code: invalid_parameter
            message: Name must be present
            attribute: name
            url: https://developer.signalwire.com/rest/signalwire-rest/overview/error-codes#field-invalid-parameter
  securitySchemes:
    SignalWireBasicAuth:
      type: http
      scheme: Basic
      description: |-
        SignalWire Basic Authentication using Project ID and API Token.

        The client sends HTTP requests with the Authorization header containing
        the word Basic followed by a space and a base64-encoded string of project_id:token.
        The project ID will be used as the username and the API token as the password.

        Example:
        ```
        Authorization: Basic base64(project_id:token)
        ```
      x-fern-basic:
        username:
          name: project_id
          env: SIGNALWIRE_PROJECT_ID
        password:
          name: api_token
          env: SIGNALWIRE_API_TOKEN
servers:
  - url: https://{space_name}.signalwire.com/api/video
    description: Endpoint
    variables:
      space_name:
        default: '{your_space_name}'
        description: The domain of the users SignalWire space.
