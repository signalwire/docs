paths:
  /conference_tokens/{id}:
    get:
      operationId: get_conference_token
      summary: Find a Conference Token by ID
      description: |-
        Find a conference token by ID.

        #### Permissions
        The API token must include the following scopes: _Video_.
      parameters:
        - name: id
          in: path
          required: true
          description: Unique ID of the Conference Token
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConferenceTokenResponse'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Types.StatusCodes.StatusCode401'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Types.StatusCodes.StatusCode404'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Types.StatusCodes.StatusCode500'
      tags:
        - Conference Tokens
  /conference_tokens/{id}/reset:
    post:
      operationId: reset_conference_token
      summary: Reset a Conference Token by ID
      description: |-
        Reset a conference token by ID.

        #### Permissions
        The API token must include the following scopes: _Video_.
