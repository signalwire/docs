  /logs:
    get:
      operationId: list_logs
      summary: List Logs
      description: |-
        List the available logs.

        #### Permissions
        The API token must include the following scopes: _Video_.
      parameters:
        - name: include_deleted
          in: query
          required: false
          description: Include logs for deleted activity.
          schema:
            type: boolean
          explode: false
        - name: created_before
          in: query
          required: false
          description: Return logs for activity prior to this date.
          schema:
            type: string
          explode: false
        - name: created_on
          in: query
          required: false
          description: Return logs for activity on this date.
          schema:
            type: string
          explode: false
        - name: created_after
          in: query
          required: false
          description: Return logs for activity after this date.
          schema:
            type: string
          explode: false
        - name: page_size
          in: query
          required: false
          description: Specify the number of results to return on a single page. The default page size is `50` and the maximum is `1000`.
          schema:
            type: integer
            format: int32
          explode: false
      responses:
        '200':
