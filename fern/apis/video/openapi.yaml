  schemas:
    ActiveSession:
      type: object
      properties:
        id:
          type: string
          description: Unique ID of the session.
          example: c22d24f6-5a47-4597-9a23-c7d01e696b92
        room_id:
          type: string
          description: Unique ID of the Room if the Session was created from a Room and was not an auto-created Session.
          example: a1b2c3d4-5e6f-7890-abcd-ef1234567890
        name:
          type: string
          description: The named identifier of room session.
          example: my_example_room
        display_name:
          type: string
          description: Display name of room, no character limitations. Maximum of 200 characters. Defaults to the value of name.
          example: My Room's Name
        join_from:
          type: string
          format: date-time
          description: Room Session does not accept new Members before this time.
          example: '2022-01-01T00:00:00Z'
        join_until:
          type: string
          format: date-time
          description: Room Session stops accepting new Members at this time.
          example: '2022-12-31T23:59:59Z'
        remove_at:
          type: string
          format: date-time
          description: Remove Members from the Room Session at this time.
          example: '2022-12-31T23:59:59Z'
        remove_after_seconds_elapsed:
          type: integer
          format: int32
          description: Remove Members after they are in the Room Session for N seconds.
          example: 120
        layout:
          type: string
          description: The Room Session's initial layout. See documentation for a full list of supported layouts.
          example: grid-responsive
        max_members:
          type: integer
          format: int32
          description: The maximum number of members allowed in the room at a time.
          example: 20
        fps:
          allOf:
            - $ref: '#/components/schemas/VideoFps'
          description: The Room Session's frames per second.
          example: 20
        quality:
          allOf:
            - $ref: '#/components/schemas/VideoQuality'
          description: The Room Session's resolution.
          example: 720p
        start_time:
          type: string
          format: date-time
          description: Start time of the session.
          example: '2022-01-01T10:00:00Z'
        end_time:
          type: string
          format: date-time
          description: End time of the session.
          example: '2022-01-01T11:00:00Z'
        duration:
          type: integer
          format: int32
          description: How long, in seconds, the Room Session lasted.
          example: 120
        status:
          allOf:
            - $ref: '#/components/schemas/RoomSessionStatus'
          description: Status of the session.
          example: completed
        record_on_start:
          type: boolean
          description: Whether a recording was automatically started when this Room Session began.
          example: true
        enable_room_previews:
          type: boolean
          description: Whether a video with a preview of the content of the room is to be generated.
          example: true
        preview_url:
          type: string
          description: If room previews are enabled and the room session is in progress, this is the URL of the preview video.
          example: https://example.signalwire.com/api/video/room_sessions/c22d24f6-5a47-4597-9a23-c7d01e696b92/preview
        audio_video_sync:
          type: boolean
          description: Enable/disable jitter buffer audio-video sync.
          example: true
      description: Active session information for a room.
    ChargeDetail:
      type: object
      properties:
        description:
          type: string
          description: Description for this charge.
          example: Video conference session charge
        charge:
          type: number
          format: double
          description: Charged amount.
          example: 0.005
      description: Charge detail item for logs.
    ConferenceResponse:
      type: object
      properties:
        id:
          type: string
          description: A unique identifier for the video conference
          example: c22d24f6-5a47-4597-9a23-c7d01e696b92
        name:
          type: string
          description: 'A named unique identifier for the room. Allowed characters: `A-Za-z0-9_-`. Maximum of 100 characters.'
          example: my_room
        display_name:
          type: string
          description: Display name of the video conference. Maximum of 200 characters. Defaults to the value of name.
          example: My Conference's Name
        description:
          type: string
          description: Description of the room. Maximum of 3000 characters.
          example: This room will be used for full company all hands meetings
        join_from:
          type: string
          format: date-time
          description: 'Conference does not accept new participants before this time. Expects RFC 3339 datetime: `2022-01-01T23:59:60Z`. Date only: `2022-01-01` will be converted to `2022-01-01T00:00:00Z`'
          example: '2022-01-01T00:00:00Z'
        join_until:
          type: string
          format: date-time
          description: 'Conference stops accepting new participants at this time, but keeps running until all participants leave. Expects RFC 3339 datetime: `2022-01-01T23:59:60Z`. Date only: `2022-01-01` will be converted to `2022-01-01T00:00:00Z`'
          example: '2022-12-31T23:59:59Z'
        quality:
          type: string
          description: The conference's resolution. Allowed values are `720p` or `1080p`.
          example: 720p
          default: 720p
        layout:
          type: string
          description: The conference's initial layout. See documentation for a full list of supported layouts.
          example: grid-responsive
          default: grid-responsive
        size:
          type: string
          description: The size of the video conference. Allowed values are `small`, `medium` and `large`. See documentation for a list of size limitations.
          example: medium
          default: medium
        record_on_start:
          type: boolean
          description: Specifies whether to start recording a Conference Session when one is started for this Conference
          example: true
        enable_room_previews:
          type: boolean
          description: Whether a video with a preview of the content of the conference is to be generated.
          example: true
        enable_chat:
          type: boolean
          description: Enables group chat for all participants of the room.
          example: true
          default: true
        dark_primary:
          type: string
          description: Used for CTA buttons and selected items.
          example: '#044EF4'
          default: '#044EF4'
        dark_background:
          type: string
          description: Main background color.
          example: '#FFFFFF'
          default: '#FFFFFF'
        dark_foreground:
          type: string
          description: Main foreground color.
          example: '#1D2127'
          default: '#1D2127'
        dark_success:
          type: string
          description: Used for success indications.
          example: '#17BB58'
          default: '#17BB58'
        dark_negative:
          type: string
          description: Used for error indications.
          example: '#F42C50'
          default: '#F42C50'
        light_primary:
          type: string
          description: Used for CTA buttons and selected items.
          example: '#044EF4'
          default: '#044EF4'
        light_background:
          type: string
          description: Main background color.
          example: '#FFFFFF'
          default: '#FFFFFF'
        light_foreground:
          type: string
          description: Main foreground color.
          example: '#1D2127'
          default: '#1D2127'
        light_success:
          type: string
          description: Used for success indications.
          example: '#17BB58'
          default: '#17BB58'
        light_negative:
          type: string
          description: Used for error indications.
          example: '#F42C50'
          default: '#F42C50'
        created_at:
          type: string
          format: date-time
          description: Timestamp when the conference was created.
          example: '2022-01-01T10:00:00Z'
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the conference was last updated.
          example: '2022-01-01T11:00:00Z'
        active_session:
          allOf:
            - $ref: '#/components/schemas/ActiveSession'
          description: Active session information for the conference.
      description: Conference response object.
    ConferenceTokenResponse:
      type: object
