    RoomResponse:
      type: object
      properties:
        id:
          type: string
          description: A unique identifier for the room
          example: c22d24f6-5a47-4597-9a23-c7d01e696b92
        name:
          type: string
          description: 'A named unique identifier for the room. Allowed characters: `A-Za-z0-9_-`. Maximum of 100 characters.'
          example: my_room
        display_name:
          type: string
          description: Display name of the room. Maximum of 200 characters. Defaults to the value of name.
          example: My Room's Name
        description:
          type: string
          description: Description of the room. Maximum of 3000 characters.
          example: This room will be used for full company all hands meetings
        max_members:
          type: integer
          format: int32
          description: The maximum number of members in the room at a time. Must be at least one to a maximum of 300.
          example: 20
          default: 20
        quality:
          type: string
          description: The room's resolution. Allowed values are `720p` or `1080p`.
          example: 720p
          default: 720p
        join_from:
          type: string
          format: date-time
          description: 'Room does not accept new participants before this time. Overridable by token. Expects RFC 3339 datetime: `2022-01-01T23:59:60Z`. Date only: `2022-01-01` will be converted to `2022-01-01T00:00:00Z`'
          example: '2022-01-01T00:00:00Z'
        join_until:
          type: string
          format: date-time
          description: 'Room stops accepting new participants at this time, but keeps running until all participants leave. Overridable by token. Expects RFC 3339 datetime: `2022-01-01T23:59:60Z`. Date only: `2022-01-01` will be converted to `2022-01-01T00:00:00Z`'
          example: '2022-12-31T23:59:59Z'
        remove_at:
          type: string
          format: date-time
          description: 'Remove users from the room at this time. Overridable by token. Expects RFC 3339 datetime: `2022-01-01T23:59:60Z`. Date only: `2022-01-01` will be converted to `2022-01-01T00:00:00Z`'
          example: '2022-12-31T23:59:59Z'
        remove_after_seconds_elapsed:
          type: integer
          format: int32
          description: Remove users after they are in the room for N seconds. Overridable by token.
          example: 120
        layout:
          type: string
          description: The room's initial layout. See documentation for a full list of supported layouts.
          example: grid-responsive
          default: grid-responsive
        record_on_start:
          type: boolean
          description: Specifies whether to start recording a Room Session when one is started for this Room
          example: true
        enable_room_previews:
          type: boolean
          description: Whether a video with a preview of the content of the room is to be generated.
          example: true
        audio_video_sync:
          type: boolean
          description: Enable/disable jitter buffer audio-video sync.
          example: true
        fps:
          type: integer
          format: int32
          description: Frames Per Second parameter of room video quality
          example: 20
        active_session:
          allOf:
            - $ref: '#/components/schemas/ActiveSession'
          description: Active session information for the room.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the room was created.
          example: '2022-01-01T10:00:00Z'
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the room was last updated.
          example: '2022-01-01T11:00:00Z'
