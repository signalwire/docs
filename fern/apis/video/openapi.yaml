    CreateRoomRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 100
          pattern: ^[A-Za-z0-9_\-]+$
          description: 'A named unique identifier for the room. Allowed characters: `A-Za-z0-9_-`. Maximum of 100 characters.'
          example: my_room
        display_name:
          type: string
          maxLength: 200
          description: Display name of the room. Maximum of 200 characters. Defaults to the value of name.
          example: My Room's Name
        description:
          type: string
          maxLength: 3000
          description: Description of the room. Maximum of 3000 characters.
          example: This room will be used for full company all hands meetings
        max_members:
          type: integer
          format: int32
          minimum: 1
          maximum: 300
          description: The maximum number of members in the room at a time. Must be at least 1 to a maximum of 300.
          example: 20
          default: 20
        quality:
          allOf:
            - $ref: '#/components/schemas/VideoQuality'
          description: The room's resolution.
          example: 720p
          default: 720p
        join_from:
          type: string
          format: date-time
          description: 'Room does not accept new participants before this time. Expects RFC 3339 datetime: `2022-01-01T23:59:60Z`. Date only: `2022-01-01` will be converted to `2022-01-01T00:00:00Z`.'
          example: '2022-01-01T00:00:00Z'
        join_until:
          type: string
          format: date-time
          description: 'Room stops accepting new participants at this time, but keeps running until all participants leave. Expects RFC 3339 datetime: `2022-01-01T23:59:60Z`. Date only: `2022-01-01` will be converted to `2022-01-01T00:00:00Z`.'
          example: '2022-12-31T23:59:59Z'
        remove_at:
          type: string
          format: date-time
          description: 'Remove users from the room at this time. Expects RFC 3339 datetime: `2022-01-01T23:59:60Z`. Date only: `2022-01-01` will be converted to `2022-01-01T00:00:00Z`.'
          example: '2022-12-31T23:59:59Z'
        remove_after_seconds_elapsed:
          type: integer
          format: int32
          minimum: 1
          maximum: 200000
          description: Remove users after they are in the room for N seconds.
          example: 120
        layout:
          allOf:
            - $ref: '#/components/schemas/RoomLayout'
          description: The room's initial layout.
          example: grid-responsive
          default: grid-responsive
        record_on_start:
          type: boolean
          description: Specifies whether to start recording a Room Session when one is started for this Room.
          example: false
          default: false
        enable_room_previews:
          type: boolean
          description: Whether a video with a preview of the content of the room is to be generated.
          example: false
          default: false
        meta:
          type: object
          additionalProperties: {}
          description: User-defined metadata for the room. Must be a valid JSON object. Maximum of 2000 characters when serialized.
          example: {}
        sync_audio_video:
          type: boolean
          description: Enable/disable jitter buffer audio-video sync.
          example: true
      description: Request body for creating a room.
    CreateRoomTokenRequest:
      type: object
      required:
        - room_name
      properties:
        room_name:
          type: string
          description: "Room's unique named identifier. Allowed characters: A-Za-z0-9_-. Up to 100 characters. The room does not have to exist when the token is created, but must exist prior to joining, or ensure auto_create_room is set to true."
          example: my_room
        user_name:
          type: string
          description: A display name to use for the user. Up to 100 characters. (If not supplied, a random alphanumeric string will be returned for each authorization with this token.)
          example: John Smith
        permissions:
          type: array
          items:
            type: string
          description: A list of permissions, which define what user can do once they join the room.
          example:
            - room.self.audio_mute
            - room.self.audio_unmute
            - room.self.video_mute
            - room.self.video_unmute
            - room.self.deaf
            - room.self.undeaf
            - room.self.set_input_volume
            - room.self.set_output_volume
            - room.self.set_input_sensitivity
        join_from:
          type: string
          format: date-time
          description: "The user can't join the room before this time. Expects RFC 3339 datetime: `2022-01-01T23:59:60Z`. Date only: `2022-01-01` will be converted to `2022-01-01T00:00:00Z`"
          example: '2022-01-01T00:00:00Z'
        join_until:
          type: string
          format: date-time
          description: "The user can't join the room after this time. Expects RFC 3339 datetime: `2022-01-01T23:59:60Z`. Date only: `2022-01-01` will be converted to `2022-01-01T00:00:00Z`"
          example: '2022-12-31T23:59:59Z'
        remove_at:
          type: string
          format: date-time
          description: 'Remove user from the room at this time. Expects RFC 3339 datetime: `2022-01-01T23:59:60Z`. Date only: `2022-01-01` will be converted to `2022-01-01T00:00:00Z`'
          example: '2022-12-31T23:59:59Z'
        remove_after_seconds_elapsed:
          type: integer
          format: int32
          description: Remove user after they are in the room for N seconds.
          example: 900
        join_audio_muted:
          type: boolean
          description: Whether the user joins the room with their audio muted.
          example: false
        join_video_muted:
          type: boolean
          description: Whether the user joins the room with their video muted.
          example: false
        auto_create_room:
          type: boolean
          description: By default, if the user tries to use this token to join a room that doesn't exist, it will be created with default configuration. Set this to false to require the room to exist beforehand.
          example: false
        enable_room_previews:
          type: boolean
          description: Whether to generate a video with a preview of the content of the room. This parameter has effect only if this token auto-creates the room, thus it will be ignored if the room already exists.
          example: true
        room_display_name:
          type: string
          description: Display name used if a room is auto-created when the token joins. Maximum of 200 characters. Defaults to the value of room_name.
          example: My Room
        end_room_session_on_leave:
          type: boolean
          description: Whether to end the room session when the member using this token leaves the room.
          example: false
        join_as:
          allOf:
            - $ref: '#/components/schemas/JoinAsType'
          description: Whether the user should join as a member or as a non-interactive audience participant. Audience participants cannot send audio or video.
          example: member
        media_allowed:
          allOf:
            - $ref: '#/components/schemas/MediaAllowedType'
          description: Indicates what media the user is allowed to receive.
          example: video-only
        room_meta:
          type: object
          additionalProperties: {}
          description: Set the room meta.
        meta:
          type: object
          additionalProperties: {}
          description: Set the member meta.
        audio_video_sync:
          type: boolean
          description: Enable/disable jitter buffer audio-video sync.
          example: true
      description: Request body for creating a room token.
    CreateStreamRequest:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          description: RTMP or RTMPS URL. This must be the address of a server accepting incoming RTMP/RTMPS streams.
          example: rtmp://broadcaster
      description: Request body for creating a stream.
