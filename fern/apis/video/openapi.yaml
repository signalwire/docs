          example: '#FFFFFF'
          default: '#FFFFFF'
        light_foreground:
          type: string
          description: Main foreground color.
          example: '#1D2127'
          default: '#1D2127'
        light_success:
          type: string
          description: Used for success indications.
          example: '#17BB58'
          default: '#17BB58'
        light_negative:
          type: string
