          example: c22d24f6-5a47-4597-9a23-c7d01e696b92
        name:
          type: string
          description: A named unique identifier for the room.
          example: my_room
        display_name:
          type: string
          nullable: true
          description: Display name of the room.
          example: My Room's Name
        description:
          type: string
          nullable: true
          description: Description of the room.
          example: This room will be used for full company all hands meetings
        max_members:
          type: integer
          format: int32
          description: The maximum number of members in the room at a time.
          example: 20
