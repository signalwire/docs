      summary: List Room Recordings
      description: |-
        A list of all Room Recordings.

        #### Permissions
        The API token must include the following scopes: _Video_.
      parameters:
        - name: media_ttl
          in: query
          required: false
          description: Generated media links will be valid for this many seconds. Default is 900 (15 minutes).
