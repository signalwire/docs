          type: string
          description: Main foreground color.
          example: '#1D2127'
          default: '#1D2127'
        dark_success:
          type: string
          description: Used for success indications.
          example: '#17BB58'
          default: '#17BB58'
        dark_negative:
          type: string
          description: Used for error indications.
          example: '#F42C50'
          default: '#F42C50'
        light_primary:
          type: string
          description: Used for CTA buttons and selected items.
          example: '#044EF4'
          default: '#044EF4'
        light_background:
          type: string
          description: Main background color.
          example: '#FFFFFF'
          default: '#FFFFFF'
        light_foreground:
          type: string
          description: Main foreground color.
          example: '#1D2127'
          default: '#1D2127'
        light_success:
          type: string
          description: Used for success indications.
          example: '#17BB58'
          default: '#17BB58'
        light_negative:
          type: string
          description: Used for error indications.
          example: '#F42C50'
          default: '#F42C50'
      description: Request body for updating a conference.
    UpdateRoomRequest:
      type: object
      properties:
        display_name:
          type: string
          description: Display name of the room. Maximum of 200 characters. Defaults to the value of name.
          example: My Room's Name
        description:
          type: string
          description: Description of the room. Maximum of 3000 characters.
          example: This room will be used for full company all hands meetings
        max_members:
          type: integer
          format: int32
          description: The maximum number of members in the room at a time. Must be at least one to a maximum of 300.
          example: 20
          default: 20
        quality:
          type: string
          description: The room's resolution. Allowed values are `720p` or `1080p`.
          example: 720p
          default: 720p
        join_from:
          type: string
          format: date-time
          description: 'Room does not accept new participants before this time. Overridable by token. Expects RFC 3339 datetime: `2022-01-01T23:59:60Z`. Date only: `2022-01-01` will be converted to `2022-01-01T00:00:00Z`'
          example: '2022-01-01T00:00:00Z'
        join_until:
          type: string
          format: date-time
          description: 'Room stops accepting new participants at this time, but keeps running until all participants leave. Overridable by token. Expects RFC 3339 datetime: `2022-01-01T23:59:60Z`. Date only: `2022-01-01` will be converted to `2022-01-01T00:00:00Z`'
          example: '2022-12-31T23:59:59Z'
        remove_at:
          type: string
          format: date-time
          description: 'Remove users from the room at this time. Overridable by token. Expects RFC 3339 datetime: `2022-01-01T23:59:60Z`. Date only: `2022-01-01` will be converted to `2022-01-01T00:00:00Z`'
          example: '2022-12-31T23:59:59Z'
        remove_after_seconds_elapsed:
          type: integer
          format: int32
          description: Remove users after they are in the room for N seconds. Overridable by token.
          example: 120
        layout:
          type: string
          description: The room's initial layout. See documentation for a full list of supported layouts.
          example: grid-responsive
          default: grid-responsive
        record_on_start:
          type: boolean
          description: Specifies whether to start recording a Room Session when one is started for this Room
          example: true
        enable_room_previews:
          type: boolean
          description: Whether a video with a preview of the content of the room is to be generated.
          example: true
        audio_video_sync:
          type: boolean
          description: Enable/disable jitter buffer audio-video sync.
          example: true
      description: Request body for updating a room.
    UpdateStreamRequest:
      type: object
      properties:
        url:
          type: string
          description: RTMP or RTMPS url. This must be the address of a server accepting incoming RTMP/RTMPS streams.
          example: rtmp://broadcaster
      description: Request body for updating a stream.
    VideoStatusCode422:
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/Types.StatusCodes.StatusCode422Error'
      example:
        errors:
          - type: validation_error
            code: invalid_parameter
            message: Name must be present
            attribute: name
            url: https://developer.signalwire.com/rest/signalwire-rest/overview/error-codes#field-invalid-parameter
  securitySchemes:
    BasicAuth:
      type: http
      scheme: Basic
servers:
  - url: https://{space_name}.signalwire.com/api/video
    description: Endpoint
    variables:
      space_name:
        default: '{your_space_name}'
        description: The domain of the users SignalWire space.
