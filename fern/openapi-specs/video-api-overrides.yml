components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
      x-fern-auth:
        scheme: basic
        username:
          name: project_id
          env: SIGNALWIRE_PROJECT_ID
        password:
          name: token
          env: SIGNALWIRE_API_TOKEN

security:
  - BasicAuth: []

paths:
  /rooms:
    get:
      x-fern-sdk-group-name:
        - rooms
      x-fern-sdk-method-name: list_rooms
    post:
      x-fern-sdk-group-name:
        - rooms
      x-fern-sdk-method-name: create_room
  /rooms/{name}:
    get:
      x-fern-sdk-group-name:
        - rooms
      x-fern-sdk-method-name: get_room_by_name
  /rooms/{id}:
    get:
      x-fern-sdk-group-name:
        - rooms
      x-fern-sdk-method-name: get_room
    put:
      x-fern-sdk-group-name:
        - rooms
      x-fern-sdk-method-name: update_room
    delete:
      x-fern-sdk-group-name:
        - rooms
      x-fern-sdk-method-name: delete_room
  /rooms/{id}/streams:
    get:
      x-fern-sdk-group-name:
        - streams
      x-fern-sdk-method-name: list_streams_by_room_id
    post:
      x-fern-sdk-group-name:
        - streams
      x-fern-sdk-method-name: create_stream_by_room_id
  /room_sessions:
    get:
      x-fern-sdk-group-name:
        - roomSessions
      x-fern-sdk-method-name: list_room_sessions
  /room_sessions/{id}:
    get:
      x-fern-sdk-group-name:
        - roomSessions
      x-fern-sdk-method-name: get_room_session
  /room_sessions/{id}/recordings:
    get:
      x-fern-sdk-group-name:
        - roomSessions
      x-fern-sdk-method-name: list_room_recordings_by_session
  /room_sessions/{id}/members:
    get:
      x-fern-sdk-group-name:
        - roomSessions
      x-fern-sdk-method-name: list_room_session_members_by_session
  /room_tokens:
    post:
      x-fern-sdk-group-name:
        - roomTokens
      x-fern-sdk-method-name: create_room_token
  /room_recordings:
    get:
      x-fern-sdk-group-name:
        - roomRecordings
      x-fern-sdk-method-name: list_room_recordings
  /room_recordings/{id}:
    get:
      x-fern-sdk-group-name:
        - roomRecordings
      x-fern-sdk-method-name: get_room_recording
    delete:
      x-fern-sdk-group-name:
        - roomRecordings
      x-fern-sdk-method-name: delete_room_recording
  /conferences:
    get:
      x-fern-sdk-group-name:
        - conferences
      x-fern-sdk-method-name: list_video_conferences
    post:
      x-fern-sdk-group-name:
        - conferences
      x-fern-sdk-method-name: create_video_conference
  /conferences/{id}:
    get:
      x-fern-sdk-group-name:
        - conferences
      x-fern-sdk-method-name: get_video_conference
    put:
      x-fern-sdk-group-name:
        - conferences
      x-fern-sdk-method-name: update_video_conference
    delete:
      x-fern-sdk-group-name:
        - conferences
      x-fern-sdk-method-name: delete_video_conference
  /conferences/{id}/streams:
    get:
      x-fern-sdk-group-name:
        - streams
      x-fern-sdk-method-name: list_streams_by_conference_id
    post:
      x-fern-sdk-group-name:
        - streams
      x-fern-sdk-method-name: create_stream_by_conference_id
  /conferences/{id}/conference_tokens:
    get:
      x-fern-sdk-group-name:
        - conferenceTokens
      x-fern-sdk-method-name: list_conference_tokens
  /conference_tokens/{id}:
    get:
      x-fern-sdk-group-name:
        - conferenceTokens
      x-fern-sdk-method-name: get_conference_token
  /conference_tokens/{id}/reset:
    post:
      x-fern-sdk-group-name:
        - conferenceTokens
      x-fern-sdk-method-name: reset_conference_token
  /logs:
    get:
      x-fern-sdk-group-name:
        - logs
      x-fern-sdk-method-name: list_logs
  /logs/{id}:
    get:
      x-fern-sdk-group-name:
        - logs
      x-fern-sdk-method-name: get_log
  /streams/{id}:
    get:
      x-fern-sdk-group-name:
        - streams
      x-fern-sdk-method-name: get_stream
    put:
      x-fern-sdk-group-name:
        - streams
      x-fern-sdk-method-name: update_stream
    delete:
      x-fern-sdk-group-name:
        - streams
      x-fern-sdk-method-name: delete_stream
