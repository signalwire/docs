                    - inbound
                  digit_termiantors: '#'
                  digit_timeout: 5
                  end_of_speech_timeout: 2
                  eleven_labs_stability: 0.85
                  eleven_labs_similarity: 0.9
                  energy_level: 0.75
                  hold_music: https://cdn.signalwire.com/default-music/hold.mp3
                  hold_on_process: true
                  inactivity_timeout: 60
                  input_poll_freq: 500ms
                  interrupt_on_noise: true
                  interrupt_prompt: Sorry, I didn't catch that. Could you please repeat?
                  languages_enabled: true
                  local_tz: America/Los_Angeles
                  outbound_attention_timeout: 30
                  save_conversation: true
                  swaig_allow_settings: true
                  swaig_allow_swml: true
                  swaig_post_conversation: true
                  transfer_summary: true
                  verbose_logs: true
                  wait_for_user: true
                pronounce:
                  - replace: pizza
                    with: pissa
                    ignore_case: true
                hints:
                  - Ask for pickup or delivery
                  - Confirm order details
                languages:
                  - name: French
                    code: fr-FR
                    voice: fr-FR-Neural2-B
                    function_fillers:
                      - bien
                      - d'accord
                    speech_fillers:
                      - euh
                      - hum
                SWAIG:
                  defaults:
                    web_hook_url: user:pass@https://hooks.example.com
                  native_functions:
                    - check_time
                  includes:
                    - functions:
                        - transfer call
                        - notify kitchen
                      url: user:pass@https://hooks.example.com
                      meta_data: {}
                  functions:
                    - function: get_weather
                      description: Get the weather information
                      parameters:
                        type: object
                        properties: {}
                        required:
                          - name1
                          - name2
                      active: true
                      meta_data: {}
                      meta_data_token: weather-token-123
                      data_map:
                        output:
                          response: Order placed
                          action:
                            - context_switch:
                                system_prompt: {}
                                consolidate: {}
                                user_prompt: {}
                      web_hook_url: user:pass@https://statuscallback.example.com
                      wait_file: https://cdn.signalwire.com/default-music/wait.mp3
                      wait_file_loops: 5
