components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
      x-fern-auth:
        scheme: basic
        username:
          name: project_id
          env: SIGNALWIRE_PROJECT_ID
        password:
          name: token
          env: SIGNALWIRE_API_TOKEN

security:
  - BasicAuth: []

paths:
  /logs:
    get:
      x-fern-sdk-group-name:
        - logs
      x-fern-sdk-method-name: list
  /logs/{id}:
    get:
      x-fern-sdk-group-name:
        - logs
      x-fern-sdk-method-name: retrieve
