x-fern-base-path: /pubsub

components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
      x-fern-auth:
        scheme: basic
        username:
          name: project_id
          env: SIGNALWIRE_PROJECT_ID
        password:
          name: token
          env: SIGNALWIRE_API_TOKEN

security:
  - BasicAuth: []

paths:
  /tokens:
    post:
      x-fern-sdk-group-name:
        - pubsubTokens
      x-fern-sdk-method-name: create_token
