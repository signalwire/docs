components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
      x-fern-auth:
        scheme: basic
        username:
          name: project_id
          env: SIGNALWIRE_PROJECT_ID
        password:
          name: token
          env: SIGNALWIRE_API_TOKEN
    BearerAuth:
      type: http
      scheme: bearer
      x-fern-auth:
        scheme: bearer
        token:
          name: subscriber_token
          env: SIGNALWIRE_SUBSCRIBER_TOKEN

security:
  - BasicAuth: []

