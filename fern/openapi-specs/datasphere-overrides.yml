components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
      x-fern-auth:
        scheme: basic
        username:
          name: project_id
          env: SIGNALWIRE_PROJECT_ID
        password:
          name: token
          env: SIGNALWIRE_API_TOKEN

security:
  - BasicAuth: []

paths:
  /documents:
    get:
      x-fern-sdk-group-name:
        - documents
      x-fern-sdk-method-name: list
    post:
      x-fern-sdk-group-name:
        - documents
      x-fern-sdk-method-name: create
  /documents/search:
    post:
      x-fern-sdk-group-name:
        - documents
      x-fern-sdk-method-name: search
  /documents/{documentId}/chunks:
    get:
      x-fern-sdk-group-name:
        - chunks
      x-fern-sdk-method-name: list
  /documents/{documentId}/chunks/{chunkId}:
    get:
      x-fern-sdk-group-name:
        - chunks
      x-fern-sdk-method-name: get
    delete:
      x-fern-sdk-group-name:
        - chunks
      x-fern-sdk-method-name: delete
  /documents/{id}:
    delete:
      x-fern-sdk-group-name:
        - documents
      x-fern-sdk-method-name: delete
    patch:
      x-fern-sdk-group-name:
        - documents
      x-fern-sdk-method-name: update
components:
  schemas:
    DocumentSearchRequest:
      properties:
        distance:
          maximum: 78
          minimum: 0
