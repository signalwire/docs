x-fern-base-path: /laml/2010-04-01

components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
      x-fern-auth:
        scheme: basic
        username:
          name: project_id
          env: SIGNALWIRE_PROJECT_ID
        password:
          name: token
          env: SIGNALWIRE_API_TOKEN

security:
  - BasicAuth: []

paths:
  /Accounts:
    get:
      x-fern-sdk-group-name:
        - accounts
      x-fern-sdk-method-name: list_accounts
    post:
      x-fern-sdk-group-name:
        - accounts
      x-fern-sdk-method-name: create_subprojects
  /Accounts/{Sid}:
    get:
      x-fern-sdk-group-name:
        - accounts
      x-fern-sdk-method-name: get_account
    post:
      x-fern-sdk-group-name:
        - accounts
      x-fern-sdk-method-name: update_account
  /Accounts/{AccountSid}/Applications:
    get:
      x-fern-sdk-group-name:
        - applications
      x-fern-sdk-method-name: list_applications
    post:
      x-fern-sdk-group-name:
        - applications
      x-fern-sdk-method-name: create_application
  /Accounts/{AccountSid}/Applications/{Sid}:
    get:
      x-fern-sdk-group-name:
        - applications
      x-fern-sdk-method-name: get_application
    post:
      x-fern-sdk-group-name:
        - applications
      x-fern-sdk-method-name: update_application
    delete:
      x-fern-sdk-group-name:
        - applications
      x-fern-sdk-method-name: delete_application
  /Accounts/{AccountSid}/AvailablePhoneNumbers/{IsoCountry}/Local:
    get:
      x-fern-sdk-group-name:
        - availablePhoneNumbers
      x-fern-sdk-method-name: search_local_available_phone_numbers
  /Accounts/{AccountSid}/AvailablePhoneNumbers/{IsoCountry}/TollFree:
    get:
      x-fern-sdk-group-name:
        - availablePhoneNumbers
      x-fern-sdk-method-name: search_toll_free_available_phone_numbers
  /Accounts/{AccountSid}/AvailablePhoneNumbers:
    get:
      x-fern-sdk-group-name:
        - availablePhoneNumbers
      x-fern-sdk-method-name: list_available_phone_number_resources
  /Accounts/{AccountSid}/AvailablePhoneNumbers/{IsoCountry}:
    get:
      x-fern-sdk-group-name:
        - availablePhoneNumbers
      x-fern-sdk-method-name: list_available_phone_number_resources_by_country
  /Accounts/{AccountSid}/Calls:
    get:
      x-fern-sdk-group-name:
        - calls
      x-fern-sdk-method-name: list_all_calls
      parameters:
        - in: query
          name: EndTime
          schema:
            type: string
            description: >-
              The time, in RFC 2822 GMT format, on which the call was
              terminated.
            example: Fri, 21 Sept 2018 10:00:00 +0000
          x-fern-parameter-name: end_time_exact
        - in: query
          name: EndTime<
          schema:
            type: string
            description: >-
              The time, in RFC 2822 GMT format, before which the call was
              terminated.
            example: Fri, 21 Sept 2018 10:00:00 +0000
          x-fern-parameter-name: end_time_before
        - in: query
          name: EndTime>
          schema:
            type: string
            description: >-
              The time, in RFC 2822 GMT format, after which the call was
              terminated.
            example: Fri, 21 Sept 2018 10:00:00 +0000
          x-fern-parameter-name: end_time_after
        - in: query
          name: From
          schema:
            type: string
            description: >-
              The address that initiated the call. Can be either a E.164
              formatted number (`+xxxxxxxxxxx`), or a SIP endpoint
              (`sip:xxx@yyy.zzz`).
            example: '+13103384645'
          x-fern-parameter-name: from
        - in: query
          name: ParentCallSid
          schema:
            type: string
            description: The unique identifier for the call that created this call.
            format: uuid
          x-fern-parameter-name: parent_call_sid
        - in: query
          name: StartTime
          schema:
            type: string
            description: The time, in RFC 2822 GMT format, on which the call began.
            example: Wed, 19 Sept 2018 20:00:01 +0000
          x-fern-parameter-name: start_time_exact
        - in: query
          name: StartTime<
          schema:
            type: string
            description: The time, in RFC 2822 GMT format, before which the call began.
            example: Wed, 19 Sept 2018 20:00:01 +0000
          x-fern-parameter-name: start_time_before
        - in: query
          name: StartTime>
          schema:
            type: string
            description: The time, in RFC 2822 GMT format, after which the call began.
            example: Wed, 19 Sept 2018 20:00:01 +0000
          x-fern-parameter-name: start_time_after
        - in: query
          name: Status
          schema:
            type: string
            description: The status of the call.
            enum:
              - queued
              - ringing
              - in-progress
              - canceled
              - completed
              - busy
              - failed
            example: queued
          x-fern-parameter-name: status
        - in: query
          name: To
          schema:
            type: string
            description: >-
              The address that received the call. Can be either a E.164
              formatted number (`+xxxxxxxxxxx`), or a SIP endpoint
              (`sip:xxx@yyy.zzz`).
            example: '+13105678901'
          x-fern-parameter-name: to
    post:
      x-fern-sdk-group-name:
        - calls
      x-fern-sdk-method-name: create_a_call
  /Accounts/{AccountSid}/Calls/{Sid}:
    get:
      x-fern-sdk-group-name:
        - calls
      x-fern-sdk-method-name: retrieve_a_call
    post:
      x-fern-sdk-group-name:
        - calls
      x-fern-sdk-method-name: update_a_call
    delete:
      x-fern-sdk-group-name:
        - calls
      x-fern-sdk-method-name: delete_a_call
