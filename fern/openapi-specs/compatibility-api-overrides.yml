      x-fern-sdk-method-name: list_incoming_phone_numbers
    post:
      x-fern-sdk-group-name:
        - incomingPhoneNumbers
      x-fern-sdk-method-name: create_incoming_phone_number
  /Accounts/{AccountSid}/IncomingPhoneNumbers/{Sid}:
    get:
      x-fern-sdk-group-name:
