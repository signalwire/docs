# yaml-language-server: $schema=https://schema.buildwithfern.dev/generators-yml.json
api:
  specs:
    - openapi: openapi.yaml
groups:
  ts-sdk:
    generators:
      - name: fernapi/fern-typescript-node-sdk
        version: 2.6.3
        output:
          location: npm
          package-name: signalwire-sdk
        github:
          repository: fern-demo/signalwire-ts-sdk
        config:
          namespaceExport: Signalwire
  python-sdk:
    generators:
      - name: fernapi/fern-python-sdk
        version: 4.25.6
        output:
          location: pypi
          package-name: signalwire-sdk
        github:
          repository: fern-demo/signalwire-python-sdk
        config:
          client:
            class_name: Signalwire
            filename: client.py
          pydantic_config:
            skip_validation: true
          exclude_types_from_init_exports: true
