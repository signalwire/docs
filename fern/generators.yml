# yaml-language-server: $schema=https://schema.buildwithfern.dev/generators-yml.json
api:
  specs:
    # SignalWire REST APIs
    - openapi: openapi-specs/calling.yaml
      namespace: Calling
      overrides: openapi-specs/calling-overrides.yml
    - openapi: openapi-specs/chat.yaml
      namespace: Chat
      overrides: openapi-specs/chat-overrides.yml
    - openapi: openapi-specs/datasphere.yaml
      namespace: Datasphere
      overrides: openapi-specs/datasphere-overrides.yml
    - openapi: openapi-specs/fabric.yaml
      namespace: Fabric
      overrides: openapi-specs/fabric-overrides.yml
    - openapi: openapi-specs/fax.yaml
      namespace: Fax
      overrides: openapi-specs/fax-overrides.yml
    - openapi: openapi-specs/logs.yaml
      namespace: Logs
      overrides: openapi-specs/logs-overrides.yml
    - openapi: openapi-specs/message.yaml
      namespace: Message
      overrides: openapi-specs/message-overrides.yml
    - openapi: openapi-specs/pubsub.yaml
      namespace: Pubsub
      overrides: openapi-specs/pubsub-overrides.yml
    - openapi: openapi-specs/voice.yaml
      namespace: Voice
      overrides: openapi-specs/voice-overrides.yml
    - openapi: openapi-specs/project-api.yaml
      namespace: Project
      overrides: openapi-specs/project-api-overrides.yml
    - openapi: openapi-specs/space-api.yaml
      namespace: Space
      overrides: openapi-specs/space-api-overrides.yml
    - openapi: openapi-specs/video-api.yaml
      namespace: Video
      overrides: openapi-specs/video-api-overrides.yml
    - openapi: openapi-specs/compatibility-api.yaml
      namespace: Compatibility
      overrides: openapi-specs/compatibility-api-overrides.yml
groups:
  ts-sdk:
    generators:
      - name: fernapi/fern-typescript-node-sdk
        version: 3.11.1
        output:
          location: npm
          package-name: signalwire-sdk
        github:
          repository: fern-demo/signalwire-ts-sdk
        config:
          namespaceExport: SignalWire
  python-sdk:
    generators:
      - name: fernapi/fern-python-sdk
        version: 4.31.1
        output:
          location: pypi
          package-name: signalwire-sdk
        github:
          repository: fern-demo/signalwire-python-sdk
        config:
          client:
            class_name: SignalWire
            filename: client.py
          pydantic_config:
            skip_validation: true
          exclude_types_from_init_exports: true
