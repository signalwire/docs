# yaml-language-server: $schema=https://schema.buildwithfern.dev/generators-yml.json
#
# SignalWire Fern API Configuration
# =================================
#
# APIs are now organized using Fern's folder-based structure.
# Each API has its own folder under fern/apis/ with:
#   - generators.yml (API config + OpenAPI settings)
#   - openapi.yaml (the spec)
#   - overrides.yml (Fern-specific overrides)
#
# Available APIs:
#   - Calling, Chat, Datasphere, Fabric, Fax, Logs
#   - Message, Project, Pubsub, Space, Video, Voice
#   - Compatibility (legacy Twilio-compatible API)
#   - CallingRPC (OpenRPC/JSON-RPC)
#
# To add SDK generation, add a 'groups' section to the
# individual API's generators.yml file.
#
# See: https://buildwithfern.com/learn/api-definitions/overview/project-structure
