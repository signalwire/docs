# yaml-language-server: $schema=https://schema.buildwithfern.dev/generators-yml.json
api:
  specs:
    # SignalWire REST APIs
    - openapi: docs/openapi-specs/calling.yaml
      namespace: Calling
    - openapi: docs/openapi-specs/chat.yaml
      namespace: Chat
    - openapi: docs/openapi-specs/datasphere.yaml
      namespace: Datasphere
    - openapi: docs/openapi-specs/fabric.yaml
      namespace: Fabric
    - openapi: docs/openapi-specs/fax.yaml
      namespace: Fax
    - openapi: docs/openapi-specs/logs.yaml
      namespace: Logs
    - openapi: docs/openapi-specs/message.yaml
      namespace: Message
    - openapi: docs/openapi-specs/pubsub.yaml
      namespace: Pubsub
    - openapi: docs/openapi-specs/voice.yaml
      namespace: Voice
    # Additional APIs
    - openapi: docs/openapi-specs/project-api.yaml
      namespace: Project
    - openapi: docs/openapi-specs/space-api.yaml
      namespace: Space
    - openapi: docs/openapi-specs/video-api.yaml
      namespace: Video
    - openapi: docs/openapi-specs/compatibility-api.yaml
      namespace: Compatibility
groups:
  ts-sdk:
    generators:
      - name: fernapi/fern-typescript-node-sdk
        version: 3.11.1
        output:
          location: npm
          package-name: signalwire-sdk
        github:
          repository: fern-demo/signalwire-ts-sdk
        config:
          namespaceExport: Signalwire
  python-sdk:
    generators:
      - name: fernapi/fern-python-sdk
        version: 4.31.1
        output:
          location: pypi
          package-name: signalwire-sdk
        github:
          repository: fern-demo/signalwire-python-sdk
        config:
          client:
            class_name: Signalwire
            filename: client.py
          pydantic_config:
            skip_validation: true
          exclude_types_from_init_exports: true
