  - tab: relay
    # Independent per-tab version selector via Fern variants: Server-side vs
    # Client/browser-side. Each variant points at its own emitted spec
    # (fern/apis/relay-server, fern/apis/relay-client). Switching it here does not
    # affect the REST/JSON-RPC tabs.
    variants:
      - title: Server
        default: true
        layout:
          - section: Core
            contents:
              - page: Overview
                path: ./pages/relay/overview.mdx
              - page: Authentication
                path: ./pages/relay/authentication.mdx
              - page: Events and subscriptions
                path: ./pages/relay/events.mdx
              - page: Connection lifecycle
                path: ./pages/relay/connection-lifecycle.mdx
              - page: Errors
                path: ./pages/relay/errors.mdx
          - api: SignalWire Relay — Server
            api-name: relay-server
            flattened: true
            alphabetized: true
            skip-slug: true
            # Per-command pages are one channel each; Fern treats every channel as its own
            # (unauthenticated) connection, so the per-page playground can't work — hide it here.
            playground:
              hidden: true
            layout:
              - section: Signalwire
                slug: signalwire
                referenced-packages:
                  - signalwireAuthorizationState
                  - signalwireConnect
                  - signalwireDisconnect
                  - signalwirePing
