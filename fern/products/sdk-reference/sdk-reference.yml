tabs:
  reference:
    display-name: Reference
    icon: fa-regular fa-code

# Each SDK is organized into the same four conceptual areas as the hand-written
# server-sdks reference: Core · Agents · RELAY · REST Client. The per-language
# markdown is generated by the Lustri pipeline (namespace_shape reshape); listing
# the four folders explicitly (rather than a single ./<lang> folder) gives a clean,
# curated top-level sidebar and excludes any package-root wrapper pages.
navigation:
  - tab: reference
    variants:
      - title: TypeScript
        icon: brands fa-js
        default: true
        layout:
          - folder: ./typescript/core
            title: Core
            collapsed: false
          - folder: ./typescript/agents
            title: Agents
            collapsed: false
          - folder: ./typescript/relay
            title: RELAY
            collapsed: false
          - folder: ./typescript/rest
            title: REST Client
