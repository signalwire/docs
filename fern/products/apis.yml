          # Generic resource endpoints at top
          - GET /api/fabric/resources
          - GET /api/fabric/resources/{id}
          - DELETE /api/fabric/resources/{id}
          # Sub-sections (alphabetical)
          - section: Addresses
            contents:
              - GET /api/fabric/resources/{id}/addresses
              - GET /api/fabric/addresses
              - GET /api/fabric/addresses/{id}
          - section: AI Agents
            contents:
