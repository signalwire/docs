            contents: []
          - section: cXML Scripts
            slug: cxml-scripts
            referenced-packages:
              - cxmlScripts
            contents: []
          - section: cXML Webhook
            slug: cxml-webhook
            referenced-packages:
              - cxmlWebhook
            contents: []
          - section: FreeSWITCH Connector
            slug: freeswitch-connector
            referenced-packages:
              - freeswitchConnector
            contents: []
          - relayApplication
          - section: SIP Credentials
            referenced-packages:
              - sipCredentials
            contents: []
