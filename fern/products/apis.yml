            referenced-packages:
              - e911Addresses
            contents: []
          - numberGroups
          - numberGroupMembership
          - verifiedCallerId
      - section: Platform
        contents:
          - chatTokens
          - section: Domain Applications
            referenced-packages:
              - fabricDomainApplications
              - spaceDomainApplications
            contents: []
          - multiFactorAuthentication
          - projectTokens
          - section: PubSub Tokens
            slug: pubsub
            referenced-packages:
              - pubSubTokens
            contents: []
          - section: SIP Profile
            referenced-packages:
              - sipProfile
            contents: []
