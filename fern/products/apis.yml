  - api: SignalWire REST API
    api-name: signalwire-rest
    alphabetized: true
    slug: rest
    layout:
      - section: Calling
        contents:
          - calls
          - queues
          - queueMembers
          - recordings
          - section: Video
            contents:
              - conferenceTokens
              - rooms
              - roomRecordings
              - roomSessions
              - roomTokens
              - streams
              - videoConferences
      - section: Datasphere
        contents:
          - chunks
          - documents
      - section: Logs
        contents:
          - conferenceLogs
          - faxLogs
          - messageLogs
          - videoLogs
          - voiceLogs
