# SDKs Product Configuration
# This demonstrates using tabs with variants to show different SDK documentation
# 
# NOTE: Tab variants allow different content within the SAME tab structure.
# All SDK variants share the same tabs (API Reference, Guides).
# The variant selector changes the content within each tab, not the tabs themselves.

tabs:
  api:
    display-name: API Reference
    icon: fa-solid fa-code
  guides:
    display-name: Guides
    icon: fa-solid fa-book

navigation:
  - tab: api
    variants:
      - title: Python SDK
        slug: python
        icon: fa-brands fa-python
        subtitle: Python SDK documentation
        default: true
        layout:
          - section: Getting Started
            contents:
              - page: Installation
                path: ./pages/python/installation.mdx
              - page: Quick Start
                path: ./pages/python/quickstart.mdx
          - section: API Reference
            contents:
              - page: Client
                path: ./pages/python/client.mdx
      - title: TypeScript SDK
        slug: typescript
        icon: fa-brands fa-js
        subtitle: TypeScript SDK documentation
        layout:
          - section: Getting Started
            contents:
              - page: Installation
                path: ./pages/typescript/installation.mdx
              - page: Quick Start
                path: ./pages/typescript/quickstart.mdx
          - section: API Reference
            contents:
              - page: Client
                path: ./pages/typescript/client.mdx
      - title: Go SDK
        slug: go
        icon: fa-brands fa-golang
        subtitle: Go SDK documentation
        layout:
          - section: Getting Started
            contents:
              - page: Installation
                path: ./pages/go/installation.mdx
              - page: Quick Start
                path: ./pages/go/quickstart.mdx
          - section: API Reference
            contents:
              - page: Client
                path: ./pages/go/client.mdx

  - tab: guides
    variants:
      - title: Python SDK
        slug: python
        icon: fa-brands fa-python
        subtitle: Python SDK guides
        default: true
        layout:
          - section: Tutorials
            contents:
              - page: Making Calls
                path: ./pages/python/guides/making-calls.mdx
              - page: Sending Messages
                path: ./pages/python/guides/sending-messages.mdx
      - title: TypeScript SDK
        slug: typescript
        icon: fa-brands fa-js
        subtitle: TypeScript SDK guides
        layout:
          - section: Tutorials
            contents:
              - page: Making Calls
                path: ./pages/typescript/guides/making-calls.mdx
              - page: Sending Messages
                path: ./pages/typescript/guides/sending-messages.mdx
      - title: Go SDK
        slug: go
        icon: fa-brands fa-golang
        subtitle: Go SDK guides
        layout:
          - section: Tutorials
            contents:
              - page: Making Calls
                path: ./pages/go/guides/making-calls.mdx
              - page: Sending Messages
                path: ./pages/go/guides/sending-messages.mdx
