asyncapi: 3.0.0
info:
  title: Relay Kitchen Sink
  version: 1.0.0
defaultContentType: application/json
servers:
  production:
    host: relay.signalwire.com
    protocol: wss
    pathname: /api/relay/wss
    security:
      - $ref: "#/components/securitySchemes/httpBearer"
    bindings:
      ws: {}
channels:
  callingDial:
    address: /
    title: calling.dial
    description: Dial outbound call(s); first to answer wins
    servers:
      - $ref: "#/servers/production"
    messages:
      callingDialRequest:
        $ref: "#/components/messages/callingDialRequest"
      callingDialResponse:
        $ref: "#/components/messages/callingDialResponse"
    bindings:
      ws: {}
  callingCallState:
    address: /
    title: calling.call.state
    servers:
      - $ref: "#/servers/production"
    messages:
      callStateEvent:
        $ref: "#/components/messages/callStateEvent"
    bindings:
      ws: {}
operations:
  callingDial:
    action: send
    channel:
      $ref: "#/channels/callingDial"
    title: calling.dial
    summary: Dial outbound call(s); first to answer wins
    messages:
      - $ref: "#/channels/callingDial/messages/callingDialRequest"
    reply:
      channel:
        $ref: "#/channels/callingDial"
      messages:
        - $ref: "#/channels/callingDial/messages/callingDialResponse"
  onCallingDialResponse:
    action: receive
    channel:
      $ref: "#/channels/callingDial"
    title: calling.dial response
    x-fern-display-name: calling.dial response
    messages:
      - $ref: "#/channels/callingDial/messages/callingDialResponse"
  onCallingCallState:
    action: receive
    channel:
      $ref: "#/channels/callingCallState"
    title: calling.call.state
    x-fern-display-name: calling.call.state
    messages:
      - $ref: "#/channels/callingCallState/messages/callStateEvent"
components:
  schemas:
    Relay.Calling.DialResult:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        call_id:
          type: string
        node_id:
          type: string
      required:
        - code
        - message
    Relay.Calling.DialParams:
      type: object
      properties:
        tag:
          type: string
          description: Identifier added to all call and dial events.
        region:
          type: string
        devices:
          type: array
          items:
            type: array
            items:
              $ref: "#/components/schemas/Relay.Calling.Device"
      required:
        - tag
        - devices
    Relay.Calling.Device:
      type: object
      properties:
        type:
          type: string
      required:
        - type
      discriminator: type
    Relay.Calling.PhoneDevice:
      allOf:
        - $ref: "#/components/schemas/Relay.Calling.Device"
        - type: object
          properties:
            type:
              type: string
              const: phone
            params:
              type: object
              properties:
                from_number:
                  type: string
                to_number:
                  type: string
                timeout:
                  type: integer
                  format: int32
                  minimum: 0
                  default: 30
              required:
                - from_number
                - to_number
          required:
            - type
            - params
    Relay.Calling.SipDevice:
      allOf:
        - $ref: "#/components/schemas/Relay.Calling.Device"
        - type: object
          properties:
            type:
              type: string
              const: sip
            params:
              type: object
              properties:
                from:
                  type: string
                to:
                  type: string
              required:
                - from
                - to
          required:
            - type
            - params
    CallingDialRequest:
      type: object
      required:
        - jsonrpc
        - id
        - method
        - params
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        method:
          type: string
          const: calling.dial
        params:
          $ref: "#/components/schemas/Relay.Calling.DialParams"
    CallingDialResponse:
      type: object
      required:
        - jsonrpc
        - id
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          type: string
          format: uuid
        result:
          $ref: "#/components/schemas/Relay.Calling.DialResult"
    Relay.Calling.CallStateEvent:
      type: object
      properties:
        node_id:
          type: string
        call_id:
          type: string
        call_state:
          type: string
          enum:
            - created
            - ringing
            - answered
            - ending
            - ended
      required:
        - node_id
        - call_id
        - call_state
    CallStateEventFrame:
      type: object
      required:
        - jsonrpc
        - method
        - id
        - params
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        method:
          type: string
          const: signalwire.event
        id:
          type: string
          format: uuid
        params:
          type: object
          required:
            - event_type
            - params
          properties:
            event_type:
              type: string
              const: calling.call.state
            event_channel:
              type: string
            timestamp:
              type: number
            space_id:
              type: string
            project_id:
              type: string
            params:
              $ref: "#/components/schemas/Relay.Calling.CallStateEvent"
  messages:
    callingDialRequest:
      name: calling.dial.request
      title: calling.dial request
      contentType: application/json
      correlationId:
        location: $message.payload#/id
      payload:
        $ref: "#/components/schemas/CallingDialRequest"
    callingDialResponse:
      name: calling.dial.response
      title: calling.dial response
      contentType: application/json
      correlationId:
        location: $message.payload#/id
      payload:
        $ref: "#/components/schemas/CallingDialResponse"
    callStateEvent:
      name: calling.call.state
      title: calling.call.state event
      contentType: application/json
      payload:
        $ref: "#/components/schemas/CallStateEventFrame"
  securitySchemes:
    httpBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
