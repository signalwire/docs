# Compatibility API - outputs to fern/apis/compatibility
extends: ../tspconfig.yaml
# @signalwire/typespec-openapi3 = stock @typespec/openapi3 + @excludeFromEmit
# honoring; a no-op here today, keeps the exclusion invariant uniform.
emit:
  - "@signalwire/typespec-openapi3"

options:
  "@signalwire/typespec-openapi3":
    emitter-output-dir: "{cwd}/../../fern/apis/compatibility"
    output-file: openapi.yaml
    openapi-versions:
      - "3.1.0"
    seal-object-schemas: true
