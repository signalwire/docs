emit:
  - "@signalwire/typespec-asyncapi"

options:
  "@signalwire/typespec-asyncapi":
    emitter-output-dir: "{project-root}/../../fern/apis/relay-single"
    output-file: "relay-single.yaml"
    # Single-channel (idiomatic) output: the whole API on ONE channel, every method an
    # operation routed by the payload. Built from the SAME specs/relay source as relay.yaml.
    # Playground left ENABLED (one connection → connect, then operate).
    channel-mode: "single"
