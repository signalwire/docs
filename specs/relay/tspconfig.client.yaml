emit:
  - "@signalwire/typespec-asyncapi"

options:
  "@signalwire/typespec-asyncapi":
    emitter-output-dir: "{project-root}/../../fern/apis/relay-client"
    output-file: "relay-client.yaml"
    # Multi-channel output for the navigable Relay tab: every operation gets its own
    # root-addressed channel. Its per-page playground can't work (each channel = its own
    # unauthenticated connection); it's hidden in Fern via `playground: { hidden: true }` on the
    # tab's `- api:` entry (apis.yml), not a spec extension.
    channel-mode: "multi"
