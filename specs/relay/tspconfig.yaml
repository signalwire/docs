emit:
  - "@signalwire/typespec-asyncapi"

options:
  "@signalwire/typespec-asyncapi":
    emitter-output-dir: "{project-root}/../../fern/apis/relay"
    output-file: "relay.yaml"
    # Per-command (multi-channel) output for the navigable "Relay" tab. Its per-page playground
    # can't work (each channel = its own unauthenticated connection); it's hidden in Fern via
    # `playground: { hidden: true }` on the tab's `- api:` entry (apis.yml), not a spec extension
    # (Fern's `x-fern-explorer` is OpenAPI-only and is ignored on AsyncAPI docs).
    channel-mode: "per-command"
