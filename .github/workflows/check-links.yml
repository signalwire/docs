name: Check Links

on:
  # Daily check of production (weekdays at 10am UTC)
  schedule:
    - cron: '0 10 * * 1-5'
  # Manual trigger
  workflow_dispatch:
    inputs:
      sitemap_url:
        description: 'Sitemap URL (defaults to production)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  check-links:
    name: Check links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install lychee
        uses: taiki-e/install-action@v2
        with:
          tool: lychee

      - name: Determine sitemap URL
        id: setup
        run: |
          SITEMAP_URL="${{ inputs.sitemap_url }}"
          if [ -z "$SITEMAP_URL" ]; then
            SITEMAP_URL="https://signalwire.docs.buildwithfern.com/sitemap.xml"
          fi
          echo "sitemap_url=${SITEMAP_URL}" >> $GITHUB_OUTPUT

      - name: Run link checker
        id: check
        run: |
          set +e
          node scripts/check-links.js \
            --sitemap "${{ steps.setup.outputs.sitemap_url }}" \
            --no-progress \
            --output /tmp/link-report.md
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Upload link report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-report
          path: /tmp/link-report.md
          if-no-files-found: ignore

      - name: Slack notification (on failure)
        if: steps.check.outputs.exit_code != '0'
        env:
          SLACK_TOKEN: ${{ secrets.FERN_WRITER_SLACK_TOKEN }}
        run: |
          curl -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"channel\":\"C062YDM9GR1\",\"text\":\"❌ Daily link check found broken links.\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>\"}"

      - name: Exit with result
        if: steps.check.outputs.exit_code != '0'
        run: exit 1
