name: preview-docs

on: pull_request

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      preview_url: ${{ steps.generate-docs.outputs.preview_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Fern CLI tool
        run: npm install -g fern-api

      - name: Generate preview URL
        id: generate-docs
        env:
          FERN_TOKEN: ${{ secrets.FERN_TOKEN }}
        run: |
          OUTPUT=$(fern generate --docs --instance signalwire.docs.buildwithfern.com --preview 2>&1) || true
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oP 'Published docs to \K.*(?= \()')
          echo "Preview URL: $URL"
          echo "preview_url=$URL" >> $GITHUB_OUTPUT
          echo "🌿 Preview your docs: $URL" > preview_url.txt

      - name: Comment URL in PR
        uses: thollander/actions-comment-pull-request@v2.4.3
        with:
          filePath: preview_url.txt

  check-links:
    needs: preview
    if: needs.preview.outputs.preview_url != ''
    uses: ./.github/workflows/ferns-links-check.yml
    with:
      sitemap_url: ${{ needs.preview.outputs.preview_url }}/sitemap.xml
      is_pr_check: true
      pr_number: ${{ github.event.pull_request.number }}
    secrets: inherit
