name: preview-docs

on: pull_request

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Fern CLI tool
        run: npm install -g fern-api

      - name: Generate preview URL
        id: generate-docs
        env:
          FERN_TOKEN: ${{ secrets.FERN_TOKEN }}
        run: |
          OUTPUT=$(fern generate --docs --instance signalwire.docs.buildwithfern.com --preview 2>&1) || true
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oP 'Published docs to \K.*(?= \()')
          echo "Preview URL: $URL"
          echo "preview_url=$URL" >> $GITHUB_OUTPUT
          echo "🌿 Preview your docs: $URL" > preview_url.txt

      - name: Comment URL in PR
        uses: thollander/actions-comment-pull-request@v2.4.3
        with:
          filePath: preview_url.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install lychee
        uses: taiki-e/install-action@v2
        with:
          tool: lychee

      - name: Run link checker
        id: check-links
        run: |
          set +e
          node scripts/check-links.js --sitemap "${{ steps.generate-docs.outputs.preview_url }}/sitemap.xml" --no-progress --format json 2>&1 | tee .link-check/lychee-output.json
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Comment link check result
        uses: actions/github-script@v7
        env:
          EXIT_CODE: ${{ steps.check-links.outputs.exit_code }}
        with:
          script: |
            const fs = require('fs');
            const failed = process.env.EXIT_CODE !== '0';
            const MARKER = '<!-- link-checker-bot -->';

            let body = MARKER + '\n';
            if (failed) {
              body += `## ❌ Link Check Failed\n\n`;

              // Try to parse lychee JSON output
              try {
                const outputPath = '.link-check/lychee-output.json';
                if (fs.existsSync(outputPath)) {
                  const raw = fs.readFileSync(outputPath, 'utf8');
                  // Find the JSON object in the output (skip any non-JSON lines)
                  const jsonMatch = raw.match(/\{[\s\S]*\}$/);
                  if (jsonMatch) {
                    const report = JSON.parse(jsonMatch[0]);
                    const failures = report.fail_map || {};
                    const failedUrls = Object.entries(failures);

                    if (failedUrls.length > 0) {
                      body += `Found ${failedUrls.length} broken link(s):\n\n`;
                      body += `| URL | Status |\n|-----|--------|\n`;

                      const maxLinks = 20;
                      failedUrls.slice(0, maxLinks).forEach(([url, errors]) => {
                        const status = errors.map(e => e.status || 'Error').join(', ');
                        body += `| ${url} | ${status} |\n`;
                      });

                      if (failedUrls.length > maxLinks) {
                        body += `\n*...and ${failedUrls.length - maxLinks} more. See full report below.*\n`;
                      }
                    }
                  }
                }
              } catch (e) {
                body += `Broken links were found in the preview.\n`;
              }
            } else {
              body += `## ✅ Link Check Passed\n\n`;
              body += `All links are valid.`;
            }
            body += `\n\n---\n[View full report](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(MARKER));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

      - name: Exit with link check result
        if: steps.check-links.outputs.exit_code != '0'
        run: exit 1
