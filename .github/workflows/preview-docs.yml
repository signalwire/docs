name: preview-docs

on: pull_request

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Fern CLI tool
        run: npm install -g fern-api

      - name: Generate preview URL
        id: generate-docs
        env:
          FERN_TOKEN: ${{ secrets.FERN_TOKEN }}
        run: |
          OUTPUT=$(fern generate --docs --instance signalwire.docs.buildwithfern.com --preview 2>&1) || true
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oP 'Published docs to \K.*(?= \()')
          echo "Preview URL: $URL"
          echo "preview_url=$URL" >> $GITHUB_OUTPUT
          echo "🌿 Preview your docs: $URL" > preview_url.txt

      - name: Comment URL in PR
        uses: thollander/actions-comment-pull-request@v2.4.3
        with:
          filePath: preview_url.txt

      - name: Save preview data for link checker
        run: |
          mkdir -p preview-data
          echo "${{ steps.generate-docs.outputs.preview_url }}" > preview-data/preview_url.txt
          echo "${{ github.event.pull_request.number }}" > preview-data/pr_number.txt

      - name: Upload preview data artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-data
          path: preview-data/
          retention-days: 1
