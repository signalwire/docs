# Lychee link checker configuration
# https://lychee.cli.rs/configuration/

# Verbose program output
# Accepts log level: "error", "warn", "info", "debug", "trace"
verbose = "error"

# Accept these HTTP status codes as valid
accept = [200, 204, 301, 302, 307, 308]

# User agent for requests
user_agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

# Don't show interactive progress bar while checking links.
no_progress = false

# Request timeout in seconds
timeout = 30

# Maximum number of retries per request
max_retries = 3

# Wait time between retries (seconds)
retry_wait_time = 10

# Maximum concurrent requests
max_concurrency = 20

# Only test links with the given schemes (e.g. https).
# Omit to check links with any other scheme.
# At the moment, we support http, https, file, and mailto.
scheme = ["https"]

# When links are available using HTTPS, treat HTTP links as errors.
require_https = true

# Exclude patterns (regex)
exclude = [
  # Placeholder/example URLs
  "^https://example\\.com",
  "^https://github\\.com/owner/repo",
  "github\\.com/your-org/",

  # Analytics and tracking
  "^https://us\\.i\\.posthog\\.com",
  "^https://c\\.vialoops\\.com",
  "_vercel/(speed-)?insights",

  # Sites that block automated requests
  "^https://docs\\.stack-auth\\.com",
  "^https://(www\\.)?linkedin\\.com",
  "^https://(www\\.)?twitter\\.com",
  "^https://x\\.com",
  "^https://www\\.npmjs\\.com",
  "^https://cdn\\.simpleicons\\.org",

  # GitHub blob/tree/tag URLs (verified locally instead)
  "^https://github\\.com/[^/]+/[^/]+/(blob|tree)/",
  "^https://github\\.com/[^/]+/[^/]+/releases/tag/",

  # Non-HTTP schemes
  "^mailto:",
  "^tel:",
  "^javascript:",
  "^#"
]
